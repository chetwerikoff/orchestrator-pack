name: Issue 857 post-remap Pester diagnostic

on:
  push:
    branches:
      - agent/issue-857-binding-contract-v2
    paths:
      - .github/workflows/issue857-retry-diagnostic.yml
  pull_request:
    types: [synchronize]
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Reconstruct candidate diff
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^          python - <<.PY./ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/issue857-regression-diagnostic.yml > /tmp/issue857-apply.py
          python /tmp/issue857-apply.py
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/pr-session-binding-cache.mjs')
          text = path.read_text(encoding='utf-8')
          pairs = [
            (
              "  const store = loaded.store;\n  sweepStaleBindings(store, openPrs, nowMs);\n  const raw = store.records?.[buildSessionBindingKey(repoSlug, id)] ?? null;",
              "  const store = loaded.store;\n  const raw = store.records?.[buildSessionBindingKey(repoSlug, id)] ?? null;\n  sweepStaleBindings(store, openPrs, nowMs);",
            ),
            (
              "  const store = loaded.store, nowMs = n(input.nowMs) || Date.now(), openPrs = array(input.openPrs);\n  sweepStaleBindings(store, openPrs, nowMs);\n  const raw = store.records?.[buildPrBindingKey(repoSlug, targetPr)] ?? null;",
              "  const store = loaded.store, nowMs = n(input.nowMs) || Date.now(), openPrs = array(input.openPrs);\n  const raw = store.records?.[buildPrBindingKey(repoSlug, targetPr)] ?? null;\n  sweepStaleBindings(store, openPrs, nowMs);",
            ),
          ]
          for old, new in pairs:
              if text.count(old) != 1:
                  raise SystemExit(f'candidate ordering block count={text.count(old)}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Capture full Pester
        shell: pwsh
        run: |
          ./scripts/test-all.ps1 -SkipNpm *> issue857-pester-post-remap.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue857-post-remap-pester
          path: issue857-pester-post-remap.log
          if-no-files-found: error
