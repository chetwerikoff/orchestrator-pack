name: issue-841-fix-shard7-classification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Prefer capture-owned missing-binary classification
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/review-start-preflight-shield.mjs')
          text = path.read_text()
          old = """  if (timedOut) {
              return { disposition: 'transient', reason: 'preflight_timeout', transientClass: 'timeout' };
            }

            const text = stderr.toLowerCase();
          """
          new = """  if (timedOut) {
              return { disposition: 'transient', reason: 'preflight_timeout', transientClass: 'timeout' };
            }

            if (parseOk === false && parseReason === 'gh_binary_missing') {
              return { disposition: 'terminal', reason: 'gh_binary_missing', terminalClass: 'config' };
            }

            const text = stderr.toLowerCase();
          """
          if old not in text:
              raise SystemExit('preflight classification insertion point not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm -f .github/workflows/issue-841-shard7-log.yml
          rm -f .github/workflows/issue-841-fix-shard7-classification.yml
          git diff --check
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run focused shard 7 regression
        run: npm test -- scripts/review-start-preflight-shield-terminal.test.ts --reporter=default
      - name: Restore unrelated executable modes
        if: always()
        shell: bash
        run: |
          git checkout -- plugins/ao-codex-pr-reviewer/bin/review.ts \
                          plugins/ao-scope-guard/bin/agent-wrap.ts \
                          plugins/ao-scope-guard/bin/scope-check.ts \
                          plugins/ao-task-declaration/bin/declare.ts \
                          plugins/ao-token-chain-ledger/bin/ledger.mjs || true
      - name: Commit and push cleaned fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/review-start-preflight-shield.mjs
          git add -u .github/workflows
          git commit -m 'fix: preserve missing gh binary classification'
          git push origin HEAD:agent/issue-841-bulk-gate-port
