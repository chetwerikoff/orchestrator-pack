name: issue-923-import-rewrite-helper

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  rewrite:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove terminalized docs imports
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const rewrites = [
            {
              path: 'scripts/pr2-foundation/worker-nudge-claim-store.ts',
              from: "../../docs/worker-nudge-gate.mjs",
              to: './worker-nudge-gate.ts',
            },
            {
              path: 'scripts/pr2-foundation/worker-notification-target.ts',
              from: "../../docs/worker-nudge-gate.mjs",
              to: './worker-nudge-gate.ts',
            },
            {
              path: 'scripts/fleet-liveness.cases.ts',
              from: "../docs/review-head-ready.mjs",
              to: './pr2-foundation/review-head-ready.ts',
            },
          ];
          for (const rewrite of rewrites) {
            const before = fs.readFileSync(rewrite.path, 'utf8');
            if (!before.includes(rewrite.from)) throw new Error(`import not found: ${rewrite.path}`);
            fs.writeFileSync(rewrite.path, before.replaceAll(rewrite.from, rewrite.to), 'utf8');
          }
          fs.rmSync('.github/workflows/issue-923-diagnostics.yml');
          NODE
      - name: Commit import rewrite
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "refactor: remove terminalized docs import edges"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
