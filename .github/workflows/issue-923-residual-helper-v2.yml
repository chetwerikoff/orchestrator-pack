name: issue-923-residual-helper-v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply residual duplicate-group fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding='utf-8')

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              source = read(path)
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              write(path, source.replace(old, new, 1))

          write(
              'scripts/pr2-foundation/mutation-target-check.ts',
              "/** Compatibility CLI: mutation-semantic-check.ts is the single implementation. */\n"
              "import './mutation-semantic-check.ts';\n",
          )

          journal_path = 'scripts/pr2-foundation/worker-dispatch-journal.ts'
          journal = read(journal_path)
          old_prefix = """export const CANONICAL_DISPATCH_SOURCE_BLOB_SHA = 'ffae6481d77e47b6bfded236a7f19b1d1fa5dfc5' as const;
          export const AO_PASTE_CHAR_THRESHOLD = 200;
          export const DISPATCH_OUTCOME_DISPATCHED = 'dispatched' as const;
          export const DISPATCH_OUTCOME_SEND_FAILED = 'send_failed' as const;
          export const DISPATCH_OUTCOME_IN_FLIGHT = 'dispatch_in_flight' as const;
          export const DISPATCH_OUTCOME_UNKNOWN = 'dispatch_unknown' as const;
          export const DRAFT_STATE_AUTO_SUBMITTED = 'auto_submitted' as const;
          export const DRAFT_STATE_DRAFT_PRESENT = 'draft_present' as const;
          export const DELIVERY_PATH_PENDING_DRAFT = 'pending-draft' as const;
          export const DELIVERY_PATH_SELF_SUBMITTED = 'self-submitted' as const;

          """
          new_prefix = """import {
            AO_PASTE_CHAR_THRESHOLD,
            classifyDeliveryPath,
            DELIVERY_PATH_PENDING_DRAFT,
            DELIVERY_PATH_SELF_SUBMITTED,
            deriveMessageShape,
            DISPATCH_OUTCOME_DISPATCHED,
            DISPATCH_OUTCOME_IN_FLIGHT,
            DISPATCH_OUTCOME_SEND_FAILED,
            DISPATCH_OUTCOME_UNKNOWN,
            DRAFT_STATE_AUTO_SUBMITTED,
            DRAFT_STATE_DRAFT_PRESENT,
          } from './terminalized/worker-message-dispatch-observe.ts';

          export {
            AO_PASTE_CHAR_THRESHOLD,
            classifyDeliveryPath,
            DELIVERY_PATH_PENDING_DRAFT,
            DELIVERY_PATH_SELF_SUBMITTED,
            deriveMessageShape,
            DISPATCH_OUTCOME_DISPATCHED,
            DISPATCH_OUTCOME_IN_FLIGHT,
            DISPATCH_OUTCOME_SEND_FAILED,
            DISPATCH_OUTCOME_UNKNOWN,
            DRAFT_STATE_AUTO_SUBMITTED,
            DRAFT_STATE_DRAFT_PRESENT,
          };

          export const CANONICAL_DISPATCH_SOURCE_BLOB_SHA = 'ffae6481d77e47b6bfded236a7f19b1d1fa5dfc5' as const;

          """
          if journal.count(old_prefix) != 1:
              raise SystemExit(f'journal prefix match count: {journal.count(old_prefix)}')
          journal = journal.replace(old_prefix, new_prefix, 1)
          classifier_start = journal.index('export function classifyDeliveryPath(')
          admission_start = journal.index('/**\n * Exact bounded admission semantics', classifier_start)
          journal = journal[:classifier_start] + journal[admission_start:]
          write(journal_path, journal)

          replace_once(
              'scripts/pr2-foundation/terminalized/orchestrator-wake-filter.ts',
              """export interface AoWebhookEvent {
            id?: string;
            type?: string;
            priority?: string;
            sessionId?: string;
            projectId?: string;
            timestamp?: string;
            message?: string;
            data?: Record<string, unknown>;
            [key: string]: unknown;
          }
          """,
              """export type AoWebhookEvent = Record<string, unknown> & {
            id?: string;
            type?: string;
            priority?: string;
            sessionId?: string;
            projectId?: string;
            timestamp?: string;
            message?: string;
            data?: Record<string, unknown>;
          };
          """,
              'wake event type alias',
          )

          replace_once(
              'scripts/pr2-foundation/worker-nudge-gate.ts',
              """  if (!claim || ownerSessionId !== requestedSessionId || !targetId || !targetGeneration) {
              return { ok: false, reason: 'pr_claim_unresolved', verifiable: false };
            }
            return {
          """,
              """  if (!claim || ownerSessionId !== requestedSessionId || !targetId || !targetGeneration) {
              return { ok: false, reason: 'pr_claim_unresolved', verifiable: false };
            }
            const resolvedWorkerTarget = `${targetId}:${targetGeneration}`;
            return {
          """,
              'worker target local value',
          )
          replace_once(
              'scripts/pr2-foundation/worker-nudge-gate.ts',
              "    workerTarget: `${targetId}:${targetGeneration}`,\n",
              "    workerTarget: resolvedWorkerTarget,\n",
              'worker target property',
          )

          foundation_path = 'scripts/pr2-foundation/foundation.test.ts'
          foundation = read(foundation_path)
          test_start = foundation.index("  it('contains no PowerShell and invokes the canonical dispatch journal CLI'")
          test_end = foundation.index('\n  });', test_start) + len('\n  });')
          replacement_test = """  it('contains no PowerShell and invokes the canonical dispatch journal CLI', () => {
            const source = [
              'scripts/lib/pack-review-worker-notification.ts',
              'scripts/pr2-foundation/worker-notification.ts',
              'scripts/pr2-foundation/worker-dispatch-journal.ts',
            ].map((file) => readFileSync(path.join(repoRoot, file), 'utf8')).join('\\n');
            for (const forbidden of [/\\bpwsh\\b/i, /\\.ps1\\b/i]) {
              expect(source).not.toMatch(forbidden);
            }
            for (const required of [
              'worker-message-dispatch-observe',
              'admitDispatchJournalRecord',
              'finalizeDispatchJournalRecord',
            ]) {
              expect(source).toContain(required);
            }
          });"""
          write(foundation_path, foundation[:test_start] + replacement_test + foundation[test_end:])

          port_path = 'scripts/pr2-foundation/terminalized-port.test.ts'
          port = read(port_path)
          assertion_start = port.index('    const expectedSuppressions = FOUNDATION_DOC_ROWS.map')
          assertion_end = port.index('    for (const suppression of suppressions) {', assertion_start)
          replacement_assertions = """    const expectedPairs = FOUNDATION_DOC_ROWS
              .map((source) => [source, targetFor(source)].join('|'))
              .sort();
            const actualPairs = suppressions
              .map((suppression) => suppression.files.join('|'))
              .sort();
            expect(actualPairs).toEqual(expectedPairs);
            expect(suppressions).toHaveLength(FOUNDATION_DOC_ROWS.length);
            expect(suppressions.every((suppression) => suppression.rule === 'duplicate-literal')).toBe(true);
            expect(new Set(suppressions.map((suppression) => suppression.reason))).toEqual(new Set([
              'Issue #923 migration parity until draft 315; remove at cutover',
            ]));
          """
          write(port_path, port[:assertion_start] + replacement_assertions + port[assertion_end:])
          PY

          expected="$RUNNER_TEMP/expected-paths"
          actual="$RUNNER_TEMP/actual-paths"
          cat > "$expected" <<'EOF'
          scripts/pr2-foundation/foundation.test.ts
          scripts/pr2-foundation/mutation-target-check.ts
          scripts/pr2-foundation/terminalized-port.test.ts
          scripts/pr2-foundation/terminalized/orchestrator-wake-filter.ts
          scripts/pr2-foundation/worker-dispatch-journal.ts
          scripts/pr2-foundation/worker-nudge-gate.ts
          EOF
          git diff --name-only | sort > "$actual"
          sort -o "$expected" "$expected"
          diff -u "$expected" "$actual"
          git diff --check

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --pathspec-from-file="$expected"
          git commit -m 'fix: remove residual self-architect duplicates'
      - name: Verify focused contracts and strict self-architect budget
        shell: bash
        run: |
          set -euo pipefail
          npm ci --include=dev
          npm run check:node-major
          npx tsc --project tsconfig.base.json --noEmit
          OPK_VITEST_HARNESS=1 npx vitest run \
            scripts/pr2-foundation/foundation.test.ts \
            scripts/pr2-foundation/terminalized-port.test.ts \
            scripts/pr2-foundation/mutation-catalog.test.ts \
            scripts/pr2-foundation/worker-notification-compat.test.ts
          started="$(date +%s)"
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 \
            -Strict \
            -BaseRef origin/main \
            -HeadRef HEAD
          elapsed=$(( $(date +%s) - started ))
          echo "self_architect_elapsed_seconds=$elapsed"
          test "$elapsed" -lt 600
      - name: Push verified fixes
        shell: bash
        run: git push origin HEAD:agent/issue-923-pr2-foundation
