name: issue-900-review6-publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-review6-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
          fetch-depth: 1

      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0

      - name: Verify payload bytes
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode payload/scripts/toolchain/.issue900-review6.patch.xz.b64 > /tmp/issue900-review6.patch.xz
          test "$(wc -c < /tmp/issue900-review6.patch.xz)" -eq 8528
          test "$(sha256sum /tmp/issue900-review6.patch.xz | awk '{print $1}')" = "90205fec088f46ac0a55b839d80134bca2909e8e2b249e1db0b021cfbd4d5d3b"
          xz --decompress --stdout /tmp/issue900-review6.patch.xz > /tmp/issue900-review6.patch

      - name: Verify exact target head
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "1f2bfb4c21c156527d2dbb553bbcf78c9bd36b83"

      - name: Apply patch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/issue900-review6.patch
          git apply --index /tmp/issue900-review6.patch
          git diff --cached --check

      - name: Verify changed-path allowlist
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git diff --cached --name-only | sort > /tmp/actual-paths.txt
          printf '%s\n' \
            AGENTS.md \
            docs/declarations/900.zz-chatgpt-node22-ts-launcher.json \
            package-lock.json \
            package.json \
            scripts/gate-runner/goldens/pre-delete-captures.json \
            scripts/toolchain/check-typescript-runtime-policy.ts \
            scripts/toolchain/node22-runtime-policy.spec.ts \
            > /tmp/expected-paths.txt
          diff -u /tmp/expected-paths.txt /tmp/actual-paths.txt

      - name: Commit staged patch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: close Node 22 workspace and YAML policy gaps"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: target/package-lock.json

      - name: Install dependencies
        working-directory: target
        run: npm ci

      - name: Validate latest review fixes
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          npm run check:node-major
          npm run typecheck:foundation
          npx tsc -p tsconfig.base.json --noEmit
          npm run lint:foundation
          npm run test:issue-900
          npm run gate-runner-selftest
          node scripts/run-vitest-with-harness.mjs run plugins/ao-codex-pr-reviewer
          node scripts/run-vitest-with-harness.mjs run plugins/ao-scope-guard
          node scripts/run-vitest-with-harness.mjs run plugins/ao-task-declaration
          node scripts/run-vitest-with-harness.mjs run plugins/ao-token-chain-ledger
          git fetch origin main:refs/remotes/origin/main --no-tags
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 -Strict -BaseRef origin/main -HeadRef HEAD

      - name: Push review fixes
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:agent/issue-900-node22-runtime
