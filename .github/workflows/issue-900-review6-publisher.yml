name: issue-900-review6-publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-review6-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
          fetch-depth: 1

      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0

      - name: Reconstruct no-dependency patch
        shell: bash
        run: |
          set -euo pipefail
          cat payload/scripts/toolchain/no-yaml.0{0,1,2,3} > /tmp/issue900-no-yaml.patch.xz.b64
          test "$(wc -c < /tmp/issue900-no-yaml.patch.xz.b64)" -eq 5164
          base64 --decode /tmp/issue900-no-yaml.patch.xz.b64 > /tmp/issue900-no-yaml.patch.xz
          test "$(wc -c < /tmp/issue900-no-yaml.patch.xz)" -eq 3872
          test "$(sha256sum /tmp/issue900-no-yaml.patch.xz | awk '{print $1}')" = "1b20dd8ef1bd6f629cc40b66d22f086333318650d2fe0156bae176ce1f2ff9c0"
          xz --decompress --stdout /tmp/issue900-no-yaml.patch.xz > /tmp/issue900-no-yaml.patch

      - name: Apply exact no-dependency patch
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "03d1aaa8d733866c628625d33ba2903bed754a7a"
          git apply --check /tmp/issue900-no-yaml.patch
          git apply --index /tmp/issue900-no-yaml.patch
          git diff --cached --check
          git diff --cached --name-only | sort > /tmp/actual-paths.txt
          printf '%s\n' \
            package-lock.json \
            package.json \
            scripts/toolchain/check-typescript-runtime-policy.ts \
            > /tmp/expected-paths.txt
          diff -u /tmp/expected-paths.txt /tmp/actual-paths.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: remove YAML registry dependency from runtime policy"

      - name: Push no-dependency policy fix
        working-directory: target
        shell: bash
        run: git push origin HEAD:agent/issue-900-node22-runtime
