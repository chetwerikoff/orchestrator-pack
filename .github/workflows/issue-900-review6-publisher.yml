name: issue-900-review6-publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-review6-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
          fetch-depth: 1

      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0

      - name: Reconstruct lock cleanup
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode payload/scripts/toolchain/lock-clean.patch.xz.b64 > /tmp/issue900-lock-clean.patch.xz
          test "$(wc -c < /tmp/issue900-lock-clean.patch.xz)" -eq 564
          test "$(sha256sum /tmp/issue900-lock-clean.patch.xz | awk '{print $1}')" = "c802778be0e74ebda8e738f07a814c08c19c7cc0fd4e922a2e1a1735cb1cee50"
          xz --decompress --stdout /tmp/issue900-lock-clean.patch.xz > /tmp/issue900-lock-clean.patch

      - name: Apply exact lock cleanup
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "f5019ecc9391acd974ca7a237fe047a2b833322f"
          git apply --check /tmp/issue900-lock-clean.patch
          git apply --index /tmp/issue900-lock-clean.patch
          git diff --cached --check
          test "$(git diff --cached --name-only)" = "package-lock.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: remove stale YAML registry lock entry"

      - name: Push clean lockfile
        working-directory: target
        shell: bash
        run: git push origin HEAD:agent/issue-900-node22-runtime
