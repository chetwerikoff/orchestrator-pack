name: issue-900-final-rollback-proof

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  rollback-proof:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout final PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/916/merge
          fetch-depth: 0

      - name: Prove one-revert rollback on final head
        shell: bash
        run: |
          set -euo pipefail
          merge_sha="$(git rev-parse HEAD)"
          read -r _ first_parent pr_parent <<< "$(git rev-list --parents -n 1 HEAD)"
          test "$pr_parent" = "14477d33d80eed47b3a79e55e4bcf85e0c06820b"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert -m 1 --no-edit "$merge_sha"
          revert_sha="$(git rev-parse HEAD)"
          test "$(git rev-parse HEAD^{tree})" = "$(git rev-parse "$first_parent^{tree}")"
          {
            printf 'merge_sha=%s\n' "$merge_sha"
            printf 'pr_parent=%s\n' "$pr_parent"
            printf 'first_parent=%s\n' "$first_parent"
            printf 'revert_sha=%s\n' "$revert_sha"
            printf 'tree_match=true\n'
          } | tee issue-900-final-rollback-proof.txt

      - name: Upload rollback proof
        uses: actions/upload-artifact@v4
        with:
          name: issue-900-final-rollback-proof
          path: issue-900-final-rollback-proof.txt
