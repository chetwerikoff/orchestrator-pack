name: issue-900-review6-publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-review6-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
          fetch-depth: 1

      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0

      - name: Verify plain lock cleanup patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(wc -c < payload/scripts/toolchain/lock-clean.patch)" -eq 872
          test "$(sha256sum payload/scripts/toolchain/lock-clean.patch | awk '{print $1}')" = "5a1f5ed9975346ef61a5b9f40baf317d59e65ca27de55cae834edab7b77f73a7"

      - name: Apply exact lock cleanup
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "f5019ecc9391acd974ca7a237fe047a2b833322f"
          git apply --check ../payload/scripts/toolchain/lock-clean.patch
          git apply --index ../payload/scripts/toolchain/lock-clean.patch
          git diff --cached --check
          test "$(git diff --cached --name-only)" = "package-lock.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: remove stale YAML registry lock entry"

      - name: Push clean lockfile
        working-directory: target
        shell: bash
        run: git push origin HEAD:agent/issue-900-node22-runtime
