name: issue-839-global-baselines-fix

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - name: Remove retired entrypoint from Wave B inventory
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('scripts/json-producers/wave-b-inventory.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          before = len(data['rows'])
          data['rows'] = [row for row in data['rows'] if row.get('path') != 'scripts/ao-review.ps1']
          if before - len(data['rows']) != 1:
              raise SystemExit('expected exactly one scripts/ao-review.ps1 Wave B inventory row')
          path.write_text(json.dumps(data, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Regenerate PowerShell child-test baseline
        run: node --experimental-strip-types scripts/toolchain/check-pwsh-test-growth.ts --write-baseline
      - name: Verify global guards
        shell: bash
        run: |
          set -euo pipefail
          npm run test:foundation
          PR_BASE_SHA='${{ github.event.pull_request.base.sha }}' npm run check:pwsh-test-growth
      - name: Commit baseline fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/json-producers/wave-b-inventory.json scripts/toolchain/powershell-child-tests.json
          git commit -m 'Update inventories after retiring ao-review shim'
          git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983714885 --field body="Issue #839 global baseline fix run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID conclusion=${{ job.status }}"
