name: issue-923-final-parser-fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Fix parser-safe interpolation
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          wrapper = Path('scripts/lib/WorkerReportStore.ps1')
          text = wrapper.read_text(encoding='utf-8')
          before = 'exited $LASTEXITCODE: $stderr'
          after = 'exited ${LASTEXITCODE}: $stderr'
          if before not in text:
              raise RuntimeError('parser-unsafe interpolation not found')
          wrapper.write_text(text.replace(before, after), encoding='utf-8')
          Path('.github/workflows/issue-923-regression-diagnostics.yml').unlink()
          PY
      - name: Commit fix and self-removal
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: make TypeScript bridge diagnostics parser-safe"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
