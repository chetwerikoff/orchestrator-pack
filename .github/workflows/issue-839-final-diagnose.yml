name: issue-839-final-diagnose

on:
  push:
    branches:
      - issue-839-pack-review-runner-v2

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev --silent
      - name: Capture verifier
        id: verify
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/verify.ps1 *>&1 | Tee-Object -FilePath /tmp/issue-839-verify.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Capture heavy topology planner
        id: topology
        continue-on-error: true
        shell: bash
        env:
          PR_BASE_SHA: b7394065b9ee1b046abb4cf29aff456df1935571
          PR_HEAD_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
          node scripts/emit-vitest-heavy-topology.mjs --gha-output 2>&1 | tee /tmp/issue-839-topology.log
      - name: Publish exact diagnostics
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY: ${{ steps.verify.outcome }}
          TOPOLOGY: ${{ steps.topology.outcome }}
        shell: bash
        run: |
          {
            echo '## Issue #839 final CI diagnosis'
            echo
            echo "verify=$VERIFY topology=$TOPOLOGY"
            echo
            echo '### verify.ps1'
            echo '```text'
            tail -c 24000 /tmp/issue-839-verify.log 2>/dev/null || true
            echo '```'
            echo
            echo '### heavy topology'
            echo '```text'
            cat /tmp/issue-839-topology.log 2>/dev/null || true
            echo '```'
          } >/tmp/issue-839-diagnosis.md
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/issue-839-diagnosis.md
