name: issue-839-finalize-node20

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-839-final-diagnose-845
  cancel-in-progress: true

jobs:
  fix-and-push:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - name: Apply minimal Node-version-aware adapter fix
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/lib/Invoke-AoReviewApi.ps1')
          text = path.read_text(encoding='utf-8')

          old = ". (Join-Path $PSScriptRoot 'MechanicalReconcileNode.ps1')\n"
          new = old + ". (Join-Path $PSScriptRoot 'Invoke-TypeScriptCli.ps1')\n"
          if text.count(old) != 1 or "Invoke-TypeScriptCli.ps1" in text:
              raise SystemExit('unexpected TypeScript CLI helper import state')
          text = text.replace(old, new)

          old = "        $raw = $json | & node --disable-warning=ExperimentalWarning --experimental-strip-types $trusted.runner $Subcommand 2>&1"
          new = "        $nodeArgs = @(Get-OpkTypeScriptNodeArguments -ScriptPath $trusted.runner)\n        $nodeArgs += $Subcommand\n        $raw = $json | & node @nodeArgs 2>&1"
          if text.count(old) != 1:
              raise SystemExit('expected exactly one direct Node 22-only runner invocation')
          text = text.replace(old, new)

          old = '    return "node --experimental-strip-types $($trusted.runner) start --session-id $SessionId --claim-mode preacquired"'
          new = "    $nodeArgs = @(Get-OpkTypeScriptNodeArguments -ScriptPath $trusted.runner)\n    $nodeArgs += @('start', '--session-id', $SessionId, '--claim-mode', 'preacquired')\n    return ('node ' + ($nodeArgs -join ' '))"
          if text.count(old) != 1:
              raise SystemExit('expected exactly one Node 22-only diagnostic invocation line')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

          rm -f .github/workflows/issue-839-final-diagnose.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lib/Invoke-AoReviewApi.ps1 .github/workflows/issue-839-final-diagnose.yml
          git commit -m 'Use shared Node 20 TypeScript loader for review adapter'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev --silent
      - name: Review adapter regression on Node 20
        run: node scripts/run-vitest-with-harness.mjs run scripts/ao-0-10-review-trigger.test.ts
      - name: Plan heavy topology from candidate commit
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head HEAD)"
          node scripts/emit-vitest-heavy-topology.mjs --gha-output
      - name: Push verified candidate
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983714885 --field body="Issue #839 Node 20 candidate publish failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
