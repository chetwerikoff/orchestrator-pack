name: issue-839-final-diagnose

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: issue-839-final-diagnose-845
  cancel-in-progress: true

jobs:
  verify:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture verifier
        id: verify
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/verify.ps1 *>&1 | Tee-Object -FilePath /tmp/issue-839-verify.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Publish verifier output
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.verify.outcome }}
        shell: bash
        run: |
          {
            echo '## Issue #839 verify.ps1 diagnosis'
            echo
            echo "outcome=$OUTCOME"
            echo '```text'
            tail -c 50000 /tmp/issue-839-verify.log 2>/dev/null || true
            echo '```'
          } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md

  topology:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev --silent
      - name: Capture heavy topology planner
        id: topology
        continue-on-error: true
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
          node scripts/emit-vitest-heavy-topology.mjs --gha-output 2>&1 | tee /tmp/issue-839-topology.log
      - name: Publish topology output
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.topology.outcome }}
        shell: bash
        run: |
          {
            echo '## Issue #839 heavy-topology diagnosis'
            echo
            echo "outcome=$OUTCOME"
            echo '```text'
            cat /tmp/issue-839-topology.log 2>/dev/null || true
            echo '```'
          } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983714885 --field body=@/tmp/report.md

  light:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev --silent
      - name: Capture Vitest light lane
        id: light
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/run-vitest-light-lane.ps1 *>&1 | Tee-Object -FilePath /tmp/issue-839-light.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Publish light-lane output
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.light.outcome }}
        shell: bash
        run: |
          {
            echo '## Issue #839 Vitest light-lane diagnosis'
            echo
            echo "outcome=$OUTCOME"
            echo '```text'
            tail -c 50000 /tmp/issue-839-light.log 2>/dev/null || true
            echo '```'
          } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983741292 --field body=@/tmp/report.md
