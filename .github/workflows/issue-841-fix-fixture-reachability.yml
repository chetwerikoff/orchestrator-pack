name: issue-841-fix-fixture-reachability

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Exclude fixture evidence from production deletion formula
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/reachability-purge.mjs')
          text = path.read_text(encoding='utf-8')
          old = "function isDeletionGraphNode(rel) {\n  if (!isGraphNode(rel) || isTestFile(rel)) return false;"
          new = "function isDeletionGraphNode(rel) {\n  if (!isGraphNode(rel) || isTestFile(rel) || rel.startsWith('scripts/fixtures/')) return false;"
          if old not in text:
              raise SystemExit('reachability classifier target not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run focused reachability regression through pack harness
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Root = $env:GITHUB_WORKSPACE
          $env:CI = 'true'
          $env:VITEST_CI_LIGHT_LANE = '1'
          $env:OPK_TESTMODE_FLEET_WORKSPACE_ROOT = $Root
          . (Join-Path $Root 'scripts/lib/Set-OpkVitestHarnessEnv.ps1')
          Set-OpkVitestHarnessEnv | Out-Null
          Push-Location $Root
          try {
            & npm test -- scripts/reachability-purge.test.ts --reporter=default
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          finally {
            Pop-Location
          }
      - name: Validate diff
        shell: bash
        run: git diff --check
      - name: Cancel temporary-head scope run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&head_sha=$PR_HEAD_SHA&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Remove temporary workflow and push fix
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-fix-fixture-reachability.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: exclude gate fixtures from reachability deletion formula'
          git push origin HEAD:agent/issue-841-bulk-gate-port
