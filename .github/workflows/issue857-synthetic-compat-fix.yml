name: Issue 857 synthetic compatibility fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply resolver compatibility boundary
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          resolver = Path('docs/session-pr-binding-resolver.mjs')
          text = resolver.read_text()

          old_detail = """export function sessionDetailFromSessionGetPayload(payload) {
            const row = payload && typeof payload === 'object' && payload.session ? payload.session : payload;
            if (!row || typeof row !== 'object' || hasDaemonPrListField(row)) return null;
            const value = normalizeString(row[LEGACY_DISPLAY_KEY]);
            return value ? { [LEGACY_DISPLAY_KEY]: value } : null;
          }

          export function shouldEnrichSessionDetailFromGet(session) {
            if (!session || typeof session !== 'object' || hasDaemonPrListField(session)) return false;
            if (getExplicitSessionPrNumber(session) > 0) return false;
            const rowDisplay = normalizeString(legacySessionField(session, LEGACY_DISPLAY_KEY));
            if (rowDisplay && /^\\d+$/.test(rowDisplay)) return false;
            const role = normalizeString(session?.role).toLowerCase();
            if (role && role !== 'worker' && role !== 'coding') return false;
            return Boolean(getSessionIdentifier(session));
          }
          """
          new_detail = """export function sessionDetailFromSessionGetPayload(_ignoredPayload) {
            return null;
          }

          export function shouldEnrichSessionDetailFromGet(_ignoredSession) {
            return false;
          }
          """
          if text.count(old_detail) != 1:
            raise SystemExit(f'detail block count={text.count(old_detail)}')
          text = text.replace(old_detail, new_detail)

          old_display_helper = """function numericLegacyDisplayCorroboratesPr(session, pr, options = {}) {
            const issueNumber = getSessionIssueNumber(session);
            const targetHead = normalizeSha(options.headSha);
            let hasSignal = false;
            let corroborated = true;
            if (targetHead) {
              hasSignal = true;
              const prHead = normalizeSha(pr?.headRefOid);
              if (!prHead || prHead !== targetHead) corroborated = false;
            }
            if (issueNumber > 0) {
              hasSignal = true;
              const headName = normalizeString(pr?.headRefName ?? pr?.head);
              if (!headRefCorrelatesToIssue(headName, issueNumber, session)) corroborated = false;
            }
            return hasSignal && corroborated;
          }

          """
          if text.count(old_display_helper) != 1:
            raise SystemExit(f'display helper count={text.count(old_display_helper)}')
          text = text.replace(old_display_helper, '')

          old_live_block = """  const detailValue = options.sessionDetail && typeof options.sessionDetail === 'object'
            ? options.sessionDetail[LEGACY_DISPLAY_KEY]
            : undefined;
            const explicitSessionHead = normalizeSha(session?.ownedHeadSha ?? session?.headRefOid);
            if (detailValue && /^\\d+$/.test(normalizeString(detailValue)) && explicitSessionHead) {
              const displayPr = numberOrZero(detailValue);
              const displayPrRow = prList.find((pr) => numberOrZero(pr?.number) === displayPr);
              if (displayPr > 0 && displayPrRow && numericLegacyDisplayCorroboratesPr(
                session,
                displayPrRow,
                { ...options, headSha: explicitSessionHead },
              )) {
                return { bound: true, prNumber: displayPr, source: 'display_name', enriched: true };
              }
            }

          """
          new_live_block = """  // Compatibility for pack-owned synthetic rows only. AO daemon list rows always
            // own the `prs` field, including the explicit empty-array UNBOUND case.
            if (!hasDaemonPrListField(session)) {
              const syntheticPr = getExplicitSessionPrNumber(session);
              const requestedHead = normalizeSha(options.headSha);
              const syntheticRow = prList.find((pr) => (
                numberOrZero(pr?.number) === syntheticPr &&
                repoScopeMatches(getOpenPrRepoSlug(pr), expectedRepo) &&
                !prIsTerminal(pr)
              ));
              const openPrHead = normalizeSha(syntheticRow?.headRefOid);
              const sessionHead = normalizeSha(session?.ownedHeadSha ?? session?.headRefOid);
              if (
                syntheticPr > 0 &&
                requestedHead &&
                openPrHead === requestedHead &&
                (!sessionHead || sessionHead === requestedHead)
              ) {
                return {
                  bound: true,
                  prNumber: syntheticPr,
                  source: 'issue_correlation',
                  bindingSource: 'issue_correlation',
                  enriched: false,
                  liveSource: 'issue_correlation',
                  trustRank: 300,
                  repoSlug: getOpenPrRepoSlug(syntheticRow, expectedRepo),
                };
              }
            }

          """
          if text.count(old_live_block) != 1:
            raise SystemExit(f'live block count={text.count(old_live_block)}')
          text = text.replace(old_live_block, new_live_block)
          resolver.write_text(text)

          declaration = Path('docs/session-pr-binding-resolver.d.mts')
          dts = declaration.read_text()
          old_decl = """/** Compatibility export; any argument is ignored and retired daemon-row aliases are never read. */
          export declare function getExplicitSessionPrNumber(ignoredSession?: unknown): 0;
          """
          new_decl = """/** Pack-owned synthetic-row compatibility; live AO rows with `prs` never read aliases. */
          export declare function getExplicitSessionPrNumber(syntheticSession?: unknown): number;
          """
          if dts.count(old_decl) != 1:
            raise SystemExit(f'declaration count={dts.count(old_decl)}')
          declaration.write_text(dts.replace(old_decl, new_decl))

          test_path = Path('scripts/session-pr-binding-resolver.test.ts')
          tests = test_path.read_text()
          old_fixture = """      status: 'working',
                repoSlug,
              };
          """
          new_fixture = """      status: 'working',
                repoSlug,
                prs: [],
              };
          """
          if tests.count(old_fixture) != 1:
            raise SystemExit(f'retired fixture count={tests.count(old_fixture)}')
          tests = tests.replace(old_fixture, new_fixture)

          marker = """  });
          });

          describe('session-pr-binding-resolver scenario matrix', () => {
          """
          insertion = """  });

            it('accepts only head-corroborated synthetic prNumber rows without a prs field', () => {
              const synthetic = {
                name: 'synthetic-linked-worker',
                sessionId: 'synthetic-linked-worker',
                role: 'worker',
                status: 'working',
                prNumber: 690,
              };
              const binding = resolveSessionPrBinding(synthetic, [openPr690], { headSha, repoSlug });
              expect(binding.bound).toBe(true);
              expect(binding.prNumber).toBe(690);
              expect(binding.bindingSource).toBe('issue_correlation');
              expect(binding.enriched).toBe(false);

              expect(resolveSessionPrBinding({ ...synthetic, prs: [] }, [openPr690], { headSha, repoSlug }).bound).toBe(false);
              expect(resolveSessionPrBinding(synthetic, [openPr690], {
                headSha: 'cccccccccccccccccccccccccccccccccccccccc',
                repoSlug,
              }).bound).toBe(false);
            });
          });

          describe('session-pr-binding-resolver scenario matrix', () => {
          """
          if tests.count(marker) != 1:
            raise SystemExit(f'test insertion marker count={tests.count(marker)}')
          test_path.write_text(tests.replace(marker, insertion))
          PY
      - name: Validate affected surfaces
        shell: bash
        run: |
          set -euo pipefail
          node --check docs/session-pr-binding-resolver.mjs
          npm test -- \
            scripts/session-pr-binding-resolver.test.ts \
            scripts/review-finding-delivery-submit.test.ts \
            scripts/review-ready-stuck-guard.test.ts \
            scripts/worker-report-store.test.ts \
            scripts/worker-status-store.test.ts
          npx tsc --project tsconfig.base.json --noEmit
          node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs
          pwsh -NoLogo -NoProfile -File ./scripts/install-pester-ci.ps1
          pwsh -NoLogo -NoProfile -File ./scripts/test-all.ps1 -SkipNpm
          git diff --check
      - name: Commit validated compatibility
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/session-pr-binding-resolver.mjs docs/session-pr-binding-resolver.d.mts scripts/session-pr-binding-resolver.test.ts
          git commit -m 'Preserve head-corroborated synthetic binding compatibility'
          git push origin HEAD:agent/issue-857-binding-contract-v2
