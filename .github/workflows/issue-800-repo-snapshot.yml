name: Apply issue 800 implementation

on:
  push:
    branches:
      - agent/issue-800-typescript-foundation
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-800-typescript-foundation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Reassemble verified implementation archive
        shell: bash
        run: |
          set -euo pipefail
          : > /tmp/issue800-small.b64
          fetch_chunk() {
            local sha="$1"
            local expected="$2"
            local target="/tmp/${sha}.chunk"
            curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/blobs/${sha}" \
              -o "${target}"
            echo "${expected}  ${target}" | sha256sum -c -
            cat "${target}" >> /tmp/issue800-small.b64
          }
          fetch_chunk dd64dfa027d16c0dfc1de7d2db2af171e3ad3040 93aea59663319c79d592c7b4c872bb471a1435b41aaf3666f3c6666941b77ce1
          fetch_chunk d6a7fe1703a43adcc129833ae15cbc7fd1ad345b 1b5f39f598b34d40a4cf19f1b56dd9a7cce2887c6e32641ca9dc5a3d30ba3d1f
          fetch_chunk a6bb9f5bc613fec20aeab95a53f7d09e32373c9d 6cfdfcd80021446b290137982ab2848b1ef210901f4506f9e85fa2554ccd2597
          fetch_chunk 7e6f647fde2432ed29a6de590ebe4941aeda4a63 2229f588320b489f534f42d2ae3c6d26cf5492df546c493f90e1a5b2721decf2
          fetch_chunk 82cff6fb9ba82a312a9ff7256667fe5736967d34 a68462f988fd3904505377f003c527170bb608d5df2abdbd990147dcafc8018f
          echo "fbcfca190c40eae1c30952cd068b207e245d35fd7f3db19a0f4245cd6e9453dd  /tmp/issue800-small.b64" | sha256sum -c -
          base64 --decode /tmp/issue800-small.b64 > /tmp/issue800-small.tar.xz
          echo "134f5b51e40347882474084a3c12fa286d494de97d02ff70cbb7f2ff74bb956f  /tmp/issue800-small.tar.xz" | sha256sum -c -
          tar -xJf /tmp/issue800-small.tar.xz
      - name: Update lock metadata and migration notes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          lock_path = Path('package-lock.json')
          lock = json.loads(lock_path.read_text(encoding='utf-8'))
          lock['packages']['']['engines'] = {'node': '22.x'}
          lock_path.write_text(json.dumps(lock, indent=2) + '\n', encoding='utf-8')

          notes_path = Path('docs/migration_notes.md')
          notes = notes_path.read_text(encoding='utf-8')
          section = '''
          ## TypeScript migration foundation (Issue #800)

          This change adds the directly executable TypeScript runtime, strict typecheck and policy lint,
          the sanctioned subprocess/JSON kernels, and the PowerShell-child-test growth baseline. It is
          additive: no live PowerShell consumer or on-disk JSON artifact is migrated by this PR.

          ### Operator adoption: required status checks

          After the PR is merged and the jobs have reported at least once on `main`, add these exact check
          names to the `main` branch protection required-status set:

          - `TypeScript runtime (Node 22)`
          - `TypeScript strict typecheck`
          - `TypeScript policy lint`
          - `TypeScript kernel tests`
          - `PowerShell child-test growth guard`

          Verify adoption in repository branch-protection settings (or through the GitHub branch-protection
          API) by recording evidence that all five names appear in the required-check set. Then open or
          refresh a test pull request and confirm that GitHub waits for every listed job before allowing the
          merge button to become eligible. The workflow landing alone does not make these checks
          merge-blocking; only this verified settings step does.

          ### Rollback pairing

          The code rollback is a single `git revert` of the merge commit because this PR has no live
          TypeScript consumers and changes no persisted artifact format. Before or together with that revert,
          remove the five names above from branch protection. After the revert, refresh an open pull request
          and confirm mergeability: no required check may remain that can no longer report. Later migration
          PRs may depend on these kernels only after this foundation has merged and remained green.

          '''
          if '## TypeScript migration foundation (Issue #800)' not in notes:
              marker = '# Migration notes\n'
              if marker not in notes:
                  raise SystemExit('migration notes heading not found')
              notes = notes.replace(marker, marker + '\n' + section, 1)
              notes_path.write_text(notes, encoding='utf-8')
          PY
      - name: Install frozen dependencies
        run: npm ci --include=dev
      - name: Generate exact current baselines
        run: |
          node --experimental-strip-types scripts/toolchain/check-ts-policy.ts --write-baseline
          node --experimental-strip-types scripts/toolchain/check-pwsh-test-growth.ts --write-baseline
      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          npm run ts:smoke
          npm run check:node-major
          npm run typecheck:foundation
          npm run lint:foundation
          npm run check:pwsh-test-growth
          npm run test:foundation
          git diff --check
          test -z "$(git diff --name-only -- '*.ps1' 'tests/external-output-references/**' 'packages/core/**' 'vendor/**' '.ao/**' 'prompts/**' 'docs/declarations/**')"
      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- .nvmrc tsconfig.json package.json package-lock.json docs/migration_notes.md scripts/kernel scripts/toolchain scripts/typescript-smoke.ts .github/workflows/typescript-foundation.yml
          git diff --cached --check
          git commit -m "Establish TypeScript kernel and toolchain foundation"
          git push origin HEAD:agent/issue-800-typescript-foundation
