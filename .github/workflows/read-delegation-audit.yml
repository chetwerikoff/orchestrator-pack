name: read-delegation-audit

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-policy:
    name: Read-delegation audit policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Capture issue 771 structural findings
        shell: pwsh
        run: ./scripts/check-read-delegation-policy-consistency.ps1

      - name: Publish structural findings
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/issue-771-structural-result.log
          git commit -m '[issue771-structural-result] Capture structural findings'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
