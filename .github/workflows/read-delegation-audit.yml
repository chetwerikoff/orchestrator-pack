name: read-delegation-audit

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-policy:
    name: Read-delegation audit policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Checkout PR 773 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-powershell-scope
          path: target
          fetch-depth: 1

      - name: Fix publisher runtime anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/publish-issue-771-fix.py')
          text = path.read_text(encoding='utf-8')
          old_wake = '''def patch_wake(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              top_level = ". (Join-Path $PSScriptRoot 'Review-PostRunRetry.ps1')\\n"
              cycle = ". (Join-Path $PSScriptRoot 'Review-CycleCap.ps1')\\n"
              local = "    . (Join-Path $PSScriptRoot 'Review-PostRunRetry.ps1')\\n"
              if top_level not in text:
                  text = replace_once(text, cycle, cycle + top_level, "wake top-level import")
              if local in text:
                  text = replace_once(text, local, "", "wake function-local import")
              if text.count(top_level) != 1 or local in text:
                  raise RuntimeError("wake import normalization failed")
              path.write_text(text, encoding="utf-8")
          '''
          new_wake = '''def patch_wake(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              top_level = ". (Join-Path $PSScriptRoot 'Review-PostRunRetry.ps1')"
              cycle = ". (Join-Path $PSScriptRoot 'Review-CycleCap.ps1')\\n"
              local = "    . (Join-Path $PSScriptRoot 'Review-PostRunRetry.ps1')\\n"
              lines = text.splitlines()
              if top_level not in lines:
                  text = replace_once(text, cycle, cycle + top_level + "\\n", "wake top-level import")
              if local in text:
                  text = replace_once(text, local, "", "wake function-local import")
              lines = text.splitlines()
              if lines.count(top_level) != 1 or local in text:
                  raise RuntimeError("wake import normalization failed")
              path.write_text(text, encoding="utf-8")
          '''
          if text.count(old_wake) != 1:
              raise SystemExit('publisher wake anchor block not found exactly once')
          text = text.replace(old_wake, new_wake, 1)
          old_patch = '''    api(
                  "PATCH",
                  ref_path,
                  {"sha": commit["sha"], "force": False},
              )
          '''
          new_patch = '''    api(
                  "PATCH",
                  ref_path.replace("/git/ref/", "/git/refs/"),
                  {"sha": commit["sha"], "force": False},
              )
          '''
          if text.count(old_patch) != 1:
              raise SystemExit('publisher ref update block not found exactly once')
          path.write_text(text.replace(old_patch, new_patch, 1), encoding='utf-8')
          PY

      - name: Capture atomic publisher result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          python scripts/publish-issue-771-fix.py target > scripts/issue-771-publisher-result.log 2>&1
          status=$?
          echo "EXIT_CODE=$status" >> scripts/issue-771-publisher-result.log
          exit 0

      - name: Upload atomic publisher result
        uses: actions/upload-artifact@v4
        with:
          name: issue-771-publisher-result
          path: scripts/issue-771-publisher-result.log
          if-no-files-found: error
