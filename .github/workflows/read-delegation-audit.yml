name: read-delegation-audit

on:
  pull_request:

concurrency:
  group: issue-771-focused-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit-policy:
    name: Issue 771 focused Pester probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Checkout PR 773 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-powershell-scope
          path: target
          fetch-depth: 1

      - name: Install Pester
        shell: pwsh
        run: ./target/scripts/install-pester-ci.ps1

      - name: Run issue 771 focused suite
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './target/tests/powershell/Issue771.PowerShellDependencyScope.Tests.ps1'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $result = Invoke-Pester -Configuration $config 2>&1 | Tee-Object -FilePath issue-771-focused-result.log
          if ($result -is [array]) {
            $summary = @($result | Where-Object { $_.PSObject.Properties.Name -contains 'FailedCount' })[-1]
          }
          else {
            $summary = $result
          }
          if ($summary) {
            "SUMMARY total=$($summary.TotalCount) passed=$($summary.PassedCount) failed=$($summary.FailedCount) skipped=$($summary.SkippedCount)" | Add-Content issue-771-focused-result.log
          }
          if ($summary -and $summary.FailedCount -gt 0) {
            "EXIT_CODE=1" | Add-Content issue-771-focused-result.log
          }
          else {
            "EXIT_CODE=0" | Add-Content issue-771-focused-result.log
          }
          exit 0

      - name: Upload focused result
        uses: actions/upload-artifact@v4
        with:
          name: issue-771-focused-result
          path: issue-771-focused-result.log
          if-no-files-found: error
