name: read-delegation-audit

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  audit-policy:
    name: Read-delegation audit policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Checkout PR 773 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-powershell-scope
          path: target
          fetch-depth: 1

      - name: Publish issue 771 fix atomically
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/publish-issue-771-fix.py target
