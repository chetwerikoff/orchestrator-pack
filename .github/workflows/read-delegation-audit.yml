name: read-delegation-audit

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit-policy:
    name: Read-delegation audit policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Capture issue 771 structural findings
        shell: pwsh
        run: ./scripts/check-read-delegation-policy-consistency.ps1

      - name: Upload structural findings
        uses: actions/upload-artifact@v4
        with:
          name: issue-771-structural-result
          path: scripts/issue-771-structural-result.log
          if-no-files-found: error
