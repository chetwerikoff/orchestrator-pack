name: read-delegation-audit

on:
  pull_request:
  push:
    branches:
      - main

# Superseded pull-request runs cancel per PR number; push-to-main runs never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  audit-policy:
    name: Read-delegation audit policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fixture suite (scripts/read-delegation-audit.test.ts) is owned by scope-guard
      # "Run pack contract tests" via scripts/test-all.ps1 on ordinary non-markdown PRs
      # and on push-to-main. This workflow retains unique policy/meta checks only.

      - name: Enforce read-delegation policy pointer consistency
        shell: pwsh
        run: ./scripts/check-read-delegation-policy-consistency.ps1

      - name: Setup Node.js (audit meta-check deps)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify read-delegation audit CI gate (meta-check)
        shell: pwsh
        run: ./scripts/check-read-delegation-audit-ci-gate.ps1
