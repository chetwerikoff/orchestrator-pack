name: Issue 928 source bootstrap

on:
  push:
    branches:
      - agent/issue-928-cutover
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-928-cutover
          fetch-depth: 0
      - name: Archive exact checkout
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD > /tmp/source-head.txt
          tar --exclude=.git -czf /tmp/orchestrator-pack-source.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: issue-928-source
          path: |
            /tmp/orchestrator-pack-source.tgz
            /tmp/source-head.txt
          retention-days: 1
          if-no-files-found: error
