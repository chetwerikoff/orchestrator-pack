name: issue-923-final-full-diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture full verification
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p diagnostics
          set +e
          npx tsc --project tsconfig.base.json --noEmit > diagnostics/typecheck.log 2>&1
          echo $? > diagnostics/typecheck.exit
          npm test -- --reporter=verbose > diagnostics/vitest-all.log 2>&1
          echo $? > diagnostics/vitest-all.exit
          npm run test:contract-mutations > diagnostics/mutations.log 2>&1
          echo $? > diagnostics/mutations.exit
          pwsh -NoLogo -NoProfile -File ./scripts/lint-self-architect.ps1 -Strict -BaseRef "$PR_BASE_SHA" -HeadRef "$PR_HEAD_SHA" > diagnostics/self-architect.log 2>&1
          echo $? > diagnostics/self-architect.exit
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-final-full-diagnostic
          path: diagnostics
          if-no-files-found: error
