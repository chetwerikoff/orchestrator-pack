name: review-4752160651-status-delivery

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  deliver:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      TARGET_PR: '939'
      TARGET_HEAD: 7d2d957052957f46af5340300fbac3d460cd859b
      REVIEW_ID: '4752160651'
    steps:
      - uses: actions/checkout@v4

      - name: Verify exact clean review and publish required status
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/gh api "repos/${GITHUB_REPOSITORY}/pulls/${TARGET_PR}" > pr.json
          ./scripts/gh api "repos/${GITHUB_REPOSITORY}/pulls/${TARGET_PR}/reviews/${REVIEW_ID}" > review.json
          node <<'NODE'
          const fs = require('node:fs');
          const pr = JSON.parse(fs.readFileSync('pr.json', 'utf8'));
          const review = JSON.parse(fs.readFileSync('review.json', 'utf8'));
          const expectedHead = process.env.TARGET_HEAD;
          if (pr.state !== 'open' || pr.head?.sha !== expectedHead) {
            throw new Error(`stale or ineligible PR: state=${pr.state} draft=${pr.draft} head=${pr.head?.sha}`);
          }
          if (String(review.id) !== process.env.REVIEW_ID || review.commit_id !== expectedHead) {
            throw new Error(`review/head mismatch: review=${review.id} commit=${review.commit_id}`);
          }
          const body = String(review.body ?? '').replace(/\*/g, '');
          if (!/Verdict:\s*clean\s*[—-]\s*0 findings/i.test(body)) {
            throw new Error('review is not an exact clean zero-finding verdict');
          }
          NODE
          ./scripts/gh api "repos/${GITHUB_REPOSITORY}/statuses/${TARGET_HEAD}" \
            -f state=success \
            -f context='orchestrator-pack/pack-review' \
            -f description="Pack review clean: review ${REVIEW_ID}, 0 findings"
          ./scripts/gh api "repos/${GITHUB_REPOSITORY}/commits/${TARGET_HEAD}/status" \
            --jq '.statuses[] | select(.context=="orchestrator-pack/pack-review") | {state,description,created_at}' \
            | head -n 1
