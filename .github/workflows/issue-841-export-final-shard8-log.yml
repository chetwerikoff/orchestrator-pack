name: issue-841-export-final-shard8-log

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
      - name: Export completed shard 8 job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87629532483/logs" > "$RUNNER_TEMP/shard8.log"
      - name: Upload shard log
        uses: actions/upload-artifact@v4
        with:
          name: pr860-final-shard8-log
          path: ${{ runner.temp }}/shard8.log
          retention-days: 1
      - name: Force-cancel stale scope runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&branch=agent/issue-841-bulk-gate-port&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Remove exporter and push cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-export-final-shard8-log.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u .github/workflows
          git commit -m 'chore: remove PR 860 shard 8 exporter'
          git push origin HEAD:agent/issue-841-bulk-gate-port
