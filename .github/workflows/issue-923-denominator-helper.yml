name: issue-923-denominator-helper

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  rewrite-denominator:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Rewrite exact Issue 923 denominator
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const manifestPath = 'scripts/estate-cut/issue-906.manifest.json';
          const testPath = 'scripts/pr2-foundation/foundation.test.ts';
          const helperPath = '.github/workflows/issue-923-denominator-helper.yml';
          const foundation = new Set([
            'docs/ao-0-10-review-api.mjs',
            'docs/autonomous-review-retry.mjs',
            'docs/events-optional-consumer-signal-recovery.d.mts',
            'docs/events-optional-consumer-signal-recovery.mjs',
            'docs/orchestrator-wake-filter.mjs',
            'docs/review-bulk-send-diagnose.mjs',
            'docs/review-finding-delivery-confirm.mjs',
            'docs/review-head-ready.mjs',
            'docs/review-producer-contract.mjs',
            'docs/review-send-reconcile.mjs',
            'docs/review-trigger-reconcile.mjs',
            'docs/review-wake-trigger.mjs',
            'docs/reviewer-failure-evidence-markers.mjs',
            'docs/worker-iteration-cycle.mjs',
            'docs/worker-message-dispatch-observe.mjs',
            'docs/worker-report-store.mjs',
          ]);
          const cutover = new Set([
            'scripts/lib/Get-ReactionMessagesFromYaml.ps1',
            'scripts/reaction-config-messages.d.mts',
            'scripts/reaction-config-messages.mjs',
            'scripts/review-ready-report-state-seed.ps1',
            'scripts/review-trigger-reconcile.ps1',
            'scripts/review-trigger-reeval.ps1',
          ]);
          const data = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
          if (!Array.isArray(data.rows)) throw new Error('authoritative rows missing');
          const byPath = new Map(data.rows.map((row) => [row.path, row]));
          for (const file of foundation) {
            const row = byPath.get(file);
            if (!row) throw new Error(`foundation manifest row missing: ${file}`);
            row.terminalState = 'deleted-now';
            delete row.replacementOwner;
            row.reason = 'terminalized by Issue #923 PR 2 foundation';
          }
          for (const file of cutover) {
            const row = byPath.get(file);
            if (!row) throw new Error(`cutover manifest row missing: ${file}`);
            row.terminalState = 'owned-by-PR-2-cutover';
            row.replacementOwner = 'draft 315';
            row.reason = 'reassigned to draft 315 PR 2-cutover activation';
          }
          if (!Array.isArray(data.objectiveStateDomain)) throw new Error('objectiveStateDomain missing');
          if (!data.objectiveStateDomain.includes('owned-by-PR-2-cutover')) {
            const index = data.objectiveStateDomain.indexOf('owned-by-PR-2');
            data.objectiveStateDomain.splice(index >= 0 ? index + 1 : data.objectiveStateDomain.length, 0, 'owned-by-PR-2-cutover');
          }
          fs.writeFileSync(manifestPath, `${JSON.stringify(data, null, 2)}\n`, 'utf8');
          for (const file of foundation) {
            if (!fs.existsSync(file)) throw new Error(`foundation doc missing before terminalization: ${file}`);
            fs.rmSync(file);
          }

          const source = fs.readFileSync(testPath, 'utf8');
          const replacement = `describe('[AC7] estate split', () => {\n  it('validates the real manifest and filesystem denominator', () => {\n    const manifest = JSON.parse(\n      readFileSync(path.join(repoRoot, 'scripts/estate-cut/issue-906.manifest.json'), 'utf8'),\n    ) as { rows?: Array<{ path: string; terminalState: string; replacementOwner?: string }> };\n    const denominator = (manifest.rows ?? []).filter((row) =>\n      (FOUNDATION_DOC_ROWS as readonly string[]).includes(row.path)\n      || (CUTOVER_ROWS as readonly string[]).includes(row.path),\n    );\n    expect(validateEstateSplit(denominator)).toEqual({ ok: true, result: 'foundation-16-cutover-6' });\n    for (const file of FOUNDATION_DOC_ROWS) {\n      expect(existsSync(path.join(repoRoot, file))).toBe(false);\n    }\n    for (const file of CUTOVER_ROWS) {\n      expect(existsSync(path.join(repoRoot, file))).toBe(true);\n    }\n  });\n});\n`;
          const next = source.replace(/describe\('\[AC7\] estate split'[\s\S]*$/m, replacement);
          if (next === source) throw new Error('AC7 test block not replaced');
          fs.writeFileSync(testPath, next, 'utf8');
          fs.rmSync(helperPath);
          NODE
          git checkout origin/main -- scripts/emit-vitest-heavy-topology.mjs
      - name: Commit exact denominator transition
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: terminalize PR 2 foundation denominator"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
