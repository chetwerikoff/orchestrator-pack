name: harness-pn-live-smoke

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    name: Live harness [Pn] smoke
    # Operator-enabled only: requires a real AO daemon + PACK_HARNESS_PN_SMOKE_SESSION.
    # Skipped on default GitHub-hosted CI (not fixture-satisfied — job does not run).
    if: vars.PACK_HARNESS_PN_SMOKE_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run live smoke (fail-closed without AO daemon)
        shell: pwsh
        env:
          PACK_HARNESS_PN_SMOKE_SESSION: ${{ vars.PACK_HARNESS_PN_SMOKE_SESSION }}
          PACK_HARNESS_PN_SMOKE_PROJECT: ${{ vars.PACK_HARNESS_PN_SMOKE_PROJECT }}
        run: ./scripts/check-harness-post-submit-pn-live-smoke.ps1
