name: issue-908-apply

on:
  push:
    branches:
      - fix/scope-guard-pr-files-pagination

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/scope-guard-pr-files-pagination
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply pagination fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          from datetime import datetime, timezone

          path = Path('scripts/pr-scope-check.ps1')
          text = path.read_text()
          anchor = "$prPaths = @(gh pr diff $prNumber --name-only)\nif ($LASTEXITCODE -ne 0) {\n    Write-Error \"gh pr diff failed for PR #$prNumber\"\n}\n"
          replacement = r'''function Get-PrChangedPaths {
              param(
                  [string]$Repository,
                  [int]$PrNumber,
                  [string]$WorkingDirectory
              )

              $filesRead = Invoke-GhSignalJsonCommand `
                  -Arguments @('api', "repos/$Repository/pulls/$PrNumber/files?per_page=100", '--paginate') `
                  -ExpectedRoot 'array' `
                  -WorkingDirectory $WorkingDirectory
              if (-not $filesRead.ok) {
                  Write-Error "failed to enumerate PR files for PR #$PrNumber: $(Format-GhSignalFailureDetail -Result $filesRead)"
              }

              $paths = [System.Collections.Generic.List[string]]::new()
              foreach ($entry in @($filesRead.value)) {
                  $filename = [string]$entry.filename
                  if ([string]::IsNullOrWhiteSpace($filename)) {
                      Write-Error "PR files response contained an entry without filename for PR #$PrNumber"
                  }
                  $paths.Add($filename)
              }
              return @($paths)
          }

          $prPaths = @(Get-PrChangedPaths -Repository $repository -PrNumber $prNumber -WorkingDirectory $TrustedRoot)
          '''
          if text.count(anchor) != 1:
              raise SystemExit('pr scope diff block drifted')
          path.write_text(text.replace(anchor, replacement, 1))

          Path('scripts/pr-scope-check-pagination.test.ts').write_text(r'''import { readFileSync } from 'node:fs';
          import { describe, expect, it } from 'vitest';

          const source = readFileSync(new URL('./pr-scope-check.ps1', import.meta.url), 'utf8');

          describe('trusted PR scope path enumeration', () => {
            it('uses the paginated Pull Request Files API instead of the 300-file diff endpoint', () => {
              expect(source).not.toContain('gh pr diff');
              expect(source).toContain("pulls/$PrNumber/files?per_page=100");
              expect(source).toContain("'--paginate'");
              expect(source).toContain('foreach ($entry in @($filesRead.value))');
              expect(source).toContain('$paths.Add($filename)');
            });

            it('fails closed on API failure or malformed file entries', () => {
              expect(source).toContain('if (-not $filesRead.ok)');
              expect(source).toContain('Format-GhSignalFailureDetail -Result $filesRead');
              expect(source).toContain('[string]::IsNullOrWhiteSpace($filename)');
              expect(source).toContain('entry without filename');
            });
          });
          ''')

          snapshot = {
              'issue_number': 908,
              'iteration_id': 'scope-pagination',
              'iteration_id_source': 'wrapper_generated',
              'supersedes': None,
              'created_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'baseline': {
                  'commit_sha': 'f10fd0051dd28f4cea865e4859b495e369219698',
                  'worktree_dirty': False,
                  'active_scope_hash': 'sha256:834e91f844aaa696af7a7159bf7b9b802b8e7d845fa89fe7de0ee607b32c95a3',
              },
              'declared_paths': [
                  'scripts/pr-scope-check-pagination.test.ts',
                  'scripts/pr-scope-check.ps1',
              ],
              'declared_globs': [],
              'amendments': [],
          }
          Path('docs/declarations').mkdir(parents=True, exist_ok=True)
          Path('docs/declarations/908.scope-pagination.json').write_text(json.dumps(snapshot, indent=2) + '\n')
          PY
          rm -f .github/workflows/issue-908-apply.yml

      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          npm ci --ignore-scripts
          npx vitest run scripts/pr-scope-check-pagination.test.ts
          npm run typecheck:foundation
          npm run lint:foundation
          git diff --check

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: paginate trusted PR file enumeration"
          git push origin HEAD:fix/scope-guard-pr-files-pagination
