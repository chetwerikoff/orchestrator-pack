name: issue-943-base-window-cache-apply

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: issue-943-base-window-cache-apply
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: agent/issue-943-self-architect-hot-loop
      TARGET_HEAD: faf379a6f61a9cc00fa119435f04437e31d52510
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-943-self-architect-hot-loop
          fetch-depth: 0
      - name: Cache exact base windows by path and size
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_HEAD"
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str, label: str) -> None:
              source = path.read_text(encoding='utf-8')
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              path.write_text(source.replace(old, new, 1), encoding='utf-8')

          lint_path = Path('scripts/lint-self-architect.ps1')
          block_exists = r'''function Test-BlockExistsInLines {
              param(
                  [string[]]$Lines,
                  [string]$BlockText,
                  [int]$Size
              )

              if ($Lines.Count -lt $Size) { return $false }

              for ($start = 0; $start -le ($Lines.Count - $Size); $start++) {
                  $candidate = ($Lines[$start..($start + $Size - 1)] -join "`n")
                  if ($candidate -eq $BlockText) {
                      return $true
                  }
              }

              return $false
          }

          '''
          replace_once(lint_path, block_exists, '', 'legacy per-block base scan')
          replace_once(
              lint_path,
              r'''        [int]$Size,
                  [hashtable]$BaseLinesCache,
                  [hashtable]$RenameMap
          ''',
              r'''        [int]$Size,
                  [hashtable]$BaseLinesCache,
                  [hashtable]$BaseBlockCache,
                  [hashtable]$RenameMap
          ''',
              'novelty cache parameters',
          )
          replace_once(
              lint_path,
              r'''    $normalized = Normalize-RepoPath $RelativePath
              $lookupKey = $normalized.ToLowerInvariant()
          ''',
              r'''    $normalized = Normalize-RepoPath $RelativePath
              $lookupKey = $normalized.ToLowerInvariant()
              $baseSourcePath = $normalized
          ''',
              'base source path initialization',
          )
          replace_once(
              lint_path,
              r'''    if ($baseLines.Count -eq 0 -and $RenameMap -and $RenameMap.ContainsKey($lookupKey)) {
                  $renamedFrom = $RenameMap[$lookupKey]
                  if (-not $BaseLinesCache.ContainsKey($renamedFrom)) {
                      $baseLinesCache[$renamedFrom] = Get-BaseFileLines -Root $Root -BaseRef $BaseRef -RelativePath $renamedFrom
                  }
                  $baseLines = $baseLinesCache[$renamedFrom]
              }
          ''',
              r'''    if ($baseLines.Count -eq 0 -and $RenameMap -and $RenameMap.ContainsKey($lookupKey)) {
                  $renamedFrom = $RenameMap[$lookupKey]
                  if (-not $BaseLinesCache.ContainsKey($renamedFrom)) {
                      $baseLinesCache[$renamedFrom] = Get-BaseFileLines -Root $Root -BaseRef $BaseRef -RelativePath $renamedFrom
                  }
                  $baseSourcePath = $renamedFrom
                  $baseLines = $baseLinesCache[$renamedFrom]
              }
          ''',
              'renamed base source path',
          )
          replace_once(
              lint_path,
              r'''    return -not (Test-BlockExistsInLines -Lines $baseLines -BlockText $BlockText -Size $Size)
          ''',
              r'''    $cacheKey = '{0}`0{1}' -f $baseSourcePath, $Size
              if (-not $BaseBlockCache.ContainsKey($cacheKey)) {
                  $blockSet = New-Object 'System.Collections.Generic.HashSet[string]' ([System.StringComparer]::Ordinal)
                  foreach ($block in (Get-SlidingBlocks -Lines $baseLines -Size $Size)) {
                      [void]$blockSet.Add([string]$block.text)
                  }
                  $BaseBlockCache[$cacheKey] = $blockSet
              }

              return -not $BaseBlockCache[$cacheKey].Contains($BlockText)
          ''',
              'cached base block lookup',
          )
          replace_once(
              lint_path,
              r'''    $requireIntroduced = ($introduced.Count -gt 0)
              $baseLinesCache = @{}
          ''',
              r'''    $requireIntroduced = ($introduced.Count -gt 0)
              $baseLinesCache = @{}
              $baseBlockCache = @{}
          ''',
              'base block cache initialization',
          )
          source = lint_path.read_text(encoding='utf-8')
          old_call = '-BaseLinesCache $baseLinesCache -RenameMap $renameMap'
          new_call = '-BaseLinesCache $baseLinesCache -BaseBlockCache $baseBlockCache -RenameMap $renameMap'
          if source.count(old_call) != 2:
              raise SystemExit(f'novelty call match count: {source.count(old_call)}')
          lint_path.write_text(source.replace(old_call, new_call), encoding='utf-8')

          test_path = Path('tests/powershell/Lint-SelfArchitect.Tests.ps1')
          source = test_path.read_text(encoding='utf-8')
          marker = '\n}\n'
          if not source.endswith(marker):
              raise SystemExit('test file closing marker missing')
          addition = r'''

              It 'caches exact base windows once per path and size' {
                  $source = Get-Content -LiteralPath $script:LintScript -Raw -Encoding UTF8
                  $noveltyStart = $source.IndexOf('function Test-IsBlockNovelAtPath')
                  $noveltyEnd = $source.IndexOf('function Get-LineSimilarity')
                  $duplicateStart = $source.IndexOf('function Find-DuplicateLiteralFindings')
                  $duplicateEnd = $source.IndexOf('function Find-HeuristicDuplicateFindings')
                  $noveltyStart | Should -BeGreaterOrEqual 0
                  $noveltyEnd | Should -BeGreaterThan $noveltyStart
                  $duplicateStart | Should -BeGreaterOrEqual 0
                  $duplicateEnd | Should -BeGreaterThan $duplicateStart
                  $noveltyBody = $source.Substring($noveltyStart, $noveltyEnd - $noveltyStart)
                  $duplicateBody = $source.Substring($duplicateStart, $duplicateEnd - $duplicateStart)

                  $noveltyBody | Should -Match 'BaseBlockCache'
                  $noveltyBody | Should -Match 'System\.Collections\.Generic\.HashSet\[string\]'
                  $noveltyBody | Should -Match 'StringComparer\]::Ordinal'
                  $noveltyBody | Should -Not -Match '\$Lines\[\$start\.\.'
                  $noveltyBody | Should -Not -Match 'Test-BlockExistsInLines'
                  ([regex]::Matches($duplicateBody, '\$baseBlockCache\s*=\s*@\{\}')).Count | Should -Be 1
                  ([regex]::Matches($duplicateBody, '-BaseBlockCache \$baseBlockCache')).Count | Should -Be 2
              }
          '''
          test_path.write_text(source[:-len(marker)] + addition + marker, encoding='utf-8')
          PY
          git diff --check
          test "$(git diff --name-only | sort | tr '\n' ' ')" = "scripts/lint-self-architect.ps1 tests/powershell/Lint-SelfArchitect.Tests.ps1 "
      - name: Verify cached novelty policy
        shell: pwsh
        run: |
          ./scripts/install-pester-ci.ps1
          Invoke-Pester ./tests/powershell/Lint-SelfArchitect.Tests.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/verify.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/check-reusable.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Commit and push verified cache
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lint-self-architect.ps1 tests/powershell/Lint-SelfArchitect.Tests.ps1
          git commit -m 'perf: cache exact base windows for novelty checks'
          git push origin HEAD:"$TARGET_BRANCH"
