name: issue-841-probe-final-heavy-flakes

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  probe:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run focused repo-tick stale-window test
        shell: bash
        run: npm test -- scripts/github-fleet-repo-tick-snapshot.test.ts -t "stale-serve window extends beyond the fresh interval" --reporter=default
      - name: Run focused TestMode teardown test
        shell: bash
        run: npm test -- scripts/testmode-fleet-reaper.test.ts -t "teardown reaps this run TestMode fleet on hook-executable exit path" --pool=forks --reporter=default
      - name: Restore unrelated executable modes
        shell: bash
        run: |
          git checkout -- plugins/ao-codex-pr-reviewer/bin/review.ts \
                          plugins/ao-scope-guard/bin/agent-wrap.ts \
                          plugins/ao-scope-guard/bin/scope-check.ts \
                          plugins/ao-task-declaration/bin/declare.ts \
                          plugins/ao-token-chain-ledger/bin/ledger.mjs
      - name: Force-cancel stale scope runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&branch=agent/issue-841-bulk-gate-port&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Remove probe and push cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-probe-final-heavy-flakes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u .github/workflows
          git commit -m 'chore: remove PR 860 heavy-flake probe'
          git push origin HEAD:agent/issue-841-bulk-gate-port
