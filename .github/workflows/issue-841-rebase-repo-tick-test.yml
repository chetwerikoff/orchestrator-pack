name: issue-841-rebase-repo-tick-test

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Restore current main test and apply deterministic stale window
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:scripts/github-fleet-repo-tick-snapshot.test.ts > scripts/github-fleet-repo-tick-snapshot.test.ts
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/github-fleet-repo-tick-snapshot.test.ts')
          text = p.read_text()
          old = """    await new Promise((resolve) => setTimeout(resolve, 2500));

    const staleScript = `
$ErrorActionPreference = 'Stop'
. '${join(repoRoot, 'scripts/lib/Gh-FleetInventoryCache.ps1').replace(/'/g, "''")}'
$paths = Get-GhFleetRepoTickPaths -RepoRoot '${repoRoot.replace(/'/g, "''")}'
New-Item -ItemType File -Path $paths.LockPath -Force | Out-Null
try {
  $record = Ensure-GhFleetRepoTickSnapshot -RepoRoot '${repoRoot.replace(/'/g, "''")}' -Consumer 'stale-window-test' -DataClass 'open_pr_list'
  if (-not $record.generation) { throw 'expected stale generation' }
  Write-Output 'stale-served'
}
finally {
  Remove-Item -LiteralPath $paths.LockPath -Force -ErrorAction SilentlyContinue
}
`;
"""
          new = """    const staleScript = `
$ErrorActionPreference = 'Stop'
. '${join(repoRoot, 'scripts/lib/Gh-FleetInventoryCache.ps1').replace(/'/g, "''")}'
$paths = Get-GhFleetRepoTickPaths -RepoRoot '${repoRoot.replace(/'/g, "''")}'
$record = Get-Content -LiteralPath $paths.GenerationPath -Raw | ConvertFrom-Json
$record.storedAt = ([datetime]::UtcNow.AddSeconds(-5)).ToString('o')
$record.expiresAt = ([datetime]::UtcNow.AddSeconds(-3)).ToString('o')
$record | ConvertTo-Json -Depth 20 -Compress | Set-Content -LiteralPath $paths.GenerationPath -Encoding utf8NoBOM
New-Item -ItemType File -Path $paths.LockPath -Force | Out-Null
try {
  $staleRecord = Ensure-GhFleetRepoTickSnapshot -RepoRoot '${repoRoot.replace(/'/g, "''")}' -Consumer 'stale-window-test' -DataClass 'open_pr_list'
  if (-not $staleRecord.generation) { throw 'expected stale generation' }
  Write-Output 'stale-served'
}
finally {
  Remove-Item -LiteralPath $paths.LockPath -Force -ErrorAction SilentlyContinue
}
`;
"""
          if old not in text:
              raise SystemExit('stale-window source block not found in current main')
          p.write_text(text.replace(old, new, 1))
          PY
          rm -f .github/workflows/issue-841-export-pack-typecheck-log.yml
          rm -f .github/workflows/issue-841-rebase-repo-tick-test.yml
          git diff --check
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Validate merge-level typecheck
        run: npx tsc --project tsconfig.base.json --noEmit
      - name: Validate deterministic stale-window scenario
        run: npm test -- scripts/github-fleet-repo-tick-snapshot.test.ts -t "stale-serve window extends beyond the fresh interval" --reporter=default
      - name: Restore unrelated executable modes
        if: always()
        shell: bash
        run: |
          git checkout -- plugins/ao-codex-pr-reviewer/bin/review.ts \
                          plugins/ao-scope-guard/bin/agent-wrap.ts \
                          plugins/ao-scope-guard/bin/scope-check.ts \
                          plugins/ao-task-declaration/bin/declare.ts \
                          plugins/ao-token-chain-ledger/bin/ledger.mjs || true
      - name: Cancel stale scope runs
        if: success()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&branch=agent/issue-841-bulk-gate-port&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Commit deterministic test
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/github-fleet-repo-tick-snapshot.test.ts
          git add -u .github/workflows
          git commit -m 'test: stabilize repo-tick stale window'
          git push origin HEAD:agent/issue-841-bulk-gate-port
