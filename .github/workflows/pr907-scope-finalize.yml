name: pr907-scope-finalize

on:
  push:
    branches:
      - ops/pr907-scope-finalize
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-906-estate-cut
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Build retained-guard candidate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- \
            .github/workflows/contract-evidence-legacy-list-guard.yml \
            scripts/run-contract-evidence-legacy-list-guard.mjs \
            scripts/contract-evidence-legacy-list-guard.test.ts \
            scripts/toolchain/raw-child-process-baseline.json

          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/estate-cut/manifest-generator.mjs')
          text = path.read_text()
          text = text.replace("  '.github/workflows/contract-evidence-legacy-list-guard.yml',\n", '')
          text = text.replace("  'scripts/run-contract-evidence-legacy-list-guard.mjs',\n", '')
          marker = "const SHARED_TEST_SURVIVORS = new Set([\n"
          entry = "  'scripts/contract-evidence-legacy-list-guard.test.ts',\n"
          if entry not in text:
              text = text.replace(marker, marker + entry, 1)
          path.write_text(text)
          PY

          node --experimental-strip-types scripts/estate-cut/manifest-generator.mjs --write --check

      - name: Capture foundation policy lint
        id: policy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run lint:foundation 2>&1 | tee policy-lint.log

      - name: Upload policy lint diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr907-policy-lint
          path: policy-lint.log
          if-no-files-found: error

      - name: Fail on policy lint
        if: steps.policy.outcome != 'success'
        shell: bash
        run: |
          cat policy-lint.log
          exit 1

# Trigger: capture retained-guard policy lint diagnostics.
