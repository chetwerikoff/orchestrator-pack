name: issue-923-final-cleanup-helper

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply final scope and type cleanup
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const targetFile = 'scripts/pr2-foundation/worker-notification-target.ts';
          let target = fs.readFileSync(targetFile, 'utf8');
          const oldArgs = `  const target = resolveWorkerTargetFromPrClaim({\n    prNumber: input.prNumber,\n    sessionId: ownerSessionId,\n    headSha: input.headSha,\n    sessions,\n    openPrs,\n    prClaims: [sync.record],\n    claimRecord: sync.record,\n  });`;
          const newArgs = `  const target = resolveWorkerTargetFromPrClaim({\n    prNumber: input.prNumber,\n    sessionId: ownerSessionId,\n    prClaims: [sync.record],\n    claimRecord: sync.record,\n  });`;
          if (!target.includes(oldArgs)) throw new Error('legacy target args not found');
          fs.writeFileSync(targetFile, target.replace(oldArgs, newArgs), 'utf8');

          const wakeFile = 'scripts/pr2-foundation/terminalized/orchestrator-wake-filter.ts';
          let wake = fs.readFileSync(wakeFile, 'utf8');
          const marker = `export const DEFAULT_WAKE_DEDUP_WINDOW_MS = 30_000;`;
          const typeBlock = `export interface AoWebhookEvent {\n  id?: string;\n  type?: string;\n  priority?: string;\n  sessionId?: string;\n  projectId?: string;\n  timestamp?: string;\n  message?: string;\n  data?: Record<string, unknown>;\n  [key: string]: unknown;\n}\n\nexport interface AoWebhookBody {\n  type?: string;\n  event?: AoWebhookEvent;\n  [key: string]: unknown;\n}\n\n`;
          if (!wake.includes(marker)) throw new Error('wake type insertion marker missing');
          if (!wake.includes('export interface AoWebhookBody')) {
            wake = wake.replace(marker, `${typeBlock}${marker}`);
          }
          fs.writeFileSync(wakeFile, wake, 'utf8');

          fs.rmSync('.github/workflows/issue-923-scope-type-diagnostic.yml', { force: true });
          fs.rmSync('.github/workflows/issue-923-final-cleanup-helper.yml', { force: true });
          NODE
          git checkout faac4525e5e457f7480f99b5f26fcfd96da6d9d5 -- scripts/reaction-config-messages.mjs
      - name: Commit final cleanup
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: restore cutover bytes and complete TypeScript port types"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
