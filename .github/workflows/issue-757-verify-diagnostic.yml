name: issue-757-verify-diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'agent/issue-757-runtime-history-self-heal'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-757-runtime-history-self-heal

      - name: Run verifier and preserve full output
        id: verify
        shell: pwsh
        continue-on-error: true
        run: |
          $output = & ./scripts/verify.ps1 *>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath issue-757-verify.log
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload verifier output
        uses: actions/upload-artifact@v4
        with:
          name: issue-757-verify-log
          path: issue-757-verify.log
          if-no-files-found: error
          retention-days: 1

      - name: Fail if verifier failed
        shell: bash
        run: exit '${{ steps.verify.outputs.exit_code }}'
