name: issue-849-fetch-topology-tail

on:
  push:
    branches: [agent/issue-849-gh-signal-classification]

permissions:
  contents: write
  actions: read

concurrency:
  group: issue-849-fetch-topology-tail
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-849-gh-signal-classification
          fetch-depth: 0
      - name: Fetch bounded topology failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          full="$RUNNER_TEMP/topology.log"
          out="scripts/.issue-849-topology-tail.txt"
          curl --fail --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/chetwerikoff/orchestrator-pack/actions/jobs/87563008006/logs" \
            --output "$full"
          {
            grep -nEi 'error|fail|unresolved|missing|stale|oversized|classification|topology|Test Files|Tests' "$full" || true
            echo '=== TAIL ==='
            tail -n 220 "$full"
          } > "$out"
          tail -n 500 "$out" > "$RUNNER_TEMP/bounded"
          mv "$RUNNER_TEMP/bounded" "$out"
          git rm .github/workflows/issue-849-fetch-topology-tail.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$out"
          git commit -m "chore: record bounded issue 849 topology tail"
          git push origin HEAD:agent/issue-849-gh-signal-classification
