name: issue-900-blocker-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  rollback-proof:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/916/merge
          fetch-depth: 0

      - name: Prove one-revert rollback
        shell: bash
        run: |
          set -euo pipefail
          merge_sha="$(git rev-parse HEAD)"
          base_parent="$(git rev-parse HEAD^1)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git revert -m 1 --no-edit HEAD
          revert_sha="$(git rev-parse HEAD)"
          git diff --exit-code "$base_parent" HEAD
          test -f scripts/lib/Invoke-TypeScriptCli.ps1
          test -f scripts/toolchain/typescript-loader.mjs
          printf 'merge_sha=%s\nbase_parent=%s\nrevert_sha=%s\nrollback_tree_matches_base=true\n' \
            "$merge_sha" "$base_parent" "$revert_sha" | tee rollback-proof.txt

      - uses: actions/upload-artifact@v4
        with:
          name: issue-900-rollback-proof
          path: rollback-proof.txt
