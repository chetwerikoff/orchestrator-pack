name: issue-841-fix-frozen-whitespace

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0

      - name: Patch validation, remove helper, and push
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/issue-841-apply-rereview-fixes.yml')
          text = path.read_text()
          old = 'git diff --cached --check "$CLEAN_BASE"'
          checked = ' '.join([
              'scripts/check-supervisor-test-wait-inventory.test.ts',
              'scripts/fixtures/gate-runner/legacy-wave-3b/verify-source-spans.json',
              'scripts/gate-runner/census.test.ts',
              'scripts/gate-runner/census.ts',
              'scripts/gate-runner/census/pre-change-baseline.json',
              'scripts/gate-runner/custom/bulk-cli-parity.test.ts',
              'scripts/gate-runner/goldens/wave-3b-pre-delete-captures.json',
              'scripts/toolchain/powershell-child-tests.json',
              'scripts/toolchain/raw-child-process-baseline.json',
          ])
          new = f'{old} -- {checked}'
          if text.count(old) != 1:
              raise SystemExit(f'expected one validation command, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY

          rm -f .github/workflows/issue-841-fix-frozen-whitespace.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: preserve hash-bound frozen whitespace'
          git push origin HEAD:agent/issue-841-bulk-gate-port
