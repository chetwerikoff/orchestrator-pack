name: issue-841-export-focused-parity-log

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Export completed focused parity job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87646437366/logs" > "$RUNNER_TEMP/focused-parity.log"
      - name: Upload focused parity log
        uses: actions/upload-artifact@v4
        with:
          name: pr860-focused-parity-log
          path: ${{ runner.temp }}/focused-parity.log
          retention-days: 1
          if-no-files-found: error
