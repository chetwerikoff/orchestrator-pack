# Trigger after workflow exists in the parent commit.
name: Issue 857 cache admission fix

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply minimal production fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/lib/worker-status-store.mjs')
          text = path.read_text()
          old = """    if (resolution?.failClosed) {
              const reason = String(resolution.reason ?? 'binding_miss_after_backfill');
              return workerStatusBindingFailure(reason, headHint, `binding_contract:${String(resolution.source ?? 'none')}`);
            }
            matches.push({ pr, resolution });
"""
          new = """    if (resolution?.failClosed) {
              const reason = String(resolution.reason ?? 'binding_miss_after_backfill');
              return workerStatusBindingFailure(reason, headHint, `binding_contract:${String(resolution.source ?? 'none')}`);
            }
            // Preserve #891 admission: resolve conflicts through the shared contract,
            // but accept a successful worker-status binding only from durable cache.
            if (String(resolution?.source ?? '') !== 'cache') {
              continue;
            }
            matches.push({ pr, resolution });
"""
          if text.count(old) != 1:
              raise SystemExit(f'insertion point count={text.count(old)}')
          text = text.replace(old, new)
          old_gen = "bindingCacheGeneration: Number(match.resolution.bindingCacheGeneration ?? store.generation ?? 0),"
          new_gen = "bindingCacheGeneration: Number(store.generation ?? 0),"
          if text.count(old_gen) != 1:
              raise SystemExit(f'generation point count={text.count(old_gen)}')
          path.write_text(text.replace(old_gen, new_gen))

          test_path = Path('tests/powershell/Issue857.PrSessionBindingContract.Node.mjs')
          test = test_path.read_text()
          marker = """  const cacheStore = cache('worker-status-cache', 201);
          writePrSessionBindingCacheFile(cachePath, cacheStore);
"""
          replacement = """  writePrSessionBindingCacheFile(cachePath, createDefaultPrSessionBindingCache());
          const liveOnlyResolution = resolveWorkerStatusSessionBinding({
            session: session('worker-status-live-only', { branch: 'issue-200', prs: [url(200)] }),
            openPrs: [pr(200)],
            repoSlug,
            bindingCachePath: cachePath,
            nowMs,
            osLiveness: { dead: false },
          });
          assert.equal(liveOnlyResolution.ok, false);
          assert.equal(liveOnlyResolution.reason, 'no_issue_binding');

          const cacheStore = cache('worker-status-cache', 201);
          writePrSessionBindingCacheFile(cachePath, cacheStore);
"""
          if test.count(marker) != 1:
              raise SystemExit(f'test insertion point count={test.count(marker)}')
          test_path.write_text(test.replace(marker, replacement))
          PY
      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/lib/worker-status-store.mjs
          node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs
          npx tsc --project tsconfig.base.json --noEmit
          pwsh -NoLogo -NoProfile -File ./scripts/install-pester-ci.ps1
          pwsh -NoLogo -NoProfile -File ./scripts/test-all.ps1 -SkipNpm
          git diff --check
      - name: Commit
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/lib/worker-status-store.mjs tests/powershell/Issue857.PrSessionBindingContract.Node.mjs
          git commit -m 'Preserve worker-status cache-backed admission'
          git push origin HEAD:agent/issue-857-binding-contract-v2
