name: Issue 800 CI diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Extract self-architect failure tail
        shell: bash
        run: |
          set -euo pipefail
          gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/actions/jobs/86887662457/logs" > /tmp/self-architect.log
          echo '===== self-architect final 45 lines ====='
          tail -n 45 /tmp/self-architect.log
