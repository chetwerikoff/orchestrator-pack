name: Issue 857 fix harness command

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
      - name: Use the pack Vitest harness
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/issue857-clause-d-tests.yml')
          text = path.read_text()
          old = "npx vitest run scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts >> \"$log\" 2>&1 || status=$?"
          new = "npm test -- scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts >> \"$log\" 2>&1 || status=$?"
          if text.count(old) != 1:
              raise SystemExit(f'expected one command, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/issue857-clause-d-tests.yml
          git commit -m 'Run Clause D tests through pack harness'
          git push origin HEAD:agent/issue-857-binding-contract-v2
