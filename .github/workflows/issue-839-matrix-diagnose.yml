name: issue-839-matrix-diagnose

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        file:
          - scripts/ao-0-10-review-trigger.test.ts
          - scripts/review-handoff-wake-trigger.test.ts
          - scripts/review-start-claim.test.ts
          - scripts/review-start-claim-run-binding.test.ts
          - scripts/scripted-review-confirmed-delivery-gate.test.ts
          - scripts/harness-post-submit-pn-content-shape.test.ts
          - scripts/harness-review-bridge.test.ts
          - scripts/review-wake-trigger.test.ts
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - name: Apply same patch
        shell: bash
        run: |
          awk 'BEGIN{take=0} /python3 - <<.PY./{take=1; next} take && /^          PY$/{exit} take{sub(/^          /,""); print}' .github/workflows/issue-839-pr-apply.yml > /tmp/apply.py
          python3 /tmp/apply.py
      - name: Test file
        id: test
        continue-on-error: true
        shell: bash
        run: node scripts/run-vitest-with-harness.mjs run '${{ matrix.file }}' --reporter=verbose 2>&1 | tee /tmp/test.log
      - name: Report failure
        if: steps.test.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          FILE: ${{ matrix.file }}
        shell: bash
        run: |
          { echo "## Issue #839 failing test file: $FILE"; echo; echo '```text'; tail -c 12000 /tmp/test.log; echo; echo '```'; } >/tmp/report.md
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/report.md
      - name: Fail matrix cell
        if: steps.test.outcome == 'failure'
        run: exit 1
