name: issue-849-apply-pack-review-fixes

on:
  push:
    branches: [agent/issue-849-gh-signal-classification]

permissions:
  contents: write

concurrency:
  group: issue-849-apply-pack-review-fixes
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-849-gh-signal-classification
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Apply Pack Review fixes
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.issue-849-review-fix/part-* > "$RUNNER_TEMP/apply.py.gz.b64"
          base64 --decode "$RUNNER_TEMP/apply.py.gz.b64" | gzip -dc > "$RUNNER_TEMP/apply.py"
          python "$RUNNER_TEMP/apply.py"
          git rm -r scripts/.issue-849-review-fix
          git rm .github/workflows/issue-849-fetch-review-logs.yml
          git diff --check
      - name: Install dependencies
        run: npm ci
      - name: Run targeted regressions
        shell: bash
        run: |
          set -euo pipefail
          npm test -- scripts/gh-signal-classification.test.ts
          node scripts/lib/ci-red-watchdog-selftest.mjs
          npm run typecheck:foundation
          npm run lint:foundation
      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve parked lookup evidence and prune empty snapshots"
          git push origin HEAD:agent/issue-849-gh-signal-classification
