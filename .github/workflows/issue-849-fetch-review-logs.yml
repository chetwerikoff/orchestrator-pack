name: issue-849-fetch-review-logs
on:
  push:
    branches: [agent/issue-849-gh-signal-classification]
permissions:
  contents: read
  actions: read
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch failing logs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for pair in topology:87542050446 structure:87542025216; do
            name="${pair%%:*}"
            id="${pair##*:}"
            curl --fail --location \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/chetwerikoff/orchestrator-pack/actions/jobs/${id}/logs" \
              --output "$RUNNER_TEMP/${name}.log"
            tail -n 600 "$RUNNER_TEMP/${name}.log" > "$RUNNER_TEMP/${name}-tail.log"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: issue-849-review-logs
          path: ${{ runner.temp }}/*-tail.log
          retention-days: 1
