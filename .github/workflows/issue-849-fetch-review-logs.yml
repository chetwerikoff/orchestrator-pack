name: issue-849-apply-pack-review-fixes-v2

on:
  push:
    branches: [agent/issue-849-gh-signal-classification]

permissions:
  contents: write

concurrency:
  group: issue-849-apply-pack-review-fixes-v2
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-849-gh-signal-classification
          fetch-depth: 0
      - name: Apply fixes and clean transport files
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.issue-849-review-fix/part-* > "$RUNNER_TEMP/apply.py.gz.b64"
          base64 --decode "$RUNNER_TEMP/apply.py.gz.b64" | gzip -dc > "$RUNNER_TEMP/apply.py"
          python "$RUNNER_TEMP/apply.py"
          git rm -r scripts/.issue-849-review-fix
          git rm .github/workflows/issue-849-fetch-review-logs.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve parked lookup evidence and prune empty snapshots"
          git push origin HEAD:agent/issue-849-gh-signal-classification
