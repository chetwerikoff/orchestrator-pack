name: issue-941-declaration-pair-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-941-self-architect-migration-pairs
          fetch-depth: 0
      - name: Add exact declaration migration pair
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import json

          config_path = Path('scripts/lint-self-architect.config.json')
          config = json.loads(config_path.read_text())
          pair = [
              'docs/events-optional-consumer-signal-recovery.d.mts',
              'scripts/pr2-foundation/terminalized/events-optional-consumer-signal-recovery.d.ts',
          ]
          if any(entry.get('files') == pair for entry in config['suppressions']):
              raise SystemExit('declaration pair already present')
          config['suppressions'].append({
              'rule': 'duplicate-literal',
              'reason': 'Issue #923 declaration migration parity until draft 315; remove at cutover',
              'files': pair,
          })
          config_path.write_text(json.dumps(config, indent=2) + '\n')

          test_path = Path('tests/powershell/Lint-SelfArchitect.Tests.ps1')
          tests = test_path.read_text()
          replacements = {
              "declares exactly the fifteen Issue 923 runtime migration pairs without wildcards":
                  "declares exactly the sixteen Issue 923 migration pairs without wildcards",
              "$suppressions.Count | Should -Be 15":
                  "$suppressions.Count | Should -Be 16",
              "            'docs/events-optional-consumer-signal-recovery.mjs',\n":
                  "            'docs/events-optional-consumer-signal-recovery.d.mts',\n            'docs/events-optional-consumer-signal-recovery.mjs',\n",
              "$legacy = @($entry.files | Where-Object { $_ -like 'docs/*.mjs' })":
                  "$legacy = @($entry.files | Where-Object { $_ -like 'docs/*.mjs' -or $_ -like 'docs/*.d.mts' })",
          }
          for old, new in replacements.items():
              count = tests.count(old)
              if count != 1:
                  raise SystemExit(f'test replacement count for {old!r}: {count}')
              tests = tests.replace(old, new, 1)
          test_path.write_text(tests)
          PY
      - name: Commit declaration pair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lint-self-architect.config.json tests/powershell/Lint-SelfArchitect.Tests.ps1
          git commit -m "fix: include declaration migration parity"
          git push origin HEAD:agent/issue-941-self-architect-migration-pairs
