name: issue-923-atomic-fix-input

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  export-input:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 50722cde9571877d482dfb893d925a23d32617fa
          fetch-depth: 0
      - name: Export exact head inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p payload/scripts/pr2-foundation
          cp scripts/lint-self-architect.config.json payload/scripts/
          cp scripts/pr2-foundation/contracts.ts payload/scripts/pr2-foundation/
          cp scripts/pr2-foundation/terminalized-port.test.ts payload/scripts/pr2-foundation/
          git rev-parse 'HEAD^{tree}' > payload/base-tree-sha.txt
          git rev-parse HEAD > payload/base-commit-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-atomic-fix-input
          path: payload
          if-no-files-found: error
          retention-days: 1
