name: issue-923-validation-probe

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PR_BASE_SHA: faac4525e5e457f7480f99b5f26fcfd96da6d9d5
      PR_HEAD_SHA: 8cc4f6137998019e2a9159f32674162b3e6ddd7f
      OPK_DISABLE_PRE_TOPOLOGY_MEASUREMENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout exact PR merge ref
        run: |
          git fetch origin refs/pull/939/merge
          git checkout --detach FETCH_HEAD
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture exact failures
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          pwsh -NoProfile -File ./scripts/check-ci-pipeline-split.ps1 > diagnostics/pipeline.log 2>&1
          echo $? > diagnostics/pipeline.exit
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
          node scripts/emit-vitest-heavy-topology.mjs --skip-oversized-guard > diagnostics/topology.log 2>&1
          echo $? > diagnostics/topology.exit
          OPK_VITEST_TOPOLOGY_PLAN_PATH="$GITHUB_WORKSPACE/scripts/vitest-heavy-topology.plan.json" pwsh -NoProfile -File ./scripts/run-vitest-light-lane.ps1 -Shard 1 > diagnostics/light1.log 2>&1
          echo $? > diagnostics/light1.exit
          OPK_VITEST_TOPOLOGY_PLAN_PATH="$GITHUB_WORKSPACE/scripts/vitest-heavy-topology.plan.json" pwsh -NoProfile -File ./scripts/run-vitest-heavy-shard.ps1 -Shard 2 > diagnostics/heavy2.log 2>&1
          echo $? > diagnostics/heavy2.exit
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-exact-failures
          path: diagnostics
          if-no-files-found: error
      - name: Print exit summary
        shell: bash
        run: |
          cat diagnostics/*.exit
