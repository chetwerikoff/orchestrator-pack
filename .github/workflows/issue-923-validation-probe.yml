name: issue-941-hot-loop-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-941-self-architect-migration-pairs
          fetch-depth: 0
      - name: Replace quadratic sliding-block accumulation
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          script_path = Path('scripts/lint-self-architect.ps1')
          source = script_path.read_text()
          old = '''    $blocks = @()
              if ($Lines.Count -lt $Size) { return $blocks }
          
              for ($start = 0; $start -le ($Lines.Count - $Size); $start++) {
                  $slice = @($Lines[$start..($start + $Size - 1)])
                  if (-not (Test-MeaningfulBlock -Lines $slice)) { continue }
                  $blocks += [pscustomobject]@{
                      text      = ($slice -join "`n")
                      startLine = $start + 1
                      endLine   = $start + $Size
                      lineCount = $Size
                  }
              }
              return $blocks
          '''
          new = '''    $blocks = New-Object System.Collections.Generic.List[object]
              if ($Lines.Count -lt $Size) { return $blocks.ToArray() }
          
              for ($start = 0; $start -le ($Lines.Count - $Size); $start++) {
                  $slice = @($Lines[$start..($start + $Size - 1)])
                  if (-not (Test-MeaningfulBlock -Lines $slice)) { continue }
                  $blocks.Add([pscustomobject]@{
                      text      = ($slice -join "`n")
                      startLine = $start + 1
                      endLine   = $start + $Size
                      lineCount = $Size
                  }) | Out-Null
              }
              return $blocks.ToArray()
          '''
          if source.count(old) != 1:
              raise SystemExit(f'sliding block implementation match count: {source.count(old)}')
          script_path.write_text(source.replace(old, new, 1))

          test_path = Path('tests/powershell/Lint-SelfArchitect.Tests.ps1')
          tests = test_path.read_text().rstrip()
          marker = "builds sliding windows without quadratic array concatenation"
          if marker in tests:
              raise SystemExit('hot-loop regression already present')
          if not tests.endswith('}'):
              raise SystemExit('unexpected test file ending')
          addition = r'''

              It 'builds sliding windows without quadratic array concatenation' {
                  $source = Get-Content -LiteralPath $script:LintScript -Raw -Encoding UTF8
                  $start = $source.IndexOf('function Get-SlidingBlocks')
                  $end = $source.IndexOf('function Get-RenameMap')
                  $start | Should -BeGreaterOrEqual 0
                  $end | Should -BeGreaterThan $start
                  $body = $source.Substring($start, $end - $start)

                  $body | Should -Match 'System\.Collections\.Generic\.List\[object\]'
                  $body | Should -Match '\$blocks\.Add\('
                  $body | Should -Not -Match '\$blocks\s*\+='
                  $body | Should -Match 'return \$blocks\.ToArray\(\)'
              }
          '''
          test_path.write_text(tests[:-1] + addition + '\n}\n')
          PY
      - name: Commit optimized lint loop
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lint-self-architect.ps1 tests/powershell/Lint-SelfArchitect.Tests.ps1
          git commit -m "perf: make self-architect sliding windows linear"
          git push origin HEAD:agent/issue-941-self-architect-migration-pairs
