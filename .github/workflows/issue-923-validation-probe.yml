name: issue-923-final-ac9-diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PR_BASE_SHA: faac4525e5e457f7480f99b5f26fcfd96da6d9d5
      PR_HEAD_SHA: fbf4939ee03f6a0d12fb82f0d7d5aae7c8d913b0
      OPK_DISABLE_PRE_TOPOLOGY_MEASUREMENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout exact PR 939 merge ref
        shell: bash
        run: |
          git fetch origin refs/pull/939/merge
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD^2)" = "$PR_HEAD_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture light lane 1
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
          node scripts/emit-vitest-heavy-topology.mjs --skip-oversized-guard > diagnostics/topology.log 2>&1
          echo $? > diagnostics/topology.exit
          export OPK_VITEST_TOPOLOGY_PLAN_PATH="$GITHUB_WORKSPACE/scripts/vitest-heavy-topology.plan.json"
          pwsh -NoProfile -File ./scripts/run-vitest-light-lane.ps1 -Shard 1 > diagnostics/light1.log 2>&1
          echo $? > diagnostics/light1.exit
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-final-ac9
          path: diagnostics
          if-no-files-found: error
