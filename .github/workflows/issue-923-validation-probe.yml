name: issue-923-final-fix-script-extract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88712704384'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Extract echoed Python patch as compressed chunks
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > source.log
          python3 - <<'PY'
          import base64
          import gzip
          import re

          ansi = re.compile(r'\x1b\[[0-9;]*m')
          stamp = re.compile(r'^\d{4}-\d{2}-\d{2}T\S+Z\s')
          raw = open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()
          lines = [stamp.sub('', ansi.sub('', line), count=1) for line in raw]
          start = next(i for i, line in enumerate(lines) if line == "python3 <<'PY'")
          end = next(i for i in range(start + 1, len(lines)) if lines[i] == 'PY')
          script = '\n'.join(lines[start + 1:end]) + '\n'
          encoded = base64.b64encode(gzip.compress(script.encode('utf-8'), compresslevel=9)).decode('ascii')
          print(f'SCRIPT_LINES={end-start-1}')
          print(f'SCRIPT_SHA256=' + __import__('hashlib').sha256(script.encode()).hexdigest())
          width = 1400
          chunks = [encoded[i:i+width] for i in range(0, len(encoded), width)]
          print(f'CHUNKS={len(chunks)}')
          for index, chunk in enumerate(chunks):
              print(f'CHUNK_{index:02d}={chunk}')
          PY
