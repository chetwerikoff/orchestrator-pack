name: issue-923-validation-probe

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TARGET_HEAD: 2f7acc58b79f90621108cb6b37353ef5306b8751
      PR_BASE_SHA: faac4525e5e457f7480f99b5f26fcfd96da6d9d5
      PR_HEAD_SHA: 8cc4f6137998019e2a9159f32674162b3e6ddd7f
      OPK_DISABLE_PRE_TOPOLOGY_MEASUREMENT: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout exact PR merge ref
        run: git checkout --detach "$TARGET_HEAD"
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - id: typescript
        name: TypeScript foundation
        continue-on-error: true
        run: |
          npm run ts:smoke
          npm run typecheck:foundation
          npm run lint:foundation
          npm run test:foundation
          npm run check:pwsh-test-growth
      - id: verify
        name: Verify structure
        continue-on-error: true
        shell: pwsh
        run: ./scripts/verify.ps1
      - id: reusable
        name: Reusable policy
        continue-on-error: true
        shell: pwsh
        run: ./scripts/check-reusable.ps1
      - id: cheap
        name: CI cheap-wins policy
        continue-on-error: true
        shell: pwsh
        run: ./scripts/check-ci-cheap-wins.ps1
      - id: verify_runtime
        name: Verify runtime policy
        continue-on-error: true
        shell: pwsh
        run: ./scripts/check-verify-runtime.ps1
      - id: pipeline
        name: CI pipeline split policy
        continue-on-error: true
        shell: pwsh
        run: ./scripts/check-ci-pipeline-split.ps1
      - id: architect
        name: Self-architect strict
        continue-on-error: true
        shell: pwsh
        run: ./scripts/lint-self-architect.ps1 -Strict
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - id: pester
        name: Pester regression
        continue-on-error: true
        shell: pwsh
        run: ./scripts/test-all.ps1 -SkipNpm
      - id: topology
        name: Build exact PR Vitest topology
        continue-on-error: true
        shell: bash
        run: |
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
          node scripts/emit-vitest-heavy-topology.mjs --skip-oversized-guard
      - id: light1
        name: Vitest light lane 1
        continue-on-error: true
        shell: pwsh
        env:
          OPK_VITEST_TOPOLOGY_PLAN_PATH: ${{ github.workspace }}/scripts/vitest-heavy-topology.plan.json
        run: ./scripts/run-vitest-light-lane.ps1 -Shard 1
      - id: light2
        name: Vitest light lane 2
        continue-on-error: true
        shell: pwsh
        env:
          OPK_VITEST_TOPOLOGY_PLAN_PATH: ${{ github.workspace }}/scripts/vitest-heavy-topology.plan.json
        run: ./scripts/run-vitest-light-lane.ps1 -Shard 2
      - id: heavy1
        name: Vitest heavy shard 1
        continue-on-error: true
        shell: pwsh
        env:
          OPK_VITEST_TOPOLOGY_PLAN_PATH: ${{ github.workspace }}/scripts/vitest-heavy-topology.plan.json
        run: ./scripts/run-vitest-heavy-shard.ps1 -Shard 1
      - id: heavy2
        name: Vitest heavy shard 2
        continue-on-error: true
        shell: pwsh
        env:
          OPK_VITEST_TOPOLOGY_PLAN_PATH: ${{ github.workspace }}/scripts/vitest-heavy-topology.plan.json
        run: ./scripts/run-vitest-heavy-shard.ps1 -Shard 2
      - name: Enforce aggregate
        if: always()
        env:
          TYPESCRIPT: ${{ steps.typescript.outcome }}
          VERIFY: ${{ steps.verify.outcome }}
          REUSABLE: ${{ steps.reusable.outcome }}
          CHEAP: ${{ steps.cheap.outcome }}
          VERIFY_RUNTIME: ${{ steps.verify_runtime.outcome }}
          PIPELINE: ${{ steps.pipeline.outcome }}
          ARCHITECT: ${{ steps.architect.outcome }}
          PESTER: ${{ steps.pester.outcome }}
          TOPOLOGY: ${{ steps.topology.outcome }}
          LIGHT1: ${{ steps.light1.outcome }}
          LIGHT2: ${{ steps.light2.outcome }}
          HEAVY1: ${{ steps.heavy1.outcome }}
          HEAVY2: ${{ steps.heavy2.outcome }}
        run: |
          failures=0
          for name in TYPESCRIPT VERIFY REUSABLE CHEAP VERIFY_RUNTIME PIPELINE ARCHITECT PESTER TOPOLOGY LIGHT1 LIGHT2 HEAVY1 HEAVY2; do
            value="${!name}"
            echo "$name=$value"
            if [ "$value" != "success" ]; then failures=1; fi
          done
          exit "$failures"
