name: issue-923-final-fix-source-extract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88712704384'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print exact final-fix source and residual findings
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > source.log
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          needles = (
              'mutation-semantic-gates.ts', 'real-scope-proof.test.ts',
              'worker-dispatch-journal.ts', 'foundation.test.ts',
              'worker-notification-compat.test.ts', 'terminalized-port.test.ts',
              'replace_once(', 'python3 <<', 'git diff --name-only',
              '[STRICT]', 'Summary:', 'self_architect_elapsed_seconds=',
          )
          selected = set()
          for index, line in enumerate(lines):
              if any(needle in line for needle in needles):
                  for cursor in range(max(0, index - 12), min(len(lines), index + 18)):
                      selected.add(cursor)
          print('--- selected windows ---')
          previous = None
          for index in sorted(selected):
              if previous is not None and index > previous + 1:
                  print('...')
              print(f'{index + 1}:{lines[index][:2200]}')
              previous = index
          print('--- final 50 ---')
          for index, line in enumerate(lines[-50:], start=max(1, len(lines) - 49)):
              print(f'{index}:{line[:2200]}')
          PY
