name: issue-923-self-architect-log-extract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88674126173'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download and print self-architect verdict
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > self-architect.log
          echo '--- filtered verdict ---'
          grep -nE 'self-architect|duplicate-literal|near-duplicate-literal|paired-edit|strict|warning|Summary|summary|finding|Finding|error|Error|failed|Failed' self-architect.log | tail -n 1200 || true
          echo '--- final 400 lines ---'
          tail -n 400 self-architect.log
