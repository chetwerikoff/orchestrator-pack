name: issue-923-residual-focused-failure

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88709369923'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print residual focused-test failure
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > residual.log
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('residual.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          for index, line in enumerate(lines):
              if not any(token in line for token in ('AssertionError:', ' FAIL ', 'failed', 'Error:')):
                  continue
              for cursor in range(max(0, index - 8), min(len(lines), index + 20)):
                  print(f'{cursor + 1}:{lines[cursor]}')
          PY
