name: issue-923-final-fix-v2-script-extract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88718065071'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Extract publisher v2 Python patch as compressed chunks
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28" "$api" > source.log
          python3 - <<'PY'
          import base64, gzip, hashlib, re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          stamp = re.compile(r'^\d{4}-\d{2}-\d{2}T\S+Z\s')
          lines = [stamp.sub('', ansi.sub('', line), count=1) for line in open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          start = next(i for i, line in enumerate(lines) if line == "python3 <<'PY'")
          end = next(i for i in range(start + 1, len(lines)) if lines[i] == 'PY')
          script = '\n'.join(lines[start + 1:end]) + '\n'
          encoded = base64.b64encode(gzip.compress(script.encode(), compresslevel=9)).decode()
          chunks = [encoded[i:i+1400] for i in range(0, len(encoded), 1400)]
          print(f'SCRIPT_LINES={end-start-1}')
          print('SCRIPT_SHA256=' + hashlib.sha256(script.encode()).hexdigest())
          print(f'CHUNKS={len(chunks)}')
          print('CHUNK_00=' + chunks[0])
          PY
