name: issue-923-final-fix-helper

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0
      - name: Restore inert PowerShell boundary and align AC7 proofs
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- scripts/lib/WorkerReportStore.ps1
          python <<'PY'
          from pathlib import Path
          import re

          foundation_path = Path('scripts/pr2-foundation/foundation.test.ts')
          foundation = foundation_path.read_text()
          foundation, count = re.subn(
              r"    for \(const file of FOUNDATION_DOC_ROWS\) \{\n      expect\(existsSync\(path\.join\(repoRoot, file\)\)\)\.toBe\(false\);\n    \}",
              """    for (const file of FOUNDATION_DOC_ROWS) {
              const source = path.join(repoRoot, file);
              expect(existsSync(source), file).toBe(true);
              expect(readFileSync(source, 'utf8'), file)
                .toMatch(/^\\/\\/ Issue #923 foundation-terminalized:/);
            }""",
              foundation,
              count=1,
          )
          if count != 1:
              raise SystemExit('AC7 filesystem assertion not found')
          foundation_path.write_text(foundation)

          port_path = Path('scripts/pr2-foundation/terminalized-port.test.ts')
          port = port_path.read_text()
          pattern = re.compile(
              r"  it\('launches the terminalized worker-report store through the canonical Node 22 TypeScript bridge',[\s\S]*?\n  \}\);",
          )
          replacement = """  it('keeps the worker-report PowerShell edge byte-compatible and the TypeScript authority dormant', () => {
              const wrapper = readFileSync(path.resolve('scripts/lib/WorkerReportStore.ps1'), 'utf8');
              expect(wrapper).toContain("'docs/worker-report-store.mjs'");
              expect(wrapper).toContain(
                'Invoke-MechanicalNodeFilterCli -FilterCliPath $Script:WorkerReportStoreCli',
              );
              expect(wrapper).not.toContain('scripts/lib/Invoke-TypeScriptCli.ts');
              expect(wrapper).not.toContain("'--experimental-strip-types'");
              expect(existsSync(path.resolve(
                'scripts/pr2-foundation/terminalized/worker-report-store.ts',
              ))).toBe(true);
            });"""
          port, count = pattern.subn(replacement, port, count=1)
          if count != 1:
              raise SystemExit('worker-report bridge assertion not found')
          port_path.write_text(port)
          PY
      - name: Commit final fixes to PR 939
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lib/WorkerReportStore.ps1 scripts/pr2-foundation/foundation.test.ts scripts/pr2-foundation/terminalized-port.test.ts
          git commit -m "fix: preserve inert boundary and real AC7 replacement proof"
          git push origin HEAD:agent/issue-923-pr2-foundation
