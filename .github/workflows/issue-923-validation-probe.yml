name: issue-923-sync-main-after-941

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0
      - name: Merge current main and resolve only the known policy overlap
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U)
            printf 'conflicts=%s\n' "${conflicts[*]}"
            if [ "${#conflicts[@]}" -ne 1 ] || [ "${conflicts[0]}" != 'scripts/lint-self-architect.config.json' ]; then
              echo 'unexpected merge conflict set' >&2
              exit 1
            fi
            git checkout --theirs -- scripts/lint-self-architect.config.json
            git add scripts/lint-self-architect.config.json
          fi
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo 'unresolved conflicts remain' >&2
            exit 1
          fi
          git commit -m 'Merge main after Issue 941 self-architect policy'
          git push origin HEAD:agent/issue-923-pr2-foundation
