name: issue-941-overlay-residual-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  summarize:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88694890317'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Classify exact residual findings
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > overlay.log
          python3 <<'PY'
          from collections import Counter
          import re

          lines = open('overlay.log', encoding='utf-8-sig', errors='replace').read().splitlines()
          path_re = re.compile(r'([A-Za-z0-9_.@/-]+\.(?:ps1|sh|bash|js|ts|mts|mjs|cjs|md|yaml|yml|json|example|template|tpl)):\d+-\d+')
          finding_re = re.compile(r'\[STRICT\]\s+duplicate-literal:\s+(.*?)\s+-\s+')
          pairs = Counter()
          for line in lines:
              match = finding_re.search(line)
              if not match:
                  continue
              files = tuple(dict.fromkeys(path_re.findall(match.group(1))))
              pairs[files] += 1
          print(f'total_strict={sum(pairs.values())}')
          print(f'unique_groups={len(pairs)}')
          for files, count in sorted(pairs.items(), key=lambda item: (-item[1], item[0])):
              print(f'count={count} files={" | ".join(files)}')
          for needle in ('Summary:', 'elapsed_seconds=', 'Process completed with exit code'):
              matches = [line for line in lines if needle in line and 'echo "elapsed_seconds=' not in line]
              if matches:
                  print(matches[-1])
          PY
