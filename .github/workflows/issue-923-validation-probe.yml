name: issue-923-current-ci-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  summarize:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_JOB_IDS: '88704713303 88704808829 88704808843'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Summarize current-head failures
        shell: bash
        run: |
          set -euo pipefail
          for job_id in $SOURCE_JOB_IDS; do
            api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs"
            curl --fail --silent --show-error --location \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" > "job-${job_id}.log"
          done
          python3 - <<'PY'
          import re
          ids = ['88704713303', '88704808829', '88704808843']
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          needles = (
              '[FAIL]', 'AssertionError:', 'failureMessages', 'Test Files', 'Tests ',
              'Process completed with exit code', '##[error]', 'expected ', 'received ',
          )
          for job_id in ids:
              print(f'===== job {job_id} =====')
              lines = open(f'job-{job_id}.log', encoding='utf-8-sig', errors='replace').read().splitlines()
              emitted = set()
              for index, raw in enumerate(lines):
                  line = ansi.sub('', raw)
                  if not any(needle in line for needle in needles):
                      continue
                  for cursor in range(max(0, index - 2), min(len(lines), index + 4)):
                      candidate = ansi.sub('', lines[cursor])
                      key = (cursor, candidate)
                      if key in emitted:
                          continue
                      emitted.add(key)
                      print(f'{cursor + 1}:{candidate[:5000]}')
          PY
