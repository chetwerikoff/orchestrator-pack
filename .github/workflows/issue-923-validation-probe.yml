name: issue-941-overlay-log-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  summarize:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88694890317'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print exact overlay verdict
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > overlay.log
          echo '--- verdict ---'
          grep -nE 'Summary:|elapsed_seconds=|\[STRICT\]|##\[error\]|Process completed with exit code' overlay.log | tail -n 300 || true
          echo '--- tail ---'
          tail -n 200 overlay.log
