name: issue-923-residual-fix-log-extract

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88703081197'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print exact helper failure
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > helper.log
          grep -nE 'match count|expected one match|SystemExit|Traceback|Error|error|failed|journal|wake event|worker target|foundation AC4|AC7 policy' helper.log | tail -n 200 || true
          echo '--- tail ---'
          tail -n 160 helper.log
