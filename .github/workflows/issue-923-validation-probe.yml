name: issue-923-final-scope-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0
      - name: Restore live sibling readiness and keep TS port dormant
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- scripts/lib/worker-status-store.mjs
          python <<'PY'
          from pathlib import Path
          import re

          test_path = Path('scripts/pr2-foundation/terminalized-port.test.ts')
          source = test_path.read_text()
          pattern = re.compile(
              r"  it\('treats the TypeScript implementation as sibling readiness, not a pre-existing data file',[\s\S]*?\n  \}\);",
          )
          replacement = """  it('keeps live sibling readiness byte-compatible and the TypeScript port dormant', () => {
              const source = readFileSync(path.resolve('scripts/lib/worker-status-store.mjs'), 'utf8');
              expect(source).toContain('workerReportStorePresent = reportStorePath');
              expect(source).toContain("existsSync(join(docsDir, 'worker-report-store.mjs'))");
              expect(source).not.toContain("'terminalized',\\n    'worker-report-store.ts'");
              expect(existsSync(path.resolve(
                'scripts/pr2-foundation/terminalized/worker-report-store.ts',
              ))).toBe(true);
            });"""
          source, count = pattern.subn(replacement, source, count=1)
          if count != 1:
              raise SystemExit('worker-status readiness assertion not found')
          test_path.write_text(source)
          PY
      - name: Commit final scope fix to PR 939
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lib/worker-status-store.mjs scripts/pr2-foundation/terminalized-port.test.ts
          git commit -m "fix: keep worker status readiness on legacy live boundary"
          git push origin HEAD:agent/issue-923-pr2-foundation
