name: issue-923-scope-amendment-helper

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: read

jobs:
  export-issue-body:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Export authoritative Issue 923 body through the pack gh wrapper
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/gh issue view 923 --repo "$GITHUB_REPOSITORY" --json body > issue-923.json
          python3 - <<'PY'
          import json
          payload = json.load(open('issue-923.json', encoding='utf-8'))
          body = payload.get('body')
          if not isinstance(body, str) or not body.strip():
              raise SystemExit('issue_923_body_missing')
          open('issue-923.md', 'w', encoding='utf-8', newline='').write(body)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-body
          path: issue-923.md
          if-no-files-found: error
          retention-days: 1
