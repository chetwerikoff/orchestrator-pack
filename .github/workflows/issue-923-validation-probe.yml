name: issue-923-final-self-architect

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PR_BASE_SHA: faac4525e5e457f7480f99b5f26fcfd96da6d9d5
      PR_HEAD_SHA: 50722cde9571877d482dfb893d925a23d32617fa
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout exact PR 939 merge ref
        shell: bash
        run: |
          git fetch origin refs/pull/939/merge
          git checkout --detach FETCH_HEAD
          test "$(git rev-parse HEAD^2)" = "$PR_HEAD_SHA"
      - name: Run strict self-architect lint
        shell: pwsh
        run: |
          ./scripts/lint-self-architect.ps1 `
            -Strict `
            -BaseRef $env:PR_BASE_SHA `
            -HeadRef $env:PR_HEAD_SHA
