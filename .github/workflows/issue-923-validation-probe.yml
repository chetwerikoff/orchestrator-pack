name: issue-923-final-fix-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88712704384'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print exact final-fix verifier failure
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > source.log
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          needles = (
              '[FAIL]', '[STRICT]', 'Summary:', 'self_architect_elapsed_seconds=',
              'Process completed with exit code', '##[error]', 'AssertionError:',
              'Test Files', 'Tests ', 'pipeline', 'elapsed_seconds=', 'failed', 'FAIL ',
          )
          print('--- matched ---')
          for index, line in enumerate(lines, start=1):
              if any(needle in line for needle in needles):
                  print(f'{index}:{line[:1600]}')
          print('--- final ---')
          for index, line in enumerate(lines[-35:], start=max(1, len(lines) - 34)):
              print(f'{index}:{line[:1600]}')
          PY