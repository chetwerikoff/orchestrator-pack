name: issue-941-manual-pack-review-status

on:
  pull_request:
    types: [reopened, synchronize]

permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  deliver:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_PR: '942'
      TARGET_SHA: 0ec143f1a1812fb08663c5185b3aaa24cf42fd89
      REVIEW_ID: '4746942684'
      REVIEW_URL: https://github.com/chetwerikoff/orchestrator-pack/pull/942#pullrequestreview-4746942684
    steps:
      - name: Verify exact clean review and green CI, then deliver required status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = Number(process.env.TARGET_PR);
            const sha = process.env.TARGET_SHA;
            const reviewId = Number(process.env.REVIEW_ID);

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            if (pr.state !== 'open' || pr.draft || pr.head.sha !== sha) {
              core.setFailed(`target_pr_drift:${pr.state}:draft=${pr.draft}:head=${pr.head.sha}`);
              return;
            }

            const { data: review } = await github.rest.pulls.getReview({
              owner,
              repo,
              pull_number,
              review_id: reviewId,
            });
            const reviewBody = String(review.body || '');
            if (review.commit_id !== sha || !reviewBody.includes('Verdict: clean')) {
              core.setFailed(`review_not_exact_clean:${review.commit_id}`);
              return;
            }

            const expectedChecks = [
              'PR scope guard',
              'Verify orchestrator-pack structure',
              'Self-architect lint',
              'Pester regression',
              'Type-check pack sources',
              'Vitest light lane 1/2',
              'Vitest light lane 2/2',
              'Vitest heavy shard 1/2',
              'Vitest heavy shard 2/2',
              'Run pack contract tests',
            ];
            const { data: checks } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: sha,
              per_page: 100,
            });
            const latest = new Map();
            for (const run of checks.check_runs) {
              const prior = latest.get(run.name);
              if (!prior || new Date(run.started_at || 0) > new Date(prior.started_at || 0)) {
                latest.set(run.name, run);
              }
            }
            for (const name of expectedChecks) {
              const run = latest.get(name);
              if (!run || run.status !== 'completed' || run.conclusion !== 'success') {
                core.setFailed(`required_check_not_green:${name}:${run?.status || 'missing'}:${run?.conclusion || 'missing'}`);
                return;
              }
            }

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha,
              state: 'success',
              context: 'orchestrator-pack/pack-review',
              description: 'Manual exact-head pack review clean; audited CI gate.',
              target_url: process.env.REVIEW_URL,
            });
            core.info(`published exact-head clean status for ${sha}`);
