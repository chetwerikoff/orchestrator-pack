name: issue-849-targeted-diagnostic

# Temporary read-only PR diagnostic. The GitHub App removes this workflow after reading the artifact.
on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: issue-849-targeted-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-849-gh-signal-classification
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture exact targeted and topology output
        shell: bash
        run: |
          set -u
          log="scripts/issue-849-targeted-diagnostic.txt"
          : > "$log"
          {
            echo '=== targeted gh-signal-classification ==='
            set +e
            npm test -- scripts/gh-signal-classification.test.ts
            echo "targeted_exit=$?"
            echo '=== heavy topology ==='
            export PR_BASE_SHA=0e8846b1e7caf063d73792700968971d75e0524f
            export PR_HEAD_SHA=8c15900972a1ba4d1a82207b23a393eaa69d2474
            export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
            export GITHUB_OUTPUT="$RUNNER_TEMP/topology-output"
            node scripts/emit-vitest-heavy-topology.mjs --gha-output
            echo "topology_exit=$?"
            set -e
          } > "$log" 2>&1
          tail -n 800 "$log" > "$RUNNER_TEMP/tail"
          mv "$RUNNER_TEMP/tail" "$log"
      - name: Upload bounded diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-849-targeted-diagnostic
          path: scripts/issue-849-targeted-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
