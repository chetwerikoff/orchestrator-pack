name: issue-849-apply-topology-fix

on:
  push:
    branches: [agent/issue-849-gh-signal-classification]

permissions:
  contents: write

concurrency:
  group: issue-849-apply-topology-fix
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-849-gh-signal-classification
          fetch-depth: 0
      - name: Reuse existing heavy test inventory
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          python - <<'PY'
          from pathlib import Path

          source_path = Path('scripts/gh-signal-classification.test.ts')
          source = source_path.read_text(encoding='utf-8')
          marker = "describe('gh signal classification (Issue #849)', () => {"
          if marker not in source:
              raise SystemExit('gh signal classification describe marker not found')
          source = source.replace(
              marker,
              "export function registerGhSignalClassificationTests(): void {\n  " + marker,
              1,
          )
          source = source.rstrip() + "\n}\n"
          cases_path = Path('scripts/gh-signal-classification.cases.ts')
          cases_path.write_text(source, encoding='utf-8')
          source_path.unlink()

          dead_path = Path('scripts/dead-worker-reconcile.test.ts')
          dead = dead_path.read_text(encoding='utf-8')
          fixture_import = "import { GH_SIGNAL_TEST_HEAD, writeGhSignalFake } from './gh-signal-test-fixture.ts';\n"
          registration_import = "import { registerGhSignalClassificationTests } from './gh-signal-classification.cases.ts';\n"
          if registration_import not in dead:
              if fixture_import not in dead:
                  raise SystemExit('dead-worker fixture import marker not found')
              dead = dead.replace(fixture_import, fixture_import + registration_import, 1)
          describe_marker = "describe('dead-worker-reconciler (Issue #593)', () => {"
          if 'registerGhSignalClassificationTests();' not in dead:
              if describe_marker not in dead:
                  raise SystemExit('dead-worker describe marker not found')
              dead = dead.replace(describe_marker, "registerGhSignalClassificationTests();\n\n" + describe_marker, 1)
          dead_path.write_text(dead, encoding='utf-8')
          PY
          git checkout origin/main -- scripts/vitest-ci-lanes.config.json
          git rm .github/workflows/issue-849-targeted-diagnostic.yml
          rm -f scripts/.issue-849-targeted-diagnostic.txt scripts/issue-849-targeted-diagnostic.txt
          git add -A
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "test: reuse existing heavy inventory for gh signal cases"
          git push origin HEAD:agent/issue-849-gh-signal-classification
