name: issue-943-changed-first-index-publisher

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: issue-943-changed-first-index-publisher
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET_BRANCH: agent/issue-943-self-architect-hot-loop
      TARGET_HEAD: 9b33c5007416280bcdc42b9f3c96f0b60119e253
      PR939_HEAD: 4901a274d1f6ec980d2974f3f729a26dcd1cc751
      PR939_BASE: 296dff446d365cb3c0aba92b93ab16a95ee51fd3
      PATCH_SOURCE_COMMIT: dd1916d6650bea279f49eb0e3c0e34f08932475e
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-943-self-architect-hot-loop
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply changed-first exact duplicate indexing
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_HEAD"
          python3 <<'PY'
          from pathlib import Path
          import textwrap

          lint_path = Path('scripts/lint-self-architect.ps1')
          source = lint_path.read_text(encoding='utf-8')
          start = source.index('function Find-DuplicateLiteralFindings {')
          end = source.index('function Find-HeuristicDuplicateFindings {', start)
          replacement = textwrap.dedent(r'''
          function Add-SlidingBlockLocations {
              param(
                  [string[]]$Lines,
                  [int]$Size,
                  [string]$RelativePath,
                  [object]$BlockMap,
                  [hashtable]$CandidateEdges,
                  [switch]$ExistingKeysOnly
              )

              if ($Lines.Count -lt $Size) { return }
              $meaningfulPrefix = [int[]]::new($Lines.Count + 1)
              for ($index = 0; $index -lt $Lines.Count; $index++) {
                  $meaningfulPrefix[$index + 1] = $meaningfulPrefix[$index]
                  if ($Lines[$index] -match '\S') {
                      $meaningfulPrefix[$index + 1]++
                  }
              }

              for ($start = 0; $start -le ($Lines.Count - $Size); $start++) {
                  $endExclusive = $start + $Size
                  if (($meaningfulPrefix[$endExclusive] - $meaningfulPrefix[$start]) -eq 0) {
                      continue
                  }

                  $firstLine = [string]$Lines[$start]
                  $lastLine = [string]$Lines[$endExclusive - 1]
                  if ($ExistingKeysOnly) {
                      if (-not $CandidateEdges.ContainsKey($firstLine)) { continue }
                      $lastLines = $CandidateEdges[$firstLine]
                      if (-not $lastLines.Contains($lastLine)) { continue }
                  }

                  $blockKey = [string]::Join("`n", $Lines, $start, $Size)
                  if ($ExistingKeysOnly -and -not $BlockMap.ContainsKey($blockKey)) { continue }
                  if (-not $BlockMap.ContainsKey($blockKey)) {
                      $BlockMap[$blockKey] = New-Object System.Collections.Generic.List[object]
                  }
                  if (-not $ExistingKeysOnly) {
                      if (-not $CandidateEdges.ContainsKey($firstLine)) {
                          $CandidateEdges[$firstLine] = New-Object 'System.Collections.Generic.HashSet[string]' ([System.StringComparer]::Ordinal)
                      }
                      [void]$CandidateEdges[$firstLine].Add($lastLine)
                  }
                  $BlockMap[$blockKey].Add([pscustomobject]@{
                          file      = $RelativePath
                          startLine = $start + 1
                          endLine   = $endExclusive
                          lineCount = $Size
                      })
              }
          }

          function Find-DuplicateLiteralFindings {
              param(
                  [hashtable]$FileLines,
                  [hashtable]$Config,
                  [string[]]$IntroducedInPaths = @(),
                  [string]$Root,
                  [string]$BaseRef,
                  [string]$HeadRef
              )

              $findings = New-Object System.Collections.Generic.List[object]
              $minStrict = [int]$Config.duplicateLiteralMinLines
              $renameMap = @{}
              if ($BaseRef -and $HeadRef) {
                  $renameMap = Get-RenameMap -Root $Root -BaseRef $BaseRef -HeadRef $HeadRef
              }
              $blockMap = New-Object 'System.Collections.Generic.Dictionary[string, System.Collections.Generic.List[object]]'
              $candidateEdges = @{}
              $introduced = @{}
              foreach ($path in $IntroducedInPaths) {
                  if ($path) {
                      $introduced[(Normalize-RepoPath $path).ToLowerInvariant()] = $true
                  }
              }
              $requireIntroduced = ($introduced.Count -gt 0)
              $baseLinesCache = @{}
              $baseBlockCache = @{}

              if ($requireIntroduced) {
                  # A reportable diff-mode group must touch a changed path. Index those
                  # blocks first; unchanged files can then probe only exact candidates.
                  foreach ($entry in $FileLines.GetEnumerator()) {
                      $normalizedPath = (Normalize-RepoPath $entry.Key).ToLowerInvariant()
                      if (-not $introduced.ContainsKey($normalizedPath)) { continue }
                      Add-SlidingBlockLocations -Lines $entry.Value -Size $minStrict -RelativePath $entry.Key -BlockMap $blockMap -CandidateEdges $candidateEdges
                  }
                  if ($blockMap.Count -gt 0) {
                      foreach ($entry in $FileLines.GetEnumerator()) {
                          $normalizedPath = (Normalize-RepoPath $entry.Key).ToLowerInvariant()
                          if ($introduced.ContainsKey($normalizedPath)) { continue }
                          Add-SlidingBlockLocations -Lines $entry.Value -Size $minStrict -RelativePath $entry.Key -BlockMap $blockMap -CandidateEdges $candidateEdges -ExistingKeysOnly
                      }
                  }
              }
              else {
                  foreach ($entry in $FileLines.GetEnumerator()) {
                      Add-SlidingBlockLocations -Lines $entry.Value -Size $minStrict -RelativePath $entry.Key -BlockMap $blockMap -CandidateEdges $candidateEdges
                  }
              }

              foreach ($pair in $blockMap.GetEnumerator()) {
                  $locations = @($pair.Value | Sort-Object file, startLine)
                  $distinctFiles = @($locations | Select-Object -ExpandProperty file -Unique)
                  if ($distinctFiles.Count -lt 2) { continue }

                  $rule = 'duplicate-literal'
                  $files = @($distinctFiles)
                  if (Test-Suppressed -Config $Config -Rule $rule -Files $files) { continue }

                  if ($requireIntroduced) {
                      $touchesIntroduced = $false
                      $touchesUnchanged = $false
                      foreach ($file in $distinctFiles) {
                          $normalizedFile = (Normalize-RepoPath $file).ToLowerInvariant()
                          if ($introduced.ContainsKey($normalizedFile)) {
                              $touchesIntroduced = $true
                          }
                          else {
                              $touchesUnchanged = $true
                          }
                      }

                      if (-not $touchesIntroduced) { continue }

                      if ($BaseRef) {
                          $sampleLoc = $locations[0]
                          $blockText = [string]$pair.Key
                          $shouldReport = $false

                          if ($touchesUnchanged) {
                              foreach ($loc in $locations) {
                                  $changedPath = Normalize-RepoPath $loc.file
                                  if (-not $introduced.ContainsKey($changedPath.ToLowerInvariant())) { continue }

                                  if (Test-IsBlockNovelAtPath -Root $Root -BaseRef $BaseRef -RelativePath $changedPath -BlockText $blockText -Size $sampleLoc.lineCount -BaseLinesCache $baseLinesCache -BaseBlockCache $baseBlockCache -RenameMap $renameMap) {
                                      $shouldReport = $true
                                      break
                                  }
                              }
                          }
                          else {
                              $novelIntroducedCount = 0
                              foreach ($file in $distinctFiles) {
                                  $introducedPath = Normalize-RepoPath $file
                                  if (-not $introduced.ContainsKey($introducedPath.ToLowerInvariant())) { continue }

                                  if (Test-IsBlockNovelAtPath -Root $Root -BaseRef $BaseRef -RelativePath $introducedPath -BlockText $blockText -Size $sampleLoc.lineCount -BaseLinesCache $baseLinesCache -BaseBlockCache $baseBlockCache -RenameMap $renameMap) {
                                      $novelIntroducedCount++
                                  }
                              }

                              # One novel introduced path is enough: the other file may already
                              # contain the block at base but still be in IntroducedInPaths.
                              if ($novelIntroducedCount -ge 1) {
                                  $shouldReport = $true
                              }
                          }

                          if (-not $shouldReport) { continue }
                      }
                  }

                  $lineCount = $locations[0].lineCount
                  $severity = if ($lineCount -ge $minStrict) { 'strict' } else { 'warning' }
                  $rationale = "Exact duplicate prompt literal ($lineCount lines) across $($distinctFiles.Count) files; centralize into one source of truth."
                  $findingLocations = @(
                      $locations |
                          ForEach-Object { Format-Location -File $_.file -StartLine $_.startLine -EndLine $_.endLine }
                  )
                  $findings.Add((New-Finding -Rule $rule -Severity $severity -Rationale $rationale -Locations $findingLocations)) | Out-Null
              }

              if ($findings.Count -eq 0) { return @() }
              return $findings.ToArray()
          }

          ''').lstrip()
          lint_path.write_text(source[:start] + replacement + source[end:], encoding='utf-8')

          tests_path = Path('tests/powershell/Lint-SelfArchitect.Tests.ps1')
          tests = tests_path.read_text(encoding='utf-8')
          marker = "\n}\n"
          insert_at = tests.rfind(marker)
          if insert_at < 0:
              raise SystemExit('pester closing marker missing')
          addition = r'''

              It 'indexes changed blocks before probing unchanged files' {
                  $source = Get-Content -LiteralPath $script:LintScript -Raw -Encoding UTF8
                  $helperStart = $source.IndexOf('function Add-SlidingBlockLocations')
                  $helperEnd = $source.IndexOf('function Find-DuplicateLiteralFindings')
                  $finderStart = $helperEnd
                  $finderEnd = $source.IndexOf('function Find-HeuristicDuplicateFindings')
                  $helperStart | Should -BeGreaterOrEqual 0
                  $helperEnd | Should -BeGreaterThan $helperStart
                  $finderEnd | Should -BeGreaterThan $finderStart
                  $helperBody = $source.Substring($helperStart, $helperEnd - $helperStart)
                  $finderBody = $source.Substring($finderStart, $finderEnd - $finderStart)

                  $helperBody | Should -Match 'ExistingKeysOnly'
                  $helperBody | Should -Match 'CandidateEdges'
                  $helperBody | Should -Match '\$ExistingKeysOnly -and -not \$BlockMap\.ContainsKey'
                  $helperBody.IndexOf('if ($ExistingKeysOnly)') | Should -BeLessThan $helperBody.IndexOf('$blockKey = [string]::Join')
                  $finderBody | Should -Match 'Index those'
                  $finderBody | Should -Match '-ExistingKeysOnly'
                  $finderBody | Should -Not -Match '\$FileLines\[\$samplePath\]\['
                  $finderBody | Should -Match '\$blockText\s*=\s*\[string\]\$pair\.Key'
              }
          '''
          tests_path.write_text(tests[:insert_at] + textwrap.dedent(addition) + tests[insert_at:], encoding='utf-8')
          PY

          expected="$RUNNER_TEMP/expected-paths"
          actual="$RUNNER_TEMP/actual-paths"
          printf '%s\n' \
            scripts/lint-self-architect.ps1 \
            tests/powershell/Lint-SelfArchitect.Tests.ps1 \
            | sort > "$expected"
          git diff --name-only | sort > "$actual"
          diff -u "$expected" "$actual"
          git diff --check
      - name: Verify policy and exact PR 939 budget
        shell: bash
        run: |
          set -euo pipefail
          npm ci --include=dev
          npm run check:node-major
          pwsh -NoProfile -File ./scripts/install-pester-ci.ps1
          pwsh -NoProfile -Command '$result = Invoke-Pester -Path @("./tests/powershell/Lint-SelfArchitect.Tests.ps1", "./scripts/lint-self-architect.diff-mode.Tests.ps1") -PassThru; if ($result.FailedCount -gt 0) { exit 1 }'
          pwsh -NoProfile -File ./scripts/verify.ps1
          pwsh -NoProfile -File ./scripts/check-reusable.ps1

          git fetch origin "$PR939_HEAD" "$PATCH_SOURCE_COMMIT" main
          benchmark="$RUNNER_TEMP/pr939-benchmark"
          git worktree add --detach "$benchmark" "$PR939_HEAD"
          git show "$PATCH_SOURCE_COMMIT:.github/workflows/issue-923-final-fix-publisher.yml" > "$RUNNER_TEMP/publisher-v2.yml"
          POLICY_SCRIPT="$GITHUB_WORKSPACE/scripts/lint-self-architect.ps1" BENCHMARK_ROOT="$benchmark" RUNNER_TEMP="$RUNNER_TEMP" python3 <<'PY'
          from pathlib import Path
          import os
          import textwrap

          workflow = Path(os.environ['RUNNER_TEMP'], 'publisher-v2.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == "python3 <<'PY'") + 1
          end = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'PY')
          script = textwrap.dedent('\n'.join(workflow[start:end])) + '\n'
          root = Path(os.environ['BENCHMARK_ROOT'])
          previous = Path.cwd()
          try:
              os.chdir(root)
              exec(compile(script, '<publisher-v2-patch>', 'exec'), {'__name__': '__main__'})
              path = Path('scripts/pr2-foundation/worker-notification-compat.test.ts')
              source = path.read_text(encoding='utf-8')
              old = "    expect(source).toContain('worker-message-dispatch-observe.mjs');\n"
              new = "    expect(source).toContain('worker-message-dispatch-observe');\n"
              if source.count(old) != 1:
                  raise SystemExit(f'canonical assertion match count: {source.count(old)}')
              path.write_text(source.replace(old, new, 1), encoding='utf-8')
              Path('scripts/lint-self-architect.ps1').write_text(
                  Path(os.environ['POLICY_SCRIPT']).read_text(encoding='utf-8'),
                  encoding='utf-8',
              )
          finally:
              os.chdir(previous)
          PY

          pushd "$benchmark"
          started="$(date +%s)"
          set +e
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 \
            -Strict \
            -BaseRef "$PR939_BASE" \
            -HeadRef HEAD \
            > "$RUNNER_TEMP/pr939-self-architect.log" 2>&1
          lint_status=$?
          set -e
          elapsed=$(( $(date +%s) - started ))
          popd
          tail -n 30 "$RUNNER_TEMP/pr939-self-architect.log"
          echo "pr939_lint_status=$lint_status"
          echo "pr939_self_architect_elapsed_seconds=$elapsed"
          test "$lint_status" -eq 0
          grep -F 'No findings.' "$RUNNER_TEMP/pr939-self-architect.log"
          grep -F 'Summary: strict=0 warning=0' "$RUNNER_TEMP/pr939-self-architect.log"
          test "$elapsed" -lt 600
      - name: Commit and push verified policy
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/lint-self-architect.ps1 tests/powershell/Lint-SelfArchitect.Tests.ps1
          git commit -m 'perf: index changed duplicate blocks first'
          git push origin HEAD:"$TARGET_BRANCH"
