name: Apply issue 821 migration

on:
  push:
    branches:
      - agent/issue-821-retire-autonomous-surface
    paths:
      - .github/scripts/apply-issue-821.mjs
      - .github/workflows/issue-821-apply.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/scripts/apply-issue-821.mjs
      - .github/workflows/issue-821-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply migration and validate
        id: migrate
        shell: bash
        run: |
          set +e
          node .github/scripts/apply-issue-821.mjs
          apply_status=$?

          npx vitest run \
            scripts/autonomous-session-gates.test.ts \
            scripts/autonomous-spawn-policy.test.ts \
            scripts/worker-nudge-gate.test.ts \
            scripts/spawn-worktree-grant-finalization.test.ts \
            scripts/orchestrator-claimed-review-run.test.ts \
            scripts/autonomous-orchestrator-boundary.test.ts
          test_status=$?

          pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          claimed_guard_status=$?
          pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          runtime_guard_status=$?
          npm run typecheck:foundation
          typecheck_status=$?
          npm run lint:foundation
          lint_status=$?

          rm -f .github/scripts/apply-issue-821.mjs .github/workflows/issue-821-apply.yml
          git add -A
          if ! git diff --cached --quiet; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Retire autonomous surface shims and activate session gates"
            git push origin HEAD:agent/issue-821-retire-autonomous-surface
          fi

          printf 'apply=%s test=%s claimed=%s runtime=%s typecheck=%s lint=%s\n' \
            "$apply_status" "$test_status" "$claimed_guard_status" "$runtime_guard_status" "$typecheck_status" "$lint_status"

          if (( apply_status != 0 || test_status != 0 || claimed_guard_status != 0 || runtime_guard_status != 0 || typecheck_status != 0 || lint_status != 0 )); then
            exit 1
          fi
