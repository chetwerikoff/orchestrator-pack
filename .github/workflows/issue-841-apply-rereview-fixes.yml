name: issue-841-apply-rereview-fixes

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Assemble and verify deterministic patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/issue-841-rereview/apply.part00 \
              .github/issue-841-rereview/apply.part01 \
              .github/issue-841-rereview/apply.part02 \
              .github/issue-841-rereview/apply.part03 \
              > "$RUNNER_TEMP/apply-rereview-fixes.py"
          echo '2f2a19c9dc17df9088189fcb1416430d47c97c4219db7e38b5397fb20bbda365  '"$RUNNER_TEMP/apply-rereview-fixes.py" | sha256sum --check
          python "$RUNNER_TEMP/apply-rereview-fixes.py"
          test "$(git hash-object scripts/fixtures/gate-runner/legacy-wave-3b/verify-frozen.ps1)" = '6e1c57e8a8114e0e74618bb6e8129463ca4ae881'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run gate-runner proof suite
        run: npm run gate-runner-selftest

      - name: Run foundation suite
        run: npm run test:foundation

      - name: Run TypeScript checks
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck:foundation
          npm run lint:foundation
          npm run ts:smoke
          npm run check:pwsh-test-growth

      - name: Validate final tree and commit
        shell: bash
        env:
          CLEAN_BASE: b65e0ade971717b560efe3290f0c01070d3cbec7
          GH_TOKEN: ${{ github.token }}
          TEMP_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          rm -f .github/workflows/issue-841-apply-rereview-fixes.yml
          rm -rf .github/issue-841-rereview

          expected=$(cat <<'EOF'
          scripts/check-supervisor-test-wait-inventory.test.ts
          scripts/fixtures/gate-runner/legacy-wave-3b/verify-frozen.ps1
          scripts/fixtures/gate-runner/legacy-wave-3b/verify-source-spans.json
          scripts/gate-runner/census.test.ts
          scripts/gate-runner/census.ts
          scripts/gate-runner/census/pre-change-baseline.json
          scripts/gate-runner/custom/bulk-cli-parity.test.ts
          scripts/gate-runner/goldens/wave-3b-pre-delete-captures.json
          scripts/toolchain/powershell-child-tests.json
          scripts/toolchain/raw-child-process-baseline.json
          EOF
          )

          # Tests and npm installation may expose generated or mode-only drift.
          # Restore every path outside the reviewed ten-file change set to the clean source head.
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            if printf '%s\n' "$expected" | grep -Fqx -- "$path"; then
              continue
            fi
            if git cat-file -e "$CLEAN_BASE:$path" 2>/dev/null; then
              git checkout "$CLEAN_BASE" -- "$path"
            else
              rm -rf -- "$path"
            fi
          done < <(git diff --name-only "$CLEAN_BASE")

          actual=$(git diff --name-only "$CLEAN_BASE" | sort)
          if [ "$actual" != "$(printf '%s\n' "$expected" | sort)" ]; then
            echo 'Unexpected final changed-path set:' >&2
            printf '%s\n' "$actual" >&2
            exit 1
          fi

          git diff --check "$CLEAN_BASE"

          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&head_sha=$TEMP_HEAD_SHA&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: close PR 860 rereview proof gaps'
          git push origin HEAD:agent/issue-841-bulk-gate-port
