name: issue-841-probe-wallclock-shard

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  probe:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Cancel stale scope attempts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/29487139587/force-cancel" || true
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&head_sha=$PR_HEAD_SHA&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run focused wall-clock test through pack harness
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $Root = $env:GITHUB_WORKSPACE
          $env:CI = 'true'
          $env:VITEST_CI_HEAVY_SHARD = '1'
          $env:OPK_TESTMODE_FLEET_WORKSPACE_ROOT = $Root
          . (Join-Path $Root 'scripts/lib/Set-OpkVitestHarnessEnv.ps1')
          Set-OpkVitestHarnessEnv | Out-Null
          Push-Location $Root
          try {
            & npm test -- scripts/testmode-fleet-reaper-wallclock.test.ts --reporter=default
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          finally {
            Pop-Location
          }
      - name: Remove temporary workflow and restore unrelated modes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-probe-wallclock-shard.yml
          chmod -x \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove PR 860 wall-clock probe'
          git push origin HEAD:agent/issue-841-bulk-gate-port
