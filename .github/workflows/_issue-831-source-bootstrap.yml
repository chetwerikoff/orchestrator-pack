name: issue-831 source bootstrap

on:
  push:
    branches:
      - agent/issue-831-json-producers-wave-b
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue-831-source
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error
