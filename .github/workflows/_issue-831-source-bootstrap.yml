name: issue-831 patch applicator

on:
  push:
    branches:
      - agent/issue-831-json-producers-wave-b
    paths:
      - .github/issue-831-patch/apply

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reconstruct and apply implementation patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/issue-831-patch/chunk-* > /tmp/issue-831.patch.gz.b64
          test "$(sha256sum /tmp/issue-831.patch.gz.b64 | cut -d' ' -f1)" = "5e5ab5402cbec1a098e065a39b733c23f79f7b1ca375c47d79e72cc3a631e218"
          base64 -d /tmp/issue-831.patch.gz.b64 | gzip -d > /tmp/issue-831.patch
          test "$(sha256sum /tmp/issue-831.patch | cut -d' ' -f1)" = "eaec8d097e1c9544ca35e3dbaa07a86f5c73601d602504643ef36506ad8d5479"
          git apply --check /tmp/issue-831.patch
          git apply /tmp/issue-831.patch
          rm -rf .github/issue-831-patch
          rm -f .github/workflows/_issue-831-source-bootstrap.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Port Wave B JSON producers to TypeScript"
          git push origin HEAD:agent/issue-831-json-producers-wave-b
