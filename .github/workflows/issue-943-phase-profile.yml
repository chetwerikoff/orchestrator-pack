name: issue-943-phase-profile

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  profile:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      POLICY_BASE: 8c5b1e2de60daec8c39eddbf5ec9c8972c20f288
      PATCH_WORKFLOW_COMMIT: 123b57c04bd146eb0b0b5863140df946ce06aa0b
      CANDIDATE_HELPER_COMMIT: 2f7e7f24356f645ac193a0c095309524aaad10c4
      PR939_HEAD: 4901a274d1f6ec980d2974f3f729a26dcd1cc751
      PR939_BASE: 296dff446d365cb3c0aba92b93ab16a95ee51fd3
      FINAL_PATCH_COMMIT: dd1916d6650bea279f49eb0e3c0e34f08932475e
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-923-validation-probe
          fetch-depth: 0

      - name: Assemble exact candidate and instrument phases
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$POLICY_BASE" "$PATCH_WORKFLOW_COMMIT" "$CANDIDATE_HELPER_COMMIT" "$PR939_HEAD" "$FINAL_PATCH_COMMIT" main

          policy="$RUNNER_TEMP/policy"
          git worktree add --detach "$policy" "$POLICY_BASE"
          git show "$PATCH_WORKFLOW_COMMIT:.github/workflows/issue-943-policy-apply.yml" > "$RUNNER_TEMP/source-workflow.yml"
          git show "$CANDIDATE_HELPER_COMMIT:scripts/issue-943-apply-changed-first-v4.py" > "$RUNNER_TEMP/apply.py"
          pushd "$policy"
          SOURCE_WORKFLOW="$RUNNER_TEMP/source-workflow.yml" python3 "$RUNNER_TEMP/apply.py"
          popd

          benchmark="$RUNNER_TEMP/pr939-profile"
          git worktree add --detach "$benchmark" "$PR939_HEAD"
          git show "$FINAL_PATCH_COMMIT:.github/workflows/issue-923-final-fix-publisher.yml" > "$RUNNER_TEMP/final-publisher.yml"
          BENCHMARK_ROOT="$benchmark" RUNNER_TEMP="$RUNNER_TEMP" python3 <<'PY'
          from pathlib import Path
          import os
          import textwrap

          workflow = Path(os.environ['RUNNER_TEMP'], 'final-publisher.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == "python3 <<'PY'") + 1
          end = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'PY')
          script = textwrap.dedent('\n'.join(workflow[start:end])) + '\n'
          root = Path(os.environ['BENCHMARK_ROOT'])
          previous = Path.cwd()
          try:
              os.chdir(root)
              exec(compile(script, '<final-patch>', 'exec'), {'__name__': '__main__'})
              path = Path('scripts/pr2-foundation/worker-notification-compat.test.ts')
              source = path.read_text(encoding='utf-8')
              old = "    expect(source).toContain('worker-message-dispatch-observe.mjs');\n"
              new = "    expect(source).toContain('worker-message-dispatch-observe');\n"
              if source.count(old) != 1:
                  raise SystemExit(f'canonical assertion match count: {source.count(old)}')
              path.write_text(source.replace(old, new, 1), encoding='utf-8')
          finally:
              os.chdir(previous)
          PY
          cp "$policy/scripts/lint-self-architect.ps1" "$benchmark/scripts/lint-self-architect.ps1"

          BENCHMARK_ROOT="$benchmark" python3 <<'PY'
          from pathlib import Path
          import os

          path = Path(os.environ['BENCHMARK_ROOT'], 'scripts/lint-self-architect.ps1')
          source = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str, label: str) -> None:
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              source = source.replace(old, new, 1)

          replace_once(
              '# --- main ---\n$Root = Get-RepoRoot -Start $RepoRoot\n',
              '# --- main ---\n$profileTotal = [System.Diagnostics.Stopwatch]::StartNew()\n$profilePhase = [System.Diagnostics.Stopwatch]::StartNew()\n$Root = Get-RepoRoot -Start $RepoRoot\n',
              'profile start',
          )
          replace_once(
              '$scanPaths = @(\n    $changedPaths | Where-Object { Test-ShouldScanPath -RelativePath $_ -Config $Config }\n)\n',
              '$scanPaths = @(\n    $changedPaths | Where-Object { Test-ShouldScanPath -RelativePath $_ -Config $Config }\n)\nWrite-Host ("PROFILE scope_ms={0}" -f $profilePhase.ElapsedMilliseconds)\n$profilePhase.Restart()\n',
              'scope timing',
          )
          replace_once(
              '$fileLines = @{}\n',
              'Write-Host ("PROFILE comparison_paths_ms={0}" -f $profilePhase.ElapsedMilliseconds)\n$profilePhase.Restart()\n$fileLines = @{}\n',
              'comparison timing',
          )
          replace_once(
              '$heuristicFileLines = @{}\n',
              'Write-Host ("PROFILE read_lines_ms={0}" -f $profilePhase.ElapsedMilliseconds)\n$profilePhase.Restart()\n$heuristicFileLines = @{}\n',
              'read timing',
          )
          replace_once(
              '$allFindings = New-Object System.Collections.Generic.List[object]\nforeach ($finding in (Find-DuplicateLiteralFindings -FileLines $fileLines -Config $Config -IntroducedInPaths $scanPaths -Root $Root -BaseRef $BaseRef -HeadRef $HeadRef)) {\n    $allFindings.Add($finding) | Out-Null\n}\n',
              '$allFindings = New-Object System.Collections.Generic.List[object]\n$profilePhase.Restart()\nforeach ($finding in (Find-DuplicateLiteralFindings -FileLines $fileLines -Config $Config -IntroducedInPaths $scanPaths -Root $Root -BaseRef $BaseRef -HeadRef $HeadRef)) {\n    $allFindings.Add($finding) | Out-Null\n}\nWrite-Host ("PROFILE duplicate_ms={0}" -f $profilePhase.ElapsedMilliseconds)\n',
              'duplicate timing',
          )
          replace_once(
              'foreach ($finding in (Find-PairedEditFindings -FileLines $fileLines -ChangedPaths $changedPaths -Config $Config)) {\n    $allFindings.Add($finding) | Out-Null\n}\n',
              '$profilePhase.Restart()\nforeach ($finding in (Find-PairedEditFindings -FileLines $fileLines -ChangedPaths $changedPaths -Config $Config)) {\n    $allFindings.Add($finding) | Out-Null\n}\nWrite-Host ("PROFILE paired_ms={0}" -f $profilePhase.ElapsedMilliseconds)\nWrite-Host ("PROFILE total_before_output_ms={0}" -f $profileTotal.ElapsedMilliseconds)\n',
              'paired timing',
          )
          replace_once(
              '    foreach ($pair in $blockMap.GetEnumerator()) {\n',
              '    Write-Host ("PROFILE duplicate_index_complete_ms={0} block_keys={1}" -f $profileDuplicate.ElapsedMilliseconds, $blockMap.Count)\n    $profileDuplicate.Restart()\n    foreach ($pair in $blockMap.GetEnumerator()) {\n',
              'duplicate index detail',
          )
          replace_once(
              '    $baseLinesCache = @{}\n    $baseBlockCache = @{}\n',
              '    $baseLinesCache = @{}\n    $baseBlockCache = @{}\n    $profileDuplicate = [System.Diagnostics.Stopwatch]::StartNew()\n',
              'duplicate stopwatch',
          )
          replace_once(
              '    if ($findings.Count -eq 0) { return @() }\n    return $findings.ToArray()\n}\n\nfunction Find-HeuristicDuplicateFindings',
              '    Write-Host ("PROFILE duplicate_groups_ms={0} findings={1}" -f $profileDuplicate.ElapsedMilliseconds, $findings.Count)\n    if ($findings.Count -eq 0) { return @() }\n    return $findings.ToArray()\n}\n\nfunction Find-HeuristicDuplicateFindings',
              'duplicate groups detail',
          )
          path.write_text(source, encoding='utf-8')
          PY
          git -C "$benchmark" diff --check

      - name: Run exact phase profile
        shell: bash
        run: |
          set -euo pipefail
          benchmark="$RUNNER_TEMP/pr939-profile"
          pushd "$benchmark"
          started="$(date +%s)"
          set +e
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 \
            -Strict \
            -BaseRef "$PR939_BASE" \
            -HeadRef HEAD | tee "$RUNNER_TEMP/profile.log"
          status=${PIPESTATUS[0]}
          set -e
          elapsed=$(( $(date +%s) - started ))
          popd
          echo "PROFILE process_status=$status elapsed_seconds=$elapsed"
          grep -E 'PROFILE|No findings.|Summary:' "$RUNNER_TEMP/profile.log"
          test "$status" -eq 0
