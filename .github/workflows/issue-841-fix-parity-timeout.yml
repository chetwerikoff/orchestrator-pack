name: issue-841-fix-parity-timeout

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Apply narrow parity timeout fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/gate-runner/custom/bulk-cli-parity.test.ts')
          text = p.read_text()
          needle = """  it('replays every frozen PowerShell fixture when pwsh is available and requires it in CI', () => {
              const available = pwshAvailable();"""
          if needle not in text:
              raise SystemExit('parity replay test not found')
          old = """      expect(replayed.stderr, `${capture.legacyScript} stderr`).toBe(capture.stderr ?? '');
              }
            });
          });
          """
          new = """      expect(replayed.stderr, `${capture.legacyScript} stderr`).toBe(capture.stderr ?? '');
              }
            }, 30_000);
          });
          """
          if old not in text:
              raise SystemExit('parity replay test tail not found')
          p.write_text(text.replace(old, new, 1))
          PY
          rm -f .github/workflows/issue-841-export-foundation-log.yml
          rm -f .github/workflows/issue-841-fix-parity-timeout.yml
          git diff --check
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Run focused frozen parity suite
        run: npx vitest run scripts/gate-runner/custom/bulk-cli-parity.test.ts --reporter=default
      - name: Restore unrelated executable modes
        if: always()
        shell: bash
        run: |
          git checkout -- plugins/ao-codex-pr-reviewer/bin/review.ts \
                          plugins/ao-scope-guard/bin/agent-wrap.ts \
                          plugins/ao-scope-guard/bin/scope-check.ts \
                          plugins/ao-task-declaration/bin/declare.ts \
                          plugins/ao-token-chain-ledger/bin/ledger.mjs || true
      - name: Commit and push cleaned fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/gate-runner/custom/bulk-cli-parity.test.ts
          git add -u .github/workflows
          git commit -m 'test: allow frozen PowerShell parity replay time'
          git push origin HEAD:agent/issue-841-bulk-gate-port
