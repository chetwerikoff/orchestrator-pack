name: issue-906-final-diagnostics

on:
  push:
    branches:
      - agent/issue-906-estate-cut
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/issue-906-estate-cut

      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: f10fd0051dd28f4cea865e4859b495e369219698
          path: trusted-scope-guard

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: trusted-scope-guard/package-lock.json

      - name: Install trusted dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix trusted-scope-guard ci --include=dev
          rm -rf node_modules
          ln -s "$PWD/trusted-scope-guard/node_modules" node_modules

      - name: Run focused diagnostics
        shell: bash
        env:
          PR_NUMBER: '907'
          PR_SCOPE_REPO_ROOT: ${{ github.workspace }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPO_FORK: 'false'
          PR_HEAD_REF: agent/issue-906-estate-cut
          PR_HEAD_REPO_SAME: 'true'
          SCOPE_GUARD_DEGRADED_LABEL: 'false'
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          scope_log="$RUNNER_TEMP/issue-906-scope.log"
          pipeline_log="$RUNNER_TEMP/issue-906-pipeline.log"

          (
            cd trusted-scope-guard
            pwsh -NoProfile -File ./scripts/pr-scope-check.ps1
          ) >"$scope_log" 2>&1
          scope_exit=$?
          printf '\nscope_exit=%s\n' "$scope_exit" >>"$scope_log"

          pwsh -NoProfile -File ./scripts/check-ci-pipeline-split.ps1 >"$pipeline_log" 2>&1
          pipeline_exit=$?
          printf '\npipeline_exit=%s\n' "$pipeline_exit" >>"$pipeline_log"

          cat "$scope_log"
          cat "$pipeline_log"
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-906-final-diagnostics
          path: |
            ${{ runner.temp }}/issue-906-scope.log
            ${{ runner.temp }}/issue-906-pipeline.log
          if-no-files-found: error
          retention-days: 1
