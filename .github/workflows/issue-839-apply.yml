name: issue-839-apply

on:
  push:
    branches: [issue-839-pack-review-runner-v2]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - name: Patch cutover surfaces
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/issue-839-apply.log) 2>&1
          python3 - <<'PY'
          from pathlib import Path
          import re

          yaml = Path('agent-orchestrator.yaml.example')
          text = yaml.read_text(encoding='utf-8')
          replacements = {
            'The orchestrator and reconcile loops jump the gaps via ao-review run / Get-AoReviewRuns.': 'The orchestrator and reconcile loops invoke the pack review runner and read the Get-AoReviewRuns pack-store view from the pack-side run/status store.',
            'At review time: ao-review run <worker-session-id>  (scripts/ao-review.ps1 shim → POST .../reviews/trigger)': 'Manual trigger: node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>',
            'Discover/idempotency: Get-AoReviewRuns fan-out (GET /api/v1/sessions/{id}/reviews) or ao-review list <session-id> --json.': 'Discover/idempotency: Get-AoReviewRuns pack-store view backed by the pack-side run/status store.',
          }
          for old, new in replacements.items():
            if old not in text:
              raise SystemExit(f'YAML target missing: {old[:60]}')
            text = text.replace(old, new)
          text = text.replace('Get-AoReviewRuns fan-out', 'Get-AoReviewRuns pack-store view')
          text = text.replace('ao-review list', 'Get-AoReviewRuns pack-store view')
          text = text.replace('ao-review run', 'pack review runner')
          text = text.replace('scripts/ao-review.ps1', 'scripts/pack-review-runner.ts')
          text = text.replace('GET /api/v1/sessions/{id}/reviews', 'pack-side run/status store')
          text = text.replace('GET /sessions/{id}/reviews', 'pack-side run/status store')
          text = text.replace('/api/v1/sessions/{workerId}/reviews/trigger', 'pack review runner')
          text, count = re.subn(r'# AO 0\.10 review harness \(Issue #623\)[\s\S]*?# Operator adoption: docs/ao-0-10-review-harness-adoption\.md', '# Pack-owned review runner (Issue #839)\n# AO project config carries no daemon reviewer-harness wiring after adoption.\n# Manual and automatic triggers use scripts/pack-review-runner.ts; status reads use\n# the pack-side run/status store through the Get-AoReviewRuns pack-store view.\n# Operator cutover: docs/ao-0-10-review-harness-adoption.md', text, count=1)
          if count != 1:
            raise SystemExit('YAML harness tail not replaced')
          yaml.write_text(text, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          old = '- **Trigger:** `ao-review run` via `scripts/ao-review.ps1`; discover via `Get-AoReviewRuns` or\n  `ao-review list --json`.'
          if old not in text:
            raise SystemExit('AGENTS trigger block missing')
          text = text.replace(old, '- **Trigger:** manual and automatic starts use `scripts/pack-review-runner.ts`; operational status comes from the compatible `Get-AoReviewRuns` pack-store view. GitHub PR review is the verdict.')
          agents.write_text(text, encoding='utf-8')

          skill = Path('.claude/skills/merge-with-local-adoption/SKILL.md')
          text = skill.read_text(encoding='utf-8')
          text, count = re.subn(r'- PR review is run by \*\*pack scripts\*\*[\s\S]*?scripts to record a verdict back to AO\)\.\n', '- PR review is run by the **pack-owned runner**, not by AO. Manual invocation is `node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>`; operational status comes from `scripts/pack-review-runner.ts list` or the compatible `Get-AoReviewRuns` pack-store view. GitHub PR review is the authoritative verdict; the pack-side run/status store is operational state only. Never use daemon review HTTP or `ao review submit` as a fallback or dual-write path.\n', text, count=1)
          if count != 1:
            raise SystemExit('merge skill review block not replaced')
          skill.write_text(text, encoding='utf-8')

          adapter = Path('scripts/lib/Invoke-AoReviewApi.ps1')
          text = adapter.read_text(encoding='utf-8')
          text, count = re.subn(r'\nfunction Set-AoProjectReviewerHarness \{[\s\S]*?\n\}\n\nfunction Test-ReviewBeforeCleanupGate', '\nfunction Test-ReviewBeforeCleanupGate', text, count=1)
          if count != 1:
            raise SystemExit('reviewer harness setter not removed')
          text, count = re.subn(r'\n    if \(\$null -ne \$ProjectConfigFixture -and -not \$FixturePayload\) \{[\s\S]*?\n    \}\n    if \(\$FixturePayload\) \{', '\n    if ($FixturePayload) {', text, count=1)
          if count != 1:
            raise SystemExit('reviewer harness guard not removed')
          adapter.write_text(text, encoding='utf-8')
          PY

          if grep -RInE 'scripts/ao-review\.ps1|/api/v1/sessions/.*/reviews(?:/trigger)?' agent-orchestrator.yaml.example AGENTS.md docs/ao-0-10-review-harness-adoption.md .claude/skills/merge-with-local-adoption/SKILL.md .cursor/skills/merge-with-local-adoption/SKILL.md; then
            exit 1
          fi
      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/issue-839-validation.log) 2>&1
          npm run typecheck:foundation
          npm run lint:foundation
          pwsh -NoProfile -File scripts/check-review-trigger-reconcile.ps1
          pwsh -NoProfile -File scripts/check-orchestrator-review-idempotency.ps1
          pwsh -NoProfile -File scripts/check-orchestrator-review-head-coverage.ps1
          npm test -- scripts/ao-0-10-review-trigger.test.ts scripts/review-handoff-wake-trigger.test.ts scripts/review-start-claim.test.ts scripts/review-start-claim-run-binding.test.ts scripts/scripted-review-confirmed-delivery-gate.test.ts scripts/harness-post-submit-pn-content-shape.test.ts scripts/harness-review-bridge.test.ts scripts/review-wake-trigger.test.ts
      - name: Commit clean tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-839-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Complete issue 839 review cutover'
          git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Success comment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body 'Issue #839 direct completion succeeded: YAML/AGENTS/skill/adapter cut over, three static gates and eight targeted test files passed, temporary workflow removed.'
      - name: Failure comment
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          { echo '## Issue #839 apply failure'; echo; echo '```text'; tail -c 30000 /tmp/issue-839-apply.log 2>/dev/null || true; tail -c 30000 /tmp/issue-839-validation.log 2>/dev/null || true; echo; echo '```'; } >/tmp/issue-839-failure.md
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/issue-839-failure.md
