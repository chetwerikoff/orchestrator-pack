name: Temporary rebase tree recorder

on:
  push:
    branches:
      - agent/tmp-rebase-847-tree

permissions:
  contents: write

jobs:
  record:
    if: ${{ !contains(github.event.head_commit.message, '[tree-recorded]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record tree SHA
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse 'HEAD^{tree}' > .tmp-rebase-tree-sha
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .tmp-rebase-tree-sha
          git commit -m 'chore: record rebase tree [tree-recorded]'
          git push
