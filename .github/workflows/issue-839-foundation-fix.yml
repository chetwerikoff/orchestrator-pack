name: issue-839-foundation-fix

on:
  push:
    branches:
      - issue-839-pack-review-runner-v2

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-839-foundation-fix
  cancel-in-progress: true

jobs:
  fix-and-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Remove stale PowerShell child-test baseline entry
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/toolchain/powershell-child-tests.json')
          text = path.read_text(encoding='utf-8')
          stale = '    {"path":"scripts/harness-review-bridge.test.ts","justification":"Pre-existing PowerShell child test at the Issue #800 baseline (direct:execFileSync); preserve until that test is migrated in a later PR."},\n'
          if text.count(stale) != 1:
              raise SystemExit('expected exactly one stale harness-review-bridge PowerShell baseline entry')
          path.write_text(text.replace(stale, ''), encoding='utf-8')
          PY
      - name: Verify PowerShell child-test baseline
        id: pwsh_guard
        shell: bash
        run: |
          set -o pipefail
          npm run check:pwsh-test-growth 2>&1 | tee /tmp/pwsh-growth.log
      - name: Run full TypeScript foundation suite
        id: foundation
        shell: bash
        run: |
          set -o pipefail
          npm run test:foundation -- --reporter=verbose 2>&1 | tee /tmp/foundation.log
      - name: Commit verified baseline fix
        if: steps.pwsh_guard.outcome == 'success' && steps.foundation.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-839-foundation-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Update PowerShell child-test baseline for review cutover'
          git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report diagnostic result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PWSH_GUARD: ${{ steps.pwsh_guard.outcome }}
          FOUNDATION: ${{ steps.foundation.outcome }}
        shell: bash
        run: |
          {
            echo '## Issue #839 foundation verification'
            echo
            echo "PowerShell growth guard: $PWSH_GUARD"
            echo "Foundation suite: $FOUNDATION"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            if [[ "$PWSH_GUARD" == success && "$FOUNDATION" == success ]]; then
              echo 'Baseline fix committed and temporary workflow removed.'
            else
              echo '```text'
              echo '===== PowerShell growth guard ====='
              tail -c 12000 /tmp/pwsh-growth.log 2>/dev/null || true
              echo
              echo '===== Foundation suite ====='
              tail -c 36000 /tmp/foundation.log 2>/dev/null || true
              echo
              echo '```'
            fi
          } >/tmp/issue-839-foundation-result.md
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/issue-839-foundation-result.md
