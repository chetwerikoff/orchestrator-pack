name: Issue 857 amend Clause D test roots

on:
  pull_request:
    types: [synchronize]

permissions:
  issues: write
  contents: read

jobs:
  amend:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Add only the two Clause D existing-suite paths
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue view 857 --repo "$GITHUB_REPOSITORY" --json body --jq .body > /tmp/issue857-body.md
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/issue857-body.md')
          body = path.read_text()
          additions = [
              'scripts/pr-session-binding-cache.test.ts',
              'scripts/session-pr-binding-resolver.test.ts',
          ]
          if all(item in body for item in additions):
              raise SystemExit(0)
          marker = '```allowed-roots\n'
          start = body.find(marker)
          if start < 0:
              raise SystemExit('allowed-roots fence not found')
          end = body.find('```', start + len(marker))
          if end < 0:
              raise SystemExit('allowed-roots fence is unterminated')
          block = body[start + len(marker):end]
          lines = [line.strip() for line in block.splitlines() if line.strip()]
          for item in additions:
              if item not in lines:
                  lines.append(item)
          updated = body[:start + len(marker)] + '\n'.join(lines) + '\n' + body[end:]
          path.write_text(updated)
          PY
          gh issue edit 857 --repo "$GITHUB_REPOSITORY" --body-file /tmp/issue857-body.md
