name: issue-831 CI integration fix

on:
  push:
    branches:
      - agent/issue-831-json-producers-wave-b
    paths:
      - .github/workflows/_issue-831-ci-fix.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/_issue-831-ci-fix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-831-json-producers-wave-b
          fetch-depth: 0
      - name: Apply verified CI integration fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          replacements = {
              'scripts/json-producers/golden-hygiene.test.ts': ("from './golden-hygiene.ts'", "from './golden-hygiene.js'"),
              'scripts/json-producers/read-delegation-audit-stop.test.ts': ("from './read-delegation-audit-stop.ts'", "from './read-delegation-audit-stop.js'"),
              'scripts/json-producers/read-delegation-audit-stop.ts': ("from './cli.ts'", "from './cli.js'"),
              'scripts/json-producers/rtk-discover-inventory.test.ts': ("from './rtk-discover-inventory.ts'", "from './rtk-discover-inventory.js'"),
              'scripts/json-producers/rtk-discover-inventory.ts': ("from './cli.ts'", "from './cli.js'"),
              'scripts/json-producers/sanctioned-worker-kill-record.test.ts': ("from './sanctioned-worker-kill-record.ts'", "from './sanctioned-worker-kill-record.js'"),
              'scripts/json-producers/sanctioned-worker-kill-record.ts': ("from './cli.ts'", "from './cli.js'"),
              'scripts/json-producers/worker-status-report.test.ts': ("from './worker-status-report.ts'", "from './worker-status-report.js'"),
              'scripts/json-producers/worker-status-report.ts': ("from './cli.ts'", "from './cli.js'"),
          }
          for name, (old, new) in replacements.items():
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f'{name}: expected exactly one {old!r}')
              path.write_text(text.replace(old, new), encoding='utf-8')

          lane_path = Path('scripts/vitest-ci-lanes.config.json')
          lane = json.loads(lane_path.read_text(encoding='utf-8'))
          for name in [
              'scripts/json-producers/golden-hygiene.test.ts',
              'scripts/json-producers/read-delegation-audit-stop.test.ts',
              'scripts/json-producers/rtk-discover-inventory.test.ts',
              'scripts/json-producers/sanctioned-worker-kill-record.test.ts',
              'scripts/json-producers/wave-b-reconciliation.test.ts',
              'scripts/json-producers/worker-status-report.test.ts',
              'scripts/kernel/json-artifact.test.ts',
          ]:
              lane['classification'][name] = 'light'
          lane['classification'] = dict(sorted(lane['classification'].items()))
          lane_path.write_text(json.dumps(lane, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY
          git show origin/main:tsconfig.json > tsconfig.json
          rm -f .github/workflows/_issue-831-ci-fix.yml
          npx tsc --project tsconfig.base.json --noEmit
          node scripts/invoke-vitest-ci-lane-plan.mjs light >/dev/null
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix Wave B full CI integration"
          git push origin HEAD:agent/issue-831-json-producers-wave-b
