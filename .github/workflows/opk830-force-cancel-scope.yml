name: Issue 830 force-cancel stale scope runs

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Force-cancel active scope runs for this head branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: agent/issue-830-gate-runner-core-census
        run: |
          set -euo pipefail
          mapfile -t run_ids < <(
            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/283233035/runs?event=pull_request&per_page=100" \
              --jq ".workflow_runs[] | select(.head_branch == \"${HEAD_BRANCH}\") | select(.status != \"completed\") | .id"
          )
          for run_id in "${run_ids[@]}"; do
            gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/force-cancel" >/dev/null 2>&1 \
              || gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 \
              || true
          done
