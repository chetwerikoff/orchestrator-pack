name: issue-841-cancel-stale-scope

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  cancel:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
      - name: Cancel stale payload-head scope run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel 29484136209 --repo "$GITHUB_REPOSITORY" || true
      - name: Remove temporary canceller and push
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-cancel-stale-scope.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove stale-scope canceller'
          git push origin HEAD:agent/issue-841-bulk-gate-port
