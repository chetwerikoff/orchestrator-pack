name: issue-841-cancel-stale-scope

on:
  push:
    branches:
      - agent/issue-841-bulk-gate-port

permissions:
  actions: write
  contents: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
      - name: Force-cancel stale scope runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&branch=agent/issue-841-bulk-gate-port&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Remove canceller and push cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-cancel-stale-scope.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove PR 860 stale-scope canceller'
          git push origin HEAD:agent/issue-841-bulk-gate-port
