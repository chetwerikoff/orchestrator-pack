name: Diagnose issue 821

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-821-diagnose.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run diagnostics and persist report
        shell: bash
        run: |
          set +e
          report=issue-821-diagnostics.txt
          : > "$report"

          run_check() {
            name="$1"
            shift
            tmp="$(mktemp)"
            "$@" >"$tmp" 2>&1
            status=$?
            {
              printf '\n===== %s (exit %s) =====\n' "$name" "$status"
              tail -n 400 "$tmp"
            } >> "$report"
            rm -f "$tmp"
          }

          # npm may mark package bin targets executable during install; restore repository modes.
          chmod -x \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/lib/agent-orchestrator-contract.test.mjs \
            plugins/lib/agent-orchestrator-contract.mjs \
            scripts/lint-agent-kit-placeholders.mjs \
            scripts/lint-skill-frontmatter.mjs

          run_check "residual references" bash -lc "git grep -n -E 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|ao-autonomous-guard\\.ps1|git-autonomous-guard\\.ps1|git-real-binary|_invoke-system-git\\.sh|_resolve-system-git\\.sh|autonomous-orchestrator-surface-bootstrap\\.sh|autonomous-bash-env\\.sh|autonomous-real-binaries\\.example\\.json|\\.ao/autonomous-real-binaries\\.json|invoke-orchestrator-claimed-review-run\\.ps1|Invoke-OrchestratorClaimedReviewRun\\.ps1|check-worker-nudge-gate-adoption\\.ps1' -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' || true"
          run_check "target vitest" npx vitest run \
            scripts/autonomous-session-gates.test.ts \
            scripts/autonomous-spawn-policy.test.ts \
            scripts/worker-nudge-gate.test.ts \
            scripts/spawn-worktree-grant-finalization.test.ts \
            scripts/orchestrator-claimed-review-run.test.ts \
            scripts/autonomous-orchestrator-boundary.test.ts
          run_check "claimed review lookup guard" pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          run_check "command runtime bootstrap guard" pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          run_check "typecheck foundation" npm run typecheck:foundation
          run_check "lint foundation" npm run lint:foundation
          run_check "diff check" git diff --check main...HEAD
          run_check "diff summary" git diff --summary main...HEAD

          rm -f .github/workflows/issue-821-diagnose.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Capture issue 821 diagnostics and normalize modes"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
