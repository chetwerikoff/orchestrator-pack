name: issue-771-focused-diagnostic

on:
  push:
    branches:
      - agent/issue-771-probe-loader

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-771-powershell-scope
          fetch-depth: 1
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Run focused suite and capture result
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/powershell/Issue771.PowerShellDependencyScope.Tests.ps1'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $output = @(Invoke-Pester -Configuration $config 2>&1)
          $output | Out-File -LiteralPath issue-771-pester-result.log -Encoding utf8
          $summary = @($output | Where-Object { $_.PSObject.Properties.Name -contains 'FailedCount' })[-1]
          if ($summary) {
            "SUMMARY total=$($summary.TotalCount) passed=$($summary.PassedCount) failed=$($summary.FailedCount) skipped=$($summary.SkippedCount)" | Add-Content issue-771-pester-result.log
          }
          exit 0
      - name: Upload focused result
        uses: actions/upload-artifact@v4
        with:
          name: issue-771-pester-result
          path: issue-771-pester-result.log
          if-no-files-found: error
