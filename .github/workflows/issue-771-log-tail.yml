name: issue-771-focused-diagnostic

on:
  push:
    branches:
      - agent/issue-771-probe-loader

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, '[issue771-focused-result]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout diagnostic branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout PR 773 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-771-powershell-scope
          path: target
          fetch-depth: 1
      - name: Install Pester
        shell: pwsh
        run: ./target/scripts/install-pester-ci.ps1
      - name: Run focused suite and capture result
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './target/tests/powershell/Issue771.PowerShellDependencyScope.Tests.ps1'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $output = @(Invoke-Pester -Configuration $config 2>&1)
          $output | Out-File -LiteralPath scripts/issue-771-pester-result.log -Encoding utf8
          $summary = @($output | Where-Object { $_.PSObject.Properties.Name -contains 'FailedCount' })[-1]
          if ($summary) {
            "SUMMARY total=$($summary.TotalCount) passed=$($summary.PassedCount) failed=$($summary.FailedCount) skipped=$($summary.SkippedCount)" | Add-Content scripts/issue-771-pester-result.log
          }
          exit 0
      - name: Publish focused result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/issue-771-pester-result.log
          git commit -m '[issue771-focused-result] Capture focused Pester result'
          git push origin "HEAD:${GITHUB_REF_NAME}"
