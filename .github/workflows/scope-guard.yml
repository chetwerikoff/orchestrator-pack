name: scope-guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main

# Superseded pull-request runs cancel per PR number; push-to-main runs never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default read-only; jobs that post PR comments override permissions locally.
permissions:
  contents: read

jobs:
  # Conservative markdown-only gate for heavy advisory jobs (issue #155).
  # Every changed path in the PR diff must be .md/.mdc AND match the allowlist below;
  # one non-qualifying path forces the full CI suite.
  classify-pr-changes:
    name: Classify PR changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      markdown_only: ${{ steps.classify.outputs.markdown_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify markdown-only PR
        id: classify
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Markdown-only allowlist (literal; conservative / fail-safe):
          #   docs/**
          #   .claude/skills/**
          #   .cursor/skills/**
          #   .cursor/rules/**
          #   AGENTS.md
          #   top-level *.md (e.g. README.md, CLAUDE.md)
          # Each changed path must also end in .md or .mdc.

          mapfile -t changed < <(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "markdown_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          markdown_only=true
          for path in "${changed[@]}"; do
            [ -z "$path" ] && continue
            case "$path" in
              *.md|*.mdc) ;;
              *) markdown_only=false; break ;;
            esac
            case "$path" in
              docs/*|.claude/skills/*|.cursor/skills/*|.cursor/rules/*) continue ;;
              AGENTS.md) continue ;;
            esac
            if [[ "$path" != */* ]]; then
              continue
            fi
            markdown_only=false
            break
          done

          echo "markdown_only=${markdown_only}" >> "$GITHUB_OUTPUT"

  verify-pack:
    name: Verify orchestrator-pack structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run read-only pack verifier
        shell: pwsh
        run: ./scripts/verify.ps1

      - name: Enforce reusable repository content policy
        shell: pwsh
        run: ./scripts/check-reusable.ps1

      - name: Enforce CI cheap wins policy
        shell: pwsh
        run: ./scripts/check-ci-cheap-wins.ps1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Enforce CI pipeline split policy
        shell: pwsh
        run: ./scripts/check-ci-pipeline-split.ps1

  pr-scope-guard:
    name: PR scope guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Checkout trusted scope guard (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-scope-guard

      - name: Setup Node.js (trusted scope guard deps)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            trusted-scope-guard/package-lock.json

      - name: Run scope guard
        shell: pwsh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SCOPE_REPO_ROOT: ${{ github.workspace }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork }}
          SCOPE_GUARD_DEGRADED_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'scope-guard-degraded') }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            throw 'GitHub CLI (gh) is required for PR scope guard'
          }
          if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
            throw 'Node.js is required for PR scope guard'
          }

          $trustedRoot = Join-Path $env:GITHUB_WORKSPACE 'trusted-scope-guard'
          $guardScript = Join-Path $trustedRoot 'scripts/pr-scope-check.ps1'
          if (-not (Test-Path -LiteralPath $guardScript)) {
            Write-Warning 'scope guard bootstrap: checker not on base ref yet; using PR head scripts (one-time until merge)'
            $trustedRoot = $env:GITHUB_WORKSPACE
            $guardScript = Join-Path $trustedRoot 'scripts/pr-scope-check.ps1'
          }

          Push-Location $trustedRoot
          try {
            npm ci --include=dev
            & $guardScript
          }
          finally {
            Pop-Location
          }

  test-typecheck:
    name: Type-check pack sources
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Type-check TypeScript sources
        run: npx tsc --project tsconfig.base.json --noEmit

      - name: Enforce review-start claim drift guard
        shell: pwsh
        run: ./scripts/check-review-start-claim-guard.ps1

  test-vitest:
    name: Vitest shard ${{ matrix.shard }}/4
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Run Vitest shard
        shell: pwsh
        run: ./scripts/run-vitest-shard.ps1 -Shard ${{ matrix.shard }} -ShardTotal 4

  test-pester:
    name: Pester regression
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -AllowClobber -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0.0
          Write-Host "Pester version: $((Get-Module Pester).Version)"

      - name: Run Pester track
        shell: pwsh
        run: ./scripts/test-all.ps1 -SkipNpm

  test-aggregate:
    name: Run pack contract tests
    needs: [classify-pr-changes, test-typecheck, test-vitest, test-pester]
    if: |
      always() &&
      !cancelled() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail-closed full-regression aggregate
        shell: pwsh
        env:
          TYPECHECK_RESULT: ${{ needs.test-typecheck.result }}
          VITEST_RESULT: ${{ needs.test-vitest.result }}
          PESTER_RESULT: ${{ needs.test-pester.result }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: ./scripts/ci-test-aggregate.ps1

  self-architect-lint:
    name: Self-architect lint
    needs: classify-pr-changes
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.classify-pr-changes.outputs.markdown_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run self-architect lint (strict)
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ./scripts/lint-self-architect.ps1 `
            -Strict `
            -BaseRef $env:PR_BASE_SHA `
            -HeadRef $env:PR_HEAD_SHA
