name: scope-guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  push:
    branches:
      - main

# Superseded pull-request runs cancel per PR number; push-to-main runs never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default read-only; jobs that post PR comments override permissions locally.
permissions:
  contents: read

jobs:
  # Conservative markdown-only gate for heavy advisory jobs (issue #155).
  # Every changed path in the PR diff must be .md/.mdc AND match the allowlist below;
  # one non-qualifying path forces the full CI suite.
  classify-pr-changes:
    name: Classify PR changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      markdown_only: ${{ steps.classify.outputs.markdown_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify markdown-only PR
        id: classify
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # Markdown-only allowlist (literal; conservative / fail-safe):
          #   docs/**
          #   .claude/skills/**
          #   .cursor/skills/**
          #   .cursor/rules/**
          #   AGENTS.md
          #   top-level *.md (e.g. README.md, CLAUDE.md)
          # Each changed path must also end in .md or .mdc.

          mapfile -t changed < <(git diff --name-only "${BASE_SHA}...${HEAD_SHA}")
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "markdown_only=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          markdown_only=true
          for path in "${changed[@]}"; do
            [ -z "$path" ] && continue
            case "$path" in
              *.md|*.mdc) ;;
              *) markdown_only=false; break ;;
            esac
            case "$path" in
              docs/*|.claude/skills/*|.cursor/skills/*|.cursor/rules/*) continue ;;
              AGENTS.md) continue ;;
            esac
            if [[ "$path" != */* ]]; then
              continue
            fi
            markdown_only=false
            break
          done

          echo "markdown_only=${markdown_only}" >> "$GITHUB_OUTPUT"

  verify-pack:
    name: Verify orchestrator-pack structure
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: read
      pull-requests: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run read-only pack verifier
        shell: pwsh
        run: ./scripts/verify.ps1

      - name: Enforce reusable repository content policy
        shell: pwsh
        run: ./scripts/check-reusable.ps1

      - name: Enforce CI cheap wins policy
        shell: pwsh
        run: ./scripts/check-ci-cheap-wins.ps1

      - name: Enforce verify runtime refactor policy
        shell: pwsh
        run: ./scripts/check-verify-runtime.ps1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Enforce CI pipeline split policy
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/check-ci-pipeline-split.ps1

  pr-scope-guard:
    name: PR scope guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Checkout trusted scope guard (base ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-scope-guard

      - name: Setup Node.js (trusted scope guard deps)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: trusted-scope-guard/package-lock.json

      - name: Run scope guard
        shell: pwsh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SCOPE_REPO_ROOT: ${{ github.workspace }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO_SAME: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          SCOPE_GUARD_DEGRADED_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'scope-guard-degraded') }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            throw 'GitHub CLI (gh) is required for PR scope guard'
          }
          if (-not (Get-Command node -ErrorAction SilentlyContinue)) {
            throw 'Node.js is required for PR scope guard'
          }

          $trustedRoot = Join-Path $env:GITHUB_WORKSPACE 'trusted-scope-guard'
          $trustedChecker = Join-Path $trustedRoot 'scripts/pr-scope-check.ps1'
          if (Test-Path -LiteralPath $trustedChecker) {
            $guardScript = $trustedChecker
          }
          else {
            Write-Warning 'scope guard bootstrap: checker not on base ref yet; using PR head scripts (one-time until merge)'
            $guardScript = Join-Path $env:GITHUB_WORKSPACE 'scripts/pr-scope-check.ps1'
          }

          Push-Location $trustedRoot
          try {
            npm ci --include=dev
            # PR-head pr-scope-check.ts imports workspace packages; resolve them from the
            # trusted base install without running npm (and lifecycle scripts) on PR head.
            $trustedNodeModules = Join-Path $trustedRoot 'node_modules'
            $prNodeModules = Join-Path $env:GITHUB_WORKSPACE 'node_modules'
            if (Test-Path -LiteralPath $prNodeModules) {
              Remove-Item -LiteralPath $prNodeModules -Recurse -Force -ErrorAction SilentlyContinue
            }
            New-Item -ItemType SymbolicLink -Path $prNodeModules -Target $trustedNodeModules -Force | Out-Null
            & $guardScript
          }
          finally {
            Pop-Location
          }

  test-typecheck:
    name: Type-check pack sources
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Type-check TypeScript sources
        run: npx tsc --project tsconfig.base.json --noEmit

      - name: Enforce review-start claim drift guard
        shell: pwsh
        run: ./scripts/check-review-start-claim-guard.ps1

  test-vitest-light:
    name: Vitest light lane
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Run Vitest light lane
        shell: pwsh
        run: ./scripts/run-vitest-light-lane.ps1

  plan-vitest-ci-topology:
    name: Plan Vitest heavy topology
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      heavy_shard_count: ${{ steps.plan.outputs.heavy_shard_count }}
      heavy_shard_matrix: ${{ steps.plan.outputs.heavy_shard_matrix }}
      fallback_classification: ${{ steps.plan.outputs.fallback_classification }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Emit derived heavy topology
        id: plan
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OPK_VITEST_PR_SCOPE_MODE: ${{ vars.OPK_VITEST_PR_SCOPE_MODE }}
        run: |
          set -euo pipefail
          if [ -n "${PR_BASE_SHA:-}" ] && [ -n "${PR_HEAD_SHA:-}" ]; then
            export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "${PR_BASE_SHA}" --head "${PR_HEAD_SHA}")"
          fi
          node scripts/emit-vitest-heavy-topology.mjs --gha-output

      - name: Upload heavy topology artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitest-heavy-topology
          path: scripts/vitest-heavy-topology.plan.json
          if-no-files-found: error

  test-vitest-heavy:
    name: Vitest heavy shard ${{ matrix.shard }}/${{ needs.plan-vitest-ci-topology.outputs.heavy_shard_count }}
    needs: [classify-pr-changes, plan-vitest-ci-topology]
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.plan-vitest-ci-topology.outputs.heavy_shard_matrix) }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Download heavy topology artifact
        uses: actions/download-artifact@v4
        with:
          name: vitest-heavy-topology
          path: scripts

      - name: Run Vitest heavy shard
        shell: pwsh
        env:
          OPK_VITEST_TOPOLOGY_PLAN_PATH: ${{ github.workspace }}/scripts/vitest-heavy-topology.plan.json
        run: ./scripts/run-vitest-heavy-shard.ps1 -Shard ${{ matrix.shard }}

  test-pester:
    name: Pester regression
    needs: classify-pr-changes
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Pester module
        uses: actions/cache@v4
        with:
          path: ~/.local/share/powershell/Modules/Pester
          key: pester-5-${{ runner.os }}-${{ hashFiles('scripts/install-pester-ci.ps1', 'scripts/test-all.ps1') }}
          restore-keys: |
            pester-5-${{ runner.os }}-

      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1

      - name: Run Pester track
        shell: pwsh
        run: ./scripts/test-all.ps1 -SkipNpm

  test-aggregate:
    name: Run pack contract tests
    needs: [classify-pr-changes, plan-vitest-ci-topology, test-typecheck, test-vitest-light, test-vitest-heavy, test-pester]
    if: |
      always() &&
      (needs.classify-pr-changes.result == 'skipped' ||
       needs.classify-pr-changes.outputs.markdown_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail-closed full-regression aggregate
        shell: pwsh
        env:
          TYPECHECK_RESULT: ${{ needs.test-typecheck.result }}
          VITEST_LIGHT_RESULT: ${{ needs.test-vitest-light.result }}
          VITEST_HEAVY_RESULT: ${{ needs.test-vitest-heavy.result }}
          VITEST_TOPOLOGY_PLAN_RESULT: ${{ needs.plan-vitest-ci-topology.result }}
          PESTER_RESULT: ${{ needs.test-pester.result }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: ./scripts/ci-test-aggregate.ps1

  self-architect-lint:
    name: Self-architect lint
    needs: classify-pr-changes
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.classify-pr-changes.outputs.markdown_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run self-architect lint (strict)
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          ./scripts/lint-self-architect.ps1 `
            -Strict `
            -BaseRef $env:PR_BASE_SHA `
            -HeadRef $env:PR_HEAD_SHA
