name: issue-839-amend-declaration

on:
  pull_request:
    types: [labeled]
    branches: [main]

concurrency:
  group: issue-839-amend-declaration
  cancel-in-progress: true

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  amend:
    if: github.event.pull_request.number == 845 && github.event.label.name == 'in_progress'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev --silent
      - name: Amend committed declaration
        id: declare
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -o pipefail
          npx tsx plugins/ao-task-declaration/bin/declare.ts \
            --issue 839 \
            --iteration-id issue-839-pr-845 \
            --declared-paths '.claude/skills/merge-with-local-adoption/SKILL.md,.cursor/skills/merge-with-local-adoption/SKILL.md,AGENTS.md,agent-orchestrator.yaml.example,docs/ao-0-10-review-harness-adoption.md,docs/migration_notes.md,docs/orchestrator-autoloop-go-live.md,tests/harness-pretrigger-config-read.test.ts' \
            --declared-globs 'scripts/**' \
            --amend \
            --reason 'Include the existing compatibility test directly affected by retiring reviewer-harness config writes.' \
            --actor chatgpt \
            --repo-root . 2>&1 | tee /tmp/issue-839-declare.log
      - name: Publish amendment failure
        if: steps.declare.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tail -n 120 /tmp/issue-839-declare.log >/tmp/issue-839-declare-tail.log
          {
            echo '## Issue #839 declaration amendment failure'
            echo '```text'
            cat /tmp/issue-839-declare-tail.log
            echo '```'
          } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md
          exit 1
      - name: Commit amended declaration
        if: steps.declare.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/issue-839-amend-declaration.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/declarations/839.issue-839-pr-845.json
          git commit -m 'Amend issue 839 declaration for compatibility test'
          git push origin HEAD:issue-839-pack-review-runner-v2
