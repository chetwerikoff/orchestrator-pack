# Temporary read-only diagnostic; remove after artifact capture.
name: Issue 857 final CI diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture failing checks
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          & ./scripts/check-ci-pipeline-split.ps1 *> diagnostics/structure.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/structure.log
          & ./scripts/run-vitest-light-lane.ps1 -Shard 1 *> diagnostics/light-1.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/light-1.log
          & ./scripts/run-vitest-light-lane.ps1 -Shard 2 *> diagnostics/light-2.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/light-2.log
      - uses: actions/upload-artifact@v4
        with:
          name: issue857-final-ci-diagnostics-${{ github.run_id }}
          path: diagnostics/*.log
          if-no-files-found: error
