# Temporary read-only diagnostic; remove after artifact capture.
name: Issue 857 final CI diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  structure:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture structure policy
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          & ./scripts/check-ci-pipeline-split.ps1 *> diagnostics/structure.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/structure.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue857-structure-${{ github.run_id }}
          path: diagnostics/structure.log
          if-no-files-found: error

  light-1:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture light shard 1
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          & ./scripts/run-vitest-light-lane.ps1 -Shard 1 *> diagnostics/light-1.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/light-1.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue857-light-1-${{ github.run_id }}
          path: diagnostics/light-1.log
          if-no-files-found: error

  light-2:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture light shard 2
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          & ./scripts/run-vitest-light-lane.ps1 -Shard 2 *> diagnostics/light-2.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/light-2.log
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue857-light-2-${{ github.run_id }}
          path: diagnostics/light-2.log
          if-no-files-found: error
