# Temporary fix/validation workflow; remove after candidate commit.
name: Issue 857 final CI diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  validate-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply validated candidate plus diagnostic-only detail eligibility
        shell: bash
        run: |
          python - <<'PYCODE'
          from pathlib import Path
          import subprocess
          import textwrap

          previous = subprocess.check_output(
              ['git', 'show', 'HEAD^:.github/workflows/issue857-final-ci-diagnostic.yml'],
              text=True,
          )
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = previous.index(start_marker) + len(start_marker)
          end = previous.index(end_marker, start)
          candidate = textwrap.dedent(previous[start:end])
          exec(compile(candidate, '<issue857-candidate>', 'exec'), {'__name__': '__main__'})

          invoke = Path('scripts/lib/Invoke-AoCliJson.ps1')
          text = invoke.read_text()
          old = """function Test-AoSessionRowNeedsSessionGetDetail {
              param($Row)

              # Issue #857: bulk session-list rows already carry branch + prs[].
              # Per-session detail enrichment is structurally retired.
              return $false
          }
          """
          new = """function Test-AoSessionRowNeedsSessionGetDetail {
              param($Row)

              if (-not $Row) { return $false }
              $hasBulkPrList = if ($Row -is [System.Collections.IDictionary]) {
                  $Row.Contains('prs')
              }
              else {
                  $Row.PSObject.Properties.Name -contains 'prs'
              }
              # AO 0.10.2 bulk rows always carry prs[] (including an empty array), so
              # production consumers never fan out. Rows without prs are legacy or
              # bounded diagnostic fixtures and retain refresh-only telemetry.
              if ($hasBulkPrList) { return $false }
              $role = [string]$Row.role
              if ($role -and $role.ToLowerInvariant() -ne 'worker' -and $role.ToLowerInvariant() -ne 'coding') {
                  return $false
              }
              return -not [string]::IsNullOrWhiteSpace((Get-AoSessionRowIdentifier -Row $Row))
          }
          """
          if text.count(old) != 1:
              raise SystemExit(f'detail eligibility block count={text.count(old)}')
          invoke.write_text(text.replace(old, new))
          PYCODE
      - name: Validate affected suites
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          status=0
          npm test -- \
            scripts/worker-report-store.test.ts \
            scripts/session-pr-binding-resolver.test.ts \
            scripts/worker-status-store.test.ts \
            scripts/worker-status-store-live-rca.test.ts \
            > diagnostics/affected-suites.log 2>&1 || status=$?
          npx tsc --project tsconfig.base.json --noEmit >> diagnostics/affected-suites.log 2>&1 || status=$?
          node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs >> diagnostics/affected-suites.log 2>&1 || status=$?
          git diff --check >> diagnostics/affected-suites.log 2>&1 || status=$?
          echo "exit=$status" >> diagnostics/affected-suites.log
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue857-affected-suites-${{ github.run_id }}
          path: diagnostics/affected-suites.log
          if-no-files-found: error
      - name: Commit validated production fix
        if: success()
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/worker-report-store.mjs \
            docs/session-pr-binding-resolver.mjs \
            scripts/lib/WorkerReportStore.ps1 \
            scripts/lib/worker-status-store.mjs \
            scripts/lib/Invoke-AoCliJson.ps1
          git commit -m 'Restore binding consumer compatibility contracts'
          git push origin HEAD:agent/issue-857-binding-contract-v2
