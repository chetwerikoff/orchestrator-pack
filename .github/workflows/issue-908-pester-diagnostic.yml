name: issue-908-pester-diagnostic

on:
  push:
    branches:
      - fix/scope-guard-pr-files-pagination
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/scope-guard-pr-files-pagination
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Capture Pester track
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -File ./scripts/test-all.ps1 -SkipNpm > "$RUNNER_TEMP/issue-908-pester.log" 2>&1
          printf '\nexit=%s\n' "$?" >> "$RUNNER_TEMP/issue-908-pester.log"
          tail -n 200 "$RUNNER_TEMP/issue-908-pester.log"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue-908-pester-diagnostic
          path: ${{ runner.temp }}/issue-908-pester.log
          retention-days: 1
