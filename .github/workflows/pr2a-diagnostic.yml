name: PR2a diagnostic capture

on:
  pull_request:

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Capture conformance
        shell: bash
        run: |
          set +e
          mkdir -p pr2a-diagnostic
          node --experimental-strip-types scripts/pr2a/final-conformance.ts --ref HEAD --json > pr2a-diagnostic/final-conformance.log 2>&1
          printf '%s\n' "$?" > pr2a-diagnostic/final-conformance.exit
          exit 0

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr2a-conformance-${{ github.sha }}
          path: pr2a-diagnostic
          if-no-files-found: error
