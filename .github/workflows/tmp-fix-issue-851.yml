name: Temporary issue 851 lane inventory fix

on:
  push:
    branches:
      - agent/issue-851-gate-runner-extension-contract

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Register registry selftest and remove temporary workflow
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('scripts/vitest-ci-lanes.config.json')
          data = json.loads(path.read_text())
          data['classification']['scripts/gate-runner/registry.test.ts'] = 'light'
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
          rm .github/workflows/tmp-fix-issue-851.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/vitest-ci-lanes.config.json .github/workflows/tmp-fix-issue-851.yml
          git commit -m "fix: register gate registry selftest in CI lane"
          git push
