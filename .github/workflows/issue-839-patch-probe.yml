name: issue-839-patch-probe

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    if: github.event.pull_request.number == 845 && github.event.label.name == 'in_progress'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Probe full apply sequence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euxo pipefail
          git clone -q --single-branch --branch issue-839-pack-review-runner-v2 "https://x-access-token:${GH_TOKEN}@github.com/chetwerikoff/orchestrator-pack.git" repo
          cd repo
          python3 scripts/issue-839-finalize-light.py
          git rm --ignore-unmatch \
            .github/workflows/issue-839-light-diagnose.yml \
            .github/workflows/issue-839-finalize-light-labeled.yml \
            .github/workflows/issue-839-finalize-light-valid.yml \
            .github/workflows/issue-839-patch-probe.yml \
            scripts/issue-839-finalize-light.py
          node scripts/reachability-purge.mjs --write
          git status --short
