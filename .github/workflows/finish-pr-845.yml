name: finish-pr-845

on:
  push:
    branches: [issue-839-pack-review-runner-v2]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finish:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Apply issue 839 cutover
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/issue-839-apply.log) 2>&1
          python3 - <<'PY'
          from pathlib import Path
          import re

          yaml = Path('agent-orchestrator.yaml.example')
          text = yaml.read_text(encoding='utf-8')
          text = text.replace('The orchestrator and reconcile loops jump the gaps via ao-review run / Get-AoReviewRuns.', 'The orchestrator and reconcile loops invoke the pack review runner and read the Get-AoReviewRuns pack-store view from the pack-side run/status store.')
          text = text.replace('At review time: ao-review run <worker-session-id>  (scripts/ao-review.ps1 shim → POST .../reviews/trigger)', 'Manual trigger: node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>')
          text = text.replace('Discover/idempotency: Get-AoReviewRuns fan-out (GET /api/v1/sessions/{id}/reviews) or ao-review list <session-id> --json.', 'Discover/idempotency: Get-AoReviewRuns pack-store view backed by the pack-side run/status store.')
          text = text.replace('Get-AoReviewRuns fan-out', 'Get-AoReviewRuns pack-store view')
          text = text.replace('ao-review list', 'Get-AoReviewRuns pack-store view')
          text = text.replace('ao-review run', 'pack review runner')
          text = text.replace('scripts/ao-review.ps1', 'scripts/pack-review-runner.ts')
          text = text.replace('GET /api/v1/sessions/{id}/reviews', 'pack-side run/status store')
          text = text.replace('GET /sessions/{id}/reviews', 'pack-side run/status store')
          text = text.replace('/api/v1/sessions/{workerId}/reviews/trigger', 'pack review runner')
          text, count = re.subn(
              r'# AO 0\.10 review harness \(Issue #623\)[\s\S]*?# Operator adoption: docs/ao-0-10-review-harness-adoption\.md',
              '# Pack-owned review runner (Issue #839)\n# AO project config carries no daemon reviewer-harness wiring after adoption.\n# Manual and automatic triggers use scripts/pack-review-runner.ts; status reads use\n# the pack-side run/status store through the Get-AoReviewRuns pack-store view.\n# Operator cutover: docs/ao-0-10-review-harness-adoption.md',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('failed to replace YAML harness tail')
          yaml.write_text(text, encoding='utf-8')

          adoption = '''# Pack-owned review runner adoption (Issue #839)

## Purpose

The pack owns review invocation and operational run/status tracking. AO must not spawn a reviewer for this project. Manual and automatic triggers both enter `scripts/pack-review-runner.ts`, which invokes `scripts/invoke-pack-review.ps1` from the trusted pack checkout, posts the GitHub PR review directly, and records operational state in the pack-side run/status store.

GitHub PR review is the authoritative verdict. The local store is authoritative only for run existence, in-flight/terminal status, and the run bound to a `(PR, head)` claim.

## Commands

```bash
node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>
node --experimental-strip-types scripts/pack-review-runner.ts start --pr-number <pr> --head-sha <40-hex>
node --experimental-strip-types scripts/pack-review-runner.ts list --project-id orchestrator-pack
```

Automatic review uses the same runner through existing PowerShell adapters. The preserved `Review-StartClaim.ps1` mutex/atomic-write/stale-reclaim primitive remains the concurrency authority. Do not use daemon review endpoints or `ao review submit` as a transition or fallback path.

## Required post-merge adoption

1. Read the live project config with `ao project get orchestrator-pack --json`.
2. Clear reviewer-harness wiring: set `reviewers` to an empty array or omit the key using the live daemon's accepted shape, then read it back and verify no harness remains.
3. Restart the daemon or recycle the affected project session according to the local config-change procedure; verify a new/restored session observes the cleared config.
4. Remove pre-cutover zombies: session 109 / PR #758, session 124 / PR #820, and the stuck #835 fallback, using `ao session kill` or existing dead-session reconciliation.
5. Run one fresh manual and one automatic trigger on real open heads. Verify one GitHub review, terminal pack-store state, and zero daemon review HTTP traffic.

## Failure handling

Missing, corrupt, duplicate, or ambiguous state fails closed. A disappeared stale runner becomes failed and reclaimable through the existing claim policy. Reviewer non-zero exit and timeout record terminal `failed` or `timed_out`; neither is clean. A new PR head uses a distinct claim key.

## Rollback

Revert the pack-runner change and deliberately restore the previous project reviewer configuration. Never leave pack and daemon invocation active in parallel.
'''
          Path('docs/ao-0-10-review-harness-adoption.md').write_text(adoption, encoding='utf-8')

          agents = Path('AGENTS.md')
          text = agents.read_text(encoding='utf-8')
          text = text.replace('- **Trigger:** `ao-review run` via `scripts/ao-review.ps1`; discover via `Get-AoReviewRuns` or\n  `ao-review list --json`.', '- **Trigger:** manual and automatic starts use `scripts/pack-review-runner.ts`; operational status comes from the compatible `Get-AoReviewRuns` pack-store view. GitHub PR review is the verdict.')
          text = text.replace('Use **REVIEW_COMMAND** / **PACK_REVIEWER** — retired `ao review send` / `execute` are\n  **REMOVED**.', 'Use **REVIEW_COMMAND** / **PACK_REVIEWER**; daemon review HTTP and `ao review submit` are not fallback paths.')
          agents.write_text(text, encoding='utf-8')

          skill = Path('.claude/skills/merge-with-local-adoption/SKILL.md')
          text = skill.read_text(encoding='utf-8')
          text, count = re.subn(
              r'- PR review is run by \*\*pack scripts\*\*[\s\S]*?scripts to record a verdict back to AO\)\.\n',
              '- PR review is run by the **pack-owned runner**, not by AO. Manual invocation is `node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>`; operational status comes from `scripts/pack-review-runner.ts list` or the compatible `Get-AoReviewRuns` pack-store view. GitHub PR review is the authoritative verdict; the pack-side run/status store is operational state only. Never use daemon review HTTP or `ao review submit` as a fallback or dual-write path.\n',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('failed to replace merge skill review facts')
          skill.write_text(text, encoding='utf-8')

          adapter = Path('scripts/lib/Invoke-AoReviewApi.ps1')
          text = adapter.read_text(encoding='utf-8')
          text, count = re.subn(r'\nfunction Set-AoProjectReviewerHarness \{[\s\S]*?\n\}\n\nfunction Test-ReviewBeforeCleanupGate', '\nfunction Test-ReviewBeforeCleanupGate', text, count=1)
          if count != 1:
              raise SystemExit('failed to remove reviewer harness setter')
          text, count = re.subn(r'\n    if \(\$null -ne \$ProjectConfigFixture -and -not \$FixturePayload\) \{[\s\S]*?\n    \}\n    if \(\$FixturePayload\) \{', '\n    if ($FixturePayload) {', text, count=1)
          if count != 1:
              raise SystemExit('failed to remove reviewer harness guard')
          adapter.write_text(text, encoding='utf-8')

          bridge = Path('scripts/harness-review-bridge.test.ts')
          text = bridge.read_text(encoding='utf-8')
          text = text.replace('  classifyReviewerHarnessAbort,\n', '')
          text = text.replace("import { classifyReviewTriggerResponse } from '../docs/ao-0-10-review-api.mjs';\n", '')
          text = re.sub(r"const capturesDir = .*?;\n", '', text)
          text = re.sub(r"const reviewApiLib = .*?;\n", '', text)
          for title in ['classifies unset reviewers before trigger', 'Invoke-AoReviewTriggerForWorker refuses trigger on misconfig fixture', 'ao-review trigger classify unchanged for capture payloads']:
              text, count = re.subn(r"\n  it\('" + re.escape(title) + r"',[\s\S]*?\n  \}\);\n", '\n', text, count=1)
              if count != 1:
                  raise SystemExit(f'failed to remove legacy test: {title}')
          bridge.write_text(text, encoding='utf-8')

          pn = Path('scripts/harness-post-submit-pn-content-shape.test.ts')
          text = pn.read_text(encoding='utf-8').replace("import { classifyReviewerHarnessAbort } from '../docs/harness-review-bridge.mjs';\n", '')
          text, count = re.subn(r"\n  it\('pre-trigger reviewers-unset boundary stays delegated to #682 guard',[\s\S]*?\n  \}\);\n", '\n', text, count=1)
          if count != 1:
              raise SystemExit('failed to remove old pre-trigger harness case')
          pn.write_text(text, encoding='utf-8')
          PY

          AO_SESSION_ID=issue-839-pr-845 npx tsx plugins/ao-task-declaration/bin/declare.ts \
            --issue 839 --iteration-id issue-839-pr-845 \
            --declared-paths 'agent-orchestrator.yaml.example,AGENTS.md,docs/ao-0-10-review-harness-adoption.md,.claude/skills/merge-with-local-adoption/SKILL.md,.cursor/skills/merge-with-local-adoption/SKILL.md' \
            --declared-globs 'scripts/**'

          if grep -RInE 'scripts/ao-review\.ps1|/api/v1/sessions/.*/reviews(?:/trigger)?' \
            agent-orchestrator.yaml.example AGENTS.md docs/ao-0-10-review-harness-adoption.md \
            .claude/skills/merge-with-local-adoption/SKILL.md .cursor/skills/merge-with-local-adoption/SKILL.md; then
            exit 1
          fi
      - name: Validate issue 839
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/issue-839-validation.log) 2>&1
          npm run typecheck:foundation
          npm run lint:foundation
          pwsh -NoProfile -File scripts/check-review-trigger-reconcile.ps1
          pwsh -NoProfile -File scripts/check-orchestrator-review-idempotency.ps1
          pwsh -NoProfile -File scripts/check-orchestrator-review-head-coverage.ps1
          npm test -- scripts/ao-0-10-review-trigger.test.ts scripts/review-handoff-wake-trigger.test.ts scripts/review-start-claim.test.ts scripts/review-start-claim-run-binding.test.ts scripts/scripted-review-confirmed-delivery-gate.test.ts scripts/harness-post-submit-pn-content-shape.test.ts scripts/harness-review-bridge.test.ts scripts/review-wake-trigger.test.ts
      - name: Commit and push clean final tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finish-pr-845.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Complete pack-owned review runner cutover'
          git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body 'Issue #839 completion pass succeeded: adoption/docs/adapter updated, declaration committed, three static gates passed, and all eight targeted regression files passed. Temporary workflow removed from final tree.'
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          { echo '## Issue #839 completion failure'; echo; echo '```text'; tail -c 30000 /tmp/issue-839-apply.log 2>/dev/null || true; tail -c 30000 /tmp/issue-839-validation.log 2>/dev/null || true; echo; echo '```'; } >/tmp/issue-839-failure.md
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/issue-839-failure.md
