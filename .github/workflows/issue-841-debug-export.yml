name: issue-841-debug-export

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
      - name: Download original failing job logs
        shell: bash
        run: |
          set -euo pipefail
          gh run view 29475930841 --repo "$GITHUB_REPOSITORY" --job 87548846450 --log > topology-original.log
          gh run view 29475930841 --repo "$GITHUB_REPOSITORY" --job 87548846495 --log > light-lane-original.log
          tail -n 120 topology-original.log
          tail -n 200 light-lane-original.log
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-pack-pr860-original-ci-logs
          path: |
            topology-original.log
            light-lane-original.log
          retention-days: 1
          if-no-files-found: error
