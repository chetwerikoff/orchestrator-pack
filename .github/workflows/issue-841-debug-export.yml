name: issue-841-debug-export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup Node.js 20 matching scope-guard
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Apply CI fixes
        shell: python
        run: |
          from pathlib import Path

          launch = Path('scripts/launch-argv-inventory.test.ts')
          text = launch.read_text(encoding='utf-8')
          import_old = "import { runProcess } from '#opk-kernel/subprocess';\n"
          import_new = import_old + "import { formatGateRunnerReport, runGateRunner } from './gate-runner/runner.ts';\n"
          if import_new not in text:
              if import_old not in text:
                  raise SystemExit('launch inventory import seam not found')
              text = text.replace(import_old, import_new, 1)

          old_function = """async function runGuard(args: string[] = []) {
            const result = await runProcess({
              command: process.execPath,
              args: ['--experimental-strip-types', gateRunner, '--repo-root', repoRoot, '--gate', 'launch-argv-inventory', ...args],
              cwd: repoRoot,
              inheritParentEnv: true,
              timeoutMs: pwshTimeoutMs,
            });
            return {
              status: result.exitCode,
              stdout: result.stdout,
              stderr: result.stderr,
            };
          }
          """
          new_function = """async function runGuard(args: string[] = []) {
            const nodeMajor = Number.parseInt(process.versions.node.split('.')[0] ?? '0', 10);
            if (nodeMajor < 22) {
              // scope-guard still pins Node 20 even though the repository engine is Node 22.
              // Exercise the same registered gate/report contract in-process rather than
              // asking Node 20 to parse TypeScript with an unsupported strip-types flag.
              const report = runGateRunner(repoRoot, ['launch-argv-inventory']);
              return {
                status: report.aggregate.exitCode,
                stdout: formatGateRunnerReport(report),
                stderr: '',
              };
            }

            const result = await runProcess({
              command: process.execPath,
              args: ['--experimental-strip-types', gateRunner, '--repo-root', repoRoot, '--gate', 'launch-argv-inventory', ...args],
              cwd: repoRoot,
              inheritParentEnv: true,
              timeoutMs: pwshTimeoutMs,
            });
            return {
              status: result.exitCode,
              stdout: result.stdout,
              stderr: result.stderr,
            };
          }
          """
          if new_function not in text:
              if old_function not in text:
                  raise SystemExit('launch inventory runGuard block not found')
              text = text.replace(old_function, new_function, 1)
          launch.write_text(text, encoding='utf-8')

          reachability = Path('scripts/reachability-purge.test.ts')
          text = reachability.read_text(encoding='utf-8')
          old_set = """const censusDeletionClassifications = new Set([
            'ported-declarative',
            'ported-custom',
            'retired-with-justification',
          ]);
          """
          new_set = """const censusDeletionClassifications = new Set([
            'ported-declarative',
            'ported-custom',
            'retired-with-justification',
            'retired-with-reason',
          ]);
          """
          if new_set not in text:
              if old_set not in text:
                  raise SystemExit('reachability census classification block not found')
              text = text.replace(old_set, new_set, 1)
          reachability.write_text(text, encoding='utf-8')

          Path('.github/workflows/issue-841-debug-export.yml').unlink()
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Verify fixed Node 20 and reachability paths
        shell: pwsh
        run: |
          npm test -- scripts/launch-argv-inventory.test.ts scripts/reachability-purge.test.ts --reporter=default
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Type-check fixes
        run: npm run typecheck:foundation
      - name: Commit and push fixes
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/launch-argv-inventory.test.ts scripts/reachability-purge.test.ts .github/workflows/issue-841-debug-export.yml
          git commit -m "fix: close PR 860 CI regressions"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
