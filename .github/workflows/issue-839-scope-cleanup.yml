name: issue-839-scope-cleanup

on:
  pull_request:
    types: [labeled]
    branches: [main]

concurrency:
  group: issue-839-scope-cleanup
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  cleanup:
    if: github.event.pull_request.number == 845 && github.event.label.name == 'in_progress'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev --silent
      - name: Build scoped candidate
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard HEAD
          git fetch origin main
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          python3 scripts/issue-839-scope-cleanup.py
          git show origin/main:tests/harness-pretrigger-config-read.test.ts > tests/harness-pretrigger-config-read.test.ts
          git show origin/main:scripts/toolchain/powershell-child-tests.json > scripts/toolchain/powershell-child-tests.json
          git show origin/main:scripts/toolchain/raw-child-process-baseline.json > scripts/toolchain/raw-child-process-baseline.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('scripts/toolchain/powershell-child-tests.json')
          doc = json.loads(path.read_text(encoding='utf-8'))
          rows = doc.get('entries')
          filtered = [row for row in rows if row.get('path') != 'scripts/harness-review-bridge.test.ts']
          if len(rows) - len(filtered) != 1:
              raise SystemExit(f'powershell-child removal count={len(rows) - len(filtered)}')
          doc['entries'] = filtered
          path.write_text(json.dumps(doc, separators=(',', ':')) + '\n', encoding='utf-8')

          path = Path('scripts/toolchain/raw-child-process-baseline.json')
          doc = json.loads(path.read_text(encoding='utf-8'))
          rows = doc.get('entries')
          filtered = [
              row for row in rows
              if not (
                  row.get('path') == 'scripts/harness-review-bridge.test.ts'
                  and row.get('api') == 'execFileSync'
                  and row.get('fingerprint') == 'b4b9ea0960343b046042'
              )
          ]
          if len(rows) - len(filtered) != 1:
              raise SystemExit(f'raw-child removal count={len(rows) - len(filtered)}')
          doc['entries'] = filtered
          path.write_text(json.dumps(doc, separators=(',', ':')) + '\n', encoding='utf-8')
          PY
          git rm \
            .github/workflows/issue-839-amend-declaration.yml \
            .github/workflows/issue-839-scope-cleanup.yml \
            scripts/issue-839-scope-cleanup.py
          git add \
            scripts/lib/Invoke-AoReviewApi.ps1 \
            tests/harness-pretrigger-config-read.test.ts \
            scripts/toolchain/powershell-child-tests.json \
            scripts/toolchain/raw-child-process-baseline.json
          git commit -m 'Keep issue 839 compatibility tests within declared scope'
      - name: Run full light lane
        id: light
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/run-vitest-light-lane.ps1 *>&1 | Tee-Object -FilePath /tmp/issue-839-light.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Publish light lane failure
        if: steps.light.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tail -n 200 /tmp/issue-839-light.log >/tmp/issue-839-tail.log
          { echo '## Issue #839 light lane failure'; echo '```text'; cat /tmp/issue-839-tail.log; echo '```'; } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md
          exit 1
      - name: Run full verifier
        id: verifier
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/verify.ps1 *>&1 | Tee-Object -FilePath /tmp/issue-839-verifier.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Publish verifier failure
        if: steps.verifier.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tail -n 220 /tmp/issue-839-verifier.log >/tmp/issue-839-tail.log
          { echo '## Issue #839 verifier failure'; echo '```text'; cat /tmp/issue-839-tail.log; echo '```'; } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md
          exit 1
      - name: Run Pester regression
        id: pester
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/test-all.ps1 -SkipNpm *>&1 | Tee-Object -FilePath /tmp/issue-839-pester.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Publish Pester failure
        if: steps.pester.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tail -n 220 /tmp/issue-839-pester.log >/tmp/issue-839-tail.log
          { echo '## Issue #839 Pester failure'; echo '```text'; cat /tmp/issue-839-tail.log; echo '```'; } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md
          exit 1
      - name: Verify strict self-architect
        shell: pwsh
        run: ./scripts/lint-self-architect.ps1 -Strict -BaseRef origin/main -HeadRef HEAD
      - name: Push verified scoped candidate
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report other failure
        if: failure() && steps.light.outcome != 'failure' && steps.verifier.outcome != 'failure' && steps.pester.outcome != 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method POST repos/chetwerikoff/orchestrator-pack/issues/845/comments \
            --field body="Issue #839 scope cleanup failed at a named step: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
