name: codex-pr-review

# Reusable workflow — wire it into a target repo like this:
#
#   # .github/workflows/pr-review.yml  (in the target repository)
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#   permissions:
#     contents: read
#     issues: read
#     pull-requests: write
#   jobs:
#     codex-review:
#       uses: chetwerikoff/orchestrator-pack/.github/workflows/codex-pr-review.yml@main
#       with:
#         pack_ref: main
#       secrets:
#         codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
#
# Required secret in the target repo: CODEX_AUTH_JSON
#   Generate it locally (PowerShell):
#     [Convert]::ToBase64String([IO.File]::ReadAllBytes("$env:USERPROFILE\.codex\auth.json")) | clip
#   Then paste the result as the secret value.
#
# The auth.json is issued by ChatGPT OAuth and contains a refresh token,
# so it stays valid across runs. Re-export when you see 401 errors.
#
# This workflow checks out the caller PR repository (workspace root) and a
# separate orchestrator-pack checkout (orchestrator-pack/) for the reviewer
# wrapper and npm dependencies.

on:
  workflow_call:
    inputs:
      model:
        description: Codex model to use for review
        required: false
        type: string
        default: gpt-5.5
      pack_ref:
        description: >
          orchestrator-pack git ref to checkout. Required — set to the same ref as the
          uses: ...@ref pin (e.g. main, v1.0.0, feat/issue-9). job.workflow_sha/ref are not
          available in reusable workflow runs.
        required: true
        type: string
    secrets:
      codex_auth_json:
        required: true
        description: Base64-encoded contents of ~/.codex/auth.json (ChatGPT OAuth credentials)

permissions:
  contents: read
  issues: read
  pull-requests: write

# Caller PR runs cancel per pull_request.number; non-PR workflow_call invocations stay isolated.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || format('call-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event.pull_request.number != '' }}

jobs:
  codex-review:
    name: Codex ${{ inputs.model }} PR review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: write
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Resolve orchestrator-pack checkout ref
        id: pack-ref
        run: |
          ref="${{ inputs.pack_ref }}"
          if [ -z "$ref" ]; then
            echo "::error::pack_ref input is required and must match the uses: ...@ref pin"
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout orchestrator-pack
        uses: actions/checkout@v4
        with:
          repository: chetwerikoff/orchestrator-pack
          ref: ${{ steps.pack-ref.outputs.ref }}
          path: orchestrator-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: orchestrator-pack/package-lock.json

      - name: Install pack dependencies
        working-directory: orchestrator-pack
        run: npm ci

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Restore Codex OAuth credentials
        env:
          CODEX_AUTH_JSON: ${{ secrets.codex_auth_json }}
        run: |
          mkdir -p ~/.codex
          echo "$CODEX_AUTH_JSON" | base64 --decode > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Save PR body for scope resolution
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr view "${{ github.event.pull_request.number }}" --json body --jq .body > pr-body.md

      - name: Run Codex review (scoped wrapper)
        id: review
        working-directory: orchestrator-pack
        env:
          GH_TOKEN: ${{ github.token }}
          PR_REPO_ROOT: ${{ github.workspace }}
        run: |
          set -o pipefail
          ./node_modules/.bin/tsx plugins/ao-codex-pr-reviewer/bin/review.ts \
            --repo-root "$PR_REPO_ROOT" \
            --base "origin/${{ github.base_ref }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-body-file "$PR_REPO_ROOT/pr-body.md" \
            --model "${{ inputs.model }}" \
            --source codex-github-action \
            --github-comment-file "$PR_REPO_ROOT/codex-review-comment.md" \
            > "$PR_REPO_ROOT/codex-ao-findings.json"

      - name: Post review comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            let body;
            try {
              body = fs.readFileSync('codex-review-comment.md', 'utf8').trim();
            } catch {
              body = '_Codex review comment file not found._';
            }
            if (!body) {
              let hasWarnings = false;
              try {
                const payload = JSON.parse(
                  fs.readFileSync('codex-ao-findings.json', 'utf8'),
                );
                hasWarnings = Array.isArray(payload.findings) && payload.findings.length > 0;
              } catch {
                hasWarnings = false;
              }
              body = hasWarnings
                ? '_Codex review produced findings but no PR comment was written._'
                : '## Codex Review — no findings\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Wipe OAuth credentials
        if: always()
        run: rm -f ~/.codex/auth.json
