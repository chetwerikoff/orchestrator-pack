name: codex-pr-review

# Reusable workflow — wire it into a target repo like this:
#
#   # .github/workflows/pr-review.yml  (in the target repository)
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#   permissions:
#     contents: read
#     pull-requests: write
#   jobs:
#     codex-review:
#       uses: chetwerikoff/orchestrator-pack/.github/workflows/codex-pr-review.yml@main
#       secrets:
#         codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
#
# Required secret in the target repo: CODEX_AUTH_JSON
#   Generate it locally (PowerShell):
#     [Convert]::ToBase64String([IO.File]::ReadAllBytes("$env:USERPROFILE\.codex\auth.json")) | clip
#   Then paste the result as the secret value.
#
# The auth.json is issued by ChatGPT OAuth and contains a refresh token,
# so it stays valid across runs. Re-export when you see 401 errors.
#
# This workflow checks out the caller PR repository (workspace root) and a
# separate orchestrator-pack checkout (orchestrator-pack/) for the reviewer
# wrapper and npm dependencies.

on:
  workflow_call:
    inputs:
      model:
        description: Codex model to use for review
        required: false
        type: string
        default: gpt-5.5
    secrets:
      codex_auth_json:
        required: true
        description: Base64-encoded contents of ~/.codex/auth.json (ChatGPT OAuth credentials)

permissions:
  contents: read
  pull-requests: write

jobs:
  codex-review:
    name: Codex ${{ inputs.model }} PR review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Checkout orchestrator-pack
        uses: actions/checkout@v4
        with:
          repository: chetwerikoff/orchestrator-pack
          ref: ${{ github.action_ref }}
          path: orchestrator-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pack dependencies
        working-directory: orchestrator-pack
        run: npm ci

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Restore Codex OAuth credentials
        env:
          CODEX_AUTH_JSON: ${{ secrets.codex_auth_json }}
        run: |
          mkdir -p ~/.codex
          echo "$CODEX_AUTH_JSON" | base64 --decode > ~/.codex/auth.json
          chmod 600 ~/.codex/auth.json

      - name: Save PR body for scope resolution
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr view "${{ github.event.pull_request.number }}" --json body --jq .body > pr-body.md

      - name: Run Codex review (scoped wrapper)
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          node --import tsx orchestrator-pack/plugins/ao-codex-pr-reviewer/bin/review.ts \
            --repo-root . \
            --base "origin/${{ github.base_ref }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --pr-body-file pr-body.md \
            --model "${{ inputs.model }}" \
            --source codex-github-action \
            --github-comment-file codex-review-comment.md \
            > codex-ao-findings.json

      - name: Post review comment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            let body = '## Codex Review — no findings\n';
            try {
              body = fs.readFileSync('codex-review-comment.md', 'utf8').trim();
            } catch {
              body = '_Codex review comment file not found._';
            }
            if (!body) body = '## Codex Review — no findings\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Wipe OAuth credentials
        if: always()
        run: rm -f ~/.codex/auth.json
