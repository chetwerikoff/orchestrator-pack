name: issue-832 reachability refresh

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-831-json-producers-wave-b
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Generate manifest for final tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/_issue-832-reachability-refresh.yml
          node scripts/reachability-purge.mjs --write
      - name: Commit generated manifest
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/reachability-purge.manifest.json
          if git diff --cached --quiet; then
            echo 'reachability manifest already current'
            exit 0
          fi
          git commit -m 'test: refresh reachability manifest for Stop hook fail-open'
          git push origin HEAD:agent/issue-831-json-producers-wave-b
