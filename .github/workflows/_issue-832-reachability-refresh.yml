name: issue-832 reachability refresh

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Generate manifest for final tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/_issue-832-reachability-refresh.yml
          node scripts/reachability-purge.mjs --write
      - uses: actions/upload-artifact@v4
        with:
          name: issue-832-reachability-manifest
          path: scripts/reachability-purge.manifest.json
          if-no-files-found: error
          retention-days: 1
