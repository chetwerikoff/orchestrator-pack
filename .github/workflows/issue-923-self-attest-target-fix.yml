name: issue-923-self-attest-target-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: issue-923-self-attest-target-fix
  cancel-in-progress: true

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/issue-923-pr2-foundation
      TARGET_HEAD: 2e5c6bb2f435221c06d3c2b9399e38b830aae197
    steps:
      - name: Checkout exact PR 939 head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply exact target replacement
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$TARGET_HEAD"
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/pr2-foundation/mutation-behavior-recipes.ts')
          text = path.read_text(encoding='utf-8')
          old = "replacement: \"resolve('scripts/pr2-foundation/mutation-semantic-gates.ts')\""
          new = "replacement: \"resolve('scripts/pr2-foundation/mutation-self-attesting-check.fixture.ts')\""
          if text.count(old) != 1:
              raise SystemExit(f'self-attest target cardinality: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git diff --check
          npm ci --include=dev
          npm run lint:foundation
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/pr2-foundation/mutation-behavior-recipes.ts
          git commit -m 'fix: isolate self-attesting mutation target'

      - name: Push exact verified fix
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          test "$(git rev-parse origin/$TARGET_BRANCH)" = "$TARGET_HEAD"
          git push origin HEAD:"$TARGET_BRANCH"
