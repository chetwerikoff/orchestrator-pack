name: review-4750643719-inventory

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  inventory:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0
      - name: Inventory exact seams
        shell: bash
        run: |
          set -euo pipefail
          echo "HEAD=$(git rev-parse HEAD)"
          echo 'TERMINALIZED_IMPORTS_BEGIN'
          grep -RIn --include='*.mjs' --include='*.mts' "scripts/pr2-foundation/terminalized" docs || true
          echo 'TERMINALIZED_IMPORTS_END'
          echo 'CUSTOM_GATES_BEGIN'
          grep -n "custom:" scripts/pr2-foundation/mutation-semantic-gates.ts || true
          echo 'CUSTOM_GATES_END'
          echo 'MUTATION_FILE_COUNT_BEGIN'
          node --experimental-strip-types -e "import('./scripts/pr2-foundation/mutation-catalog.ts').then(m=>console.log(m.FOUNDATION_MUTATION_CATALOG.length))"
          echo 'MUTATION_FILE_COUNT_END'
