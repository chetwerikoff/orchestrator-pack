name: issue-841-export-final-baseline-logs

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Export completed baseline job logs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87609869950/logs" > "$RUNNER_TEMP/powershell-growth.log"
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87609869984/logs" > "$RUNNER_TEMP/policy-lint.log"
      - name: Upload baseline logs
        uses: actions/upload-artifact@v4
        with:
          name: pr860-final-baseline-logs
          path: |
            ${{ runner.temp }}/powershell-growth.log
            ${{ runner.temp }}/policy-lint.log
          retention-days: 1
          if-no-files-found: error
