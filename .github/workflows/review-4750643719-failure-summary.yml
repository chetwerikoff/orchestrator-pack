name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: agent/issue-923-pr2-foundation
      EXPECTED_HEAD: d60eaffef853d1c4c3b696561737523ab3103949
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
      - name: Mutate both duplicate-send guards
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('scripts/pr2-foundation/mutation-behavior-recipes.ts')
          text = path.read_text(encoding='utf-8')

          old_interface = """interface TextRecipe {
            anchor: string;
            replacement: string;
          }"""
          new_interface = """interface TextRecipe {
            anchor: string;
            replacement: string;
            expectedOccurrences?: number;
          }"""
          if text.count(old_interface) != 1:
              raise SystemExit('TextRecipe interface shape drifted')
          text = text.replace(old_interface, new_interface)

          pattern = re.compile(
              r"  'AC4:duplicate-send-unaccounted': \{.*?\n  \},\n  'AC4:run-linkage-missing': \{",
              re.S,
          )
          replacement = """  'AC4:duplicate-send-unaccounted': {
            anchor: \"if (inspected.duplicate) return { state: 'delivered', reason: 'journal_duplicate_no_op' };\",
            replacement: \"if (false && inspected.duplicate) return { state: 'delivered', reason: 'journal_duplicate_no_op' };\",
            expectedOccurrences: 2,
          },
          'AC4:run-linkage-missing': {"""
          text, count = pattern.subn(replacement, text)
          if count != 1:
              raise SystemExit(f'duplicate recipe block cardinality={count}')

          old_cardinality = """  const affectedOccurrences = source.split(recipe.anchor).length - 1;
            if (affectedOccurrences !== 1) {
              throw new Error(`behavior_mutation_anchor_cardinality:${key}:${affectedOccurrences}`);
            }"""
          new_cardinality = """  const affectedOccurrences = source.split(recipe.anchor).length - 1;
            const expectedOccurrences = recipe.expectedOccurrences ?? 1;
            if (affectedOccurrences !== expectedOccurrences) {
              throw new Error(`behavior_mutation_anchor_cardinality:${key}:${affectedOccurrences}:${expectedOccurrences}`);
            }"""
          if text.count(old_cardinality) != 1:
              raise SystemExit('cardinality guard shape drifted')
          text = text.replace(old_cardinality, new_cardinality)

          path.write_text(text, encoding='utf-8')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck:foundation
      - run: node --experimental-strip-types scripts/pr2-foundation/contract-test-runner.ts --ac AC4
      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/pr2-foundation/mutation-behavior-recipes.ts
          git commit -m "test: mutate both duplicate-send guards"
          git push origin "HEAD:${TARGET_BRANCH}"
