name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88902394718'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish bounded mutation failure summary
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > source.log
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          needles = (
              'mutation-contract:',
              'mutation_',
              'behavior_mutation',
              'independent_',
              'artifact_',
              'specific_failing_test',
              'restore_',
              '##[error]',
              'Process completed with exit code',
          )
          matched = [(index, line) for index, line in enumerate(lines, start=1)
                     if any(needle.lower() in line.lower() for needle in needles)]
          with open('summary.md', 'w', encoding='utf-8') as output:
              output.write('## PR #939 mutation failure summary\n\n')
              output.write('Source job: `88902394718`\n\n')
              output.write('```text\n')
              for index, line in matched[-120:]:
                  output.write(f'{index}:{line[:5000]}\n')
              output.write('```\n')
          PY
          gh pr edit -R "$GITHUB_REPOSITORY" 940 --body-file summary.md
