name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  pull-requests: write

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Publish bounded AC4 mutation failure
        uses: actions/github-script@v7
        with:
          script: |
            const jobId = 88924443231;
            const url = `https://api.github.com/repos/${context.repo.owner}/${context.repo.repo}/actions/jobs/${jobId}/logs`;
            const response = await fetch(url, {
              headers: {
                accept: 'application/vnd.github+json',
                authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                'x-github-api-version': '2022-11-28',
              },
              redirect: 'follow',
            });
            if (!response.ok) throw new Error(`job_log_fetch_failed:${response.status}`);
            const raw = await response.text();
            const ansi = /\u001b\[[0-9;]*m/g;
            const lines = raw.split(/\r?\n/).map((line) => line.replace(ansi, ''));
            const needles = [
              'mutation-contract:', 'mutation_', 'behavior_mutation', 'independent_',
              'artifact_', 'specific_failing_test', 'restore_', '##[error]',
              'Process completed with exit code',
            ];
            const matched = lines
              .map((line, index) => ({ line, index: index + 1 }))
              .filter(({ line }) => needles.some((needle) => line.includes(needle)))
              .slice(-120);
            const body = [
              '## PR #939 AC4 explicit-mutation failure',
              '',
              `Source job: \`${jobId}\``,
              '',
              '```text',
              ...matched.map(({ line, index }) => `${index}:${line.slice(0, 5000)}`),
              '```',
              '',
            ].join('\n');
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: 940,
              body,
            });
