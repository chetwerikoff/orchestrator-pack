name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88832365483'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Print mutation plan audit failures
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > source.log
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          print('--- plan failures ---')
          for index, line in enumerate(lines, start=1):
              if 'PLAN_FAIL ' in line or 'PLAN_SUMMARY ' in line or '##[error]' in line:
                  print(f'{index}:{line[:7000]}')
          PY
