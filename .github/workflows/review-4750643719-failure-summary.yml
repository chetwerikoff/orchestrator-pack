name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  pull-requests: write

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish bounded heavy-shard failure summary
        uses: actions/github-script@v7
        with:
          script: |
            const jobId = 88917895433;
            const response = await github.request('GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs', {
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: jobId,
              request: { parseSuccessResponseBody: false },
            });
            const raw = Buffer.isBuffer(response.data)
              ? response.data.toString('utf8')
              : String(response.data ?? '');
            const ansi = /\u001b\[[0-9;]*m/g;
            const lines = raw.split(/\r?\n/).map((line) => line.replace(ansi, ''));
            const needles = [
              'FAIL ', 'Failed Tests', 'AssertionError', 'Error:',
              'expected ', 'Test Files', 'Tests  ', 'Process completed with exit code',
            ];
            const matched = lines
              .map((line, index) => ({ line, index: index + 1 }))
              .filter(({ line }) => needles.some((needle) => line.includes(needle)))
              .slice(-120);
            const body = [
              '## PR #939 heavy-shard failure summary',
              '',
              `Source job: \`${jobId}\``,
              '',
              '```text',
              ...matched.map(({ line, index }) => `${index}:${line.slice(0, 5000)}`),
              '```',
              '',
            ].join('\n');
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: 940,
              body,
            });
