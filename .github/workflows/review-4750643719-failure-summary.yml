name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_IDS: '88912024167 88912077012'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish bounded current-head failure summaries
        shell: bash
        run: |
          set -euo pipefail
          : > combined.log
          for job_id in ${SOURCE_JOB_IDS}; do
            api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs"
            echo "===== JOB ${job_id} =====" >> combined.log
            curl --fail --silent --show-error --location \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" >> combined.log
            printf '\n' >> combined.log
          done
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('combined.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          needles = (
              '===== JOB',
              'self-architect',
              'architect-',
              'FAIL',
              'Error:',
              'AssertionError',
              'expected',
              'received',
              'Test Files',
              'Tests ',
              'mutation-contract:',
              'independent_',
              '##[error]',
              'Process completed with exit code',
          )
          matched = [(index, line) for index, line in enumerate(lines, start=1)
                     if any(needle.lower() in line.lower() for needle in needles)]
          with open('summary.md', 'w', encoding='utf-8') as output:
              output.write('## PR #939 current-head failure summary\n\n')
              output.write('Source jobs: `88912024167`, `88912077012`\n\n')
              output.write('```text\n')
              for index, line in matched[-240:]:
                  output.write(f'{index}:{line[:5000]}\n')
              output.write('```\n')
          PY
          gh pr edit -R "$GITHUB_REPOSITORY" 940 --body-file summary.md
