name: review-4750643719-failure-summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  extract:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SOURCE_JOB_ID: '88912024167'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish self-architect failure context
        shell: bash
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${SOURCE_JOB_ID}/logs"
          curl --fail --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$api" > source.log
          python3 - <<'PY'
          import re
          ansi = re.compile(r'\x1b\[[0-9;]*m')
          lines = [ansi.sub('', line) for line in open('source.log', encoding='utf-8-sig', errors='replace').read().splitlines()]
          selected = []
          for index, line in enumerate(lines):
              if '== self-architect lint ==' in line:
                  selected.extend((offset + 1, lines[offset]) for offset in range(index, min(index + 30, len(lines))))
          with open('summary.md', 'w', encoding='utf-8') as output:
              output.write('## PR #939 self-architect failure context\n\n')
              output.write('Source job: `88912024167`\n\n')
              output.write('```text\n')
              for index, line in selected:
                  output.write(f'{index}:{line[:5000]}\n')
              output.write('```\n')
          PY
          gh pr edit -R "$GITHUB_REPOSITORY" 940 --body-file summary.md
