name: issue-839-merge-main-finalize

on:
  pull_request:
    types: [labeled]
    branches: [main]

concurrency:
  group: issue-839-merge-main-finalize
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finalize:
    if: github.event.pull_request.number == 845 && github.event.label.name == 'in_progress'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev --silent
      - name: Merge current main and resolve scoped overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          merge_rc=$?
          set -e
          conflicts="$(git diff --name-only --diff-filter=U)"
          unexpected="$(printf '%s\n' "$conflicts" | grep -vE '^(AGENTS\.md|scripts/reachability-purge\.test\.ts)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "Unexpected merge conflicts:"
            printf '%s\n' "$unexpected"
            exit 1
          fi
          if git ls-files -u -- AGENTS.md | grep -q .; then
            git checkout --ours AGENTS.md
          fi
          python3 - <<'PY'
          from pathlib import Path
          path = Path('AGENTS.md')
          text = path.read_text(encoding='utf-8')
          old = 'an upstream contribution plan.'
          new = 'an upstream contribution plan. **TS-first:** New `scripts/**` files MUST use TypeScript/Node. PowerShell is frozen during migration; new `.ps1` needs explicit task-spec justification that TS/Node is unsuitable. Existing `.ps1` and wrappers/shims stay with #830/#831.'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'AGENTS migration marker count={text.count(old)}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git add AGENTS.md
          if git ls-files -u -- scripts/reachability-purge.test.ts | grep -q .; then
            git checkout --theirs scripts/reachability-purge.test.ts
          fi
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/reachability-purge.test.ts')
          text = path.read_text(encoding='utf-8')
          old = "['zero-reachability', 'superseded', 'backup', 'issue-821-retired']"
          new = "['zero-reachability', 'superseded', 'backup', 'issue-821-retired', 'issue-839-retired']"
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'reachability reason marker count={text.count(old)}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git add scripts/reachability-purge.test.ts
          git rm .github/workflows/issue-839-merge-main-finalize.yml
          for path in \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs; do
            git update-index --chmod=-x "$path"
          done
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo 'Unresolved conflicts remain'
            git diff --name-only --diff-filter=U
            exit 1
          fi
          if [ "$merge_rc" -ne 0 ] && ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            echo "git merge failed without a resolvable merge state: $merge_rc"
            exit "$merge_rc"
          fi
          git commit -m 'Merge current main into issue 839 pack runner'
      - name: Refresh declaration snapshot on merged baseline
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types plugins/ao-task-declaration/bin/declare.ts \
            --issue 839 \
            --iteration-id issue-839-pr-845-rebase \
            --declared-paths '.claude/skills/merge-with-local-adoption/SKILL.md,AGENTS.md,agent-orchestrator.yaml.example,docs/ao-0-10-review-harness-adoption.md,docs/migration_notes.md,tests/harness-pretrigger-config-read.test.ts' \
            --declared-globs 'scripts/**' \
            --actor chatgpt \
            --repo-root .
          git rm docs/declarations/839.issue-839-pr-845.json
          git add docs/declarations/839.issue-839-pr-845-rebase.json
          git commit -m 'Refresh issue 839 declaration on current main'
      - name: Verify foundation and focused regressions
        shell: bash
        run: |
          set -euo pipefail
          npx tsc --project tsconfig.base.json --noEmit
          npm run typecheck:foundation
          npm run lint:foundation
          npm run test:foundation
          node scripts/run-vitest-with-harness.mjs run \
            tests/agents-md-relocation.test.ts \
            scripts/reachability-purge.test.ts \
            scripts/review-delivery.test.ts \
            scripts/review-producer-contract-mapping.test.ts
      - name: Verify full light lane and pack contracts
        shell: pwsh
        run: |
          ./scripts/run-vitest-light-lane.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/verify.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/test-all.ps1 -SkipNpm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Verify strict self-architect
        shell: pwsh
        run: ./scripts/lint-self-architect.ps1 -Strict -BaseRef origin/main -HeadRef HEAD
      - name: Push verified merge
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method POST repos/chetwerikoff/orchestrator-pack/issues/845/comments \
            --field body="Issue #839 merge-finalizer failed at a named step: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
