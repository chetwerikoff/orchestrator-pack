name: issue-948-final-ac5-binding-fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tmp/issue-948-verification-toolchain
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply exact verifyArtifact binding
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}: {old}")
              p.write_text(text.replace(old, new, 1))

          replace_once(
              'scripts/pr2a/final-conformance.ts',
              "  { ac: 'AC5', mutationId: 'receipt-self-asserts-unverifiable-tree', path: 'scripts/pr2a/closure-receipt.ts', kind: 'required', token: 'function verifyArtifact' },",
              "  { ac: 'AC5', mutationId: 'receipt-self-asserts-unverifiable-tree', path: 'scripts/pr2a/closure-receipt.ts', kind: 'required', token: 'function verifyArtifact(' },",
          )
          replace_once(
              'scripts/pr2a/mutation-runner.ts',
              "defineReplace('AC5','receipt-self-asserts-unverifiable-tree','scripts/pr2a/closure-receipt.ts',\"function verifyArtifact\",\"function verifyArtifactDisabled\");",
              "defineReplace('AC5','receipt-self-asserts-unverifiable-tree','scripts/pr2a/closure-receipt.ts',\"function verifyArtifact(\",\"function verifyArtifactDisabled(\");",
          )
          PY
          git diff --check
          git status --short
      - name: Commit and push production fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'orchestrator-pack-ci'
          git config user.email 'orchestrator-pack-ci@users.noreply.github.com'
          git add scripts/pr2a/final-conformance.ts scripts/pr2a/mutation-runner.ts
          git commit -m 'fix(issue-948): bind receipt artifact verification mutation exactly'
          git push origin HEAD:tmp/issue-948-verification-toolchain
