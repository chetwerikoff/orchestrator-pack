name: issue-923-light-diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture light shard 1
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -File ./scripts/run-vitest-light-lane.ps1 -Shard 1 > light-shard-1.log 2>&1
          echo $? > light-shard-1.exit
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-light-diagnostic
          path: |
            light-shard-1.log
            light-shard-1.exit
          if-no-files-found: error
