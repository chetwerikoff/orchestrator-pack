name: issue-752-diagnostics

on:
  push:
    branches:
      - agent/issue-752-vitest-live-store-isolation

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Capture failing command output
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Path diagnostics -Force | Out-Null

          & ./scripts/verify.ps1 *> diagnostics/verify.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/verify.log

          node scripts/emit-vitest-heavy-topology.mjs --gha-output *> diagnostics/topology.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/topology.log

          & ./scripts/run-vitest-light-lane.ps1 *> diagnostics/light.log
          "exit=$LASTEXITCODE" | Add-Content diagnostics/light.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-752-diagnostics
          path: diagnostics
          if-no-files-found: error
