name: issue-923-focused-diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture focused verification
        shell: bash
        run: |
          mkdir -p diagnostics
          set +e
          npm test -- scripts/pr2-foundation --reporter=verbose > diagnostics/pr2.log 2>&1
          echo $? > diagnostics/pr2.exit
          npm run test:contract-mutations -- --ac AC8 > diagnostics/ac8.log 2>&1
          echo $? > diagnostics/ac8.exit
          set -e
      - uses: actions/upload-artifact@v4
        with:
          name: issue-923-focused-diagnostic
          path: diagnostics
          if-no-files-found: error
