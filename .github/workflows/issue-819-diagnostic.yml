name: issue-819-manifest-finalize

on:
  push:
    branches:
      - agent/issue-819-reachability-purge
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-819-manifest-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/issue-819-reachability-purge

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Minify deterministic manifest encoding
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          target = Path('scripts/reachability-purge.mjs')
          text = target.read_text(encoding='utf-8')
          old = 'return `${JSON.stringify(value, null, 2)}\\n`;'
          new = 'return `${JSON.stringify(value)}\\n`;'
          if old not in text:
              if new not in text:
                  raise SystemExit('serializeManifest anchor missing')
          else:
              target.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          node scripts/reachability-purge.mjs --write
          node scripts/reachability-purge.mjs
          git diff --check

      - name: Validate focused implementation
        shell: bash
        run: |
          set -euo pipefail
          npm ci --include=dev
          npx tsc --project tsconfig.base.json --noEmit
          printf '%s\n' \
            "import { defineConfig } from 'vitest/config';" \
            "export default defineConfig({ test: {" \
            "  include: ['scripts/reachability-purge.test.ts']," \
            "  fileParallelism: false, maxWorkers: 1," \
            "  testTimeout: 120000, hookTimeout: 120000," \
            "} });" > vitest.issue-819.config.mjs
          npx vitest run --config vitest.issue-819.config.mjs
          rm vitest.issue-819.config.mjs

      - name: Commit finalized manifest encoding
        shell: bash
        run: |
          set -euo pipefail
          git add scripts/reachability-purge.mjs scripts/reachability-purge.manifest.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Minify reachability purge manifest encoding'
          git push origin HEAD:agent/issue-819-reachability-purge
