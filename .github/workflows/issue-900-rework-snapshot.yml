name: issue-900-rework-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-rework-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
          fetch-depth: 1
      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0
      - name: Reconstruct and validate patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            payload/scripts/toolchain/.issue900-rework-patch-00.b64 \
            payload/scripts/toolchain/.issue900-rework-xz-01.b64 \
            payload/scripts/toolchain/.issue900-rework-patch-02.b64 \
            payload/scripts/toolchain/.issue900-rework-patch-03.b64 \
            payload/scripts/toolchain/.issue900-rework-patch-04.b64 \
            > /tmp/issue900-rework.patch.xz.b64
          test "$(wc -c < /tmp/issue900-rework.patch.xz.b64)" -eq 51184
          base64 --decode /tmp/issue900-rework.patch.xz.b64 > /tmp/issue900-rework.patch.xz
          echo "0cc862f2721fd73a9ae7b0d2a4c7de3cde9bda4d73607ff9ae75e48ad63cd96a  /tmp/issue900-rework.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout /tmp/issue900-rework.patch.xz > /tmp/issue900-rework.patch
          cd target
          test "$(git rev-parse HEAD)" = "3fd8b7e0a4fc55ac6b31831e45a6e92f69d58d4f"
          git apply --check /tmp/issue900-rework.patch
          git apply --index /tmp/issue900-rework.patch
          test "$(git diff --cached --name-only | wc -l)" -eq 98
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: target/package-lock.json
      - name: Validate corrected Issue 900 implementation
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run check:node-major
          npm run typecheck:foundation
          npm run lint:foundation
          npm run test:issue-900
          npm run gate-runner-selftest
          npx vitest run \
            plugins/ao-codex-pr-reviewer \
            plugins/ao-scope-guard \
            plugins/ao-task-declaration \
            plugins/ao-token-chain-ledger
      - name: Commit and push corrected implementation
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: complete Node 22 runtime normalization"
          git push origin HEAD:agent/issue-900-node22-runtime
