name: issue-900-rework-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-typescript-launcher-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
          fetch-depth: 1
      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0
      - name: Reconstruct and apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            payload/scripts/toolchain/.issue900-ts-launcher-00.b64 \
            payload/scripts/toolchain/.issue900-ts-launcher-01.b64 \
            > /tmp/issue900-ts-launcher.patch.xz.b64
          test "$(wc -c < /tmp/issue900-ts-launcher.patch.xz.b64)" -eq 14000
          base64 --decode /tmp/issue900-ts-launcher.patch.xz.b64 > /tmp/issue900-ts-launcher.patch.xz
          echo "604723e345712f36ce0bcd99a92ea6364dd1c652574a844d52bbac83dc380e6d  /tmp/issue900-ts-launcher.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout /tmp/issue900-ts-launcher.patch.xz > /tmp/issue900-ts-launcher.patch
          echo "88d3ae94c02ec6c6d7428c9487701e2c184e2e0bfb036f73501562333e05b594  /tmp/issue900-ts-launcher.patch" | sha256sum --check --strict
          cd target
          test "$(git rev-parse HEAD)" = "ddc5d4add70d0d2c3f31fedf2cd2d081e247f1cf"
          git apply --check /tmp/issue900-ts-launcher.patch
          git apply --index /tmp/issue900-ts-launcher.patch
          test "$(git diff --cached --name-only | wc -l)" -eq 30
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: target/package-lock.json
      - name: Install dependencies
        working-directory: target
        run: npm ci
      - name: Validate TypeScript launcher migration
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          npm run check:node-major
          npm run typecheck:foundation
          npx tsc --project tsconfig.base.json --noEmit
          npm run lint:foundation
          npm run test:issue-900
          npm run gate-runner-selftest
          node scripts/run-vitest-with-harness.mjs run \
            plugins/ao-codex-pr-reviewer \
            plugins/ao-scope-guard \
            plugins/ao-task-declaration \
            plugins/ao-token-chain-ledger
          pwsh -NoProfile -File scripts/lint-self-architect.ps1 -Strict
          node --experimental-strip-types plugins/ao-scope-guard/bin/scope-check.ts \
            --issue 900 --mode index --repo-root .
      - name: Commit and push migration
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: migrate TypeScript launcher from PowerShell"
          git push origin HEAD:agent/issue-900-node22-runtime
