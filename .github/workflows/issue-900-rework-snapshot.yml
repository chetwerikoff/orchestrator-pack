name: issue-900-rework-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-900-policy-fix-publisher
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout transfer payload
        uses: actions/checkout@v4
        with:
          path: payload
      - name: Checkout exact PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          path: target
          fetch-depth: 0
      - name: Reconstruct and apply policy fix
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode payload/scripts/toolchain/.issue900-policy-fix.b64 > /tmp/issue900-policy-fix.patch.xz
          echo "ab399dde992d6ad782bce54c8a11517981356f0c61dcc457a0cd22c664d4a72a  /tmp/issue900-policy-fix.patch.xz" | sha256sum --check --strict
          xz --decompress --stdout /tmp/issue900-policy-fix.patch.xz > /tmp/issue900-policy-fix.patch
          cd target
          test "$(git rev-parse HEAD)" = "3786f315dc36f5fdd62974bbb16b1785e4481fc4"
          git apply --check /tmp/issue900-policy-fix.patch
          git apply --index /tmp/issue900-policy-fix.patch
          test "$(git diff --cached --name-only | wc -l)" -eq 3
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: target/package-lock.json
      - name: Validate policy fix
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run lint:foundation
          npm run typecheck:foundation
          node scripts/run-vitest-with-harness.mjs run \
            plugins/ao-scope-guard/tests/integration.test.ts \
            plugins/ao-task-declaration/tests/declare.test.ts
      - name: Commit and push policy fix
        working-directory: target
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: route plugin CLI tests through subprocess kernel"
          git push origin HEAD:agent/issue-900-node22-runtime
