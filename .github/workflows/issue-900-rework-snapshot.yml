name: issue-900-rework-snapshot

on:
  push:
    branches:
      - agent/issue-900-rework-snapshot
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive exact branch tree
        shell: bash
        run: git archive --format=tar.gz --output=issue-900-rework-snapshot.tar.gz HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: issue-900-rework-snapshot
          path: issue-900-rework-snapshot.tar.gz
          compression-level: 0
