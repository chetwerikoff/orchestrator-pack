name: issue-900-rework-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: issue-900-final-snapshot
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout final PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          fetch-depth: 0
      - name: Archive exact branch tree
        shell: bash
        run: git archive --format=tar.gz --output=issue-900-final-snapshot.tar.gz HEAD
      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue-900-final-snapshot
          path: issue-900-final-snapshot.tar.gz
          compression-level: 0
