name: issue-900-rework-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: issue-900-final-policy-diagnostic
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout final PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          fetch-depth: 0
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Capture policy output
        id: policy
        shell: bash
        run: |
          set +e
          npm run lint:foundation > issue-900-final-policy.log 2>&1
          status=$?
          cat issue-900-final-policy.log
          exit "$status"
      - name: Upload policy output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-900-final-policy
          path: issue-900-final-policy.log
          if-no-files-found: error
