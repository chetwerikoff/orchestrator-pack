name: pr939-approve-current-head-runs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read

jobs:
  approve:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Approve exact-head PR 939 runs
        shell: bash
        run: |
          set -euo pipefail
          for run in 29909826406 29909826415 29909826430 29909826555; do
            ./scripts/gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run}/approve"
          done
