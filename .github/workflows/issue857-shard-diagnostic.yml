# Temporary fix/validation workflow; remove after candidate commit.
name: Issue 857 shard diagnostics

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  validate-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Restore head-corroborated synthetic session compatibility
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/session-pr-binding-resolver.mjs')
          text = path.read_text()
          marker = """  const detailValue = options.sessionDetail && typeof options.sessionDetail === 'object'
            ? options.sessionDetail[LEGACY_DISPLAY_KEY]
            : undefined;
          """
          replacement = """  if (!hasDaemonPrListField(session)) {
            const explicitPr = getExplicitSessionPrNumber(session);
            const explicitSessionHead = normalizeSha(session?.ownedHeadSha ?? session?.headRefOid);
            const requestedHead = normalizeSha(options.headSha);
            const explicitPrRow = prList.find((pr) => (
              numberOrZero(pr?.number) === explicitPr &&
              repoScopeMatches(getOpenPrRepoSlug(pr), expectedRepo) &&
              !prIsTerminal(pr)
            ));
            const explicitPrHead = normalizeSha(explicitPrRow?.headRefOid);
            const headCorroborated = Boolean(
              explicitPr > 0 &&
              explicitSessionHead &&
              (!requestedHead || explicitSessionHead === requestedHead) &&
              (!explicitPrHead || explicitSessionHead === explicitPrHead)
            );
            if (headCorroborated) {
              return {
                bound: true,
                prNumber: explicitPr,
                source: 'issue_correlation',
                bindingSource: 'issue_correlation',
                enriched: false,
                liveSource: 'issue_correlation',
                trustRank: 300,
                repoSlug: expectedRepo,
              };
            }
          }

            const detailValue = options.sessionDetail && typeof options.sessionDetail === 'object'
            ? options.sessionDetail[LEGACY_DISPLAY_KEY]
            : undefined;
          """
          if text.count(marker) != 1:
              raise SystemExit(f'insertion marker count={text.count(marker)}')
          path.write_text(text.replace(marker, replacement))
          PY
      - name: Validate all affected consumers
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          status=0
          npm test -- \
            scripts/worker-report-store.test.ts \
            scripts/session-pr-binding-resolver.test.ts \
            scripts/worker-status-store.test.ts \
            scripts/worker-status-store-live-rca.test.ts \
            scripts/ci-green-wake-reconcile.test.ts \
            scripts/review-head-ready.test.ts \
            scripts/review-ready-stuck-guard.test.ts \
            scripts/review-finding-delivery-submit.test.ts \
            scripts/review-delivery.test.ts \
            scripts/ao-0-10-review-trigger.test.ts \
            scripts/worker-recovery.test.ts \
            > diagnostics/consumer-compatibility.log 2>&1 || status=$?
          npx tsc --project tsconfig.base.json --noEmit >> diagnostics/consumer-compatibility.log 2>&1 || status=$?
          node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs >> diagnostics/consumer-compatibility.log 2>&1 || status=$?
          git diff --check >> diagnostics/consumer-compatibility.log 2>&1 || status=$?
          echo "exit=$status" >> diagnostics/consumer-compatibility.log
          exit "$status"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue857-consumer-compatibility-${{ github.run_id }}
          path: diagnostics/consumer-compatibility.log
          if-no-files-found: error
      - name: Commit validated resolver compatibility
        if: success()
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/session-pr-binding-resolver.mjs
          git commit -m 'Preserve head-corroborated session compatibility'
          git push origin HEAD:agent/issue-857-binding-contract-v2
