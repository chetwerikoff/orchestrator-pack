name: Issue 857 shard diagnostics

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  consumer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: review-head-ready
            file: scripts/review-head-ready.test.ts
          - id: ci-green-wake
            file: scripts/ci-green-wake-reconcile.test.ts
          - id: review-finding-delivery
            file: scripts/review-finding-delivery-submit.test.ts
          - id: worker-recovery
            file: scripts/worker-recovery.test.ts
          - id: ao-review-trigger
            file: scripts/ao-0-10-review-trigger.test.ts
          - id: review-delivery
            file: scripts/review-delivery.test.ts
          - id: review-ready-stuck
            file: scripts/review-ready-stuck-guard.test.ts
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture consumer suite
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          npm test -- "${{ matrix.file }}" > "diagnostics/${{ matrix.id }}.log" 2>&1
          status=$?
          echo "exit=$status" >> "diagnostics/${{ matrix.id }}.log"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue857-${{ matrix.id }}-${{ github.run_id }}
          path: diagnostics/${{ matrix.id }}.log
          if-no-files-found: error
