name: issue-923-final-light-helper

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Rewrite retired consumer test
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const testPath = 'scripts/session-pr-binding-resolver.test.ts';
          let text = fs.readFileSync(testPath, 'utf8');
          const before = `    'docs/review-trigger-reconcile.mjs',`;
          const after = `    'scripts/pr2-foundation/terminalized/review-trigger-reconcile.ts',`;
          if (!text.includes(before)) throw new Error('retired consumer path not found');
          text = text.replace(before, after);
          fs.writeFileSync(testPath, text, 'utf8');
          for (const temporary of [
            '.github/workflows/issue-923-light-diagnostic.yml',
            '.github/workflows/issue-923-final-light-helper.yml',
          ]) {
            if (fs.existsSync(temporary)) fs.rmSync(temporary);
          }
          NODE
      - name: Commit final light-lane fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test: follow terminalized binding consumer port"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
