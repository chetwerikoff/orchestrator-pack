name: issue-832 cancel superseded scope runs

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded scope-guard runs for this PR branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${api}/actions/workflows/scope-guard.yml/runs?event=pull_request&per_page=30" \
            | jq -r --arg branch "${HEAD_BRANCH}" '.workflow_runs[] | select(.head_branch == $branch and (.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested")) | .id' \
            > /tmp/superseded-runs
          while IFS= read -r run_id; do
            [ -n "${run_id}" ] || continue
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api}/actions/runs/${run_id}/cancel" >/dev/null || true
            echo "cancel requested: ${run_id}"
          done < /tmp/superseded-runs
