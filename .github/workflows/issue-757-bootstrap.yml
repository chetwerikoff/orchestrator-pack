name: issue-757-bootstrap

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: issue-757-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.head_ref == 'agent/issue-757-runtime-history-self-heal' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-757-runtime-history-self-heal
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Decode and apply implementation
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > /tmp/issue-757-bootstrap.log 2>&1
          import base64
          import zlib
          from pathlib import Path
          payload = ''.join(
              Path(f'scripts/.issue-757-bootstrap.part{index}').read_text(encoding='utf-8')
              for index in range(1, 5)
          )
          code = zlib.decompress(base64.b64decode(payload)).decode('utf-8')
          compiled = compile(code, 'issue-757-bootstrap.py', 'exec')
          exec(compiled, {'__name__': '__main__'})
          PY
          status=$?
          set -e
          cat /tmp/issue-757-bootstrap.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/issue-757-bootstrap.log scripts/issue-757-bootstrap-error.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- scripts/issue-757-bootstrap-error.txt
            if ! git diff --cached --quiet; then
              git commit -m 'Record issue 757 bootstrap diagnostic'
              git push origin HEAD:agent/issue-757-runtime-history-self-heal
            fi
            exit "$status"
          fi

      - name: Verify implementation
        shell: bash
        run: |
          set +e
          bash -euo pipefail <<'VERIFY' > /tmp/issue-757-verify.log 2>&1
          echo '[verify] delivery tests'
          node --test scripts/vitest-runtime-history-delivery.test.mjs
          echo '[verify] isolated vitest tests'
          cat > vitest.issue757.config.ts <<'EOF'
          import { defineConfig } from 'vitest/config';
          export default defineConfig({
            test: {
              include: [
                'scripts/pr-scope-check.test.ts',
                'scripts/check-ci-pipeline-split.test.ts',
              ],
              environment: 'node',
              pool: 'forks',
              fileParallelism: false,
              maxWorkers: 1,
              testTimeout: 30000,
            },
          });
          EOF
          npx vitest run --config vitest.issue757.config.ts \
            scripts/pr-scope-check.test.ts \
            scripts/check-ci-pipeline-split.test.ts
          rm vitest.issue757.config.ts
          echo '[verify] TypeScript'
          npx tsc --project tsconfig.base.json --noEmit
          echo '[verify] pipeline split PowerShell with pinned baseline fixtures'
          OPK_WALLCLOCK_MAIN_EVIDENCE_FIXTURE=bootstrap \
          OPK_WALLCLOCK_SPLIT_APPROVAL_FIXTURE=approved \
          SUPERVISOR_RPC_BIND_HEAD=f4eb835dd08c43e8143a5ee981e1dc2159825698 \
            pwsh -NoProfile -File scripts/check-ci-pipeline-split.ps1
          echo '[verify] diff check'
          git diff --check
          VERIFY
          status=$?
          set -e
          cat /tmp/issue-757-verify.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/issue-757-verify.log scripts/issue-757-verify-error.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- scripts/issue-757-verify-error.txt
            if ! git diff --cached --quiet; then
              git commit -m 'Record issue 757 verification diagnostic'
              git push origin HEAD:agent/issue-757-runtime-history-self-heal
            fi
            exit "$status"
          fi

      - name: Commit verified implementation
        shell: bash
        run: |
          set +e
          bash -euo pipefail <<'PUBLISH' > /tmp/issue-757-publish.log 2>&1
          git status --short
          git rm -f scripts/.issue-757-bootstrap.py.zlib.b64 scripts/.issue-757-bootstrap.part* scripts/issue-757-bootstrap-error.txt scripts/issue-757-verify-error.txt
          git add -- \
            .github/workflows/scope-guard.yml \
            docs/declarations/757.arch-direct.json \
            scripts/pr-scope-check.ps1 \
            scripts/pr-scope-check.test.ts \
            scripts/pr-scope-check.ts \
            scripts/vitest-runtime-history-delivery.mjs \
            scripts/vitest-runtime-history-delivery.test.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Fix runtime-history delivery self-heal (#757)'
          git push origin HEAD:agent/issue-757-runtime-history-self-heal
          PUBLISH
          status=$?
          set -e
          cat /tmp/issue-757-publish.log
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/issue-757-publish.log scripts/issue-757-publish-error.txt
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- scripts/issue-757-publish-error.txt
            git commit -m 'Record issue 757 publish diagnostic'
            git push origin HEAD:agent/issue-757-runtime-history-self-heal
            exit "$status"
          fi
