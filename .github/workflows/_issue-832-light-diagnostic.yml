name: issue-832 final validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: issue-832-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Generate final-tree reachability manifest
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/_issue-832-light-diagnostic.yml
          node --no-warnings --loader ./scripts/toolchain/typescript-loader.mjs ./scripts/reachability-purge.mjs --write
          git status --short
      - name: Run Node 20 regression tests
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail
          npm test -- \
            scripts/reachability-purge.test.ts \
            scripts/sanctioned-worker-kill-record.test.ts \
            scripts/read-delegation-audit.test.ts \
            2>&1 | tee "${RUNNER_TEMP}/issue-832-targeted-tests.log"
      - name: Commit final generated artifacts
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/reachability-purge.manifest.json
          git add -u .github/workflows/_issue-832-light-diagnostic.yml
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'No final-tree artifact changes to commit.'
            exit 0
          fi
          git commit -m 'fix: finalize issue 832 generated artifacts'
          git push origin "HEAD:${HEAD_REF}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: issue-832-final-validation
          path: |
            scripts/reachability-purge.manifest.json
            ${{ runner.temp }}/issue-832-targeted-tests.log
          retention-days: 1
          if-no-files-found: error
