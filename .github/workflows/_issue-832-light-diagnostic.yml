name: issue-832 light diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Download light-lane job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/87369166897/logs" \
            -o "${RUNNER_TEMP}/light-job.raw"
          if unzip -t "${RUNNER_TEMP}/light-job.raw" >/dev/null 2>&1; then
            unzip -p "${RUNNER_TEMP}/light-job.raw" > "${RUNNER_TEMP}/light-job.log"
          else
            cp "${RUNNER_TEMP}/light-job.raw" "${RUNNER_TEMP}/light-job.log"
          fi
          {
            echo '=== failure-focused lines ==='
            grep -nEi '(fail|failed|failure|error|exception|assertion|expected|received|test files|tests )' "${RUNNER_TEMP}/light-job.log" || true
            echo '=== final 600 lines ==='
            tail -n 600 "${RUNNER_TEMP}/light-job.log"
          } > "${RUNNER_TEMP}/light-diagnostic.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: issue-832-light-diagnostic
          path: ${{ runner.temp }}/light-diagnostic.txt
          retention-days: 1
          if-no-files-found: error
