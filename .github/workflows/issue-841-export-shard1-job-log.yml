name: issue-841-export-shard1-job-log

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Export completed heavy shard 1 job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87584978817/logs" > "$RUNNER_TEMP/pr860-heavy-shard1.log"
      - name: Upload shard log
        uses: actions/upload-artifact@v4
        with:
          name: pr860-heavy-shard1-job-log
          path: ${{ runner.temp }}/pr860-heavy-shard1.log
          retention-days: 1
          if-no-files-found: error
