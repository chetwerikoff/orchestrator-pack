name: issue-849-apply-node-only-regression

on:
  push:
    branches: [agent/issue-849-gh-signal-classification]

permissions:
  contents: write

concurrency:
  group: issue-849-apply-node-only-regression
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-849-gh-signal-classification
          fetch-depth: 0
      - name: Apply exact test patch and remove transports
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/gh-signal-classification.test.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace("import { runProcessSync } from '#opk-kernel/subprocess';\n", '', 1)
          text = text.replace("import { functionBody } from './_test-pwsh-helpers.js';\n", '', 1)
          helper_start = text.index('\nfunction quotePowerShell')
          helper_end = text.index('\nafterEach(', helper_start)
          text = text[:helper_start] + '\n' + text[helper_end:]
          test_start = text.index("  it('runs lookup retention for an authoritative empty open-PR snapshot without a checks bundle', () => {")
          test_end = text.index("\n  it('reads a legacy ledger without lookupFailures compatibly'", test_start)
          replacement = """  it('wires lookup retention before the empty-open-PR checks gate', () => {
            const reconcileSource = readFileSync(join(repoRoot, 'scripts/ci-failure-notification-reconcile.ps1'), 'utf8');
            const tickStart = reconcileSource.indexOf('function Invoke-CiFailureNotificationTick');
            const retentionCall = reconcileSource.indexOf('Invoke-CiRedWatchdogLookupRetention', tickStart);
            const checksGate = reconcileSource.indexOf('if ($openPrs.Count -gt 0)', tickStart);
            expect(tickStart).toBeGreaterThanOrEqual(0);
            expect(retentionCall).toBeGreaterThan(tickStart);
            expect(checksGate).toBeGreaterThan(retentionCall);
          });

"""
          text = text[:test_start] + replacement + text[test_end + 1:]
          path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/issue-849-remove-new-pwsh-child.yml
          git rm .github/workflows/issue-849-apply-pester-regression.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: move empty-snapshot integration to Pester"
          git push origin HEAD:agent/issue-849-gh-signal-classification
