name: finish-pr-845-diagnostic

on:
  push:
    branches:
      - issue-839-pack-review-runner-v2

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Collect targeted diagnostics
        shell: bash
        run: |
          set +e
          log=/tmp/pr-845-diagnostic.log
          : > "$log"
          run_check() {
            local label="$1"
            shift
            {
              echo
              echo "===== $label ====="
              "$@"
              status=$?
              echo "===== exit=$status ====="
            } >>"$log" 2>&1
          }

          run_check "HEAD and changed files" bash -lc 'git rev-parse HEAD; git diff --name-status origin/main...HEAD'
          run_check "TypeScript typecheck" npm run typecheck
          run_check "Targeted review runner test" npx vitest run scripts/ao-0-10-review-trigger.test.ts --reporter=verbose
          run_check "review trigger static gate" pwsh -NoProfile -File scripts/check-review-trigger-reconcile.ps1
          run_check "review idempotency static gate" pwsh -NoProfile -File scripts/check-orchestrator-review-idempotency.ps1
          run_check "review head coverage static gate" pwsh -NoProfile -File scripts/check-orchestrator-review-head-coverage.ps1
          run_check "focused retired-path inventory" bash -lc 'grep -RInE "scripts/ao-review\\.ps1|/api/v1/sessions/.*/reviews|ao review submit|reviewers.*harness" -- scripts/lib/Invoke-AoReviewApi.ps1 scripts/review-trigger-reconcile.ps1 agent-orchestrator.yaml.example docs/ao-0-10-review-harness-adoption.md .claude/skills/merge-with-local-adoption/SKILL.md .cursor/skills/merge-with-local-adoption/SKILL.md 2>/dev/null | head -n 160'
          run_check "issue 839 declaration inventory" bash -lc 'ls -la docs/declarations/839.*.json 2>&1 || true'

          {
            echo "## PR #845 focused diagnostic"
            echo
            echo '```text'
            cat "$log"
            echo
            echo '```'
          } >/tmp/pr-845-comment.md
          head -c 62000 /tmp/pr-845-comment.md >/tmp/pr-845-comment-truncated.md
      - name: Post diagnostic to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/pr-845-comment-truncated.md
