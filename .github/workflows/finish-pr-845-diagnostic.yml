name: finish-pr-845

on:
  push:
    branches:
      - issue-839-pack-review-runner-v2

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finish:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Complete runner cutover documentation and operator contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise SystemExit(f"{path}: expected exactly one replacement target, found {text.count(old)}")
              p.write_text(text.replace(old, new), encoding='utf-8')

          yaml_path = 'agent-orchestrator.yaml.example'
          replace_once(
              yaml_path,
              """      REVIEW DRIVING — AO 0.10 does not auto-trigger Codex review on PR open.
      Live procedure: AGENTS.md + side-process scripts (orchestratorRules below is legacy-import reference only).
      The orchestrator and reconcile loops jump the gaps via ao-review run / Get-AoReviewRuns.
""",
              """      REVIEW DRIVING — reviews are pack-owned; AO does not spawn the reviewer.
      Live procedure: AGENTS.md + side-process scripts (orchestratorRules below is legacy-import reference only).
      The orchestrator and reconcile loops invoke the pack review runner and read the
      Get-AoReviewRuns pack-store view from the pack-side run/status store; never ao spawn.
""",
          )
          replace_once(
              yaml_path,
              """      RUNTIME INVOCATION (shell only — do NOT embed --command in orchestratorRules):
        At review time: ao-review run <worker-session-id>  (scripts/ao-review.ps1 shim → POST .../reviews/trigger)
        REVIEW_COMMAND is configured in project review settings / operator shell — not re-pasted here.
        Discover/idempotency: Get-AoReviewRuns fan-out (GET /api/v1/sessions/{id}/reviews) or ao-review list <session-id> --json.
        Do not add double-quote characters inside this orchestratorRules literal.
""",
              """      RUNTIME INVOCATION (shell only — do NOT embed --command in orchestratorRules):
        Manual trigger: node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>
        Automatic reconciliation delegates to the same pack review runner; never ao spawn.
        Discover/idempotency: Get-AoReviewRuns pack-store view backed by the pack-side run/status store.
        GitHub PR review is the authoritative verdict; the local store is operational run/status only.
        Do not add double-quote characters inside this orchestratorRules literal.
""",
          )
          replace_once(
              yaml_path,
              """# AO 0.10 review harness (Issue #623)
# On AO 0.10.x, configure reviewers via project config API — not REVIEW_COMMAND/--command:
#   ao project set-config orchestrator-pack --config-json '{"reviewers":[{"harness":"codex"}]}'
# Pack trigger loop uses POST /api/v1/sessions/{workerId}/reviews/trigger (scripts/ao-review.ps1 shim).
# Operator adoption: docs/ao-0-10-review-harness-adoption.md
""",
              """# Pack-owned review runner (Issue #839)
# AO project config must carry no daemon reviewer-harness wiring after adoption.
# Manual and automatic review triggers use scripts/pack-review-runner.ts; status reads use
# the pack-side run/status store through the Get-AoReviewRuns pack-store view.
# Operator cutover and zombie cleanup: docs/ao-0-10-review-harness-adoption.md
""",
          )

          adoption = """# Pack-owned review runner adoption (Issue #839)

## Purpose

The pack now owns review invocation and operational run/status tracking. AO must not spawn a reviewer for this project. Manual and automatic triggers both enter `scripts/pack-review-runner.ts`, which invokes the trusted pack reviewer from the trusted pack checkout, posts the GitHub PR review directly, and records operational state in the pack-side run/status store.

GitHub PR review is the authoritative verdict record. The local store is only the authority for run existence, in-flight/terminal status, and the run bound to a `(PR, head)` claim.

## Repository contract

- Manual trigger:

  ```bash
  node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>
  ```

- Explicit target trigger:

  ```bash
  node --experimental-strip-types scripts/pack-review-runner.ts start --pr-number <pr> --head-sha <40-hex>
  ```

- Operational status:

  ```bash
  node --experimental-strip-types scripts/pack-review-runner.ts list --project-id orchestrator-pack
  ```

- Automatic review uses the same runner through the existing reconcile/wake adapters.
- The preserved PowerShell claim primitive remains the concurrency authority for a `(PR, head)` start.
- Do not use the removed shim, daemon review endpoints, or `ao review submit` as a transition path.

## Required post-merge adoption

1. Inspect the live project config:

   ```bash
   ao project get orchestrator-pack --json
   ```

2. Clear the project's reviewer-harness wiring. Use the live daemon's accepted empty-state shape: set `reviewers` to an empty array or omit the key, then read the config back and verify that no reviewer harness remains. Do not assume the command succeeded merely because it exited zero.
3. Restart the AO daemon or recycle the affected project session according to the local AO config-change procedure. Verify a newly spawned/restored session observes the cleared config.
4. Remove known pre-cutover reviewer zombies: session 109 for PR #758, session 124 for PR #820, and the stuck #835 fallback. Use `ao session kill` or the existing dead-session reconciliation path; this is one-time hygiene, not a new recurring reaper.
5. Run one fresh manual trigger and one fresh automatic trigger on real open PR heads. For each run verify:
   - the pack runner creates or reuses exactly one current-head run;
   - the trusted reviewer process completes;
   - a GitHub PR review is posted;
   - the pack store reaches a terminal status;
   - no daemon review HTTP traffic occurs.

## Failure handling

- A missing/corrupt/ambiguous binding or store is fail-closed; repair the local state instead of falling back to AO.
- A disappeared stale runner is marked failed and may be reclaimed through the existing claim policy.
- A non-zero reviewer exit records terminal failure and must not be interpreted as a clean review.
- A head change invalidates the requested target; trigger again for the new head rather than reviewing the stale commit.

## Rollback

Rollback requires reverting the pack-runner change and deliberately restoring the previous project reviewer configuration. Do not leave both paths active: parallel pack and daemon invocation breaks the exactly-one-run contract.
"""
          Path('docs/ao-0-10-review-harness-adoption.md').write_text(adoption, encoding='utf-8')

          old_skill = """- PR review is run by **pack scripts** (`invoke-pack-review.ps1` under the wake
  supervisor), not by AO. Read verdicts via the pack wrapper
  `pwsh -NoProfile -File scripts/ao-review.ps1 list <worker-session-id> --json`
  (AO HTTP `/api/v1/sessions/{id}/reviews`) or the detached store
  `~/.ao/detached-pack-reviews/pr-<P>.json` (`verdict`, `findingCount`, `headSha`).
  Never call the `ao review` CLI to read verdicts — it has only `submit` (used by pack
  scripts to record a verdict back to AO).
"""
          new_skill = """- PR review is run by the **pack-owned runner**, not by AO. Manual invocation is
  `node --experimental-strip-types scripts/pack-review-runner.ts start --session-id <worker-session-id>`;
  operational status is read with `scripts/pack-review-runner.ts list` or the compatible
  `Get-AoReviewRuns` pack-store view. GitHub PR review is the authoritative verdict; the
  pack-side run/status store is operational state only. Never use daemon review HTTP or
  `ao review submit` as a fallback or dual-write path.
"""
          for skill in [
              '.claude/skills/merge-with-local-adoption/SKILL.md',
              '.cursor/skills/merge-with-local-adoption/SKILL.md',
          ]:
              replace_once(skill, old_skill, new_skill)
          PY

          rm -f .github/workflows/finish-pr-845-diagnostic.yml

          if grep -RInE 'scripts/ao-review\.ps1|/api/v1/sessions/.*/reviews(?:/trigger)?' \
            agent-orchestrator.yaml.example docs/ao-0-10-review-harness-adoption.md \
            .claude/skills/merge-with-local-adoption/SKILL.md \
            .cursor/skills/merge-with-local-adoption/SKILL.md; then
            echo 'retired review path remains in adopted surfaces' >&2
            exit 1
          fi
      - name: Validate completed cutover
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck:foundation
          npm run lint:foundation
          pwsh -NoProfile -File scripts/check-review-trigger-reconcile.ps1
          pwsh -NoProfile -File scripts/check-orchestrator-review-idempotency.ps1
          pwsh -NoProfile -File scripts/check-orchestrator-review-head-coverage.ps1
          npm test -- \
            scripts/ao-0-10-review-trigger.test.ts \
            scripts/review-handoff-wake-trigger.test.ts \
            scripts/review-start-claim.test.ts \
            scripts/review-start-claim-run-binding.test.ts \
            scripts/scripted-review-confirmed-delivery-gate.test.ts \
            scripts/harness-post-submit-pn-content-shape.test.ts \
            scripts/harness-review-bridge.test.ts \
            scripts/review-wake-trigger.test.ts
      - name: Commit implementation and documentation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete pack-owned review runner cutover"
      - name: Generate committed issue scope declaration
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AO_SESSION_ID=issue-839-pr-845 npx tsx plugins/ao-task-declaration/bin/declare.ts \
            --issue 839 \
            --iteration-id issue-839-pr-845 \
            --declared-paths 'agent-orchestrator.yaml.example,tsconfig.json,docs/ao-0-10-review-harness-adoption.md,.claude/skills/merge-with-local-adoption/SKILL.md,.cursor/skills/merge-with-local-adoption/SKILL.md' \
            --declared-globs 'scripts/**'
          git add docs/declarations
          git commit -m "Declare issue 839 scope"
      - name: Push completed branch
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report completion
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cat >/tmp/pr-845-finish.md <<'EOF'
          ## PR #845 completion pass

          - completed the pack-runner/store operator cutover in the YAML example, adoption runbook, and both merge skills
          - removed live references to the retired shim and daemon review HTTP from those surfaces
          - passed TypeScript typecheck/policy, all three static review gates, and the eight targeted regression files
          - generated the repository-native issue #839 declaration snapshot
          - removed the temporary diagnostic workflow from the final tree
          EOF
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/pr-845-finish.md
