name: finish-pr-845-diagnostic

on:
  push:
    branches:
      - issue-839-pack-review-runner-v2

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Collect runner diagnostics
        shell: bash
        run: |
          set +e
          log=/tmp/pr-845-diagnostic.log
          : > "$log"
          run_check() {
            local label="$1"
            shift
            {
              echo
              echo "===== $label ====="
              "$@"
              status=$?
              echo "===== exit=$status ====="
            } >>"$log" 2>&1
          }

          run_check "Foundation typecheck" npm run typecheck:foundation
          run_check "Foundation policy lint" npm run lint:foundation
          run_check "Targeted review runner test" npm test -- scripts/ao-0-10-review-trigger.test.ts --reporter=verbose
          run_check "Foundation test suite" npm run test:foundation -- --reporter=verbose

          {
            echo "## PR #845 runner diagnostic"
            echo
            echo '```text'
            cat "$log"
            echo
            echo '```'
          } >/tmp/pr-845-comment.md
          head -c 62000 /tmp/pr-845-comment.md >/tmp/pr-845-comment-truncated.md
      - name: Post diagnostic to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/pr-845-comment-truncated.md
