name: issue-849-capture-topology-log

on:
  push:
    branches:
      - agent/issue-849-topology-log

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture failed topology log tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          status="$(curl -sS -L -w '%{http_code}' -o /tmp/topology-full.log \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/chetwerikoff/orchestrator-pack/actions/jobs/87501706490/logs" || true)"
          {
            echo "HTTP_STATUS=$status"
            tail -n 320 /tmp/topology-full.log 2>&1 || true
          } > issue-849-topology-tail.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add issue-849-topology-tail.log
          git commit -m "chore: capture issue 849 topology log"
          git push origin HEAD:refs/heads/agent/issue-849-topology-log
