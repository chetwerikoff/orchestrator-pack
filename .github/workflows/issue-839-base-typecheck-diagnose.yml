name: issue-839-base-typecheck-diagnose

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies quietly
        shell: bash
        run: npm ci --include=dev --silent >/dev/null 2>&1
      - name: Type-check full pack sources
        run: npx tsc --project tsconfig.base.json --noEmit
