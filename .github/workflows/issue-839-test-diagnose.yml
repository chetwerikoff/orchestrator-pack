name: issue-839-test-diagnose

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - name: Apply same in-worktree patch
        shell: bash
        run: |
          set -euo pipefail
          awk 'BEGIN{take=0} /python3 - <<.PY./{take=1; next} take && /^          PY$/{exit} take{sub(/^          /,""); print}' .github/workflows/issue-839-pr-apply.yml > /tmp/issue-839-apply.py
          python3 /tmp/issue-839-apply.py
      - name: Run targeted tests with machine-readable report
        id: test
        continue-on-error: true
        shell: bash
        run: |
          node scripts/run-vitest-with-harness.mjs run \
            scripts/ao-0-10-review-trigger.test.ts \
            scripts/review-handoff-wake-trigger.test.ts \
            scripts/review-start-claim.test.ts \
            scripts/review-start-claim-run-binding.test.ts \
            scripts/scripted-review-confirmed-delivery-gate.test.ts \
            scripts/harness-post-submit-pn-content-shape.test.ts \
            scripts/harness-review-bridge.test.ts \
            scripts/review-wake-trigger.test.ts \
            --reporter=json --outputFile=/tmp/vitest.json
      - name: Post concise diagnosis
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        shell: bash
        run: |
          node <<'NODE' >/tmp/diagnosis.md
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('/tmp/vitest.json', 'utf8'));
          console.log('## Issue #839 targeted-test diagnosis');
          console.log('');
          console.log(`success=${result.success} passed=${result.numPassedTests} failed=${result.numFailedTests}`);
          for (const file of result.testResults ?? []) {
            for (const test of file.assertionResults ?? []) {
              if (test.status !== 'failed') continue;
              console.log('');
              console.log(`- ${file.name}: ${test.fullName}`);
              const message = (test.failureMessages ?? []).join('\n').replace(/\x1b\[[0-9;]*m/g, '');
              console.log('```text');
              console.log(message.slice(-6000));
              console.log('```');
            }
          }
          NODE
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/diagnosis.md
