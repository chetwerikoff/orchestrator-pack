name: issue-839-finalize-policy

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-839-finalize-policy-845
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - name: Compact review policy and de-duplicate marker check
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          agents_path = Path('AGENTS.md')
          agents = agents_path.read_text(encoding='utf-8')

          feedback_pattern = re.compile(
              r'(#### Review feedback and AO review response\n\n).*?'
              r'(\n\nScript-owned orchestrator review starters and predicates:)',
              re.S,
          )
          feedback = (
              '#### Review feedback and AO review response\n\n'
              'On delivered findings, use `addressing_reviews` → optional `fixing_ci` → '
              '`ready_for_review` after CI is green; never report `completed` with open findings. '
              'Inspect pack-store `Get-AoReviewRuns` and the authoritative current-head GitHub review.'
              '\n\nScript-owned orchestrator review starters and predicates:'
          )
          agents, count = feedback_pattern.subn(feedback, agents, count=1)
          if count != 1:
              raise SystemExit('expected exactly one review-feedback section')

          telemetry_pattern = re.compile(
              r'(#### Review delivery telemetry \(Issue #718\)\n\n).*?'
              r'(\n\*\*Worker status \(Issue #720\):)',
              re.S,
          )
          telemetry = (
              '#### Review delivery telemetry (Issue #718)\n\n'
              'Trust reviewer terminal JSON, the authoritative current-head GitHub review, and the '
              'dispatch journal. The pack store is operational only; daemon review HTTP and '
              '`ao review submit` are retired. Never synthesize findings from store rows.'
              '\n**Worker status (Issue #720):'
          )
          agents, count = telemetry_pattern.subn(telemetry, agents, count=1)
          if count != 1:
              raise SystemExit('expected exactly one review-delivery section')
          agents_path.write_text(agents, encoding='utf-8')

          check_path = Path('scripts/check-harness-post-submit-pn-content-shape.ps1')
          check = check_path.read_text(encoding='utf-8')
          start_marker = "$adoption = Get-Content -LiteralPath (Join-Path $Root 'docs/ao-0-10-review-harness-adoption.md') -Raw"
          end_marker = '$fixtureText ='
          start = check.find(start_marker)
          end = check.find(end_marker, start + len(start_marker))
          if start < 0 or end < 0:
              raise SystemExit('expected adoption marker block boundaries')
          adoption = """$adoption = Get-Content -LiteralPath (Join-Path $Root 'docs/ao-0-10-review-harness-adoption.md') -Raw
          if ($adoption -notmatch 'Pack-owned review runner adoption' -or
              $adoption -notmatch 'GitHub PR review is the authoritative verdict record' -or
              $adoption -notmatch 'Do not use daemon review endpoints') {
              Write-Host 'review-runner adoption guide is missing the pack-owned verdict or no-daemon contract'
              exit 1
          }

          $fixtureText ="""
          check = check[:start] + adoption + check[end + len(end_marker):]
          check_path.write_text(check, encoding='utf-8')
          PY

          rm -f .github/workflows/issue-839-verifier-summary.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add AGENTS.md scripts/check-harness-post-submit-pn-content-shape.ps1 .github/workflows/issue-839-verifier-summary.yml
          git commit -m 'Finalize pack review policy guards'
      - name: Verify AGENTS size budget
        shell: pwsh
        run: ./scripts/check-agent-rules-line-budget.ps1
      - name: Verify review contract gates
        shell: pwsh
        run: |
          ./scripts/check-ao-0-10-review-trigger.ps1
          ./scripts/check-harness-review-bridge.ps1
          ./scripts/check-harness-post-submit-pn-content-shape.ps1
      - name: Verify strict self-architect lint
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: ./scripts/lint-self-architect.ps1 -Strict -BaseRef $env:PR_BASE_SHA -HeadRef HEAD
      - name: Verify full pack
        shell: pwsh
        run: ./scripts/verify.ps1
      - name: Push verified candidate
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body "Issue #839 policy finalization failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
