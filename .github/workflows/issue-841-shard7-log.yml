name: issue-841-shard7-log

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch log
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api repos/$GITHUB_REPOSITORY/actions/jobs/87663276569/logs > $RUNNER_TEMP/shard7.log
      - uses: actions/upload-artifact@v4
        with:
          name: pr860-shard7-log
          path: ${{ runner.temp }}/shard7.log
          retention-days: 1
