name: issue-841-export-rereview-source

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Pack source tree
        shell: bash
        run: |
          set -euo pipefail
          git archive --format=zip --output="$RUNNER_TEMP/pr860-rereview-source.zip" HEAD
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: pr860-rereview-source
          path: ${{ runner.temp }}/pr860-rereview-source.zip
          retention-days: 1
          if-no-files-found: error
      - name: Cancel temporary-head scope run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&head_sha=$PR_HEAD_SHA&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done
      - name: Remove exporter and push cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-export-rereview-source.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/issue-841-export-rereview-source.yml
          git commit -m 'chore: remove PR 860 rereview source exporter'
          git push origin HEAD:agent/issue-841-bulk-gate-port
