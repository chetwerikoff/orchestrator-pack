name: issue-841-export-ci-failures

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Export failed job logs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87623376047/logs" > "$RUNNER_TEMP/topology.log"
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87623339731/logs" > "$RUNNER_TEMP/verifier.log"
      - name: Upload failure logs
        uses: actions/upload-artifact@v4
        with:
          name: pr860-ci-failure-logs
          path: |
            ${{ runner.temp }}/topology.log
            ${{ runner.temp }}/verifier.log
          retention-days: 1
