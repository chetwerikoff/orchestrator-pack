name: issue-832 verifier diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Download verifier job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/87362705352/logs" \
            -o "${RUNNER_TEMP}/verifier-job.raw"
          if unzip -t "${RUNNER_TEMP}/verifier-job.raw" >/dev/null 2>&1; then
            unzip -p "${RUNNER_TEMP}/verifier-job.raw" > "${RUNNER_TEMP}/verifier-job.log"
          else
            cp "${RUNNER_TEMP}/verifier-job.raw" "${RUNNER_TEMP}/verifier-job.log"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: issue-832-verifier-diagnostic
          path: ${{ runner.temp }}/verifier-job.log
          retention-days: 1
          if-no-files-found: error
