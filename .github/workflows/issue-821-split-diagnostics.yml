name: Split issue 821 diagnostics

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/issue-821-split-diagnostics.yml

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - name: Split report and normalize remaining modes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          source = Path('issue-821-diagnostics.txt').read_text(encoding='utf-8')
          matches = list(re.finditer(r'^===== (.*?) \(exit (\d+)\) =====$', source, re.MULTILINE))
          for index, match in enumerate(matches):
              start = match.end() + 1
              end = matches[index + 1].start() if index + 1 < len(matches) else len(source)
              name = re.sub(r'[^a-z0-9]+', '-', match.group(1).lower()).strip('-')
              content = f'exit={match.group(2)}\n' + source[start:end].strip() + '\n'
              Path(f'issue-821-diag-{name}.txt').write_text(content, encoding='utf-8')
          PY

          chmod -x \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs

          rm -f .github/workflows/issue-821-split-diagnostics.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Split issue 821 diagnostics and normalize modes"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
