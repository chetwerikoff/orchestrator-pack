name: issue-830-snapshot

on:
  pull_request:
    paths:
      - .github/workflows/issue-830-snapshot.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tracked repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pack exact tracked snapshot
        shell: bash
        run: |
          set -euo pipefail
          git ls-files -z | tar --null -T - -czf /tmp/orchestrator-pack-issue-830.tgz
          git ls-files > /tmp/orchestrator-pack-issue-830-files.txt

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: issue-830-repository-snapshot
          path: |
            /tmp/orchestrator-pack-issue-830.tgz
            /tmp/orchestrator-pack-issue-830-files.txt
          if-no-files-found: error
          retention-days: 1
