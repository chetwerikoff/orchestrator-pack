name: issue-839-harness-failures

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --include=dev --silent
      - name: Run combined harness regressions
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/run-vitest-with-harness.mjs run \
            scripts/ao-0-10-review-trigger.test.ts \
            scripts/harness-review-bridge.test.ts \
            scripts/harness-post-submit-pn-content-shape.test.ts \
            --reporter=json \
            --outputFile=/tmp/issue-839-harness.json
      - name: Publish failure messages only
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.tests.outcome }}
        shell: bash
        run: |
          node - <<'NODE' >/tmp/failures.txt
          const fs = require('node:fs');
          const path = '/tmp/issue-839-harness.json';
          if (!fs.existsSync(path)) {
            console.log('Vitest JSON report missing');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          for (const file of report.testResults ?? []) {
            for (const test of file.assertionResults ?? []) {
              if (test.status !== 'failed') continue;
              console.log(`FILE: ${file.name}`);
              console.log(`TEST: ${test.fullName}`);
              for (const message of test.failureMessages ?? []) console.log(message);
              console.log('---');
            }
          }
          NODE
          {
            echo '## Issue #839 combined harness regression diagnosis'
            echo
            echo "outcome=$OUTCOME"
            echo '```text'
            cat /tmp/failures.txt
            echo '```'
          } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md
