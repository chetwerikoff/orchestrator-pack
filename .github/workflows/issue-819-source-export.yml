name: issue-819-finalize

on:
  push:
    branches:
      - agent/issue-819-reachability-purge
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: issue-819-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/issue-819-reachability-purge

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Materialize reviewed implementation
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/issue-819-reachability-purge.mjs.gz.b64 | gzip -d > scripts/reachability-purge.mjs
          chmod +x scripts/reachability-purge.mjs

          python3 - <<'PY'
          from pathlib import Path

          notes = Path('docs/migration_notes.md')
          heading = '## Reachability purge precondition audit (Issue #819)'
          entry = '''

## Reachability purge precondition audit (Issue #819)

The committed reachability procedure found that the proposed autonomous-surface shim retirement is
not yet safe on the pinned `main` tree. `scripts/ao`, `scripts/git`,
`scripts/autonomous-bash-env.sh`, `scripts/autonomous-orchestrator-surface-bootstrap.sh`,
`scripts/_invoke-system-git.sh`, and `scripts/_resolve-system-git.sh` remain reachable or held by
protected test/config surfaces. In particular, the REWRITE-list
`autonomous-orchestrator-interposer.test.ts` and the live
`autonomous-orchestrator-boundary.test.ts` still execute or assert these files, while
`agent-orchestrator.yaml.example` still configures the shim PATH/bootstrap chain and is outside this
issue's allowed roots.

This audit does **not** retire the shims and does not authorize operator PATH/profile cleanup yet.
Keep the existing pack-local shim configuration until the owning predicate/test/config migration
lands. At that point, the retirement change must add the final operator step: remove local
PATH/profile references to the retired pack shims and use regular `ao` and `git` from PATH.
'''
          text = notes.read_text(encoding='utf-8')
          if heading not in text:
              notes.write_text(text.rstrip() + entry, encoding='utf-8')

          lanes = Path('scripts/vitest-ci-lanes.config.json')
          text = lanes.read_text(encoding='utf-8')
          row = '    "scripts/reachability-purge.test.ts": "light",\n'
          anchor = '    "scripts/reaction-config-messages.test.ts": "light",\n'
          if row not in text:
              if anchor not in text:
                  raise SystemExit('vitest lane anchor missing')
              text = text.replace(anchor, row + anchor, 1)
              lanes.write_text(text, encoding='utf-8')
          PY

          git rm --ignore-unmatch -- \
            scripts/fixtures/gh-pr-info-from-view/fake-gh-api.sh \
            scripts/lib/Invoke-ContractEvidenceReverify.ps1 \
            scripts/lib/scan-vitest-worker-rpc.mjs
          git rm --ignore-unmatch -- \
            .github/issue-819-reachability-purge.mjs.gz.b64 \
            .github/workflows/issue-819-source-export.yml
          git add -- \
            docs/migration_notes.md \
            scripts/reachability-purge.mjs \
            scripts/reachability-purge.config.json \
            scripts/reachability-purge.test.ts \
            scripts/vitest-ci-lanes.config.json

      - name: Regenerate and verify reachability manifest
        shell: bash
        run: |
          set -euo pipefail
          node scripts/reachability-purge.mjs --write
          git add scripts/reachability-purge.manifest.json
          node scripts/reachability-purge.mjs
          git diff --check

      - name: Run focused acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          npm ci --include=dev --ignore-scripts
          cat > vitest.issue-819.config.mjs <<'EOF'
          import { defineConfig } from 'vitest/config';
          export default defineConfig({
            test: {
              include: ['scripts/reachability-purge.test.ts'],
              fileParallelism: false,
              maxWorkers: 1,
              testTimeout: 120000,
              hookTimeout: 120000,
            },
          });
          EOF
          npx vitest run --config vitest.issue-819.config.mjs
          rm vitest.issue-819.config.mjs

      - name: Commit finalized implementation
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add fail-closed reachability purge audit for issue 819'
          git push origin HEAD:agent/issue-819-reachability-purge
