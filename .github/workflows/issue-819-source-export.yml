name: issue-819-source-export

on:
  push:
    branches:
      - agent/issue-819-reachability-purge
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Export full Git history
        shell: bash
        run: git bundle create orchestrator-pack.bundle --all
      - name: Upload repository bundle
        uses: actions/upload-artifact@v4
        with:
          name: issue-819-git-bundle
          path: orchestrator-pack.bundle
          retention-days: 1
          if-no-files-found: error
