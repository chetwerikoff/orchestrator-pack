name: Issue 857 Clause D test migration

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write
  issues: read

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Update existing cache regressions without shrink
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/pr-session-binding-cache.test.ts')
          text = path.read_text()
          replacements = [
              (
                  "const repoSlug = 'org/orchestrator-pack';\n",
                  "const repoSlug = 'org/orchestrator-pack';\nconst prUrl = (number: number) => `https://github.com/${repoSlug}/pull/${number}`;\n",
                  1,
              ),
              (
                  "{ classId: 'B', description: 'backfill with displayName present' },",
                  "{ classId: 'B', description: 'backfill with bulk prs[] present' },",
                  1,
              ),
              (
                  "{ classId: 'C', description: 'backfill with displayName absent via issue correlation' },",
                  "{ classId: 'C', description: 'backfill via branch or issue correlation' },",
                  1,
              ),
              (
                  "liveWorker('opk-a', 719, { prNumber: 88 })",
                  "liveWorker('opk-a', 719, { prs: [prUrl(88)] })",
                  2,
              ),
              (
                  "liveWorker('opk-b', 720, { prNumber: 88 })",
                  "liveWorker('opk-b', 720, { prs: [prUrl(88)] })",
                  2,
              ),
              (
                  "liveWorker('opk-stale', 501, { prNumber: 501, ownedHeadSha: 'oldhead' })",
                  "liveWorker('opk-stale', 501, { prs: [prUrl(501)], ownedHeadSha: 'oldhead' })",
                  1,
              ),
          ]
          for old, new, expected in replacements:
              actual = text.count(old)
              if actual != expected:
                  raise SystemExit(f'expected {expected} occurrences, found {actual}: {old}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
      - name: Generate wrapper-style declaration iteration
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          export BASELINE_SHA="$(git rev-parse HEAD)"
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          body = subprocess.check_output(
              ['gh', 'issue', 'view', '857', '--repo', os.environ['REPOSITORY'], '--json', 'body', '--jq', '.body'],
              text=True,
          )
          denylist = []
          allowed_roots = []
          saw_allowed = False
          pattern = re.compile(r'```(denylist|allowed-roots)\s*\r?\n([\s\S]*?)```', re.I)
          for label, block in pattern.findall(body):
              lines = [line.strip() for line in block.splitlines() if line.strip() and not line.strip().startswith('#')]
              if label.lower() == 'denylist':
                  denylist.extend(lines)
              else:
                  saw_allowed = True
                  allowed_roots.extend(lines)
          if not denylist:
              raise SystemExit('Issue #857 denylist fence was not found')
          if not saw_allowed:
              raise SystemExit('Issue #857 allowed-roots fence was not found')

          previous = json.loads(Path('docs/declarations/857.chatgpt-pr-896.json').read_text())
          declared_paths = sorted(set(previous['declared_paths']) | {
              'scripts/pr-session-binding-cache.test.ts',
              'scripts/session-pr-binding-resolver.test.ts',
          })
          canonical_payload = {
              'declared_paths': sorted(declared_paths),
              'declared_globs': [],
              'issue_denylist': sorted(set(denylist)),
              'issue_allowed_roots': sorted(set(allowed_roots)),
          }
          canonical = json.dumps(canonical_payload, separators=(',', ':'), ensure_ascii=False)
          active_scope_hash = 'sha256:' + hashlib.sha256(canonical.encode('utf-8')).hexdigest()
          snapshot = {
              'issue_number': 857,
              'iteration_id': 'chatgpt-pr-896-r2',
              'iteration_id_source': 'wrapper_generated',
              'supersedes': 'chatgpt-pr-896',
              'created_at': datetime.now(timezone.utc).isoformat(timespec='milliseconds').replace('+00:00', 'Z'),
              'baseline': {
                  'commit_sha': os.environ['BASELINE_SHA'],
                  'worktree_dirty': False,
                  'active_scope_hash': active_scope_hash,
              },
              'declared_paths': declared_paths,
              'declared_globs': [],
              'amendments': [],
          }
          Path('docs/declarations/857.chatgpt-pr-896-r2.json').write_text(json.dumps(snapshot, indent=2) + '\n')
          print(active_scope_hash)
          PY
      - name: Validate TypeScript and migrated suites
        shell: bash
        run: |
          set -euo pipefail
          npx tsc --project tsconfig.base.json --noEmit
          npx vitest run scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts
          node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs
          git diff --check
      - name: Commit migrated tests and declaration
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts docs/declarations/857.chatgpt-pr-896-r2.json
          git commit -m 'Migrate existing binding regressions to bulk prs contract'
          git push origin HEAD:agent/issue-857-binding-contract-v2
