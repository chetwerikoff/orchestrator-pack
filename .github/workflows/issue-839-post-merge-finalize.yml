name: issue-839-post-merge-finalize

on:
  pull_request:
    types: [synchronize]
    branches: [main]

concurrency:
  group: issue-839-post-merge-finalize
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finalize:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev --silent
      - name: Resolve current-main policy overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          python3 - <<'PY'
          from pathlib import Path
          path = Path('AGENTS.md')
          text = path.read_text(encoding='utf-8')
          old = 'an upstream contribution plan.'
          new = 'an upstream contribution plan. **TS-first:** New `scripts/**` files MUST use TypeScript/Node. PowerShell is frozen during migration; new `.ps1` needs explicit task-spec justification that TS/Node is unsuitable. Existing `.ps1` and wrappers/shims stay with #830/#831.'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'AGENTS migration marker count={text.count(old)}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git show origin/main:scripts/reachability-purge.test.ts > scripts/reachability-purge.test.ts
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/reachability-purge.test.ts')
          text = path.read_text(encoding='utf-8')
          old = "['zero-reachability', 'superseded', 'backup', 'issue-821-retired']"
          new = "['zero-reachability', 'superseded', 'backup', 'issue-821-retired', 'issue-839-retired']"
          if text.count(old) != 1:
              raise SystemExit(f'reachability reason marker count={text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/issue-839-post-merge-finalize.yml
          git add AGENTS.md scripts/reachability-purge.test.ts
          git commit -m 'Resolve current-main policy overlaps for issue 839'
      - name: Verify base TypeScript contracts
        shell: bash
        run: |
          set -euo pipefail
          npx tsc --project tsconfig.base.json --noEmit
          npm run typecheck:foundation
          npm run lint:foundation
          npm run test:foundation
      - name: Run focused regressions
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node scripts/run-vitest-with-harness.mjs run \
            tests/agents-md-relocation.test.ts \
            scripts/reachability-purge.test.ts \
            scripts/review-delivery.test.ts \
            scripts/review-producer-contract-mapping.test.ts 2>&1 | tee /tmp/issue-839-focused.log
      - name: Publish focused failure
        if: steps.focused.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tail -n 160 /tmp/issue-839-focused.log >/tmp/issue-839-focused-tail.log
          {
            echo '## Issue #839 focused regression failure'
            echo '```text'
            cat /tmp/issue-839-focused-tail.log
            echo '```'
          } >/tmp/report.md
          gh api --method POST repos/chetwerikoff/orchestrator-pack/issues/845/comments --field body=@/tmp/report.md
          exit 1
      - name: Verify AGENTS and full light lane
        shell: pwsh
        run: |
          ./scripts/check-agent-rules-line-budget.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/run-vitest-light-lane.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Verify full pack and Pester
        shell: pwsh
        run: |
          ./scripts/verify.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/test-all.ps1 -SkipNpm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Verify strict self-architect
        shell: pwsh
        run: ./scripts/lint-self-architect.ps1 -Strict -BaseRef origin/main -HeadRef HEAD
      - name: Push verified candidate
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report other failure
        if: failure() && steps.focused.outcome != 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method POST repos/chetwerikoff/orchestrator-pack/issues/845/comments \
            --field body="Issue #839 post-merge finalizer failed at a named step: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
