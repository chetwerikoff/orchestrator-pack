name: issue-839-post-merge-finalize

on:
  pull_request:
    types: [synchronize, labeled]
    branches: [main]

concurrency:
  group: issue-839-post-merge-finalize
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finalize:
    if: github.event.pull_request.number == 845 && (github.event.action == 'synchronize' || github.event.label.name == 'in_progress')
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev --silent
      - name: Resolve current-main policy overlaps
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main

          python3 - <<'PY'
          from pathlib import Path
          path = Path('AGENTS.md')
          text = path.read_text(encoding='utf-8')
          old = 'an upstream contribution plan.'
          new = 'an upstream contribution plan. **TS-first:** New `scripts/**` files MUST use TypeScript/Node. PowerShell is frozen during migration; new `.ps1` needs explicit task-spec justification that TS/Node is unsuitable. Existing `.ps1` and wrappers/shims stay with #830/#831.'
          if new not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'AGENTS migration marker count={text.count(old)}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          git show origin/main:scripts/reachability-purge.test.ts > scripts/reachability-purge.test.ts
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/reachability-purge.test.ts')
          text = path.read_text(encoding='utf-8')
          old = "['zero-reachability', 'superseded', 'backup', 'issue-821-retired']"
          new = "['zero-reachability', 'superseded', 'backup', 'issue-821-retired', 'issue-839-retired']"
          if text.count(old) != 1:
              raise SystemExit(f'reachability reason marker count={text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          git show origin/main:scripts/toolchain/powershell-child-tests.json > scripts/toolchain/powershell-child-tests.json
          git show origin/main:scripts/toolchain/raw-child-process-baseline.json > scripts/toolchain/raw-child-process-baseline.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('scripts/toolchain/powershell-child-tests.json')
          doc = json.loads(path.read_text(encoding='utf-8'))
          rows = doc.get('entries')
          if not isinstance(rows, list):
              raise SystemExit('powershell-child-tests.json: entries array missing')
          stale_paths = {
              'scripts/harness-review-bridge.test.ts',
              'tests/harness-pretrigger-config-read.test.ts',
          }
          filtered = [row for row in rows if row.get('path') not in stale_paths]
          if len(rows) - len(filtered) != 2:
              raise SystemExit(f'powershell-child baseline removal count={len(rows) - len(filtered)}')
          doc['entries'] = filtered
          path.write_text(json.dumps(doc, separators=(',', ':')) + '\n', encoding='utf-8')

          path = Path('scripts/toolchain/raw-child-process-baseline.json')
          doc = json.loads(path.read_text(encoding='utf-8'))
          rows = doc.get('entries')
          if not isinstance(rows, list):
              raise SystemExit('raw-child-process-baseline.json: entries array missing')
          stale = {
              ('scripts/harness-review-bridge.test.ts', 'execFileSync', 'b4b9ea0960343b046042'),
              ('tests/harness-pretrigger-config-read.test.ts', 'execFileSync', '8565aaf3afe4b6c82770'),
              ('tests/harness-pretrigger-config-read.test.ts', 'execFileSync', '5b5ff4cdb460a3994dcd'),
          }
          filtered = [
              row for row in rows
              if (row.get('path'), row.get('api'), row.get('fingerprint')) not in stale
          ]
          if len(rows) - len(filtered) != 3:
              raise SystemExit(f'raw-child baseline removal count={len(rows) - len(filtered)}')
          doc['entries'] = filtered
          path.write_text(json.dumps(doc, separators=(',', ':')) + '\n', encoding='utf-8')
          PY

          git rm .github/workflows/issue-839-post-merge-finalize.yml
          git add \
            AGENTS.md \
            scripts/reachability-purge.test.ts \
            scripts/toolchain/powershell-child-tests.json \
            scripts/toolchain/raw-child-process-baseline.json
          git commit -m 'Resolve current-main policy overlaps for issue 839'

      - name: Verify repository TypeScript
        run: npx tsc --project tsconfig.base.json --noEmit
      - name: Verify foundation typecheck
        run: npm run typecheck:foundation
      - name: Verify foundation policy lint
        run: npm run lint:foundation
      - name: Verify PowerShell child baseline
        run: npm run check:pwsh-test-growth
      - name: Verify foundation tests
        run: npm run test:foundation
      - name: Run focused regressions
        run: |
          node scripts/run-vitest-with-harness.mjs run \
            tests/agents-md-relocation.test.ts \
            scripts/reachability-purge.test.ts \
            scripts/review-delivery.test.ts \
            scripts/review-producer-contract-mapping.test.ts

      - name: Verify AGENTS size
        shell: pwsh
        run: ./scripts/check-agent-rules-line-budget.ps1
      - name: Run full light lane
        id: light
        continue-on-error: true
        shell: pwsh
        run: |
          ./scripts/run-vitest-light-lane.ps1 *>&1 | Tee-Object -FilePath /tmp/issue-839-light.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Publish light lane failure
        if: steps.light.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          node - <<'NODE' >/tmp/issue-839-light-failures.txt
          const fs = require('node:fs');
          const path = '.vitest-runtime-report-light.json';
          let count = 0;
          if (fs.existsSync(path)) {
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            for (const file of report.testResults ?? []) {
              for (const test of file.assertionResults ?? []) {
                if (test.status !== 'failed') continue;
                count += 1;
                console.log(`FILE: ${file.name}`);
                console.log(`TEST: ${test.fullName}`);
                for (const message of test.failureMessages ?? []) console.log(message);
                console.log('---');
              }
            }
          }
          if (count === 0) {
            const text = fs.existsSync('/tmp/issue-839-light.log')
              ? fs.readFileSync('/tmp/issue-839-light.log', 'utf8')
              : 'light lane log missing';
            console.log(text.split(/\r?\n/).slice(-160).join('\n'));
          }
          NODE
          {
            echo '## Issue #839 light lane failure'
            echo '```text'
            cat /tmp/issue-839-light-failures.txt
            echo '```'
          } >/tmp/report.md
          gh api --method PATCH repos/chetwerikoff/orchestrator-pack/issues/comments/4983724500 --field body=@/tmp/report.md
          exit 1

      - name: Verify full pack and Pester
        shell: pwsh
        run: |
          ./scripts/verify.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./scripts/test-all.ps1 -SkipNpm
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Verify strict self-architect
        shell: pwsh
        run: ./scripts/lint-self-architect.ps1 -Strict -BaseRef origin/main -HeadRef HEAD
      - name: Push verified candidate
        shell: bash
        run: git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report other failure
        if: failure() && steps.light.outcome != 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api --method POST repos/chetwerikoff/orchestrator-pack/issues/845/comments \
            --field body="Issue #839 post-merge finalizer failed at a named step: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
