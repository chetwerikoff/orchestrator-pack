name: issue-839-cleanup

on:
  push:
    branches:
      - issue-839-pack-review-runner-v2

permissions:
  contents: write

concurrency:
  group: issue-839-cleanup
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - name: Normalize final diff
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:scripts/toolchain/powershell-child-tests.json > /tmp/powershell-child-tests.json
          python3 - <<'PY'
          from pathlib import Path
          source = Path('/tmp/powershell-child-tests.json').read_text(encoding='utf-8')
          lines = source.splitlines(keepends=True)
          kept = [line for line in lines if '"path":"scripts/harness-review-bridge.test.ts"' not in line]
          if len(lines) - len(kept) != 1:
              raise SystemExit('expected exactly one harness-review-bridge baseline line in main')
          Path('scripts/toolchain/powershell-child-tests.json').write_text(''.join(kept), encoding='utf-8')
          PY

          for path in \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs; do
            chmod 0644 "$path"
            git update-index --chmod=-x "$path"
          done

          rm -f \
            .github/workflows/issue-839-cleanup.yml \
            .github/workflows/issue-839-global-baselines-fix.yml

          if grep -q '"path": "scripts/ao-review.ps1"' scripts/json-producers/wave-b-inventory.json; then
            echo 'retired ao-review inventory row remains' >&2
            exit 1
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Normalize issue 839 inventories and file modes'
          git push origin HEAD:issue-839-pack-review-runner-v2
