           function Get-WorkerStatusWriterGenerationVector {
          @@ -536,10 +511,7 @@ function Write-WorkerStatusRow {
              }
          
              $prNumber = 0
          -    if ($null -ne $session.prNumber) {
          -        $prNumber = [int]$session.prNumber
