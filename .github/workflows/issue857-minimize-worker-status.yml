name: Issue 857 minimize worker-status

on:
  push:
    branches:
      - agent/issue-857-binding-contract-v2
    paths:
      - .github/workflows/issue857-minimize-worker-status.yml
  pull_request:
    types: [synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  minimize:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 0
      - name: Restore baseline and apply Clause D patch
        shell: bash
        run: |
          set -euo pipefail
          git checkout 6dd428a9f70d82231388173ccb6eaa5f0a47bce5 -- scripts/lib/worker-status-store.mjs scripts/lib/WorkerStatusStore.ps1
          git apply <<'PATCH'
          diff --git a/scripts/lib/worker-status-store.mjs b/scripts/lib/worker-status-store.mjs
          --- a/scripts/lib/worker-status-store.mjs
          +++ b/scripts/lib/worker-status-store.mjs
          @@ -383,7 +383,7 @@ export function resolveWorkerStatusSessionBinding(input = {}) {
             const session = input.session ?? {};
             const sessionId = sessionIdOf(session);
             const openPrs = toArray(input.openPrs ?? input.githubSnapshot?.openPrs);
          -  const explicitPr = Number(input.prNumber ?? session.prNumber ?? 0);
          +  const explicitPr = Number(input.prNumber ?? 0);
             const headHint = normalizeSha(input.headSha ?? input.githubHead ?? session.ownedHeadSha ?? session.headRefOid);
             if (explicitPr > 0) {
               const prRow = openPrs.find((pr) => Number(pr?.number ?? 0) === explicitPr);
          @@ -412,9 +412,6 @@ export function resolveWorkerStatusSessionBinding(input = {}) {
               return workerStatusBindingFailure('binding_cache_read_failed', headHint);
             }
          
          -  const sessionDetailsById = input.sessionDetail
          -    ? { [sessionId]: input.sessionDetail }
          -    : {};
             const isLive = workerStatusBindingIsLive(input);
             const matches = [];
             for (const pr of openPrs) {
          @@ -430,7 +427,6 @@ export function resolveWorkerStatusSessionBinding(input = {}) {
                   headSha: normalizeSha(pr?.headRefOid) || headHint,
                   sessions: [session],
                   openPrs,
          -        sessionDetailsById,
                   nowMs: Number(input.nowMs ?? Date.now()),
                   writeBackfill: false,
                   isLive,
          @@ -811,6 +807,10 @@ runStdinJsonCli('scripts/lib/worker-status-store.mjs', {
               const payload = readStdinJson();
               return evaluateWorkerStatusKillSwitch(payload.env ?? process.env);
             },
          +  resolveBindingCachePath: () => {
          +    const payload = readStdinJson();
          +    return { path: resolvePrSessionBindingCachePath(payload.env ?? process.env) };
          +  },
             resolveSessionBinding: () => resolveWorkerStatusSessionBinding(readStdinJson()),
             testSiblingReadiness: () => {
               const payload = readStdinJson();
          diff --git a/scripts/lib/WorkerStatusStore.ps1 b/scripts/lib/WorkerStatusStore.ps1
          --- a/scripts/lib/WorkerStatusStore.ps1
          +++ b/scripts/lib/WorkerStatusStore.ps1
          @@ -122,12 +122,6 @@ function Get-WorkerStatusTrackedPrNumbers {
          
              $tracked = @()
              foreach ($session in @($Sessions)) {
          -        if ($null -ne $session.prNumber) {
          -            $pr = 0
          -            if ([int]::TryParse([string]$session.prNumber, [ref]$pr) -and $pr -gt 0) {
          -                $tracked += $pr
          -            }
          -        }
