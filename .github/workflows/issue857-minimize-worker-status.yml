name: Issue 857 minimize worker-status

on:
  push:
    branches:
      - agent/issue-857-binding-contract-v2

permissions:
  contents: write

jobs:
  minimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 2
      - name: Apply verified Clause D patch
        shell: bash
        run: |
          set -euo pipefail
          git show HEAD^:.github/workflows/issue857-minimize-worker-status.yml > /tmp/issue857-previous.yml
          python - <<'PY'
          from pathlib import Path
          text = Path('/tmp/issue857-previous.yml').read_text()
          marker = "          git apply <<'PATCH'\n"
          start = text.index(marker) + len(marker)
          end = text.index("          PATCH\n", start)
          lines = text[start:end].splitlines()
          patch = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/issue857-minimal.patch').write_text(patch)
          PY
          git checkout 6dd428a9f70d82231388173ccb6eaa5f0a47bce5 -- scripts/lib/worker-status-store.mjs scripts/lib/WorkerStatusStore.ps1
          git apply /tmp/issue857-minimal.patch
          node --check scripts/lib/worker-status-store.mjs
          ! grep -Eq '\bsession\.prNumber\b|\bsession\.displayName\b' scripts/lib/worker-status-store.mjs
          ! grep -Eiq '\$(session|Session)\.(prNumber|displayName)\b' scripts/lib/WorkerStatusStore.ps1
          grep -q 'targetPrFailClosedBelongsToSession' scripts/lib/worker-status-store.mjs
          grep -q 'bindingCacheGeneration: Number(store.generation' scripts/lib/worker-status-store.mjs
          grep -q 'resolveBindingCachePath' scripts/lib/worker-status-store.mjs
          grep -q 'resolveBindingCachePath' scripts/lib/WorkerStatusStore.ps1
          test "$(git hash-object scripts/lib/WorkerStatusStore.ps1)" = "78eaa738c21f9426cf351929d432fb609b51669e"
          git diff --check
          rm -f .github/workflows/issue857-minimize-worker-status.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Minimize worker-status Clause D wiring"
          git push origin HEAD:agent/issue-857-binding-contract-v2
