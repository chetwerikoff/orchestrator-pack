name: Issue 857 minimize worker-status

on:
  push:
    branches:
      - agent/issue-857-binding-contract-v2
    paths:
      - .github/workflows/issue857-minimize-worker-status.yml
  pull_request:
    types: [synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  minimize:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 1
      - name: Restore baseline and apply exact Clause D replacements
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 6dd428a9f70d82231388173ccb6eaa5f0a47bce5
          git checkout 6dd428a9f70d82231388173ccb6eaa5f0a47bce5 -- scripts/lib/worker-status-store.mjs scripts/lib/WorkerStatusStore.ps1
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:80]!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          js = Path('scripts/lib/worker-status-store.mjs')
          replace_once(js,
              '  const explicitPr = Number(input.prNumber ?? session.prNumber ?? 0);',
              '  const explicitPr = Number(input.prNumber ?? 0);')
          replace_once(js,
              "  const sessionDetailsById = input.sessionDetail\n    ? { [sessionId]: input.sessionDetail }\n    : {};\n",
              '')
          replace_once(js, '        sessionDetailsById,\n', '')
          replace_once(js,
              "  resolveSessionBinding: () => resolveWorkerStatusSessionBinding(readStdinJson()),",
              "  resolveBindingCachePath: () => {\n    const payload = readStdinJson();\n    return { path: resolvePrSessionBindingCachePath(payload.env ?? process.env) };\n  },\n  resolveSessionBinding: () => resolveWorkerStatusSessionBinding(readStdinJson()),")

          ps = Path('scripts/lib/WorkerStatusStore.ps1')
          replace_once(ps,
              "        if ($null -ne $session.prNumber) {\n            $pr = 0\n            if ([int]::TryParse([string]$session.prNumber, [ref]$pr) -and $pr -gt 0) {\n                $tracked += $pr\n            }\n        }\n",
              '')
          replace_once(ps,
              "        if ($null -ne $session.prNumber) {\n            $pr = 0\n            if ([int]::TryParse([string]$session.prNumber, [ref]$pr) -and $pr -gt 0) {\n                continue\n            }\n        }\n",
              "        $role = [string]$session.role\n        if ($role -and $role -notin @('worker', 'coding')) { continue }\n")
          replace_once(ps,
              "        if ($hasReportPr) { continue }\n        if ($null -ne $session.issueId -or $null -ne $session.issueNumber) {\n            return $true\n        }\n        $displayName = [string]$session.displayName\n        if ($displayName -and $displayName -match '^\\d+$') {\n            return $true\n        }\n",
              "        if (-not $hasReportPr) {\n            return $true\n        }\n")
          replace_once(ps,
              "    if (-not $PrNumber) {\n        if ($null -ne $Session.prNumber) {\n            $PrNumber = [int]$Session.prNumber\n        }\n        else {\n            foreach ($report in @($Session.reports)) {\n                if ($null -eq $report) { continue }\n                $reportPr = 0\n                if ([int]::TryParse([string]$report.prNumber, [ref]$reportPr) -and $reportPr -gt 0) {\n                    $PrNumber = $reportPr\n                    break\n                }\n            }\n        }\n    }\n",
              "    if (-not $PrNumber) {\n        foreach ($report in @($Session.reports)) {\n            if ($null -eq $report) { continue }\n            $reportPr = 0\n            if ([int]::TryParse([string]$report.prNumber, [ref]$reportPr) -and $reportPr -gt 0) {\n                $PrNumber = $reportPr\n                break\n            }\n        }\n    }\n")
          replace_once(ps,
              "function Get-WorkerStatusPrSessionBindingCachePath {\n    if ($env:AO_PR_SESSION_BINDING_CACHE) {\n        return [string]$env:AO_PR_SESSION_BINDING_CACHE\n    }\n    if ($env:AO_REPORT_STATE_SEED_STATE) {\n        $seedPath = [string]$env:AO_REPORT_STATE_SEED_STATE\n        $parent = Split-Path -Parent $seedPath\n        if (-not $parent) {\n            return 'pr-session-binding-cache.json'\n        }\n        return (Join-Path $parent 'pr-session-binding-cache.json')\n    }\n    return (Join-Path $HOME '.local/state/orchestrator-pack-wake-supervisor/pr-session-binding-cache.json')\n}\n",
              "function Get-WorkerStatusPrSessionBindingCachePath {\n    $result = Invoke-WorkerStatusStoreCli -Subcommand 'resolveBindingCachePath' -Payload @{\n        env = @{\n            AO_PR_SESSION_BINDING_CACHE = $env:AO_PR_SESSION_BINDING_CACHE\n            AO_REPORT_STATE_SEED_STATE  = $env:AO_REPORT_STATE_SEED_STATE\n        }\n    }\n    return [string]$result.path\n}\n")
          replace_once(ps,
              "    $prNumber = 0\n    if ($null -ne $session.prNumber) {\n        $prNumber = [int]$session.prNumber\n    }\n    elseif ($report -and $null -ne $report.prNumber) {\n        $prNumber = [int]$report.prNumber\n    }\n",
              "    $prNumber = 0\n    if ($report -and $null -ne $report.prNumber) {\n        $prNumber = [int]$report.prNumber\n    }\n")
          PY
          node --check scripts/lib/worker-status-store.mjs
          ! grep -Eq '\bsession\.prNumber\b|\bsession\.displayName\b' scripts/lib/worker-status-store.mjs
          ! grep -Eiq '\$(session|Session)\.(prNumber|displayName)\b' scripts/lib/WorkerStatusStore.ps1
          grep -q 'targetPrFailClosedBelongsToSession' scripts/lib/worker-status-store.mjs
          grep -q 'bindingCacheGeneration: Number(store.generation' scripts/lib/worker-status-store.mjs
          grep -q 'resolveBindingCachePath' scripts/lib/worker-status-store.mjs
          grep -q 'resolveBindingCachePath' scripts/lib/WorkerStatusStore.ps1
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/lib/worker-status-store.mjs scripts/lib/WorkerStatusStore.ps1
          git commit -m "Minimize worker-status Clause D wiring"
          git push origin HEAD:agent/issue-857-binding-contract-v2
