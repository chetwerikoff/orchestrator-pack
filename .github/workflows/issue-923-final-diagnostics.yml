name: issue-923-final-fix-helper

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact compatibility fixes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const bindingTest = 'scripts/session-pr-binding-resolver.test.ts';
          let testText = fs.readFileSync(bindingTest, 'utf8');
          const replacements = new Map([
            ["'docs/review-finding-delivery-confirm.mjs'", "'scripts/pr2-foundation/terminalized/review-finding-delivery-confirm.ts'"],
            ["'docs/review-wake-trigger.mjs'", "'scripts/pr2-foundation/terminalized/review-wake-trigger.ts'"],
          ]);
          for (const [before, after] of replacements) {
            if (!testText.includes(before)) throw new Error(`stale path not found: ${before}`);
            testText = testText.replaceAll(before, after);
          }
          fs.writeFileSync(bindingTest, testText, 'utf8');

          const wrapper = 'scripts/lib/WorkerReportStore.ps1';
          let wrapperText = fs.readFileSync(wrapper, 'utf8');
          const oldBlock = `function Invoke-WorkerReportStoreCli {
    param(
        [string]$Subcommand,
        [hashtable]$Payload
    )

    return Invoke-MechanicalNodeFilterCli -FilterCliPath $Script:WorkerReportStoreCli \\`
        -Subcommand $Subcommand -Payload $Payload -Label 'worker-report-store' -JsonDepth 30
}`;
          const newBlock = `function Invoke-WorkerReportStoreCli {
    param(
        [string]$Subcommand,
        [hashtable]$Payload
    )

    $json = $Payload | ConvertTo-Json -Depth 30 -Compress
    $inputBytes = [System.Text.Encoding]::UTF8.GetByteCount($json)
    if ($inputBytes -gt $Script:MechanicalTransportEnvelopeBytes) {
        throw "worker-report-store.ts $Subcommand payload exceeds transport envelope ($inputBytes > $($Script:MechanicalTransportEnvelopeBytes))"
    }

    $tempPaths = New-MechanicalTransportTempPaths
    $inputPath = $tempPaths.InputPath
    $outputPath = $tempPaths.OutputPath
    $repoRoot = Split-Path -Parent (Split-Path -Parent $PSScriptRoot)
    $launcher = Join-Path $repoRoot 'scripts/lib/Invoke-TypeScriptCli.ts'
    try {
        Write-MechanicalTransportPrivateFile -Path $inputPath -Content $json
        $node = Get-Command node -CommandType Application -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $node) {
            throw 'OPK_NODE_RUNTIME_MISSING: Node.js 22.x is required to run worker-report-store.ts.'
        }
        $nodeArgs = @(
            '--experimental-strip-types',
            $launcher,
            '--repo-root', $repoRoot,
            '--script', $Script:WorkerReportStoreCli,
            '--',
            $Subcommand,
            '--input-file', $inputPath,
            '--output-file', $outputPath
        )
        $stderr = & $node.Source @nodeArgs 2>&1
        if ($LASTEXITCODE -ne 0) {
            throw "worker-report-store.ts $Subcommand exited $LASTEXITCODE: $stderr"
        }
        return Read-MechanicalNodeFilterCliOutput -OutputPath $outputPath -Label 'worker-report-store' -Subcommand $Subcommand
    }
    finally {
        Remove-MechanicalTransportTempPaths -Paths @($inputPath, $outputPath)
    }
}`;
          if (!wrapperText.includes(oldBlock)) throw new Error('WorkerReportStore CLI block not found');
          wrapperText = wrapperText.replace(oldBlock, newBlock);
          fs.writeFileSync(wrapper, wrapperText, 'utf8');

          fs.rmSync('.github/workflows/issue-923-final-diagnostics.yml');
          NODE
      - name: Commit fixes and self-removal
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: complete terminalized runtime compatibility"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
