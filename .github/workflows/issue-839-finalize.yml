name: issue-839-finalize
# Single active task workflow; connector removes it after the verified commit.

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-839-finalize-845
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.number == 845
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-839-pack-review-runner-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - name: Apply verified cutover patch
        shell: bash
        run: |
          set -euo pipefail
          awk 'BEGIN{take=0} /python3 - <<.PY./{take=1; next} take && /^          PY$/{exit} take{sub(/^          /,""); print}' scripts/issue-839-pr-apply.yml > /tmp/apply.py
          python3 /tmp/apply.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/toolchain/raw-child-process-baseline.json')
          text = path.read_text(encoding='utf-8')
          stale = '    {"path":"scripts/harness-review-bridge.test.ts","api":"execFileSync","fingerprint":"b4b9ea0960343b046042","ordinal":1,"justification":"Pre-existing direct child-process call grandfathered by Issue #800; migrate it to the sanctioned kernel when its consumer is ported."},\n'
          if text.count(stale) != 1:
              raise SystemExit('expected exactly one stale harness-review-bridge raw-process baseline entry')
          path.write_text(text.replace(stale, ''), encoding='utf-8')
          PY
      - name: TypeScript typecheck
        run: npm run typecheck:foundation
      - name: TypeScript policy lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint:foundation 2>&1 | tee /tmp/issue-839-lint.log
      - name: Review reconcile gate
        shell: pwsh
        run: ./scripts/check-review-trigger-reconcile.ps1
      - name: Review idempotency gate
        shell: pwsh
        run: ./scripts/check-orchestrator-review-idempotency.ps1
      - name: Review head coverage gate
        shell: pwsh
        run: ./scripts/check-orchestrator-review-head-coverage.ps1
      - name: Runner regression including timeout
        shell: bash
        run: node scripts/run-vitest-with-harness.mjs run scripts/ao-0-10-review-trigger.test.ts
      - name: Commit final scoped tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/issue-839-pr-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Complete pack-owned review runner cutover'
          git push origin HEAD:issue-839-pack-review-runner-v2
      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body 'Issue #839 finalized: TypeScript checks and three static gates passed; the runner suite including timeout regression passed. The other seven required regression files were already green in the isolated matrix run.'
      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '## Issue #839 finalize failure'
            echo
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo '```text'
            cat /tmp/issue-839-lint.log 2>/dev/null || echo 'failure occurred outside the lint step'
            echo '```'
          } >/tmp/issue-839-failure.md
          gh pr comment 845 --repo chetwerikoff/orchestrator-pack --body-file /tmp/issue-839-failure.md
