name: issue-912-compact-pr-file-pages

on:
  push:
    branches:
      - diag/issue-908-clean-pipeline

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/issue-912-compact-pr-file-pages
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Implement compact fail-closed page loop
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          ps_path = Path('scripts/pr-scope-check.ps1')
          text = ps_path.read_text()
          start = text.index('function Get-PrChangedPaths {')
          end = text.index('$prPaths = @(Get-PrChangedPaths', start)
          replacement = r'''function Get-PrChangedPaths {
              param(
                  [string]$Repository,
                  [int]$PrNumber,
                  [string]$WorkingDirectory
              )

              $pageSize = 100
              $maxPages = 30
              $page = 1
              $paths = [System.Collections.Generic.List[string]]::new()

              while ($true) {
                  $endpoint = "repos/$Repository/pulls/$PrNumber/files?per_page=$pageSize&page=$page"
                  $filesRead = Invoke-GhSignalJsonCommand `
                      -Arguments @('api', $endpoint, '--jq', '[.[].filename]') `
                      -ExpectedRoot 'array' `
                      -WorkingDirectory $WorkingDirectory
                  if (-not $filesRead.ok) {
                      Write-Error "failed to enumerate PR files page $page for PR #${PrNumber}: $(Format-GhSignalFailureDetail -Result $filesRead)"
                  }

                  $pagePaths = @($filesRead.value)
                  foreach ($filenameValue in $pagePaths) {
                      $filename = [string]$filenameValue
                      if ([string]::IsNullOrWhiteSpace($filename)) {
                          Write-Error "PR files response contained an entry without filename for PR #$PrNumber on page $page"
                      }
                      $paths.Add($filename)
                  }

                  if ($pagePaths.Count -lt $pageSize) {
                      break
                  }
                  if ($page -ge $maxPages) {
                      Write-Error "PR files response reached the 3000-file API ceiling for PR #$PrNumber; refusing a possibly truncated scope"
                  }
                  $page += 1
              }

              return @($paths)
          }

          '''
          ps_path.write_text(text[:start] + replacement + text[end:])

          test_path = Path('scripts/pr-scope-check.test.ts')
          test = test_path.read_text()
          old = '''  it('enumerates all PR file pages and fails closed on malformed entries', () => {
              const ps1 = readFileSync(join('scripts', 'pr-scope-check.ps1'), 'utf8');
              expect(ps1).not.toContain('gh pr diff');
              expect(ps1).toContain("pulls/$PrNumber/files?per_page=100");
              expect(ps1).toContain("'--paginate'");
              expect(ps1).toContain('foreach ($entry in @($filesRead.value))');
              expect(ps1).toContain('$paths.Add($filename)');
              expect(ps1).toContain('if (-not $filesRead.ok)');
              expect(ps1).toContain('Format-GhSignalFailureDetail -Result $filesRead');
              expect(ps1).toContain('[string]::IsNullOrWhiteSpace($filename)');
              expect(ps1).toContain('entry without filename');
            });
          '''
          new = '''  it('enumerates compact filename-only pages and fails closed at every boundary', () => {
              const ps1 = readFileSync(join('scripts', 'pr-scope-check.ps1'), 'utf8');
              expect(ps1).not.toContain('gh pr diff');
              expect(ps1).not.toContain("'--paginate'");
              expect(ps1).toContain('files?per_page=$pageSize&page=$page');
              expect(ps1).toContain("'--jq', '[.[].filename]'");
              expect(ps1).toContain("-ExpectedRoot 'array'");
              expect(ps1).toContain('$pagePaths = @($filesRead.value)');
              expect(ps1).toContain('if ($pagePaths.Count -lt $pageSize)');
              expect(ps1).toContain('$page += 1');
              expect(ps1).toContain('$maxPages = 30');
              expect(ps1).toContain('3000-file API ceiling');
              expect(ps1).toContain('if (-not $filesRead.ok)');
              expect(ps1).toContain('Format-GhSignalFailureDetail -Result $filesRead');
              expect(ps1).toContain('[string]::IsNullOrWhiteSpace($filename)');
              expect(ps1).toContain('entry without filename');
            });
          '''
          if old not in test:
              raise SystemExit('scope pagination regression block drifted')
          test_path.write_text(test.replace(old, new, 1))
          PY

          gh api "repos/${GITHUB_REPOSITORY}/issues/912" --jq .body > /tmp/issue-912-body.md
          node --experimental-strip-types --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { readFileSync, writeFileSync } from 'node:fs';
          import { parseIssueBody } from './plugins/_shared/lib/issue_parser.ts';

          const declaredPaths = ['scripts/pr-scope-check.ps1', 'scripts/pr-scope-check.test.ts'];
          const constraints = parseIssueBody(readFileSync('/tmp/issue-912-body.md', 'utf8'));
          const payload = {
            declared_paths: declaredPaths,
            declared_globs: [],
            issue_denylist: [...constraints.denylist].sort(),
          };
          if (constraints.allowed_roots !== undefined) payload.issue_allowed_roots = [...constraints.allowed_roots].sort();
          const activeScopeHash = `sha256:${createHash('sha256').update(JSON.stringify(payload), 'utf8').digest('hex')}`;
          const snapshot = {
            issue_number: 912,
            iteration_id: 'compact-filename-pages',
            iteration_id_source: 'wrapper_generated',
            supersedes: null,
            created_at: new Date().toISOString(),
            baseline: {
              commit_sha: '27166b6b3d9bf8c887514c638981e26a5e3a6a43',
              worktree_dirty: false,
              active_scope_hash: activeScopeHash,
            },
            declared_paths: declaredPaths,
            declared_globs: [],
            amendments: [],
          };
          writeFileSync('docs/declarations/912.compact-filename-pages.json', `${JSON.stringify(snapshot, null, 2)}\n`);
          NODE

      - name: Validate compact pagination
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node scripts/run-vitest-with-harness.mjs run scripts/pr-scope-check.test.ts
          npm run typecheck:foundation
          npm run lint:foundation
          pwsh -NoProfile -Command "[void][scriptblock]::Create((Get-Content -LiteralPath './scripts/pr-scope-check.ps1' -Raw))"
          gh api 'repos/chetwerikoff/orchestrator-pack/pulls/907/files?per_page=100&page=1' --jq '[.[].filename]' > /tmp/page1.json
          gh api 'repos/chetwerikoff/orchestrator-pack/pulls/907/files?per_page=100&page=4' --jq '[.[].filename]' > /tmp/page4.json
          jq -e 'type == "array" and length == 100 and all(.[]; type == "string" and length > 0)' /tmp/page1.json
          jq -e 'type == "array" and length > 0 and length < 100 and all(.[]; type == "string" and length > 0)' /tmp/page4.json
          pwsh -NoProfile -File ./scripts/check-reusable.ps1
          git diff --check

      - name: Publish prerequisite
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/declarations/912.compact-filename-pages.json scripts/pr-scope-check.ps1 scripts/pr-scope-check.test.ts
          git commit -m "fix: bound scope pagination to compact filename pages"
          git push origin HEAD:fix/issue-912-compact-pr-file-pages
