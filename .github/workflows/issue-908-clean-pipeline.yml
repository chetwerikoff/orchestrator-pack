name: issue-908-clean-pipeline

on:
  push:
    branches:
      - diag/issue-908-clean-pipeline
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/scope-guard-pr-files-pagination
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Run exact light lane 1
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -File ./scripts/run-vitest-light-lane.ps1 -Shard 1 > "$RUNNER_TEMP/issue-908-light-1.log" 2>&1
          printf '\nexit=%s\n' "$?" >> "$RUNNER_TEMP/issue-908-light-1.log"
          tail -n 300 "$RUNNER_TEMP/issue-908-light-1.log"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue-908-light-1
          path: ${{ runner.temp }}/issue-908-light-1.log
          retention-days: 1
