name: issue-908-clean-pipeline

on:
  push:
    branches:
      - diag/issue-908-clean-pipeline
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download failed finalizer log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88140080849/logs" > "$RUNNER_TEMP/issue-908-finalizer-2.log"
          tail -n 350 "$RUNNER_TEMP/issue-908-finalizer-2.log"
      - uses: actions/upload-artifact@v4
        with:
          name: issue-908-finalizer-2-log
          path: ${{ runner.temp }}/issue-908-finalizer-2.log
          retention-days: 1
