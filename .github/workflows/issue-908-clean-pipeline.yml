name: issue-909-pack-review-status

on:
  push:
    branches:
      - diag/issue-908-clean-pipeline

permissions:
  statuses: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish reviewed status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: 1dc236cda46926e31e9eb435212a8599537afc41
        run: |
          set -euo pipefail
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${TARGET_SHA}" \
            -f state=success \
            -f context='orchestrator-pack/pack-review' \
            -f description='Pack review completed with no findings.'
