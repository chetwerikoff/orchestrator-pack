name: issue-908-clean-pipeline

on:
  push:
    branches:
      - diag/issue-908-clean-pipeline
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download exact failed job logs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88108026831/logs" > "$RUNNER_TEMP/light-1-failed.log"
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88106927905/logs" > "$RUNNER_TEMP/light-2-failed.log"
          tail -n 250 "$RUNNER_TEMP/light-1-failed.log"
          tail -n 250 "$RUNNER_TEMP/light-2-failed.log"
      - uses: actions/upload-artifact@v4
        with:
          name: issue-908-failed-light-logs
          path: |
            ${{ runner.temp }}/light-1-failed.log
            ${{ runner.temp }}/light-2-failed.log
          retention-days: 1
