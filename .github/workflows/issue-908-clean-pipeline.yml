name: issue-908-clean-pipeline

on:
  push:
    branches:
      - diag/issue-908-clean-pipeline

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/scope-guard-pr-files-pagination
          fetch-depth: 0

      - name: Restore base file modes
        shell: bash
        run: |
          set -euo pipefail
          git update-index --chmod=-x \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: restore unchanged CLI file modes"

      - name: Verify final PR boundary
        shell: bash
        run: |
          set -euo pipefail
          git diff --summary f10fd0051dd28f4cea865e4859b495e369219698 HEAD | tee /tmp/summary.txt
          ! grep -q 'mode change' /tmp/summary.txt
          unexpected="$(git diff --name-only f10fd0051dd28f4cea865e4859b495e369219698 HEAD -- | grep -Ev '^(docs/declarations/908\.scope-pagination\.json|scripts/pr-scope-check\.ps1|scripts/pr-scope-check\.test\.ts)$' || true)"
          test -z "$unexpected"

      - name: Publish mode cleanup
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:fix/scope-guard-pr-files-pagination
