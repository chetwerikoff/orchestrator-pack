name: Issue 857 Pester diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Run Issue 857 Pester suite
        id: pester
        shell: pwsh
        continue-on-error: true
        run: |
          $ErrorActionPreference = 'Continue'
          $log = '/tmp/issue857-pester.log'
          & {
              Import-Module Pester -MinimumVersion 5.0
              $result = Invoke-Pester -Path './tests/powershell/Issue857.PrSessionBindingContract.Tests.ps1' -Output Detailed -PassThru
              "TOTAL=$($result.TotalCount) PASSED=$($result.PassedCount) FAILED=$($result.FailedCount) SKIPPED=$($result.SkippedCount)"
              foreach ($test in @($result.Failed)) {
                  "FAILED_TEST=$($test.ExpandedName)"
                  "ERROR=$($test.ErrorRecord.Exception.Message)"
                  "STACK=$($test.ErrorRecord.ScriptStackTrace)"
              }
              if ($result.FailedCount -gt 0) { exit 1 }
          } *> $log
          Get-Content -LiteralPath $log
      - name: Upload Pester diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue857-pester-${{ github.run_id }}
          path: /tmp/issue857-pester.log
          if-no-files-found: error
