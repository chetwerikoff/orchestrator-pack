name: issue-841-apply-runtime-parser-fix

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0

      - name: Apply dependency-free parser
        shell: bash
        run: |
          set -euo pipefail
          python .github/issue-841-runtime-parser/replace-runtime-parser.py
          if grep -Fq "from 'typescript'" scripts/gate-runner/census.ts; then
            echo 'census.ts still imports external TypeScript' >&2
            exit 1
          fi

      - name: Prove gate runner works before npm install
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/gate-runner/runner.ts \
            --repo-root . \
            --gate gate-census

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run proof and policy suites
        shell: bash
        run: |
          set -euo pipefail
          npm run gate-runner-selftest
          npm run test:foundation
          npm run typecheck:foundation
          npm run lint:foundation
          npm run ts:smoke
          npm run check:pwsh-test-growth

      - name: Clean transport files and push
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TEMP_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-apply-runtime-parser-fix.yml
          rm -f .github/workflows/issue-841-export-final-verifier-log.yml
          rm -rf .github/issue-841-runtime-parser
          git checkout HEAD -- plugins
          git diff --check -- scripts/gate-runner/census.ts

          gh api "repos/$GITHUB_REPOSITORY/actions/runs?event=pull_request&head_sha=$TEMP_HEAD_SHA&per_page=100" \
            --jq '.workflow_runs[] | select(.name == "scope-guard" and .status != "completed") | .id' \
            | while read -r run_id; do
                [ -z "$run_id" ] && continue
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
              done

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: keep census runner dependency-free'
          git push origin HEAD:agent/issue-841-bulk-gate-port
