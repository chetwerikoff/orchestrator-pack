name: update-pr907-from-main

on:
  push:
    branches:
      - ops/manual-pack-review-911-b997f2d
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Extract failing finalizer output
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/88150455141/logs" > "$RUNNER_TEMP/pr907-finalizer.log"
          {
            echo "--- error markers ---"
            grep -nEi "##\[error\]|FAIL|Error:|failed|issue-906:|AssertionError|Test Files|Tests" "$RUNNER_TEMP/pr907-finalizer.log" | tail -n 250 || true
            echo "--- tail ---"
            tail -n 400 "$RUNNER_TEMP/pr907-finalizer.log"
          } > "$RUNNER_TEMP/pr907-finalizer-diagnostic.txt"
          cat "$RUNNER_TEMP/pr907-finalizer-diagnostic.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: pr907-finalizer-diagnostic
          path: ${{ runner.temp }}/pr907-finalizer-diagnostic.txt
          retention-days: 1
