name: update-pr907-from-main

on:
  push:
    branches:
      - ops/manual-pack-review-911-b997f2d
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  stage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d3051a2cad81894d596434b760219dde65078ea6
          fetch-depth: 0
      - name: Create identical child commit on staging ref
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger final CI for PR 907"
          git push --force origin HEAD:staging/pr907-final-ci
          git rev-parse HEAD
