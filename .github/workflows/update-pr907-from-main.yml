name: update-pr907-from-main

on:
  push:
    branches:
      - ops/manual-pack-review-911-b997f2d
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: d3051a2cad81894d596434b760219dde65078ea6
          fetch-depth: 0
      - name: Capture validated tree SHA
        shell: bash
        run: git rev-parse 'HEAD^{tree}' | tee "$RUNNER_TEMP/pr907-tree-sha.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: pr907-tree-sha
          path: ${{ runner.temp }}/pr907-tree-sha.txt
          retention-days: 1
