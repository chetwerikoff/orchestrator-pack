name: update-pr907-from-main

on:
  push:
    branches:
      - ops/manual-pack-review-911-b997f2d
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Extract issue 906 scope constraints
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/issues/906" --jq .body > "$RUNNER_TEMP/issue-906-body.md"
          node --experimental-strip-types --input-type=module <<'NODE' | tee "$RUNNER_TEMP/issue-906-constraints.json"
          import { readFileSync } from 'node:fs';
          import { parseIssueBody } from './plugins/_shared/lib/issue_parser.ts';
          const parsed = parseIssueBody(readFileSync(process.env.RUNNER_TEMP + '/issue-906-body.md', 'utf8'));
          console.log(JSON.stringify({
            allowed_roots: parsed.allowed_roots ?? null,
            denylist: [...parsed.denylist].sort(),
          }, null, 2));
          NODE
      - uses: actions/upload-artifact@v4
        with:
          name: issue-906-constraints
          path: ${{ runner.temp }}/issue-906-constraints.json
          retention-days: 1
