name: Temporary issue 830 source export

on:
  push:
    branches:
      - agent/tmp-issue-830-source-export
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Export tracked source
        shell: bash
        run: git archive --format=zip --output=orchestrator-pack-source.zip HEAD
      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-pack-source
          path: orchestrator-pack-source.zip
          if-no-files-found: error
          retention-days: 1
