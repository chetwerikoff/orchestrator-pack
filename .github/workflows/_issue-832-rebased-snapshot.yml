name: issue-832 rebased snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: issue-832-rebased-source
          path: |
            .
            !.git/**
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error
