name: issue-832 Pester diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Download previous Pester job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/87354668300/logs" \
            -o "${RUNNER_TEMP}/pester-job.raw"
          if unzip -t "${RUNNER_TEMP}/pester-job.raw" >/dev/null 2>&1; then
            unzip -p "${RUNNER_TEMP}/pester-job.raw" > "${RUNNER_TEMP}/pester-job.log"
          else
            cp "${RUNNER_TEMP}/pester-job.raw" "${RUNNER_TEMP}/pester-job.log"
          fi
          {
            echo '=== failure-focused lines ==='
            grep -nEi '(^|[^a-z])(fail|failed|failure|error|exception|expected|assert|at .*Tests\.ps1)' "${RUNNER_TEMP}/pester-job.log" || true
            echo '=== final 260 lines ==='
            tail -n 260 "${RUNNER_TEMP}/pester-job.log"
          } > "${RUNNER_TEMP}/pester-diagnostic.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: issue-832-pester-diagnostic
          path: ${{ runner.temp }}/pester-diagnostic.txt
          retention-days: 1
          if-no-files-found: error
