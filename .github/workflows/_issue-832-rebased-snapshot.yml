name: issue-832 apply CLI resolution fix

on:
  push:
    branches:
      - agent/issue-831-json-producers-wave-b
    paths:
      - .github/workflows/_issue-832-rebased-snapshot.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply and validate direct CLI import resolution
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          imports = package.setdefault('imports', {})
          ordered = {'#opk-json-producers/*': './scripts/json-producers/*.ts'}
          ordered.update(imports)
          package['imports'] = ordered
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          files = [
              Path('scripts/json-producers/read-delegation-audit-stop.ts'),
              Path('scripts/json-producers/rtk-discover-inventory.ts'),
              Path('scripts/json-producers/sanctioned-worker-kill-record.ts'),
              Path('scripts/json-producers/worker-status-report.ts'),
          ]
          for path in files:
              text = path.read_text()
              old = "from './cli.js';"
              new = "from '#opk-json-producers/cli';"
              if old not in text and new not in text:
                  raise SystemExit(f'expected CLI import missing: {path}')
              path.write_text(text.replace(old, new))
          PY

          npm ci
          npm run typecheck:foundation
          npm run lint:foundation
          npm run test:foundation
          node --experimental-strip-types scripts/json-producers/sanctioned-worker-kill-record.ts --help >/dev/null

          rm -f .github/workflows/_issue-832-rebased-snapshot.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json scripts/json-producers .github/workflows/_issue-832-rebased-snapshot.yml
          git commit -m "Fix direct TypeScript CLI module resolution"
          git push origin HEAD:agent/issue-831-json-producers-wave-b
