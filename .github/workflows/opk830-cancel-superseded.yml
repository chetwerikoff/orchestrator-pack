name: Issue 830 cancel superseded scope runs

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded issue 830 scope runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for run_id in 29440981150 29441137566 29441204957 29441267452 29441362640 29441555662; do
            gh api --method POST "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" >/dev/null 2>&1 || true
          done
