name: issue-819-finalize

on:
  push:
    branches:
      - agent/issue-819-reachability-purge

permissions:
  contents: write

concurrency:
  group: issue-819-finalize
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-819-reachability-purge
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Apply fail-closed suspect-edge hardening
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/issue819.patch.gz.b64 <<'PATCH'
          
          PATCH
          tr -d '[:space:]' < /tmp/issue819.patch.gz.b64 | base64 -d | gzip -d > /tmp/issue819.patch
          git apply --check /tmp/issue819.patch
          git apply /tmp/issue819.patch
          node scripts/reachability-purge.mjs --write
          node scripts/reachability-purge.mjs
          git rm .github/workflows/issue-819-final-validation.yml

      - name: Validate final tree
        shell: bash
        run: |
          set -euo pipefail
          cat > vitest.issue819.final.config.mjs <<'EOF'
          import { defineConfig } from 'vitest/config';
          export default defineConfig({ test: {
            include: ['scripts/reachability-purge.test.ts'],
            fileParallelism: false,
            maxWorkers: 1,
            testTimeout: 120000,
            hookTimeout: 120000,
          } });
          EOF
          npx vitest run --config vitest.issue819.final.config.mjs
          rm vitest.issue819.final.config.mjs
          npx tsc --project tsconfig.base.json --noEmit
          pwsh -NoProfile -File ./scripts/verify.ps1
          git diff --check

      - name: Commit finalized implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/reachability-purge.config.json scripts/reachability-purge.manifest.json scripts/reachability-purge.mjs scripts/reachability-purge.test.ts
          git status --short
          git commit -m 'Harden issue 819 dynamic reachability holds'
          git push origin HEAD:agent/issue-819-reachability-purge
