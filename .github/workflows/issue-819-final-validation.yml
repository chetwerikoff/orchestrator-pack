name: issue-819-final-validation

on:
  push:
    branches:
      - agent/issue-819-reachability-purge
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Export full Git history
        shell: bash
        run: git bundle create orchestrator-pack-current.bundle --all
      - name: Upload repository bundle
        uses: actions/upload-artifact@v4
        with:
          name: issue-819-current-git-bundle
          path: orchestrator-pack-current.bundle
          retention-days: 1
          if-no-files-found: error

  light-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Capture standard light lane
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -File ./scripts/run-vitest-light-lane.ps1 > issue-819-light.log 2>&1
          printf '%s\n' "$?" > issue-819-light.exit
          exit 0
      - name: Upload light-lane diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: issue-819-light-diagnostic
          path: |
            issue-819-light.log
            issue-819-light.exit
          retention-days: 1
          if-no-files-found: error

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Full pack verifier
        shell: pwsh
        run: ./scripts/verify.ps1

      - name: Strict self-architect lint
        shell: pwsh
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: ./scripts/lint-self-architect.ps1 -Strict -BaseRef $env:PR_BASE_SHA -HeadRef $env:PR_HEAD_SHA

      - name: Typecheck
        run: npx tsc --project tsconfig.base.json --noEmit

      - name: Focused reachability acceptance
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' \
            "import { defineConfig } from 'vitest/config';" \
            "export default defineConfig({ test: {" \
            "  include: ['scripts/reachability-purge.test.ts']," \
            "  fileParallelism: false, maxWorkers: 1," \
            "  testTimeout: 120000, hookTimeout: 120000," \
            "} });" > vitest.issue-819.config.mjs
          npx vitest run --config vitest.issue-819.config.mjs
