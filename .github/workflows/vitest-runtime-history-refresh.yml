name: vitest-runtime-history-refresh

on:
  push:
    branches:
      - main
    paths-ignore:
      - scripts/vitest-runtime-history.json
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: vitest-runtime-history-refresh
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  test-vitest-heavy:
    name: Vitest heavy shard ${{ matrix.shard }}/7
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Run Vitest heavy shard
        shell: pwsh
        run: ./scripts/run-vitest-heavy-shard.ps1 -Shard ${{ matrix.shard }}

      - name: Upload heavy shard runtime report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-heavy-report-${{ matrix.shard }}
          path: |
            .vitest-runtime-report-heavy-${{ matrix.shard }}.json
            .vitest-runtime-report-heavy-${{ matrix.shard }}.json.meta.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  refresh-runtime-history:
    name: Refresh vitest runtime-history
    needs: test-vitest-heavy
    if: >-
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
      && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Download heavy shard runtime reports
        uses: actions/download-artifact@v4
        with:
          pattern: vitest-heavy-report-*
          path: vitest-heavy-reports
          merge-multiple: true

      - name: Stage heavy shard reports for refresh
        shell: pwsh
        run: |
          $dest = Join-Path $env:GITHUB_WORKSPACE 'vitest-heavy-reports-staged'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          for ($shard = 1; $shard -le 7; $shard++) {
            $json = Join-Path $env:GITHUB_WORKSPACE "vitest-heavy-reports/.vitest-runtime-report-heavy-$shard.json"
            $meta = Join-Path $env:GITHUB_WORKSPACE "vitest-heavy-reports/.vitest-runtime-report-heavy-$shard.json.meta.json"
            if (-not (Test-Path -LiteralPath $json)) {
              throw "missing downloaded heavy shard report for shard $shard"
            }
            Copy-Item -LiteralPath $json -Destination (Join-Path $dest "shard-$shard.json")
            if (Test-Path -LiteralPath $meta) {
              Copy-Item -LiteralPath $meta -Destination (Join-Path $dest "shard-$shard.meta.json")
            }
          }

      - name: Refresh committed runtime-history
        shell: pwsh
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          ./scripts/refresh-vitest-runtime-history.ps1 `
            -ReportsDir (Join-Path $env:GITHUB_WORKSPACE 'vitest-heavy-reports-staged') `
            -CommitSha $env:COMMIT_SHA `
            -CommitBack

      - name: Require delivery credential
        shell: bash
        env:
          DELIVERY_TOKEN: ${{ secrets.VITEST_RUNTIME_HISTORY_DELIVERY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DELIVERY_TOKEN}" ]; then
            echo "VITEST_RUNTIME_HISTORY_DELIVERY_TOKEN is required for protected-branch delivery" >&2
            exit 1
          fi

      - name: Detect prepared delivery commit
        id: delivery
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          ahead="$(git rev-list --count origin/main..HEAD)"
          echo "ahead=${ahead}" >> "$GITHUB_OUTPUT"
          if [ "${ahead}" = "0" ]; then
            echo "runtime-history delivery skipped: no committed history delta"
          fi

      - name: Reconcile pending delivery branch state
        if: steps.delivery.outputs.ahead != '0'
        id: delivery_branch
        shell: bash
        env:
          DELIVERY_BRANCH: ci/vitest-runtime-history-refresh
        run: |
          set -euo pipefail
          remote_sha=""
          should_push="true"
          if git ls-remote --exit-code origin "refs/heads/${DELIVERY_BRANCH}" >/dev/null 2>&1; then
            git fetch origin main "refs/heads/${DELIVERY_BRANCH}:refs/remotes/origin/${DELIVERY_BRANCH}"
            remote_sha="$(git rev-parse "origin/${DELIVERY_BRANCH}")"
            pending_history="$(mktemp)"
            trap 'rm -f "${pending_history}"' EXIT
            git show "origin/${DELIVERY_BRANCH}:scripts/vitest-runtime-history.json" > "${pending_history}"
            node scripts/refresh-vitest-runtime-history.mjs reconcile \
              --remote "${pending_history}" \
              --proposed scripts/vitest-runtime-history.json \
              --output scripts/vitest-runtime-history.json
            git add -- scripts/vitest-runtime-history.json
            if ! git diff --cached --quiet HEAD -- scripts/vitest-runtime-history.json; then
              git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
                commit --amend --no-edit
            fi
            if git diff --quiet "origin/${DELIVERY_BRANCH}" -- scripts/vitest-runtime-history.json; then
              should_push="false"
              echo "runtime-history delivery skipped: pending PR already matches reconciled history payload"
            fi
          else
            git fetch origin main
          fi
          echo "remote_sha=${remote_sha}" >> "$GITHUB_OUTPUT"
          echo "should_push=${should_push}" >> "$GITHUB_OUTPUT"

      - name: Push delivery branch
        if: steps.delivery.outputs.ahead != '0' && steps.delivery_branch.outputs.should_push == 'true'
        shell: bash
        env:
          DELIVERY_BRANCH: ci/vitest-runtime-history-refresh
          DELIVERY_TOKEN: ${{ secrets.VITEST_RUNTIME_HISTORY_DELIVERY_TOKEN }}
          REMOTE_SHA: ${{ steps.delivery_branch.outputs.remote_sha }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${DELIVERY_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if [ -n "${REMOTE_SHA}" ]; then
            git push --force-with-lease="refs/heads/${DELIVERY_BRANCH}:${REMOTE_SHA}" origin "HEAD:refs/heads/${DELIVERY_BRANCH}"
          else
            git push --force-with-lease origin "HEAD:refs/heads/${DELIVERY_BRANCH}"
          fi

      - name: Write delivery PR body
        if: steps.delivery.outputs.ahead != '0'
        shell: bash
        run: |
          set -euo pipefail
          cat > vitest-runtime-history-delivery-pr-body.md <<'EOF'
          ## Summary
          - refresh `scripts/vitest-runtime-history.json` from measured heavy-shard reports
          - generated by `.github/workflows/vitest-runtime-history-refresh.yml`
          - constrained to the committed runtime-history artifact only

          ## Delivery model
          - PR branch: `ci/vitest-runtime-history-refresh`
          - PR open/update identity: `VITEST_RUNTIME_HISTORY_DELIVERY_TOKEN`
          - merge gate owner: `.github/workflows/vitest-runtime-history-delivery.yml` on `pull_request_target`
          EOF

      - name: Open or update delivery PR
        if: steps.delivery.outputs.ahead != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.VITEST_RUNTIME_HISTORY_DELIVERY_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/vitest-runtime-history-delivery.mjs upsert-pr \
            --repo "${GITHUB_REPOSITORY}" \
            --body-file vitest-runtime-history-delivery-pr-body.md
