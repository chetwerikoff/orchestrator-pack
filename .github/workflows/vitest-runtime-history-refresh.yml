name: vitest-runtime-history-refresh

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

concurrency:
  group: vitest-runtime-history-refresh
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  test-vitest-heavy:
    name: Vitest heavy shard ${{ matrix.shard }}/7
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Run Vitest heavy shard
        shell: pwsh
        run: ./scripts/run-vitest-heavy-shard.ps1 -Shard ${{ matrix.shard }}

      - name: Upload heavy shard runtime report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-heavy-report-${{ matrix.shard }}
          path: |
            .vitest-runtime-report-heavy-${{ matrix.shard }}.json
            .vitest-runtime-report-heavy-${{ matrix.shard }}.json.meta.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  refresh-runtime-history:
    name: Refresh vitest runtime-history
    needs: test-vitest-heavy
    if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Download heavy shard runtime reports
        uses: actions/download-artifact@v4
        with:
          pattern: vitest-heavy-report-*
          path: vitest-heavy-reports
          merge-multiple: true

      - name: Stage heavy shard reports for refresh
        shell: pwsh
        run: |
          $dest = Join-Path $env:GITHUB_WORKSPACE 'vitest-heavy-reports-staged'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          for ($shard = 1; $shard -le 7; $shard++) {
            $json = Join-Path $env:GITHUB_WORKSPACE "vitest-heavy-reports/.vitest-runtime-report-heavy-$shard.json"
            $meta = Join-Path $env:GITHUB_WORKSPACE "vitest-heavy-reports/.vitest-runtime-report-heavy-$shard.json.meta.json"
            if (-not (Test-Path -LiteralPath $json)) {
              throw "missing downloaded heavy shard report for shard $shard"
            }
            Copy-Item -LiteralPath $json -Destination (Join-Path $dest "shard-$shard.json")
            if (Test-Path -LiteralPath $meta) {
              Copy-Item -LiteralPath $meta -Destination (Join-Path $dest "shard-$shard.meta.json")
            }
          }

      - name: Refresh committed runtime-history
        shell: pwsh
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          ./scripts/refresh-vitest-runtime-history.ps1 `
            -ReportsDir (Join-Path $env:GITHUB_WORKSPACE 'vitest-heavy-reports-staged') `
            -CommitSha $env:COMMIT_SHA `
            -CommitBack
