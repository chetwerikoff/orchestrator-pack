name: List issue 821 residuals

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/issue-821-list-residuals.yml

permissions:
  contents: write

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - name: Persist residual path list
        shell: bash
        run: |
          pattern='AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|ao-autonomous-guard\.ps1|git-autonomous-guard\.ps1|git-real-binary|_invoke-system-git\.sh|_resolve-system-git\.sh|autonomous-orchestrator-surface-bootstrap\.sh|autonomous-bash-env\.sh|autonomous-real-binaries\.example\.json|\.ao/autonomous-real-binaries\.json|invoke-orchestrator-claimed-review-run\.ps1|Invoke-OrchestratorClaimedReviewRun\.ps1|check-worker-nudge-gate-adoption\.ps1'
          git grep -l -E "$pattern" -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' ':!.github/workflows/issue-821-list-residuals.yml' | sort > issue-821-residual-paths.txt || true
          rm -f .github/workflows/issue-821-list-residuals.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "List remaining issue 821 reference paths"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
