name: issue-841-apply-proof-remediation
on:
  pull_request:
    branches: [main]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
          fetch-depth: 0
      - name: Apply proof-system remediation
        run: |
          python .github/issue-841-apply.py
          git fetch origin main
          git checkout origin/main -- docs/review-start-preflight-shield.mjs
      - name: Install dependencies
        run: npm ci
      - name: Capture foundation typecheck
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck:foundation 2>&1 | tee /tmp/issue-841-typecheck.log
      - name: Upload typecheck diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: issue-841-typecheck-log
          path: /tmp/issue-841-typecheck.log
          retention-days: 1
      - name: Fail when typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
