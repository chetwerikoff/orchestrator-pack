name: Issue 857 light lane diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Run light lane shard 1
        shell: pwsh
        continue-on-error: true
        run: |
          $log = '/tmp/issue857-light1.log'
          & ./scripts/run-vitest-light-lane.ps1 -Shard 1 *> $log
          $code = $LASTEXITCODE
          Get-Content -LiteralPath $log -Tail 300
          if ($code -ne 0) { exit $code }
      - name: Upload light lane log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue857-light1-${{ github.run_id }}
          path: /tmp/issue857-light1.log
          if-no-files-found: error
