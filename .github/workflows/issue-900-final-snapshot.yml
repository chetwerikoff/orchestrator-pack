name: issue-900-final-snapshot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-900-node22-runtime
          fetch-depth: 0
      - run: git archive --format=tar.gz --output=issue-900-final-snapshot.tar.gz HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: issue-900-final-snapshot
          path: issue-900-final-snapshot.tar.gz
          compression-level: 0
