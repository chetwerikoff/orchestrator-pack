name: issue-831 mode cleanup

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/_issue-831-mode-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-831-json-producers-wave-b
          fetch-depth: 0
      - name: Restore out-of-scope executable modes
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs
          rm -f .github/workflows/_issue-831-mode-cleanup.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Remove out-of-scope install mode changes"
          git push origin HEAD:agent/issue-831-json-producers-wave-b
