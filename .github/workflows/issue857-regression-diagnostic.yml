name: Issue 857 apply regression fixes

on:
  push:
    branches:
      - agent/issue-857-binding-contract-v2
    paths:
      - .github/workflows/issue857-regression-diagnostic.yml
  pull_request:
    types: [synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply exact contract and regression replacements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}: {old[:100]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          def replace_test(path, name, block):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              marker = f"  it('{name}', () => {{"
              start = text.find(marker)
              if start < 0:
                  raise SystemExit(f'{path}: test not found: {name}')
              end = text.find('\n  });', start)
              if end < 0:
                  raise SystemExit(f'{path}: test terminator not found: {name}')
              end += len('\n  });')
              p.write_text(text[:start] + block + text[end:], encoding='utf-8')

          resolver = 'docs/session-pr-binding-resolver.mjs'
          replace_once(
              resolver,
              """export function listIssueCorrelatedOpenPrs(issueNumber, openPrs = [], session = null, options = {}) {
            const issue = numberOrZero(issueNumber);
            if (issue <= 0) return [];
            const targetHead = normalizeSha(options.headSha);
            const expectedRepo = normalizeRepoSlug(options.repoSlug ?? session?.repoSlug);
            return toArray(openPrs).filter((pr) => {
              if (prIsTerminal(pr)) return false;
              if (!repoScopeMatches(getOpenPrRepoSlug(pr), expectedRepo)) return false;
              const headName = normalizeString(pr?.headRefName ?? pr?.head);
              if (!headRefCorrelatesToIssue(headName, issue, session)) return false;
              if (!targetHead) return true;
              const prHead = normalizeSha(pr?.headRefOid);
              return Boolean(prHead && prHead === targetHead);
            });
          }""",
              """export function listIssueCorrelatedOpenPrs(issueNumber, openPrs = [], session = null, options = {}) {
            const issue = numberOrZero(issueNumber);
            if (issue <= 0) return [];
            const expectedRepo = normalizeRepoSlug(options.repoSlug ?? session?.repoSlug);
            return toArray(openPrs).filter((pr) => {
              if (prIsTerminal(pr)) return false;
              if (!repoScopeMatches(getOpenPrRepoSlug(pr), expectedRepo)) return false;
              const headName = normalizeString(pr?.headRefName ?? pr?.head);
              return headRefCorrelatesToIssue(headName, issue, session);
            });
          }""",
          )
          replace_once(
              resolver,
              """        bindingSource: 'live_prs',
                  enriched: true,
                  liveSource: 'prs',""",
              """        bindingSource: 'live_prs',
                  enriched: false,
                  liveSource: 'prs',""",
          )

          cache = 'docs/pr-session-binding-cache.mjs'
          replace_once(
              cache,
              """}
          
          function writePair({ store, cachePath, input, nowMs, writeBackfill, old }) {""",
              """}
          
          function sweepStaleBindings(store, openPrs, nowMs) {
            evictPrSessionBindings({
              store,
              openPrs,
              nowMs,
              openListAuthoritative: false,
              repoSlug: '',
            });
          }
          
          function writePair({ store, cachePath, input, nowMs, writeBackfill, old }) {""",
          )
          replace_once(
              cache,
              """  const store = loaded.store;
            const raw = store.records?.[buildSessionBindingKey(repoSlug, id)] ?? null;""",
              """  const store = loaded.store;
            sweepStaleBindings(store, openPrs, nowMs);
            const raw = store.records?.[buildSessionBindingKey(repoSlug, id)] ?? null;""",
          )
          replace_once(
              cache,
              """  const store = loaded.store, nowMs = n(input.nowMs) || Date.now(), openPrs = array(input.openPrs);
            const raw = store.records?.[buildPrBindingKey(repoSlug, targetPr)] ?? null;""",
              """  const store = loaded.store, nowMs = n(input.nowMs) || Date.now(), openPrs = array(input.openPrs);
            sweepStaleBindings(store, openPrs, nowMs);
            const raw = store.records?.[buildPrBindingKey(repoSlug, targetPr)] ?? null;""",
          )
          replace_once(
              cache,
              """  if (live.failClosed) return { ...live, source: cached ? 'cache' : 'miss' };
            if (cached && live.sessionId && live.sessionId !== cached.sessionId) return {""",
              """  if (live.failClosed) return { ...live, source: cached ? 'cache' : 'miss' };
            const liveSession = live.sessionId ? findSession(input.sessions, live.sessionId) : null;
            const targetHead = text(input.headSha).toLowerCase();
            const liveSessionHead = text(liveSession?.ownedHeadSha ?? liveSession?.headRefOid).toLowerCase();
            if (live.sessionId && targetHead && liveSessionHead && liveSessionHead !== targetHead) return {
              sessionId: live.sessionId,
              reason: 'head_owner_mismatch',
              failClosed: true,
              source: cached ? 'cache' : 'miss',
              diagnostic: 'head_owner_mismatch',
            };
            if (cached && live.sessionId && live.sessionId !== cached.sessionId) return {""",
          )

          pr_test = 'scripts/pr-session-binding-cache.test.ts'
          replace_test(pr_test, 'Codex: cache hit fails closed when live corpus has PR-to-many-session ambiguity', """  it('Codex: cache hit fails closed when live corpus has PR-to-many-session ambiguity', () => {
            const store = seedStore({ sessionId: 'opk-a', prNumber: 88, headSha: 'shared' });
            const sessions = [
              liveWorker('opk-a', 719, { prs: [`https://github.com/${repoSlug}/pull/88`] }),
              liveWorker('opk-b', 720, { prs: [`https://github.com/${repoSlug}/pull/88`] }),
            ];
            const openPrs = [openPr(88, 'shared')];
          
            const resolution = resolvePrSessionBindingForConsumer({
              store,
              repoSlug,
              prNumber: 88,
              headSha: 'shared',
              sessions,
              openPrs,
              nowMs,
              writeBackfill: false,
              isLive: (session) => isLiveWorkerSession(session),
            });
            expect(resolution.failClosed).toBe(true);
            expect(resolution.deferReason).toBe('ambiguous_pr_session_binding');
            expect(resolution.source).toBe('cache');
          });""")
          replace_test(pr_test, 'Codex: backfill does not write stale head when session lacks head ownership', """  it('Codex: backfill does not write stale head when session lacks head ownership', () => {
            const cachePath = tempCachePath();
            const sessions = [liveWorker('opk-stale', 501, {
              prs: [`https://github.com/${repoSlug}/pull/501`],
              ownedHeadSha: 'oldhead',
            })];
            const openPrs = [openPr(501, 'newhead')];
          
            const resolution = resolvePrSessionBindingForConsumer({
              cachePath,
              repoSlug,
              prNumber: 501,
              headSha: 'newhead',
              sessions,
              openPrs,
              nowMs,
              isLive: (session) => isLiveWorkerSession(session),
            });
            expect(resolution.failClosed).toBe(true);
            expect(resolution.diagnostic).toBe('head_owner_mismatch');
            const store = readPrSessionBindingCacheFile(cachePath);
            expect(lookupBindingByPr(store, repoSlug, 501)).toBeNull();
          });""")
          replace_test(pr_test, 'AC#5 class F: ambiguous PR to sessions fail closed', """  it('AC#5 class F: ambiguous PR to sessions fail closed', () => {
            const cachePath = tempCachePath();
            const sessions = [
              liveWorker('opk-a', 719, { prs: [`https://github.com/${repoSlug}/pull/88`] }),
              liveWorker('opk-b', 720, { prs: [`https://github.com/${repoSlug}/pull/88`] }),
            ];
            const openPrs = [openPr(88, 'shared')];
          
            const resolution = resolvePrSessionBindingForConsumer({
              cachePath,
              repoSlug,
              prNumber: 88,
              headSha: 'shared',
              sessions,
              openPrs,
              nowMs,
              isLive: (session) => isLiveWorkerSession(session),
            });
            expect(resolution.failClosed).toBe(true);
            expect(resolution.deferReason).toBe('ambiguous_pr_session_binding');
          });""")

          session_test = 'scripts/session-pr-binding-resolver.test.ts'
          replace_once(session_test, "const headSha = 'deadbeefdeadbeefdeadbeefdeadbeefdeadbeef';", "const headSha = 'deadbeefdeadbeefdeadbeefdeadbeefdeadbeef';\nconst prUrl = (number: number) => `https://github.com/chetwerikoff/orchestrator-pack/pull/${number}`;")
          replace_test(session_test, 'resolves owner for issue-only list row with displayName corroboration', """  it('resolves owner from bulk prs[] without session-detail enrichment', () => {
            const session = {
              ...issueOnlyListRow,
              branch: 'unrelated-branch',
              prs: [prUrl(690)],
            };
            const binding = resolveSessionPrBinding(session, [openPr690], { headSha });
            expect(binding.bound).toBe(true);
            expect(binding.prNumber).toBe(690);
            expect(binding.bindingSource).toBe('live_prs');
            expect(binding.liveSource).toBe('prs');
          
            const owner = resolvePrOwningWorkerSessionBinding(
              [session],
              690,
              [openPr690],
              {
                headSha,
                isLive: () => true,
                getSessionId: (s) => String(s.sessionId ?? s.id ?? s.name),
              },
            );
            expect(owner.sessionId).toBe('orchestrator-pack-45');
            expect(
              resolveHeadOwningWorkerSessionId(
                [session],
                690,
                headSha,
                [openPr690],
                headOwnerOptions(),
              ),
            ).toBe('orchestrator-pack-45');
          });""")
          replace_once(session_test, "expect(resolution.sessionId).toBeNull();\n    expect(resolution.failClosed).toBe(true);\n    expect(resolution.deferReason).toBe(DEFER_AMBIGUOUS_ISSUE_PR_BINDING);", "expect(resolution.sessionId).toBe('orchestrator-pack-45');\n    expect(resolution.failClosed).toBe(true);\n    expect(resolution.deferReason).toBe(DEFER_AMBIGUOUS_ISSUE_PR_BINDING);")
          replace_test(session_test, 'fails closed when multiple live sessions claim the same PR', """  it('fails closed when multiple live sessions claim the same PR', () => {
            const resolution = resolvePrOwningWorkerSessionBinding(
              [
                { ...issueOnlyListRow, id: 'opk-a', sessionId: 'opk-a', name: 'opk-a', prs: [prUrl(690)] },
                { ...issueOnlyListRow, id: 'opk-b', sessionId: 'opk-b', name: 'opk-b', prs: [prUrl(690)] },
              ],
              690,
              [openPr690],
              { requireLive: true, isLive: () => true, getSessionId: (s) => String(s.sessionId) },
            );
            expect(resolution.sessionId).toBeNull();
            expect(resolution.deferReason).toBe(DEFER_AMBIGUOUS_PR_SESSION_BINDING);
          });""")
          replace_test(session_test, 'does not first-match when multiple workers share explicit prNumber', """  it('does not first-match when multiple workers share bulk prs[] evidence', () => {
            expect(
              resolveWorkerSessionId(
                [
                  { name: 'opk-a', role: 'worker', prs: [prUrl(55)], status: 'working' },
                  { name: 'opk-b', role: 'worker', prs: [prUrl(55)], status: 'working' },
                ],
                55,
              ),
            ).toBeNull();
          });""")
          replace_test(session_test, 'grants head ownership for display_name binding corroborated by PR head', """  it('grants head ownership for direct bulk prs[] binding corroborated by PR head', () => {
            const session = {
              ...issueOnlyListRow,
              role: 'worker',
              branch: 'unrelated-branch',
              prs: [prUrl(690)],
            };
            expect(sessionOwnsRunHead(session, 690, headSha, [openPr690])).toBe(true);
            expect(
              resolveHeadOwningWorkerSessionId(
                [session],
                690,
                headSha,
                [openPr690],
                headOwnerOptions(),
              ),
            ).toBe('orchestrator-pack-45');
          });""")
          replace_once(session_test, "describe('session-pr-binding-resolver displayName head ownership'", "describe('session-pr-binding-resolver bulk prs head ownership'")
          replace_test(session_test, 'keeps legacy owner and head ownership for explicit prNumber rows', """  it('keeps owner and head ownership for direct bulk prs[] rows', () => {
            const session = {
              id: 'opk-explicit',
              name: 'opk-explicit',
              role: 'worker',
              prs: [prUrl(690)],
              status: 'working',
            };
            expect(
              resolveHeadOwningWorkerSessionId([session], 690, headSha, [openPr690], headOwnerOptions()),
            ).toBe('opk-explicit');
            expect(sessionOwnsRunHead(session, 690, headSha, [openPr690])).toBe(true);
          });""")
          replace_once(session_test, "describe('session-pr-binding-resolver explicit prNumber regression'", "describe('session-pr-binding-resolver direct prs regression'")
          replace_once(session_test, "      prNumber: 1,", "      prs: [prUrl(1)],")
          replace_test(session_test, 'scenario 4: many live sessions for one PR defers', """  it('scenario 4: many live sessions for one PR defers', () => {
            const resolution = resolvePrOwningWorkerSessionBinding(
              [
                { name: 'a', role: 'worker', prs: [prUrl(690)], status: 'working' },
                { name: 'b', role: 'worker', prs: [prUrl(690)], status: 'working' },
              ],
              690,
              [openPr690],
              { isLive: () => true, getSessionId: (s) => String(s.name) },
            );
            expect(resolution.deferReason).toBe(DEFER_AMBIGUOUS_PR_SESSION_BINDING);
          });""")
          replace_once(session_test, "const session = { ...issueOnlyListRow, status: 'terminated', prNumber: undefined };", "const session = { ...issueOnlyListRow, status: 'terminated' };")
          replace_test(session_test, 'records episode when displayName corroborated by PR head resolves as owner', """  it('records episode when direct bulk prs[] resolves the current head owner', () => {
            const sessions = [
              {
                ...issueOnlyListRow,
                role: 'worker',
                status: 'working',
                branch: 'unrelated-branch',
                prs: [prUrl(690)],
              },
            ];
            const records = planCiFailureReactionRecords({
              repo: 'chetwerikoff/orchestrator-pack',
              sessions,
              openPrs: [openPr690],
              ciChecksByPr: [
                {
                  prNumber: 690,
                  checks: [{ name: 'Run pack contract tests', state: 'FAILURE' }],
                },
              ],
              requiredCheckNamesByPr: [{ prNumber: 690, requiredCheckNames: ['Run pack contract tests'] }],
            });
            expect(records.records).toHaveLength(1);
            expect(records.records![0]?.episode?.targetId).toBe('orchestrator-pack-45');
          });""")
          replace_test(session_test, 'records episode when session-get displayName binds PR without list-row head fields', """  it('ignores session-get displayName and records only after bulk prs[] evidence arrives', () => {
            const sessions = [
              {
                id: 'orchestrator-pack-45',
                sessionId: 'orchestrator-pack-45',
                role: 'worker',
                status: 'working',
                issueId: '690',
                branch: 'unrelated-branch',
              },
            ];
            const ignoredDetail = planCiFailureReactionRecords({
              repo: 'chetwerikoff/orchestrator-pack',
              sessions,
              openPrs: [openPr690],
              sessionDetailsById: { 'orchestrator-pack-45': { displayName: '690' } },
              ciChecksByPr: [
                {
                  prNumber: 690,
                  checks: [{ name: 'Run pack contract tests', state: 'FAILURE' }],
                },
              ],
              requiredCheckNamesByPr: [{ prNumber: 690, requiredCheckNames: ['Run pack contract tests'] }],
            });
            expect(ignoredDetail.records).toEqual([]);
          
            const bulkBound = planCiFailureReactionRecords({
              repo: 'chetwerikoff/orchestrator-pack',
              sessions: [{ ...sessions[0], prs: [prUrl(690)] }],
              openPrs: [openPr690],
              ciChecksByPr: [
                {
                  prNumber: 690,
                  checks: [{ name: 'Run pack contract tests', state: 'FAILURE' }],
                },
              ],
              requiredCheckNamesByPr: [{ prNumber: 690, requiredCheckNames: ['Run pack contract tests'] }],
            });
            expect(bulkBound.records).toHaveLength(1);
            expect(bulkBound.records![0]?.episode?.targetId).toBe('orchestrator-pack-45');
          });""")
          replace_test(session_test, 'builds sessionDetailsById from ao session get payloads', """  it('retires session-get enrichment and binds from bulk prs[] instead', () => {
            const getPayload = readCapture('session-get-numeric-displayname.raw.json');
            expect(sessionDetailFromSessionGetPayload(getPayload)).toBeNull();
            expect(shouldEnrichSessionDetailFromGet(issueOnlyListRow)).toBe(false);
            expect(buildSessionDetailsById([issueOnlyListRow], {
              'orchestrator-pack-45': getPayload,
            })).toEqual({});
            const binding = resolveSessionPrBinding(
              { ...issueOnlyListRow, prs: [prUrl(690)] },
              [openPr690],
              { headSha },
            );
            expect(binding.bindingSource).toBe('live_prs');
            expect(binding.prNumber).toBe(690);
          });""")
          replace_once(session_test, "describe('session-get displayName enrichment'", "describe('retired session-get enrichment'")

          pester = 'tests/powershell/Issue748.UnknownSnapshotExpiry.Tests.ps1'
          replace_once(
              pester,
              "$miss.row.winningSource | Should -Be 'degraded'\n            [long]$miss.row.generationVector.bindingCacheGeneration | Should -Be 0",
              "$miss.row.winningSource | Should -Be 'github_pr'\n            $miss.row.derivedStatus | Should -Be 'pr_open'\n            [long]$miss.row.generationVector.bindingCacheGeneration | Should -Be 0",
          )
          PY
          git diff --check
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Run contract matrix
        shell: bash
        run: node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs
      - name: Run full Pester
        shell: pwsh
        run: ./scripts/test-all.ps1 -SkipNpm
      - name: Run affected Vitest suites
        shell: bash
        env:
          OPK_VITEST_HARNESS: '1'
        run: npx vitest run scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts scripts/worker-status-store.test.ts
      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/session-pr-binding-resolver.mjs docs/pr-session-binding-cache.mjs scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts tests/powershell/Issue748.UnknownSnapshotExpiry.Tests.ps1
          git commit -m "Fix Clause D binding regressions"
          git push origin HEAD:agent/issue-857-binding-contract-v2
