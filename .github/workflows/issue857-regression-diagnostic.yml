name: Issue 857 regression diagnostic

on:
  push:
    branches:
      - agent/issue-857-binding-contract-v2
    paths:
      - .github/workflows/issue857-regression-diagnostic.yml
  pull_request:
    types: [synchronize]
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Capture full Pester regression
        shell: pwsh
        run: |
          ./scripts/test-all.ps1 -SkipNpm *> issue857-pester-full.log
          exit 0
      - name: Capture affected Vitest suites
        shell: bash
        env:
          OPK_VITEST_HARNESS: '1'
        run: npx vitest run scripts/session-pr-binding-resolver.test.ts scripts/pr-session-binding-cache.test.ts scripts/worker-status-store.test.ts > issue857-vitest.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: issue857-regression-diagnostics-full
          path: |
            issue857-pester-full.log
            issue857-vitest.log
          if-no-files-found: error
