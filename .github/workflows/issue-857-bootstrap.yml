name: Issue 857 bootstrap

on:
  push:
    branches:
      - agent/issue-857-pr-session-binding-contract
    paths:
      - .github/workflows/issue-857-bootstrap.yml

permissions:
  contents: write

jobs:
  apply-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-pr-session-binding-contract
          fetch-depth: 0
      - name: Reconstruct implementation bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .opk-issue857/chunk-*.b64 | base64 --decode > /tmp/issue857-files.tgz
          echo "8a32515f0be3aeb88a4206b6ce90d1444544bab0d55975f108942a577ddc6507  /tmp/issue857-files.tgz" | sha256sum --check
          tar -xzf /tmp/issue857-files.tgz
          git add docs scripts
          git diff --cached --check
      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No implementation changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: unify PR-session binding contract"
          git push origin HEAD:agent/issue-857-pr-session-binding-contract
