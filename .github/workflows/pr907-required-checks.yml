name: pr907-required-checks

on:
  push:
    branches:
      - diag/pr907-required-checks
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download failing legacy guard log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/88164007326/logs" > "$RUNNER_TEMP/pr907-legacy-guard.log"
          tail -n 250 "$RUNNER_TEMP/pr907-legacy-guard.log"
      - uses: actions/upload-artifact@v4
        with:
          name: pr907-legacy-guard-log
          path: ${{ runner.temp }}/pr907-legacy-guard.log
          retention-days: 1
