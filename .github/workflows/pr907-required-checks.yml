name: pr907-required-checks

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'diag/pr907-required-checks'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download failed finalizer log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/88166549043/logs" > "$RUNNER_TEMP/pr907-finalizer.log"
          tail -n 300 "$RUNNER_TEMP/pr907-finalizer.log"
      - uses: actions/upload-artifact@v4
        with:
          name: pr907-finalizer-log
          path: ${{ runner.temp }}/pr907-finalizer.log
          retention-days: 1
