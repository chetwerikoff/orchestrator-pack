name: pr907-required-checks

on:
  push:
    branches:
      - diag/pr907-required-checks
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-906-estate-cut
          fetch-depth: 0
      - name: Inspect classification records
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/pr907-legacy-classification.txt"
          {
            echo 'run-contract entrypoint'
            grep -n -F 'scripts/run-contract-evidence-legacy-list-guard.mjs' scripts/estate-cut/issue-906.manifest.json scripts/estate-cut/issue-906.config.json || true
            echo 'legacy guard test'
            grep -n -F 'scripts/contract-evidence-legacy-list-guard.test.ts' scripts/estate-cut/issue-906.manifest.json scripts/estate-cut/issue-906.config.json || true
            echo 'legacy guard workflow'
            grep -n -F '.github/workflows/contract-evidence-legacy-list-guard.yml' scripts/estate-cut/issue-906.manifest.json scripts/estate-cut/issue-906.config.json || true
            echo 'config'
            cat scripts/estate-cut/issue-906.config.json
          } | tee "$out"
      - uses: actions/upload-artifact@v4
        with:
          name: pr907-legacy-classification
          path: ${{ runner.temp }}/pr907-legacy-classification.txt
          retention-days: 1
