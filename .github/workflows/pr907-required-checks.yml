name: pr907-required-checks

on:
  pull_request:
    branches:
      - main

permissions:
  checks: read
  contents: read
  pull-requests: read
  statuses: write

jobs:
  publish-manual-pack-review:
    if: github.head_ref == 'diag/pr907-required-checks'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify review audit and publish exact-head status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_PR: '907'
          TARGET_SHA: b0ec2f52759b53785706e6db516814db5a27ad5f
          REVIEW_RUN: manual-prr-907-b0ec2f52
        run: |
          set -euo pipefail

          current_sha="$(gh pr view "$TARGET_PR" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)"
          test "$current_sha" = "$TARGET_SHA"
          state="$(gh pr view "$TARGET_PR" --repo "$GITHUB_REPOSITORY" --json state,isDraft --jq '[.state,.isDraft] | @tsv')"
          test "$state" = $'OPEN\tfalse'

          review_count="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$TARGET_PR/reviews?per_page=100" --paginate --jq \
            "[.[] | select((.body // \"\") | contains(\"Run: $REVIEW_RUN\")) | select((.body // \"\") | contains(\"Head: $TARGET_SHA\")) | select((.body // \"\") | contains(\"VERDICT: APPROVE\"))] | length")"
          test "$review_count" -ge 1

          gh pr view "$TARGET_PR" --repo "$GITHUB_REPOSITORY" --json statusCheckRollup > "$RUNNER_TEMP/checks.json"
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';
          const payload = JSON.parse(readFileSync(process.env.RUNNER_TEMP + '/checks.json', 'utf8'));
          const failures = [];
          const pending = [];
          for (const row of payload.statusCheckRollup ?? []) {
            const identity = row.name ?? row.context ?? '';
            if (identity === 'orchestrator-pack/pack-review') continue;
            if (row.__typename === 'StatusContext') {
              if (row.state !== 'SUCCESS') failures.push(`${identity}:${row.state}`);
              continue;
            }
            if (row.status !== 'COMPLETED') pending.push(`${identity}:${row.status}`);
            else if (!['SUCCESS', 'NEUTRAL', 'SKIPPED'].includes(row.conclusion)) failures.push(`${identity}:${row.conclusion}`);
          }
          if (failures.length || pending.length) {
            console.error(JSON.stringify({ failures, pending }, null, 2));
            process.exit(1);
          }
          NODE

          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$TARGET_SHA" \
            -f state=success \
            -f context='orchestrator-pack/pack-review' \
            -f description='manual pack review clean; exact-head audit verified' \
            -f target_url="https://github.com/$GITHUB_REPOSITORY/pull/$TARGET_PR" >/dev/null
