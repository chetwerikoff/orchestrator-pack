name: pr907-required-checks

on:
  push:
    branches:
      - diag/pr907-required-checks
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-906-estate-cut
          fetch-depth: 0
      - name: Inspect manifest objects
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > "$RUNNER_TEMP/pr907-manifest-objects.txt"
          import json
          from pathlib import Path
          targets = {
              'scripts/run-contract-evidence-legacy-list-guard.mjs',
              'scripts/contract-evidence-legacy-list-guard.test.ts',
              '.github/workflows/contract-evidence-legacy-list-guard.yml',
          }
          data = json.loads(Path('scripts/estate-cut/issue-906.manifest.json').read_text())
          def walk(value, trail='$'):
              if isinstance(value, dict):
                  if value.get('path') in targets:
                      print(trail)
                      print(json.dumps(value, indent=2, sort_keys=True))
                  for key, child in value.items():
                      walk(child, f'{trail}.{key}')
              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      walk(child, f'{trail}[{index}]')
          walk(data)
          PY
          cat "$RUNNER_TEMP/pr907-manifest-objects.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: pr907-manifest-objects
          path: ${{ runner.temp }}/pr907-manifest-objects.txt
          retention-days: 1
