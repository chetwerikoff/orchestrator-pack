name: issue-832 cancel stale scope runs

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cancel superseded scope-guard runs for this PR branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: agent/issue-831-json-producers-wave-b
        run: |
          set -euo pipefail
          runs="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?branch=${HEAD_BRANCH}&event=pull_request&per_page=100")"
          mapfile -t ids < <(jq -r '.workflow_runs[] | select(.workflow_id == 283233035 and .status != "completed") | .id' <<<"${runs}")
          for id in "${ids[@]}"; do
            echo "cancelling stale scope run ${id}"
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${id}/cancel" || true
          done
