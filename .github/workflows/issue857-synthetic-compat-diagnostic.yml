name: Issue 857 synthetic compatibility diagnostic

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-857-binding-contract-v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply identical candidate patch
        shell: bash
        run: |
          awk '/python - <<'"'"'PY'"'"'/{capture=1; next} capture && /^          PY$/{exit} capture {sub(/^          /, ""); print}' \
            .github/workflows/issue857-synthetic-compat-fix.yml | python -
      - name: Capture validation output
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          log=diagnostics/synthetic-compat.log
          status=0
          for command in \
            "npm test -- scripts/session-pr-binding-resolver.test.ts scripts/review-finding-delivery-submit.test.ts scripts/review-ready-stuck-guard.test.ts scripts/worker-report-store.test.ts scripts/worker-status-store.test.ts" \
            "npx tsc --project tsconfig.base.json --noEmit" \
            "node tests/powershell/Issue857.PrSessionBindingContract.Node.mjs"; do
            echo "\$ $command" >> "$log"
            bash -lc "$command" >> "$log" 2>&1 || status=$?
          done
          echo "exit=$status" >> "$log"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: issue857-synthetic-compat-${{ github.run_id }}
          path: diagnostics/synthetic-compat.log
          if-no-files-found: error
