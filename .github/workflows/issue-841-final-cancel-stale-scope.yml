name: issue-841-final-cancel-stale-scope

on:
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  cancel:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-841-bulk-gate-port
      - name: Force-cancel stale rebase-head scope run
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/29509888205/force-cancel" || true
      - name: Remove canceller and push
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/issue-841-final-cancel-stale-scope.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -u .github/workflows
          git commit -m 'chore: remove final PR 860 stale-run canceller'
          git push origin HEAD:agent/issue-841-bulk-gate-port
