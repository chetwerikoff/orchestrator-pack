name: issue-906-reconcile-trusted-ci

on:
  push:
    branches:
      - agent/issue-906-estate-cut
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: issue-906-reconcile-trusted-ci
  cancel-in-progress: true

jobs:
  reconcile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/issue-906-estate-cut

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Patch the committed cut boundary
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json

          generator = Path('scripts/estate-cut/manifest-generator.mjs')
          text = generator.read_text()

          delete_anchor = "  'docs/github-fleet-cache-measurement.md',\n"
          delete_insert = delete_anchor + """  'scripts/testmode-fleet-harness.ts',
          'scripts/testmode-fleet-reaper.shared.ts',
          'scripts/vitest-testmode-fleet-progress.ts',
          """
          if text.count(delete_anchor) != 1:
              raise SystemExit('issue-906 explicit-delete anchor drifted')
          text = text.replace(delete_anchor, delete_insert, 1)

          prune_old = "'scripts/toolchain/powershell-child-tests.json', 'scripts/toolchain/raw-child-process-baseline.json'])"
          prune_new = "'scripts/toolchain/powershell-child-tests.json', 'scripts/toolchain/raw-child-process-baseline.json', 'scripts/launch-argv-test-exclusions.manifest.json'])"
          if text.count(prune_old) != 1:
              raise SystemExit('issue-906 JSON-prune anchor drifted')
          generator.write_text(text.replace(prune_old, prune_new, 1))

          lanes_path = Path('scripts/vitest-ci-lanes.config.json')
          lanes = json.loads(lanes_path.read_text())
          lanes['classification']['scripts/estate-cut/issue-906-vertical-slice.test.ts'] = 'light'
          lanes['classification'] = dict(sorted(lanes['classification'].items()))
          lanes_path.write_text(json.dumps(lanes, indent=2) + '\n')
          PY

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply and verify the regenerated cut
        shell: bash
        run: |
          set -o pipefail
          node --experimental-strip-types scripts/estate-cut/manifest-generator.mjs --apply --write --check 2>&1 | tee /tmp/issue-906-reconcile.log

      - name: Generate declaration snapshot
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/issues/906" --jq .body > /tmp/issue-906-body.md
          node --experimental-strip-types --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { execFileSync } from 'node:child_process';
          import { readFileSync, writeFileSync } from 'node:fs';
          import { parseIssueBody } from './plugins/_shared/lib/issue_parser.ts';

          const baseCommitSha = JSON.parse(
            readFileSync('scripts/estate-cut/issue-906.config.json', 'utf8'),
          ).baseCommitSha;
          const constraints = parseIssueBody(readFileSync('/tmp/issue-906-body.md', 'utf8'));
          const runGit = (args) => execFileSync('git', args, { encoding: 'utf8' });
          const splitZero = (value) => value
            .split('\0')
            .filter(Boolean)
            .map((path) => path.replaceAll('\\', '/'));
          const changed = splitZero(runGit(['diff', '--name-only', '-z', baseCommitSha, '--']));
          const untracked = splitZero(runGit(['ls-files', '--others', '--exclude-standard', '-z']));
          const control = new Set(['docs/declarations/906.chatgpt-estate-cut.json']);
          const declaredPaths = [...new Set([...changed, ...untracked])]
            .filter((path) =>
              !control.has(path)
              && path !== '.github/workflows/issue-906-bootstrap.yml'
              && !path.startsWith('.issue-906-bootstrap/'))
            .sort();
          const declaredGlobs = [];
          const payload = {
            declared_paths: declaredPaths,
            declared_globs: declaredGlobs,
            issue_denylist: [...constraints.denylist].sort(),
          };
          if (constraints.allowed_roots !== undefined) {
            payload.issue_allowed_roots = [...constraints.allowed_roots].sort();
          }
          const activeScopeHash = `sha256:${createHash('sha256')
            .update(JSON.stringify(payload), 'utf8')
            .digest('hex')}`;
          const snapshot = {
            issue_number: 906,
            iteration_id: 'chatgpt-estate-cut',
            iteration_id_source: 'wrapper_generated',
            supersedes: null,
            created_at: new Date().toISOString(),
            baseline: {
              commit_sha: baseCommitSha,
              worktree_dirty: false,
              active_scope_hash: activeScopeHash,
            },
            declared_paths: declaredPaths,
            declared_globs: declaredGlobs,
            amendments: [],
          };
          writeFileSync(
            'docs/declarations/906.chatgpt-estate-cut.json',
            `${JSON.stringify(snapshot, null, 2)}\n`,
          );
          console.log(`issue-906 declaration generated: ${declaredPaths.length} scoped paths`);
          NODE

      - name: Validate trusted-CI compatibility
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/issue-906-validation.log
          run_step() {
            printf '\n===== %s =====\n' "$*" | tee -a /tmp/issue-906-validation.log
            "$@" 2>&1 | tee -a /tmp/issue-906-validation.log
          }

          run_step npm run estate-cut:check
          run_step npx tsc --project tsconfig.base.json --noEmit
          run_step npm run typecheck:foundation
          run_step npm run lint:foundation
          run_step npm run gate-runner-selftest
          run_step npm run test:issue-906
          run_step npm run test:foundation
          run_step npm test
          run_step pwsh -NoProfile -File ./scripts/verify.ps1
          run_step pwsh -NoProfile -File ./scripts/check-reusable.ps1
          run_step pwsh -NoProfile -File ./scripts/check-ci-cheap-wins.ps1
          run_step pwsh -NoProfile -File ./scripts/check-verify-runtime.ps1

          topology_output="$(mktemp)"
          GITHUB_OUTPUT="$topology_output" OPK_DISABLE_PRE_TOPOLOGY_MEASUREMENT=1 \
            run_step node scripts/emit-vitest-heavy-topology.mjs --gha-output --skip-oversized-guard
          cat "$topology_output" | tee -a /tmp/issue-906-validation.log

          run_step git diff --check
          run_step test ! -e .github/workflows/issue-906-bootstrap.yml
          run_step test ! -e scripts/testmode-fleet-harness.ts
          run_step test ! -e scripts/testmode-fleet-reaper.shared.ts
          run_step test ! -e scripts/vitest-testmode-fleet-progress.ts

      - name: Upload reconciliation diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue-906-trusted-ci-diagnostics
          path: |
            /tmp/issue-906-reconcile.log
            /tmp/issue-906-validation.log
          retention-days: 1

      - name: Publish reconciled tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reconcile issue 906 trusted CI"
          git push origin HEAD:agent/issue-906-estate-cut
