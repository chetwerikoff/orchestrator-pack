name: issue-906-router-diagnostic

on:
  push:
    branches:
      - agent/issue-906-estate-cut
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: issue-906-router-diagnostic
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/issue-906-estate-cut

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore implementation sources
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .issue-906-bootstrap -maxdepth 1 -name 'part*' -type f | wc -l)" -eq 6
          cat .issue-906-bootstrap/part* | base64 --decode > /tmp/issue-906-bootstrap.tgz
          echo "865834785cb8165914616aecae47e93199243cf2751aee72ef098af8f52af72e  /tmp/issue-906-bootstrap.tgz" | sha256sum --check
          tar -xzf /tmp/issue-906-bootstrap.tgz
          python - <<'PY'
          from pathlib import Path

          generator = Path('scripts/estate-cut/manifest-generator.mjs')
          text = generator.read_text()
          replacements = [
              (
                  """  if (args.has('--apply')) {\n    applyTree(built);\n    built = await buildIssue906Manifest();\n  }\n""",
                  """  if (args.has('--apply')) {\n    applyTree(built);\n    if (!fileExists(MANIFEST)) writeFileSync(path.join(repoRoot, MANIFEST), '');\n    built = await buildIssue906Manifest();\n  }\n""",
                  'first-run manifest',
              ),
              (
                  """const NEW_ARTIFACTS = new Set([\n  CONFIG, ANCHOR, SCRIPT, MANIFEST,\n""",
                  """const NEW_ARTIFACTS = new Set([\n  CONFIG, ANCHOR, SCRIPT, MANIFEST,\n  'docs/declarations/906.chatgpt-estate-cut.json',\n""",
                  'declaration artifact',
              ),
              (
                  """  'scripts/check-review-delivery-no-visibility-poll.ps1',\n""",
                  """  'scripts/check-review-delivery-no-visibility-poll.ps1',\n  'scripts/check-scripted-review-confirmed-delivery-gate.ps1',\n""",
                  'live guard pin',
              ),
              (
                  """  const deletedChecks = [...deletedSet].filter((rel) => rel.startsWith('scripts/check-'));\n  const containsDeletedCheck = (line) => deletedChecks.some((rel) => line.includes(rel));\n""",
                  """  const deletedChecks = [...deletedSet].filter((rel) => rel.startsWith('scripts/check-'));\n  const retiredInlineMarkers = new Set([\n    'verify-runtime/autonomous-spawn-budget-vitest',\n    'verify-runtime/autonomous-spawn-policy-vitest',\n  ]);\n  const containsDeletedCheck = (line) => deletedChecks.some((rel) => line.includes(rel));\n""",
                  'inline retirement declaration',
              ),
              (
                  """    const line = lines[index];\n    if (!containsDeletedCheck(line)) {\n      output.push(line);\n""",
                  """    const line = lines[index];\n    if ([...retiredInlineMarkers].some((marker) => line.includes(`Write-Check '${marker}'`))) {\n      index += 1;\n      continue;\n    }\n    if (!containsDeletedCheck(line)) {\n      output.push(line);\n""",
                  'inline retirement loop',
              ),
              (
                  """  generation.migrationOwnershipDigest = migrationOwnershipDigest(transformedCensus.entries);\n  writeFileSync(generationPath, stable(generation));\n  pruneSupervisorRegistry();\n""",
                  """  generation.migrationOwnershipDigest = migrationOwnershipDigest(transformedCensus.entries);\n  writeFileSync(generationPath, stable(generation));\n  const censusSourcePath = path.join(repoRoot, 'scripts/gate-runner/census.ts');\n  const censusSource = readFileSync(censusSourcePath, 'utf8');\n  const digestPattern = /const EXPECTED_MIGRATION_OWNERSHIP_DIGEST = '[a-f0-9]{64}';/u;\n  if (!digestPattern.test(censusSource)) throw new Error('census ownership digest constant missing');\n  writeFileSync(censusSourcePath, censusSource.replace(digestPattern, `const EXPECTED_MIGRATION_OWNERSHIP_DIGEST = '${generation.migrationOwnershipDigest}';`));\n  pruneSupervisorRegistry();\n""",
                  'census digest',
              ),
          ]
          for old, new, name in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'issue-906 patch target drifted: {name}')
              text = text.replace(old, new, 1)
          generator.write_text(text)

          Path('scripts/vitest-global-setup.ts').write_text("""import { applyOpkVitestHarnessEscalationEnv } from './test-harness-escalation-env.js';

          export default function setup(): void {
            applyOpkVitestHarnessEscalationEnv();
          }
          """)
          vitest = Path('vitest.config.ts')
          text = vitest.read_text()
          retired = "      'scripts/vitest-testmode-fleet-progress.ts',\n"
          if text.count(retired) != 1:
              raise SystemExit('issue-906 fleet progress setup target drifted')
          vitest.write_text(text.replace(retired, '', 1))
          PY
          mkdir -p docs/declarations
          printf '{}\n' > docs/declarations/906.chatgpt-estate-cut.json
          rm -rf .issue-906-bootstrap

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply base-pinned estate cut
        run: node --experimental-strip-types scripts/estate-cut/manifest-generator.mjs --apply --write --check

      - name: Instrument protected router test
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/orchestrator-escalation-router.test.ts')
          text = path.read_text()
          needle = "    expect(router.status, `${router.stdout}\\n${router.stderr}`).toBe(0);"
          replacement = "    console.log('ROUTER_DIAGNOSTIC', JSON.stringify({ stdout: router.stdout, stderr: router.stderr }, null, 2));\n" + needle
          count = text.count(needle)
          if count < 1:
              raise SystemExit('router assertion target missing')
          path.write_text(text.replace(needle, replacement))
          print(f'instrumented {count} router assertions')
          PY

      - name: Run focused router diagnostic
        shell: bash
        run: |
          set -o pipefail
          node scripts/run-vitest-with-harness.mjs run scripts/orchestrator-escalation-router.test.ts --reporter=verbose 2>&1 | tee /tmp/issue-906-router-debug.log || true

      - name: Upload router diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: issue-906-router-diagnostic
          path: /tmp/issue-906-router-debug.log
          retention-days: 1

      - name: Stop before publication
        run: exit 1
