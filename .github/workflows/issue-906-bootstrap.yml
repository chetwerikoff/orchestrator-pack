name: issue-906-finalize

on:
  push:
    branches:
      - agent/issue-906-estate-cut
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: issue-906-finalize
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/issue-906-estate-cut

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore implementation sources
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .issue-906-bootstrap -maxdepth 1 -name 'part*' -type f | wc -l)" -eq 6
          cat .issue-906-bootstrap/part* | base64 --decode > /tmp/issue-906-bootstrap.tgz
          echo "865834785cb8165914616aecae47e93199243cf2751aee72ef098af8f52af72e  /tmp/issue-906-bootstrap.tgz" | sha256sum --check
          tar -xzf /tmp/issue-906-bootstrap.tgz
          rm -rf .issue-906-bootstrap

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply base-pinned estate cut
        shell: bash
        run: |
          set -o pipefail
          node --experimental-strip-types scripts/estate-cut/manifest-generator.mjs --apply --write --check 2>&1 | tee /tmp/issue-906-apply.log

      - name: Upload apply diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: issue-906-apply-diagnostics
          path: /tmp/issue-906-apply.log
          retention-days: 1

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          npm run estate-cut:check
          npm run typecheck:foundation
          npm run lint:foundation
          npm run gate-runner-selftest
          npm run test:issue-906
          npm run test:foundation
          npm test
          git diff --check
          test ! -e .github/workflows/issue-906-bootstrap.yml
          test ! -e .issue-906-bootstrap

      - name: Publish final implementation tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: cut legacy estate for issue 906"
          git push origin HEAD:agent/issue-906-estate-cut
