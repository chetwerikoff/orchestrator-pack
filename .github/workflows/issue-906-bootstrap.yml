name: issue-906-bootstrap

on:
  push:
    branches:
      - agent/issue-906-estate-cut
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Pack repository and base revision
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          git ls-files -z | tar --null -T - -czf orchestrator-pack-issue-906.tgz
          git archive --format=tar.gz --output=orchestrator-pack-issue-906-base.tgz "$BASE_SHA"
          git bundle create orchestrator-pack-issue-906.bundle --all
          git rev-parse HEAD > snapshot-head.txt
          printf '%s\n' "$BASE_SHA" > snapshot-base.txt
      - uses: actions/upload-artifact@v4
        with:
          name: issue-906-repo-snapshot
          path: |
            orchestrator-pack-issue-906.tgz
            orchestrator-pack-issue-906-base.tgz
            orchestrator-pack-issue-906.bundle
            snapshot-head.txt
            snapshot-base.txt
          retention-days: 1
