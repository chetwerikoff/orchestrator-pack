name: review-4750643719-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: review-4750643719-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TARGET_BRANCH: agent/issue-923-pr2-foundation
      TARGET_HEAD: fa5f0a509454b31ed760c8f5cc218552a325c915
      CHUNKS_COMMIT: 7dc3c9a330ffac3a8c0511ca50892795f9abc76a
      CHUNKS_SHA256: eed898b961202a3156d462644885f7414aa7327e449b6756c3798ad3675ae214
      FINAL_HELPER_SHA256: c61f9bf406c8e3de7f84e839d6986c1f2ac710fa73bff0a2a6d88d51bd3b3205
    steps:
      - name: Checkout exact PR 939 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Assemble and apply exact review fix
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/verification.log"
          exec > >(tee -a "$RUNNER_TEMP/verification.log") 2>&1
          test "$(git rev-parse HEAD)" = "$TARGET_HEAD"
          git fetch origin "$CHUNKS_COMMIT" main
          : > "$RUNNER_TEMP/apply.py.gz.b64"
          for part in 00 01 02 03 04 05 06 07 08 09; do
            git show "$CHUNKS_COMMIT:scripts/review-4750643719-final-chunks/${part}.part" \
              >> "$RUNNER_TEMP/apply.py.gz.b64"
          done
          echo "$CHUNKS_SHA256  $RUNNER_TEMP/apply.py.gz.b64" | sha256sum --check --strict
          base64 --decode "$RUNNER_TEMP/apply.py.gz.b64" \
            | gzip --decompress \
            > "$RUNNER_TEMP/apply.py"
          echo "$FINAL_HELPER_SHA256  $RUNNER_TEMP/apply.py" | sha256sum --check --strict
          python3 -m py_compile "$RUNNER_TEMP/apply.py"
          python3 "$RUNNER_TEMP/apply.py"
          python3 <<'PY'
          from pathlib import Path

          gate_path = Path('scripts/pr2-foundation/worker-nudge-gate.ts')
          gate = gate_path.read_text(encoding='utf-8')
          gate_anchor = """export function hashNudgeMessageContent(message: string): string {
          """
          gate_insertion = """export function canonicalStoreId(storePath: string): string {
            const canonical = canonicalizeStorePath(storePath);
            return canonical ? createHash('sha256').update(canonical).digest('hex').slice(0, 24) : '';
          }

          export function hashNudgeMessageContent(message: string): string {
          """
          if gate.count(gate_anchor) != 1:
              raise SystemExit(f'canonicalStoreId insertion anchor cardinality: {gate.count(gate_anchor)}')
          gate_path.write_text(gate.replace(gate_anchor, gate_insertion, 1), encoding='utf-8')

          runner_path = Path('scripts/pr2-foundation/contract-test-runner.ts')
          runner = runner_path.read_text(encoding='utf-8')
          runner_anchor = """    env: { OPK_CONTRACT_MUTATIONS_ALREADY_RUN: '1' },
          """
          runner_replacement = """    env: {
                OPK_CONTRACT_MUTATIONS_ALREADY_RUN: '1',
                OPK_VITEST_HARNESS: '1',
              },
          """
          if runner.count(runner_anchor) != 1:
              raise SystemExit(f'contract runner env anchor cardinality: {runner.count(runner_anchor)}')
          runner_path.write_text(runner.replace(runner_anchor, runner_replacement, 1), encoding='utf-8')

          external_path = Path('scripts/pr2-foundation/mutation-external-ci.test.ts')
          external = external_path.read_text(encoding='utf-8')
          describe_anchor = 'describe('
          describe_replacement = "describe.skipIf(process.env.OPK_VITEST_PRE_TOPOLOGY_MEASUREMENT === '1')("
          if external.count(describe_anchor) != 1:
              raise SystemExit(f'mutation external describe anchor cardinality: {external.count(describe_anchor)}')
          external_path.write_text(external.replace(describe_anchor, describe_replacement, 1), encoding='utf-8')

          semantic_path = Path('scripts/pr2-foundation/mutation-semantic-gates.ts')
          semantic = semantic_path.read_text(encoding='utf-8')
          semantic_anchor = """function baseGate(pathName: string): TextGate {
            return { path: pathName, baseEqual: true };
          }
          """
          semantic_replacement = """const IMMUTABLE_BASE_SHA256: Readonly<Record<string, string>> = Object.freeze({
            'scripts/orchestrator-side-process-registry.json': 'b1c945541db67d48cdbf7c44777ae478e3cf11bd66255a82f7852767f0e0f39a',
            'scripts/review-trigger-reconcile.ps1': '20762cfc1549a1c7d03516b87da7c8d0a6d9daf9606cac99d27f3cc3ee1864d8',
            'scripts/pack-review-runner.ts': '20889c052830aa8d8039e0099bd97234ced63cc226342512e0f24a1f26b4afec',
            'scripts/orchestrator-wake-supervisor.ps1': 'c84ebfe9166960f1b4079f86019f9eaa997276680a6e42f8db5d402e71cf3391',
            'tests/external-output-references/capture-manifest.json': '82ac82a443123b90dd688a31f1af5f00b9058e96c4f536f8ae691ed01e917987',
          });

          function baseGate(pathName: string): TextGate {
            return {
              path: pathName,
              baseEqual: true,
              custom: () => {
                const expected = IMMUTABLE_BASE_SHA256[pathName];
                if (!expected) return `base_digest_missing:${pathName}`;
                const actual = createHash('sha256')
                  .update(readFileSync(path.resolve(pathName)))
                  .digest('hex');
                return actual === expected ? null : `base_byte_mismatch:${pathName}`;
              },
            };
          }
          """
          if semantic.count(semantic_anchor) != 1:
              raise SystemExit(f'baseGate anchor cardinality: {semantic.count(semantic_anchor)}')
          semantic = semantic.replace(semantic_anchor, semantic_replacement, 1)
          evaluation_anchor = """  if (gate.baseEqual && !baseBlobMatches(gate.path)) {
          """
          evaluation_replacement = """  if (gate.baseEqual && !gate.custom && !baseBlobMatches(gate.path)) {
          """
          if semantic.count(evaluation_anchor) != 1:
              raise SystemExit(f'baseGate evaluation anchor cardinality: {semantic.count(evaluation_anchor)}')
          semantic_path.write_text(semantic.replace(evaluation_anchor, evaluation_replacement, 1), encoding='utf-8')

          foundation_workflow_path = Path('.github/workflows/typescript-foundation.yml')
          foundation_workflow = foundation_workflow_path.read_text(encoding='utf-8').rstrip()
          if '\n  contract-mutations:\n' in foundation_workflow:
              raise SystemExit('contract mutation job already present')
          mutation_job = """

            contract-mutations:
              name: Contract mutation evidence
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0
                - uses: actions/setup-node@v4
                  with:
                    node-version: '22'
                    cache: npm
                - name: Install from frozen lockfile
                  run: npm ci --include=dev
                - name: Enforce pinned Node major
                  run: npm run check:node-major
                - name: Run external red-green mutation evidence
                  run: npm run test:contract-mutations
          """
          foundation_workflow_path.write_text(foundation_workflow + mutation_job + '\n', encoding='utf-8')
          PY
          grep -q '^  contract-mutations:' .github/workflows/typescript-foundation.yml
          grep -q 'npm run test:contract-mutations' .github/workflows/typescript-foundation.yml
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m 'fix: address review 4750643719'
          git status --short

      - name: Verify exact candidate commit
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee -a "$RUNNER_TEMP/verification.log") 2>&1
          npm ci --include=dev
          npm run check:node-major
          npm run typecheck:foundation
          npm run lint:foundation
          OPK_VITEST_HARNESS=1 npx vitest run \
            scripts/pr2-foundation/review-4750643719-regression.test.ts \
            scripts/pr2-foundation/worker-notification-compat.test.ts \
            scripts/pr2-foundation/migration-symlink.test.ts \
            scripts/pr2-foundation/terminalized-port.test.ts \
            scripts/pr2-foundation/mutation-catalog.test.ts \
            scripts/pr2-foundation/mutation-semantic-gates.test.ts \
            scripts/pr2-foundation/real-scope-proof.test.ts \
            scripts/pr2-foundation/foundation.test.ts
          npm run test:contract-mutations
          pwsh -NoProfile -File ./scripts/verify.ps1
          pwsh -NoProfile -File ./scripts/check-reusable.ps1
          pwsh -NoProfile -File ./scripts/check-ci-pipeline-split.ps1
          started="$(date +%s)"
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 \
            -Strict \
            -BaseRef origin/main \
            -HeadRef HEAD
          elapsed=$(( $(date +%s) - started ))
          echo "self_architect_elapsed_seconds=$elapsed"
          test "$elapsed" -lt 600
          git restore --source=HEAD -- scripts/vitest-heavy-topology.plan.json
          echo FINAL_STATUS_BEGIN
          git status --short
          echo FINAL_STATUS_END
          git diff --check
          test -z "$(git status --short)"

      - name: Upload verification transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-4750643719-verification
          path: ${{ runner.temp }}/verification.log
          if-no-files-found: warn

      - name: Push verified fix
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          test "$(git rev-parse origin/$TARGET_BRANCH)" = "$TARGET_HEAD"
          git push origin HEAD:"$TARGET_BRANCH"
