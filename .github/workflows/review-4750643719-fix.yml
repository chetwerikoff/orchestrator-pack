name: review-4750643719-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: review-4750643719-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TARGET_BRANCH: agent/issue-923-pr2-foundation
      TARGET_HEAD: fa5f0a509454b31ed760c8f5cc218552a325c915
      CHUNKS_COMMIT: 7dc3c9a330ffac3a8c0511ca50892795f9abc76a
      CHUNKS_SHA256: eed898b961202a3156d462644885f7414aa7327e449b6756c3798ad3675ae214
      FINAL_HELPER_SHA256: c61f9bf406c8e3de7f84e839d6986c1f2ac710fa73bff0a2a6d88d51bd3b3205
    steps:
      - name: Checkout exact PR 939 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Assemble and apply exact review fix
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/verification.log"
          exec > >(tee -a "$RUNNER_TEMP/verification.log") 2>&1
          test "$(git rev-parse HEAD)" = "$TARGET_HEAD"
          git fetch origin "$CHUNKS_COMMIT" main
          : > "$RUNNER_TEMP/apply.py.gz.b64"
          for part in 00 01 02 03 04 05 06 07 08 09; do
            git show "$CHUNKS_COMMIT:scripts/review-4750643719-final-chunks/${part}.part" \
              >> "$RUNNER_TEMP/apply.py.gz.b64"
          done
          echo "$CHUNKS_SHA256  $RUNNER_TEMP/apply.py.gz.b64" | sha256sum --check --strict
          base64 --decode "$RUNNER_TEMP/apply.py.gz.b64" \
            | gzip --decompress \
            > "$RUNNER_TEMP/apply.py"
          echo "$FINAL_HELPER_SHA256  $RUNNER_TEMP/apply.py" | sha256sum --check --strict
          python3 -m py_compile "$RUNNER_TEMP/apply.py"
          python3 "$RUNNER_TEMP/apply.py"
          python3 <<'PY'
          from pathlib import Path

          gate_path = Path('scripts/pr2-foundation/worker-nudge-gate.ts')
          gate = gate_path.read_text(encoding='utf-8')
          gate_anchor = """export function hashNudgeMessageContent(message: string): string {
          """
          gate_insertion = """export function canonicalStoreId(storePath: string): string {
            const canonical = canonicalizeStorePath(storePath);
            return canonical ? createHash('sha256').update(canonical).digest('hex').slice(0, 24) : '';
          }

          export function hashNudgeMessageContent(message: string): string {
          """
          if gate.count(gate_anchor) != 1:
              raise SystemExit(f'canonicalStoreId insertion anchor cardinality: {gate.count(gate_anchor)}')
          gate_path.write_text(gate.replace(gate_anchor, gate_insertion, 1), encoding='utf-8')

          runner_path = Path('scripts/pr2-foundation/contract-test-runner.ts')
          runner = runner_path.read_text(encoding='utf-8')
          runner_anchor = """    env: { OPK_CONTRACT_MUTATIONS_ALREADY_RUN: '1' },
          """
          runner_replacement = """    env: {
                OPK_CONTRACT_MUTATIONS_ALREADY_RUN: '1',
                OPK_VITEST_HARNESS: '1',
              },
          """
          if runner.count(runner_anchor) != 1:
              raise SystemExit(f'contract runner env anchor cardinality: {runner.count(runner_anchor)}')
          runner_path.write_text(runner.replace(runner_anchor, runner_replacement, 1), encoding='utf-8')
          PY
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m 'fix: address review 4750643719'
          git status --short

      - name: Verify exact candidate commit
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee -a "$RUNNER_TEMP/verification.log") 2>&1
          npm ci --include=dev
          npm run check:node-major
          npm run typecheck:foundation
          npm run lint:foundation
          OPK_VITEST_HARNESS=1 npx vitest run \
            scripts/pr2-foundation/review-4750643719-regression.test.ts \
            scripts/pr2-foundation/worker-notification-compat.test.ts \
            scripts/pr2-foundation/migration-symlink.test.ts \
            scripts/pr2-foundation/terminalized-port.test.ts \
            scripts/pr2-foundation/mutation-catalog.test.ts \
            scripts/pr2-foundation/mutation-semantic-gates.test.ts \
            scripts/pr2-foundation/real-scope-proof.test.ts \
            scripts/pr2-foundation/foundation.test.ts
          npm run test:contract-mutations
          pwsh -NoProfile -File ./scripts/verify.ps1
          pwsh -NoProfile -File ./scripts/check-reusable.ps1
          pwsh -NoProfile -File ./scripts/check-ci-pipeline-split.ps1
          started="$(date +%s)"
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 \
            -Strict \
            -BaseRef origin/main \
            -HeadRef HEAD
          elapsed=$(( $(date +%s) - started ))
          echo "self_architect_elapsed_seconds=$elapsed"
          test "$elapsed" -lt 600
          git diff --check
          test -z "$(git status --short)"

      - name: Upload verification transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-4750643719-verification
          path: ${{ runner.temp }}/verification.log
          if-no-files-found: warn

      - name: Push verified fix
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          test "$(git rev-parse origin/$TARGET_BRANCH)" = "$TARGET_HEAD"
          git push origin HEAD:"$TARGET_BRANCH"
