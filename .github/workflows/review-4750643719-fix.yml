name: review-4750643719-fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: review-4750643719-fix
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'agent/issue-923-validation-probe'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TARGET_BRANCH: agent/issue-923-pr2-foundation
      TARGET_HEAD: fa5f0a509454b31ed760c8f5cc218552a325c915
      HELPER_COMMIT: f13aa583084bc4ea4c5428ca2c15f20e1073c163
      HELPER_SHA256: cc099dac3f45bbb59b5724980f884bb377b4273e1754b5c10ce6c507cc6fce83
      HOTFIX_COMMIT: c88f9e03c2637031a3a50d34a1d319373c4cc040
      HOTFIX_SHA256: c5eb7f8913572e6e4a945bcc4c199ccb52a0c45b9d650ffcbded6028a58d8504
      HOTFIX_V2_COMMIT: 473ffcd9efdaa851d7cfdd685692f5a23ceaaba4
      HOTFIX_V2_SHA256: 9446c7940493769957ab8d8353977a927acb8d1c7c4514807115a8b2b8dfc69a
    steps:
      - name: Checkout exact PR 939 head
        uses: actions/checkout@v4
        with:
          ref: agent/issue-923-pr2-foundation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Decode and apply bounded review fix
        shell: bash
        run: |
          set -euo pipefail
          : > "$RUNNER_TEMP/verification.log"
          exec > >(tee -a "$RUNNER_TEMP/verification.log") 2>&1
          test "$(git rev-parse HEAD)" = "$TARGET_HEAD"
          git fetch origin "$HELPER_COMMIT" "$HOTFIX_COMMIT" "$HOTFIX_V2_COMMIT" main
          git show "$HELPER_COMMIT:scripts/review-4750643719-finalize.py.gz.b64" \
            | base64 --decode \
            | gzip --decompress \
            > "$RUNNER_TEMP/apply.py"
          git show "$HOTFIX_COMMIT:scripts/review-4750643719-helper-hotfix.py" \
            > "$RUNNER_TEMP/helper-hotfix.py"
          git show "$HOTFIX_V2_COMMIT:scripts/review-4750643719-helper-hotfix-v2.py" \
            > "$RUNNER_TEMP/helper-hotfix-v2.py"
          echo "$HELPER_SHA256  $RUNNER_TEMP/apply.py" | sha256sum --check --strict
          echo "$HOTFIX_SHA256  $RUNNER_TEMP/helper-hotfix.py" | sha256sum --check --strict
          echo "$HOTFIX_V2_SHA256  $RUNNER_TEMP/helper-hotfix-v2.py" | sha256sum --check --strict
          python3 "$RUNNER_TEMP/helper-hotfix.py" "$RUNNER_TEMP/apply.py"
          python3 "$RUNNER_TEMP/helper-hotfix-v2.py" "$RUNNER_TEMP/apply.py"
          python3 -m py_compile "$RUNNER_TEMP/apply.py"
          python3 "$RUNNER_TEMP/apply.py"
          git diff --check
          git status --short

      - name: Verify exact patched head
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee -a "$RUNNER_TEMP/verification.log") 2>&1
          npm ci --include=dev
          npm run check:node-major
          npm run typecheck:foundation
          npm run lint:foundation
          OPK_VITEST_HARNESS=1 npx vitest run \
            scripts/pr2-foundation/review-4750643719-regression.test.ts \
            scripts/pr2-foundation/worker-notification-compat.test.ts \
            scripts/pr2-foundation/migration-symlink.test.ts \
            scripts/pr2-foundation/terminalized-port.test.ts \
            scripts/pr2-foundation/mutation-catalog.test.ts \
            scripts/pr2-foundation/mutation-semantic-gates.test.ts \
            scripts/pr2-foundation/real-scope-proof.test.ts \
            scripts/pr2-foundation/foundation.test.ts
          npm run test:contract-mutations
          pwsh -NoProfile -File ./scripts/verify.ps1
          pwsh -NoProfile -File ./scripts/check-reusable.ps1
          pwsh -NoProfile -File ./scripts/check-ci-pipeline-split.ps1
          started="$(date +%s)"
          pwsh -NoProfile -File ./scripts/lint-self-architect.ps1 \
            -Strict \
            -BaseRef origin/main \
            -HeadRef HEAD
          elapsed=$(( $(date +%s) - started ))
          echo "self_architect_elapsed_seconds=$elapsed"
          test "$elapsed" -lt 600
          git diff --check

      - name: Upload verification transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-4750643719-verification
          path: ${{ runner.temp }}/verification.log
          if-no-files-found: warn

      - name: Commit and push verified fix
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$TARGET_BRANCH"
          test "$(git rev-parse origin/$TARGET_BRANCH)" = "$TARGET_HEAD"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m 'fix: address review 4750643719'
          git push origin HEAD:"$TARGET_BRANCH"
