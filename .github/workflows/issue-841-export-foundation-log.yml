name: issue-841-export-foundation-log

on:
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'agent/issue-841-bulk-gate-port'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Export completed foundation job log
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/actions/jobs/87644044228/logs" > "$RUNNER_TEMP/foundation.log"
      - name: Upload foundation log
        uses: actions/upload-artifact@v4
        with:
          name: pr860-post-rebase-foundation-log
          path: ${{ runner.temp }}/foundation.log
          retention-days: 1
          if-no-files-found: error
