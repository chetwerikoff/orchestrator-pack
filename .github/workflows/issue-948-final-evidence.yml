name: issue-948-final-evidence

on:
  pull_request:

permissions:
  contents: read
  issues: read

env:
  TARGET_SHA: 3302181e9c77fc2f2967ddedba37bef18fd07af5
  LEGACY_SHA: b967dfe156838039e1d6d137e7064dc9d1b10b4d
  GH_TOKEN: ${{ github.token }}

jobs:
  pre-receipt:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Run pre-receipt verification and build receipt
        shell: bash
        run: |
          set -euo pipefail
          EVID="$RUNNER_TEMP/issue948-evidence"
          rm -rf "$EVID"
          mkdir -p "$EVID/commands" "$EVID/overlap" "$EVID/rollback" "$EVID/external"
          TARGET_COMMIT=$(git rev-parse "$TARGET_SHA^{commit}")
          TARGET_TREE=$(git rev-parse "$TARGET_SHA^{tree}")
          LEGACY_TREE=$(git rev-parse "$LEGACY_SHA^{tree}")
          [ -z "$(git status --porcelain --untracked-files=all)" ]

          cat > "$RUNNER_TEMP/record-evidence.cjs" <<'JS'
          const fs=require('node:fs'); const path=require('node:path'); const crypto=require('node:crypto');
          const root=process.env.EVID; const prefix=process.env.PREFIX||'';
          const rel=x=>prefix?`${prefix}/${x}`:x;
          const resultRel=rel(`commands/${process.env.SLUG}.json`), logRel=rel(`commands/${process.env.SLUG}.log`), rowRel=rel(`commands/${process.env.SLUG}.row.json`);
          const sha=r=>`sha256:${crypto.createHash('sha256').update(fs.readFileSync(path.join(root,r))).digest('hex')}`;
          const result={schemaVersion:1,command:process.env.LABEL,exitCode:Number(process.env.CODE),checkoutCommitSha:process.env.TARGET_COMMIT,checkoutTreeOid:process.env.TARGET_TREE,startedAtUtc:process.env.STARTED,completedAtUtc:process.env.COMPLETED};
          fs.writeFileSync(path.join(root,resultRel),`${JSON.stringify(result)}\n`);
          const row={command:process.env.LABEL,exitCode:Number(process.env.CODE),checkoutCommitSha:process.env.TARGET_COMMIT,checkoutTreeOid:process.env.TARGET_TREE,resultPath:resultRel,resultSha256:sha(resultRel),logPath:logRel,logSha256:sha(logRel)};
          fs.writeFileSync(path.join(root,rowRel),`${JSON.stringify(row)}\n`);
          JS

          cat > "$RUNNER_TEMP/heavy.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          PLAN=scripts/vitest-heavy-topology.plan.json
          BASELINE=$(mktemp)
          git show "$TARGET_SHA:$PLAN" > "$BASELINE"
          restore_plan(){ cat "$BASELINE" > "$PLAN"; rm -f "$BASELINE"; }
          trap restore_plan EXIT
          rm -f "$PLAN"
          node scripts/emit-vitest-heavy-topology.mjs
          count=$(node -e "const p=require('./scripts/vitest-heavy-topology.plan.json');process.stdout.write(String(p.heavyShardCount))")
          export OPK_VITEST_TOPOLOGY_PLAN_PATH="$PWD/$PLAN"
          for shard in $(seq 1 "$count"); do pwsh -NoProfile -File scripts/run-vitest-heavy-shard.ps1 -Shard "$shard"; done
          restore_plan
          trap - EXIT
          SH
          chmod +x "$RUNNER_TEMP/heavy.sh"

          run_record(){
            local label="$1" slug="$2"; shift 2
            local log="$EVID/commands/${slug}.log" started completed code
            started=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)
            set +e; "$@" >"$log" 2>&1; code=$?; set -e
            completed=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)
            EVID="$EVID" LABEL="$label" SLUG="$slug" CODE="$code" STARTED="$started" COMPLETED="$completed" TARGET_COMMIT="$TARGET_COMMIT" TARGET_TREE="$TARGET_TREE" node "$RUNNER_TEMP/record-evidence.cjs"
            if [ "$code" -ne 0 ]; then cat "$log"; return "$code"; fi
          }

          run_record 'npm run typecheck:foundation' '01-typecheck' npm run typecheck:foundation
          run_record 'npm run lint:foundation' '02-lint' npm run lint:foundation
          run_record 'npm run test:contract-mutations' '03-mutations' npm run test:contract-mutations
          run_record 'npm run test:issue-948' '04-issue948' npm run test:issue-948
          run_record 'pwsh -NoProfile -File scripts/verify.ps1' '05-verify' pwsh -NoProfile -File scripts/verify.ps1
          run_record 'pwsh -NoProfile -File scripts/check-reusable.ps1' '06-reusable' pwsh -NoProfile -File scripts/check-reusable.ps1
          run_record 'pwsh -NoProfile -File scripts/test-all.ps1' '07-pester' pwsh -NoProfile -File scripts/test-all.ps1
          run_record 'vitest-light' '08-vitest-light' pwsh -NoProfile -File scripts/run-vitest-light-lane.ps1
          run_record 'vitest-heavy' '09-vitest-heavy' bash "$RUNNER_TEMP/heavy.sh"

          rm -f .vitest-runtime-report*.json
          git restore --source="$TARGET_SHA" -- scripts/vitest-heavy-topology.plan.json
          git status --porcelain --untracked-files=all > "$EVID/pre-receipt-git-status.txt"
          [ ! -s "$EVID/pre-receipt-git-status.txt" ]

          CANDIDATE_BUILD_DIGEST=$(node --experimental-strip-types --input-type=module - "$TARGET_SHA" <<'JS'
          import { buildCandidateBuildProvenance } from './scripts/pr2a/closure-receipt.ts';
          process.stdout.write(buildCandidateBuildProvenance(process.argv[2]).digest);
          JS
          )
          NODE_PATH=$(command -v node)
          FS_TYPE=$(findmnt -n -o FSTYPE -T "$EVID" | tr '[:upper:]' '[:lower:]' | xargs)
          NODE_VERSION=$(node -v)
          PWSH_VERSION=$(pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()')

          cat > "$EVID/overlap/replay.mjs" <<'JS'
          import {readFileSync} from 'node:fs'; import {spawnSync} from 'node:child_process'; import path from 'node:path';
          const input=JSON.parse(readFileSync(path.resolve(process.cwd(),process.argv[2]),'utf8'));
          const args=[path.join(input.repoRoot,'node_modules/vitest/vitest.mjs'),'run','--config','vitest.config.ts','scripts/pr2a/final-conformance.test.ts','--testNamePattern','Issue #948 persisted TypeScript claim authority','--maxWorkers=1','--reporter=dot'];
          const r=spawnSync(input.nodePath,args,{cwd:input.repoRoot,env:{PATH:input.pathEnv,HOME:input.home,TMPDIR:input.tmpdir,CI:'true',OPK_VITEST_HARNESS:'1',OPK_TESTMODE_FLEET_WORKSPACE_ROOT:input.repoRoot},encoding:'utf8'});
          if(r.status!==0){process.stderr.write(r.stdout||'');process.stderr.write(r.stderr||'');process.exit(r.status??1)}
          process.stdout.write(`${JSON.stringify({result:'pass',suite:'Issue #948 persisted TypeScript claim authority'})}\n`);
          JS
          REPO_ROOT="$PWD" NODE_PATH="$NODE_PATH" PATH_ENV="$PATH" HOME_ENV="$HOME" TMP_ENV="${TMPDIR:-/tmp}" node <<'JS' > "$EVID/overlap/inputs.json"
          process.stdout.write(`${JSON.stringify({repoRoot:process.env.REPO_ROOT,nodePath:process.env.NODE_PATH,pathEnv:process.env.PATH_ENV,home:process.env.HOME_ENV,tmpdir:process.env.TMP_ENV})}\n`)
          JS
          (cd "$EVID" && "$NODE_PATH" overlap/replay.mjs overlap/inputs.json > overlap/stdout.txt)
          node -e "process.stdout.write(JSON.stringify({schemaVersion:1,classes:['acquisition','guarded-mutation','terminal-audit','release-completion','recovery-reap','interpretation','generation-fence']})+'\\n')" > "$EVID/overlap/matrix.json"
          cp scripts/pr2a/review-start-claim-protocol-vectors.json "$EVID/overlap/vectors.json"
          TARGET_COMMIT="$TARGET_COMMIT" TARGET_TREE="$TARGET_TREE" BUILD_DIGEST="$CANDIDATE_BUILD_DIGEST" node <<'JS' > "$EVID/overlap/result.json"
          process.stdout.write(`${JSON.stringify({schemaVersion:1,result:'pass',candidateCommitSha:process.env.TARGET_COMMIT,candidateTreeOid:process.env.TARGET_TREE,candidateBuildDigest:process.env.BUILD_DIGEST,classes:['acquisition','guarded-mutation','terminal-audit','release-completion','recovery-reap','interpretation','generation-fence']})}\n`)
          JS

          mkdir -p "$EVID/rollback/detached" "$EVID/rollback/compat"
          node -e 'setInterval(()=>{},1000)' & CANDIDATE_PID=$!
          LEGACY_WT="$RUNNER_TEMP/issue948-legacy"
          trap 'kill "$CANDIDATE_PID" 2>/dev/null || true; git worktree remove --force "$LEGACY_WT" >/dev/null 2>&1 || true' EXIT
          node --experimental-strip-types scripts/pr2a/rollback-drain.ts export --out "$EVID/rollback/detached" --generation "$TARGET_TREE" --pids "$CANDIDATE_PID" > "$EVID/rollback/export.json"
          OPK_VITEST_HARNESS=1 ROLLBACK_NS="$EVID/rollback/compat" node --experimental-strip-types --input-type=module <<'JS' > "$EVID/rollback/ts-claim.json"
          import {acquireReviewStartClaim} from './scripts/lib/review-start-claim-store.ts';
          const r=acquireReviewStartClaim({prNumber:948,headSha:'e'.repeat(40),surface:'rollback-compat',namespace:process.env.ROLLBACK_NS,reviewRuns:[]}); if(!r.acquired||!r.path)throw new Error(`ts_claim_failed:${r.reason??''}`); process.stdout.write(`${JSON.stringify({path:r.path})}\n`)
          JS
          CLAIM_PATH=$(node -e "const x=require('$EVID/rollback/ts-claim.json');process.stdout.write(x.path)")
          rm -rf "$LEGACY_WT"; git worktree add --detach "$LEGACY_WT" "$LEGACY_SHA"
          pwsh -NoProfile -Command ". '$LEGACY_WT/scripts/lib/Review-StartClaim.ps1'; \$r=Read-ReviewStartClaimRecord -Path '$CLAIM_PATH'; if(-not \$r.ok){throw('legacy_read_failed:'+\$r.reason)}"
          (cd "$LEGACY_WT" && node --experimental-strip-types "$EVID/rollback/detached/rollback-drain.ts" drain --artifact "$EVID/rollback/detached/rollback-drain-artifact.json" > "$EVID/rollback/drain-result.json")
          wait "$CANDIDATE_PID" || true
          if kill -0 "$CANDIDATE_PID" 2>/dev/null; then echo 'candidate survived rollback drain' >&2; exit 1; fi
          git worktree remove --force "$LEGACY_WT"; trap - EXIT
          DRAIN_SHA="sha256:$(sha256sum "$EVID/rollback/detached/rollback-drain-artifact.json"|awk '{print $1}')"
          TARGET_TREE="$TARGET_TREE" DRAIN_SHA="$DRAIN_SHA" node <<'JS' > "$EVID/rollback/result.json"
          process.stdout.write(`${JSON.stringify({schemaVersion:1,result:'pass',finalTreeOid:process.env.TARGET_TREE,zeroSurvivorsBeforeResume:true,detachedDrainSha256:process.env.DRAIN_SHA})}\n`)
          JS

          gh api repos/chetwerikoff/orchestrator-pack/issues/928 > "$EVID/external/issue-928.json"
          node - "$EVID/external/issue-928.json" "$EVID/external/issue-928.md" <<'JS'
          const fs=require('node:fs'),i=JSON.parse(fs.readFileSync(process.argv[2],'utf8'));fs.writeFileSync(process.argv[3],i.body||'')
          JS

          EVID="$EVID" TARGET_COMMIT="$TARGET_COMMIT" TARGET_TREE="$TARGET_TREE" LEGACY_SHA="$LEGACY_SHA" LEGACY_TREE="$LEGACY_TREE" BUILD_DIGEST="$CANDIDATE_BUILD_DIGEST" NODE_PATH="$NODE_PATH" FS_TYPE="$FS_TYPE" NODE_VERSION="$NODE_VERSION" PWSH_VERSION="$PWSH_VERSION" node <<'JS'
          const fs=require('node:fs'),path=require('node:path'),crypto=require('node:crypto'); const root=process.env.EVID; const sha=r=>`sha256:${crypto.createHash('sha256').update(fs.readFileSync(path.join(root,r))).digest('hex')}`;
          const rows=fs.readdirSync(path.join(root,'commands')).filter(x=>x.endsWith('.row.json')).sort().map(x=>JSON.parse(fs.readFileSync(path.join(root,'commands',x),'utf8'))); if(rows.length!==9||rows.some(x=>x.exitCode!==0))throw new Error('pre_receipt_command_rows_invalid');
          const issue=JSON.parse(fs.readFileSync(path.join(root,'external/issue-928.json'),'utf8')),classes=['acquisition','guarded-mutation','terminal-audit','release-completion','recovery-reap','interpretation','generation-fence'];
          const bundle={schemaVersion:1,overlap:{schemaVersion:1,result:'pass',generatedAfterFinalTree:true,finalTreeOid:process.env.TARGET_TREE,candidateTreeOid:process.env.TARGET_TREE,candidateBuildDigest:process.env.BUILD_DIGEST,legacyRepository:'chetwerikoff/orchestrator-pack',legacyCommitSha:process.env.LEGACY_SHA,legacyTreeOid:process.env.LEGACY_TREE,candidateRepository:'chetwerikoff/orchestrator-pack',candidateCommitSha:process.env.TARGET_COMMIT,harnessPath:'overlap/replay.mjs',harnessSha256:sha('overlap/replay.mjs'),harnessBytesArchived:true,operationMatrixPath:'overlap/matrix.json',operationMatrixSha256:sha('overlap/matrix.json'),replayCommand:process.env.NODE_PATH,replayArgs:['overlap/replay.mjs','overlap/inputs.json'],replayCwd:'.',replayInputsPath:'overlap/inputs.json',replayInputsSha256:sha('overlap/inputs.json'),replayStdoutPath:'overlap/stdout.txt',replayStdoutSha256:sha('overlap/stdout.txt'),replayExitCode:0,protocolVectorPath:'overlap/vectors.json',protocolVectorSha256:sha('overlap/vectors.json'),platform:'linux',filesystem:process.env.FS_TYPE,classes,logPath:'overlap/result.json',logSha256:sha('overlap/result.json')},rollback:{schemaVersion:1,result:'pass',finalTreeOid:process.env.TARGET_TREE,isolatedCheckout:true,entryBlockedBeforeRevert:true,entryBlockedAfterRevert:true,quiescenceInventoryComplete:true,detachedDrainPath:'rollback/detached/rollback-drain-artifact.json',detachedDrainSha256:sha('rollback/detached/rollback-drain-artifact.json'),detachedDrainSurvivedRevert:true,zeroSurvivorsBeforeResume:true,legacyReadTsRecord:true,imports928ActivationMachinery:false,logPath:'rollback/result.json',logSha256:sha('rollback/result.json')},preReceiptVerification:{schemaVersion:1,result:'pass',finalTreeOid:process.env.TARGET_TREE,checkoutCommitSha:process.env.TARGET_COMMIT,checkoutTreeOid:process.env.TARGET_TREE,repository:'chetwerikoff/orchestrator-pack',platform:'linux',filesystem:process.env.FS_TYPE,nodeVersion:process.env.NODE_VERSION,pwshVersion:process.env.PWSH_VERSION,cleanBefore:true,cleanAfter:true,stagedBefore:0,stagedAfter:0,untrackedBefore:0,untrackedAfter:0,prerequisiteSuitesPassedBeforeReceipt:true,commands:rows},external928:{schemaVersion:1,result:'pass',url:issue.html_url,repository:'chetwerikoff/orchestrator-pack',issue:928,revisionIdentity:`${issue.node_id||issue.id}@${issue.updated_at}`,updatedAt:issue.updated_at,capturedAt:new Date().toISOString(),actor:'github-actions[bot]',tool:'gh-api-rest',bodyPath:'external/issue-928.md',bodySha256:sha('external/issue-928.md'),requirements:{consumesPr2aTsAuthority:true,consumesReceiptAsPrecedent:true,independentlyRecomputesCurrentClosure:true,invariantBasedRefusal:true,historicalInventoryEqualityNotRequired:true}}};
          fs.writeFileSync(path.join(root,'bundle.json'),`${JSON.stringify(bundle,null,2)}\n`)
          JS
          node --experimental-strip-types scripts/pr2a/closure-receipt.ts --ref "$TARGET_SHA" --evidence "$EVID/bundle.json" > "$EVID/receipt.json"
          node - "$EVID/receipt.json" <<'JS'
          const fs=require('node:fs'),r=JSON.parse(fs.readFileSync(process.argv[2],'utf8'));if(r.result!=='tree-bound-empty-external-reverse-closure'||!r.receiptSha256)throw new Error('receipt_invalid');console.log(r.receiptSha256)
          JS
      - name: Upload pre-receipt evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-948-pre-receipt
          path: ${{ runner.temp }}/issue948-evidence
          if-no-files-found: warn

  post-final:
    needs: pre-receipt
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - uses: actions/download-artifact@v4
        with:
          name: issue-948-pre-receipt
          path: ${{ runner.temp }}/issue948-evidence
      - name: Run receipt-bound final verification
        shell: bash
        run: |
          set -euo pipefail
          EVID="$RUNNER_TEMP/issue948-evidence"; rm -rf "$EVID/post"; mkdir -p "$EVID/post/commands"
          TARGET_COMMIT=$(git rev-parse "$TARGET_SHA^{commit}"); TARGET_TREE=$(git rev-parse "$TARGET_SHA^{tree}")
          [ -z "$(git status --porcelain --untracked-files=all)" ]
          cat > "$RUNNER_TEMP/record-post.cjs" <<'JS'
          const fs=require('node:fs'),path=require('node:path'),crypto=require('node:crypto'),root=process.env.EVID; const resultRel=`post/commands/${process.env.SLUG}.json`,logRel=`post/commands/${process.env.SLUG}.log`,rowRel=`post/commands/${process.env.SLUG}.row.json`; const sha=r=>`sha256:${crypto.createHash('sha256').update(fs.readFileSync(path.join(root,r))).digest('hex')}`; const result={schemaVersion:1,command:process.env.LABEL,exitCode:Number(process.env.CODE),checkoutCommitSha:process.env.TARGET_COMMIT,checkoutTreeOid:process.env.TARGET_TREE,startedAtUtc:process.env.STARTED,completedAtUtc:process.env.COMPLETED};fs.writeFileSync(path.join(root,resultRel),`${JSON.stringify(result)}\n`);fs.writeFileSync(path.join(root,rowRel),`${JSON.stringify({command:process.env.LABEL,exitCode:Number(process.env.CODE),checkoutCommitSha:process.env.TARGET_COMMIT,checkoutTreeOid:process.env.TARGET_TREE,resultPath:resultRel,resultSha256:sha(resultRel),logPath:logRel,logSha256:sha(logRel)})}\n`)
          JS
          cat > "$RUNNER_TEMP/heavy.sh" <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          PLAN=scripts/vitest-heavy-topology.plan.json; BASELINE=$(mktemp); git show "$TARGET_SHA:$PLAN" > "$BASELINE"; restore_plan(){ cat "$BASELINE" > "$PLAN"; rm -f "$BASELINE"; }; trap restore_plan EXIT; rm -f "$PLAN"; node scripts/emit-vitest-heavy-topology.mjs; count=$(node -e "const p=require('./scripts/vitest-heavy-topology.plan.json');process.stdout.write(String(p.heavyShardCount))"); export OPK_VITEST_TOPOLOGY_PLAN_PATH="$PWD/$PLAN"; for shard in $(seq 1 "$count"); do pwsh -NoProfile -File scripts/run-vitest-heavy-shard.ps1 -Shard "$shard"; done; restore_plan; trap - EXIT
          SH
          chmod +x "$RUNNER_TEMP/heavy.sh"
          run_record(){ local label="$1" slug="$2";shift 2;local log="$EVID/post/commands/${slug}.log" started completed code;started=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ);set +e;"$@" >"$log" 2>&1;code=$?;set -e;completed=$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ);EVID="$EVID" LABEL="$label" SLUG="$slug" CODE="$code" STARTED="$started" COMPLETED="$completed" TARGET_COMMIT="$TARGET_COMMIT" TARGET_TREE="$TARGET_TREE" node "$RUNNER_TEMP/record-post.cjs";if [ "$code" -ne 0 ];then cat "$log";return "$code";fi; }
          run_record 'npm run typecheck:foundation' '01-typecheck' npm run typecheck:foundation
          run_record 'npm run lint:foundation' '02-lint' npm run lint:foundation
          run_record 'npm run test:contract-mutations' '03-mutations' npm run test:contract-mutations
          run_record 'npm run test:issue-948' '04-issue948' npm run test:issue-948
          run_record 'pwsh -NoProfile -File scripts/verify.ps1' '05-verify' pwsh -NoProfile -File scripts/verify.ps1
          run_record 'pwsh -NoProfile -File scripts/check-reusable.ps1' '06-reusable' pwsh -NoProfile -File scripts/check-reusable.ps1
          run_record 'pwsh -NoProfile -File scripts/test-all.ps1' '07-pester' pwsh -NoProfile -File scripts/test-all.ps1
          run_record 'vitest-light' '08-vitest-light' pwsh -NoProfile -File scripts/run-vitest-light-lane.ps1
          run_record 'vitest-heavy' '09-vitest-heavy' bash "$RUNNER_TEMP/heavy.sh"
          rm -f .vitest-runtime-report*.json; git restore --source="$TARGET_SHA" -- scripts/vitest-heavy-topology.plan.json
          git status --porcelain --untracked-files=all > "$EVID/post/git-status.txt"; [ ! -s "$EVID/post/git-status.txt" ]
          FS_TYPE=$(findmnt -n -o FSTYPE -T "$EVID"|tr '[:upper:]' '[:lower:]'|xargs); NODE_VERSION=$(node -v); PWSH_VERSION=$(pwsh -NoProfile -Command '$PSVersionTable.PSVersion.ToString()')
          EVID="$EVID" TARGET_COMMIT="$TARGET_COMMIT" TARGET_TREE="$TARGET_TREE" FS_TYPE="$FS_TYPE" NODE_VERSION="$NODE_VERSION" PWSH_VERSION="$PWSH_VERSION" node <<'JS'
          const fs=require('node:fs'),path=require('node:path'),root=process.env.EVID;const rows=fs.readdirSync(path.join(root,'post/commands')).filter(x=>x.endsWith('.row.json')).sort().map(x=>JSON.parse(fs.readFileSync(path.join(root,'post/commands',x),'utf8')));if(rows.length!==9||rows.some(x=>x.exitCode!==0))throw new Error('final_command_rows_invalid');const receipt=JSON.parse(fs.readFileSync(path.join(root,'receipt.json'),'utf8'));fs.writeFileSync(path.join(root,'final-verification.json'),`${JSON.stringify({schemaVersion:1,result:'pass',receiptSha256:receipt.receiptSha256,finalTreeOid:process.env.TARGET_TREE,checkoutCommitSha:process.env.TARGET_COMMIT,checkoutTreeOid:process.env.TARGET_TREE,repository:'chetwerikoff/orchestrator-pack',platform:'linux',filesystem:process.env.FS_TYPE,nodeVersion:process.env.NODE_VERSION,pwshVersion:process.env.PWSH_VERSION,cleanBefore:true,cleanAfter:true,stagedBefore:0,stagedAfter:0,untrackedBefore:0,untrackedAfter:0,commands:rows},null,2)}\n`)
          JS
          node --experimental-strip-types scripts/pr2a/closure-receipt.ts --final-verification "$EVID/final-verification.json" --receipt "$EVID/receipt.json" > "$EVID/final-validation.json"
          node - "$EVID/final-validation.json" <<'JS'
          const fs=require('node:fs'),r=JSON.parse(fs.readFileSync(process.argv[2],'utf8'));if(r.result!=='pass'||(r.findings||[]).length)throw new Error(`final_validation_failed:${JSON.stringify(r.findings||[])}`);console.log('final verification pass')
          JS
      - name: Upload final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-948-final-evidence
          path: ${{ runner.temp }}/issue948-evidence
          if-no-files-found: warn
