name: issue-923-linkage-helper

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  rewrite:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/issue-923-pr2-foundation' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Add explicit review-run linkage
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'scripts/lib/pack-review-delivery.ts';
          let text = fs.readFileSync(file, 'utf8');
          const beforeInterface = `export interface PackReviewWorkerNotificationRequest {\n  message: string;\n  idempotencyKey: string;\n}`;
          const afterInterface = `export interface PackReviewWorkerNotificationRequest {\n  message: string;\n  idempotencyKey: string;\n  reviewRunId?: string;\n}`;
          if (!text.includes(beforeInterface)) throw new Error('notification request interface not found');
          text = text.replace(beforeInterface, afterInterface);
          const beforeNotify = `        idempotencyKey: workerKey,\n      });`;
          const afterNotify = `        idempotencyKey: workerKey,\n        reviewRunId: options.run.id,\n      });`;
          if (!text.includes(beforeNotify)) throw new Error('notify call not found');
          text = text.replace(beforeNotify, afterNotify);
          const beforeCapture = `        idempotencyKey: options.request.idempotencyKey,\n      });`;
          const afterCapture = `        idempotencyKey: options.request.idempotencyKey,\n        reviewRunId: options.request.reviewRunId,\n      });`;
          if (!text.includes(beforeCapture)) throw new Error('notification capture not found');
          text = text.replace(beforeCapture, afterCapture);
          fs.writeFileSync(file, text, 'utf8');
          fs.rmSync('.github/workflows/issue-923-linkage-helper.yml');
          NODE
      - name: Commit linkage rewrite
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: persist pack review run linkage in notification"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
