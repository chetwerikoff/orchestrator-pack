name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write
  issues: read

jobs:
  issue-821-declaration-diagnostic:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 declaration diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Capture declaration result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          AO_SESSION_ID=issue-821-final-diagnostic node --experimental-strip-types plugins/ao-task-declaration/bin/declare.ts \
            --issue 821 \
            --iteration-id issue-821-final-diagnostic \
            --declared-paths agent-orchestrator.yaml.example \
            --declared-globs 'docs/ao-spawn-shape.mjs,docs/autonomous-*,docs/orchestrator-claimed-review-run.mjs,docs/orchestrator-recovery-runbook.md,docs/spawn-worktree-grant.mjs,docs/worker-nudge-gate.mjs,docs/issues_drafts/00-architecture-decisions.md,scripts/**' \
            > issue-821-declaration-report.txt 2>&1
          status=$?
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist issue 821 declaration diagnostic"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$status"
