name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-final-matrix:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 final verification matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply confirmed changes, verify each check, and persist
        shell: bash
        run: |
          set +e
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'scripts/gh-repo-resolve.test.ts';
          let text = readFileSync(path, 'utf8');
          text = text.replace("import { chmodSync, cpSync, mkdirSync, mkdtempSync, rmSync, writeFileSync } from 'node:fs';", "import { mkdirSync, mkdtempSync, rmSync, writeFileSync } from 'node:fs';");
          text = text.replace(/import \{\n  createIsolatedInterposerPack,\n  stripInterposerBashEnvBlockers,\n  writeIsolatedAutonomousRealBinariesConfig,\n\} from '\.\/_test-interposer-pack-fixture\.js';\n/, '');
          const envStart = text.indexOf('function autonomousSurfaceEnv(');
          const nextDescribe = text.indexOf("describe('gh repo resolver git argv guard", envStart);
          if (envStart >= 0 && nextDescribe >= 0) text = text.slice(0, envStart) + text.slice(nextDescribe);
          const shimDescribe = text.indexOf("describe('surface bootstrap GH_REPO export");
          if (shimDescribe >= 0) text = text.slice(0, shimDescribe).trimEnd() + '\n';
          if (text.includes('_test-interposer-pack-fixture') || text.includes('createIsolatedInterposerPack')) throw new Error('resolver interposer references remain');
          writeFileSync(path, text);
          NODE
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/worker-recovery-spawn-argv.test.ts')
          p.write_text(p.read_text(encoding='utf-8').rstrip() + '\n', encoding='utf-8')
          PY
          rm -f issue-821-*.txt issue-821-*.json
          npm run lint:foundation -- --write-baseline >/dev/null 2>&1
          npm run check:pwsh-test-growth -- --write-baseline >/dev/null 2>&1

          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { execFileSync } from 'node:child_process';
          import { existsSync, readFileSync, writeFileSync } from 'node:fs';
          import { resolve } from 'node:path';
          import { measurePreTopologyFiles } from './scripts/lib/vitest-pre-topology-measurement.mjs';
          const root = process.cwd();
          const measured = {
            'scripts/_test-stub-pack-import-closure.test.ts': 3.592103515625,
            'scripts/autonomous-orchestrator-boundary.test.ts': 159.05787866210937,
            'scripts/autonomous-spawn-policy.test.ts': 50.58675146484375,
            'scripts/autonomous-spawn-worktree-gate.test.ts': 73.31812548828125,
            'scripts/orchestrator-claimed-review-run.test.ts': 61.981024658203125,
            'scripts/orchestrator-review-start-preflight-audit.test.ts': 15.832411376953125,
            'scripts/review-start-envelope-external-io.test.ts': 110.33442944335937,
            'scripts/review-start-envelope-ledger.test.ts': 44.434,
            'scripts/review-start-preflight-shield-denial-audit.test.ts': 36.201537109375,
            'scripts/review-start-scoped-gh-json-capture.test.ts': 49.39142529296875,
            'scripts/spawn-worktree-grant-finalization.test.ts': 24.41172216796875,
            'scripts/spawn-worktree-head-ref-oid-binding.test.ts': 18.299706787109375,
            'scripts/spawn-worktree-repository-identity-binding.test.ts': 10.097074462890625,
            'scripts/worker-nudge-gate.test.ts': 71.37609741210937,
            'scripts/worker-recovery-spawn-argv.test.ts': 12.756,
            'scripts/worktree-gate-claim-completion-seam.test.ts': 10.518130859375,
          };
          Object.assign(measured, await measurePreTopologyFiles(root, ['scripts/gh-repo-resolve.test.ts'], { maxConcurrency: 1 }));
          const changed = execFileSync('git', ['diff', '--name-only', '--diff-filter=AM', 'origin/main', '--', '*.test.ts'], { encoding: 'utf8' }).split('\n').map((s) => s.trim()).filter(Boolean).filter((f) => existsSync(resolve(root, f)));
          const deleted = execFileSync('git', ['diff', '--name-only', '--diff-filter=D', 'origin/main', '--', '*.test.ts'], { encoding: 'utf8' }).split('\n').map((s) => s.trim()).filter(Boolean);
          const missing = changed.filter((file) => !Number.isFinite(Number(measured[file])) || Number(measured[file]) <= 0);
          if (missing.length) throw new Error(`missing runtime: ${missing.join(', ')}`);
          const historyPath = 'scripts/vitest-runtime-history.json';
          const history = JSON.parse(readFileSync(historyPath, 'utf8'));
          history.source = 'ci-measured'; history.dataChangedAt = new Date().toISOString();
          history.files ??= {}; history.provenance ??= {}; history.contentSha ??= {};
          for (const file of deleted) { delete history.files[file]; delete history.provenance[file]; delete history.contentSha[file]; }
          for (const file of changed) {
            history.files[file] = Math.max(1, Math.round(Number(measured[file]) * 1000));
            history.provenance[file] = 'measured';
            history.contentSha[file] = createHash('sha256').update(readFileSync(file)).digest('hex');
          }
          writeFileSync(historyPath, `${JSON.stringify(history, null, 2)}\n`);
          NODE

          report=issue-821-final-matrix-report.txt
          : > "$report"
          overall=0
          run_check() {
            name="$1"; shift
            tmp="$(mktemp)"; "$@" >"$tmp" 2>&1; status=$?
            { printf '\n===== %s (exit %s) =====\n' "$name" "$status"; tail -n 1000 "$tmp"; } >> "$report"
            rm -f "$tmp"; if (( status != 0 )); then overall=1; fi
          }
          run_check "ledger" npx vitest run scripts/review-start-envelope-ledger.test.ts
          run_check "worker recovery" npx vitest run scripts/worker-recovery-spawn-argv.test.ts
          run_check "gh resolver" npx vitest run scripts/gh-repo-resolve.test.ts
          run_check "reachability" npx vitest run scripts/reachability-purge.test.ts
          run_check "contract evidence" npx vitest run scripts/contract-evidence.test.ts
          run_check "draft discipline" npx vitest run scripts/draft-discipline.test.ts
          run_check "review capability" pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -ReviewStart
          run_check "boundary capability" pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -Boundary
          run_check "claimed review lookup" pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          run_check "command runtime bootstrap" pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          run_check "starter surfaces" pwsh -NoProfile -File scripts/check-review-start-envelope-ledger-starter-surfaces.ps1
          run_check "typecheck" npm run typecheck:foundation
          run_check "lint" npm run lint:foundation
          run_check "pwsh growth" npm run check:pwsh-test-growth
          run_check "reference scan" bash -lc "! git grep -n -E 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|\\.ao/autonomous-real-binaries\\.json' -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' ':!docs/declarations/**' ':!docs/issue_queue_index.md' ':!scripts/reachability-purge.manifest.json' ':!tests/external-output-references/**' ':!.github/**'"
          run_check "artifact absence" bash -lc "for p in scripts/ao scripts/git scripts/ao-autonomous-guard.ps1 scripts/git-autonomous-guard.ps1 scripts/git-real-binary scripts/_invoke-system-git.sh scripts/_resolve-system-git.sh scripts/autonomous-orchestrator-surface-bootstrap.sh scripts/autonomous-bash-env.sh docs/autonomous-real-binaries.example.json scripts/invoke-orchestrator-claimed-review-run.ps1 scripts/lib/Invoke-OrchestratorClaimedReviewRun.ps1 scripts/check-worker-nudge-gate-adoption.ps1; do test ! -e \"$p\" || exit 1; done"
          run_check "diff check" git diff --check

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist final issue 821 verification matrix"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$overall"
