name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-finalize:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 final clean validation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Finalize, validate, and persist result
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          report=issue-821-finalizer-report.txt
          bash .github/scripts/finalize-issue-821.sh >"$report" 2>&1
          status=$?
          if (( status != 0 )); then
            git checkout origin/main -- .github/workflows/typescript-foundation.yml scripts/vitest-heavy-topology.plan.json
            rm -rf node_modules .github/scripts/finalize-issue-821.sh
            git add -A
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git commit -m "Persist issue 821 finalizer result"
            git push origin HEAD:agent/issue-821-retire-autonomous-surface
          fi
          cat "$report"
          exit "$status"
