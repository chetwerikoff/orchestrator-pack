name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-mode-cleanup:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 mode cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - name: Restore plugin modes from main and publish
        shell: bash
        run: |
          set -euo pipefail
          files=(
            plugins/ao-codex-pr-reviewer/bin/review.ts
            plugins/ao-scope-guard/bin/agent-wrap.ts
            plugins/ao-scope-guard/bin/scope-check.ts
            plugins/ao-task-declaration/bin/declare.ts
            plugins/ao-token-chain-ledger/bin/ledger.mjs
          )
          for file in "${files[@]}"; do
            mode=$(git ls-tree origin/main -- "$file" | awk '{print $1}')
            case "$mode" in
              100755) git update-index --chmod=+x "$file" ;;
              100644) git update-index --chmod=-x "$file" ;;
              *) echo "unexpected main mode $mode for $file" >&2; exit 1 ;;
            esac
          done
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Remove accidental plugin mode changes"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
