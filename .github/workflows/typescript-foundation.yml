name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  runtime:
    name: TypeScript runtime (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce pinned Node major
        run: npm run check:node-major
      - name: Execute TypeScript without a build artifact
        run: npm run ts:smoke

  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Typecheck without emit
        run: npm run typecheck:foundation

  lint:
    name: TypeScript policy lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce Promise and subprocess policies
        run: npm run lint:foundation

  kernels:
    name: TypeScript kernel tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Run in-process foundation tests
        run: npm run test:foundation

  powershell-child-growth:
    name: PowerShell child-test growth guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce committed PowerShell child-test baseline
        run: npm run check:pwsh-test-growth

  issue-821-diagnose:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 focused restored-suite diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply, diagnose, and persist
        shell: bash
        run: |
          set +e
          node .github/scripts/restore-issue-821-tests.mjs > issue-821-transform-output.txt 2>&1
          transform_status=$?
          npm run lint:foundation -- --write-baseline >> issue-821-transform-output.txt 2>&1
          lint_baseline_status=$?
          npm run check:pwsh-test-growth -- --write-baseline >> issue-821-transform-output.txt 2>&1
          pwsh_baseline_status=$?
          npx vitest run \
            scripts/worker-nudge-gate.test.ts \
            scripts/autonomous-spawn-worktree-gate.test.ts \
            > issue-821-restored-suite-failure.txt 2>&1
          test_status=$?

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f \
            .github/issue-821-trigger.txt \
            .github/scripts/restore-issue-821-tests.mjs \
            .github/workflows/issue-821-minimal-runner.yml \
            .github/workflows/issue-821-run-test-restore.yml \
            .github/workflows/issue-821-restore-minimal-tests.yml \
            issue-821-gap-closure-report.txt \
            issue-821-worker-main-usage.txt \
            issue-821-minimal-test-restore-report.txt
          if (( transform_status == 0 && lint_baseline_status == 0 && pwsh_baseline_status == 0 && test_status == 0 )); then
            rm -f issue-821-transform-output.txt issue-821-restored-suite-failure.txt
          fi

          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist minimal restored gate test result"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface

          if (( transform_status != 0 || lint_baseline_status != 0 || pwsh_baseline_status != 0 || test_status != 0 )); then
            exit 1
          fi
