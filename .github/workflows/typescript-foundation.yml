name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-diagnose:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 migrated test diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Run focused diagnostic and persist output
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/worker-nudge-gate.test.ts')
          text = path.read_text(encoding='utf-8')
          old = """  it('rejects ungated journaled send on autonomous surface', () => {
              const journaled = path.join(repoRoot, 'scripts/journaled-worker-send.ps1');
              const result = spawnSync(
                'pwsh',
                ['-NoProfile', '-File', journaled, 'opk-test', '-Source', 'test'],
                {
                  cwd: repoRoot,
                  encoding: 'utf8',
                  input: 'hello worker',
                  env: {
                    ...process.env,
                    AO_JOURNALED_SEND_ASSUME_CONTRACT: '1',
                    AO_SESSION_ID: '1',
                  },
                },
              );
              expect(result.status).toBe(46);
            });"""
          new = """  it('rejects ungated journaled send on autonomous surface', () => {
              const journaled = path.join(repoRoot, 'scripts/journaled-worker-send.ps1');
              const script = `
                $env:AO_JOURNALED_SEND_ASSUME_CONTRACT = '1'
                $env:AO_SESSION_ID = '1'
                'hello worker' | & pwsh -NoProfile -File ${psString(journaled)} 'opk-test' -Source 'test' 2>$null
                [pscustomobject]@{ status = $LASTEXITCODE } | ConvertTo-Json -Compress
              `;
              const result = JSON.parse(runPwsh(script));
              expect(result.status).toBe(46);
            });"""
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one raw test block, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          npx vitest run scripts/worker-nudge-gate.test.ts -t "rejects ungated journaled send on autonomous surface" > issue-821-migrated-test-failure.txt 2>&1
          status=$?
          git checkout HEAD -- scripts/worker-nudge-gate.test.ts scripts/toolchain/raw-child-process-baseline.json
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f issue-821-final-validation-report.txt issue-821-final-guard-report.txt issue-821-restored-suite-failure.txt issue-821-transform-output.txt
          if (( status == 0 )); then
            printf 'focused test passed\n' > issue-821-migrated-test-failure.txt
          fi
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Record migrated issue 821 test diagnostic"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$status"
