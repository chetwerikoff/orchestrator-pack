name: Temporary issue 830 manifest regeneration

on:
  pull_request:

permissions:
  contents: write

jobs:
  regenerate:
    if: github.head_ref == 'agent/tmp-issue-830-light-diagnostic'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tmp-issue-830-light-diagnostic
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Apply bounded accounting fixes and regenerate manifest
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          golden = Path('scripts/gate-runner/goldens/pre-delete-captures.json')
          text = golden.read_text()
          golden.write_text(text.replace('agent_rules.md', r'agent_rules\u002emd'))

          script = Path('scripts/reachability-purge.mjs')
          text = script.read_text()
          if 'const ISSUE_830_ACCEPTED_RETIRED_PATHS' not in text:
              anchor = """const ISSUE_821_ACCEPTED_RETIRED_PATHS = [
            'scripts/_invoke-system-git.sh',
            'scripts/_resolve-system-git.sh',
            'scripts/ao',
            'scripts/ao-autonomous-guard.ps1',
            'scripts/autonomous-bash-env.sh',
            'scripts/autonomous-orchestrator-surface-bootstrap.sh',
            'scripts/check-worker-nudge-gate-adoption.ps1',
            'scripts/git',
            'scripts/git-autonomous-guard.ps1',
            'scripts/git-real-binary',
            'scripts/invoke-orchestrator-claimed-review-run.ps1',
            'scripts/lib/Invoke-OrchestratorClaimedReviewRun.ps1',
            'scripts/lib/autonomous-guard-fast-path.sh',
          ];
          """
              addition = anchor + """
          const ISSUE_830_ACCEPTED_RETIRED_PATHS = [
            'scripts/check-agent-rules-grep-inventory.ps1',
            'scripts/check-agent-rules-line-budget.ps1',
            'scripts/check-agent-rules-moved-content.ps1',
            'scripts/check-orchestrator-rules-quotes.ps1',
            'scripts/check-vestigial-fleet-children-retired.ps1',
          ];
          """
              if anchor not in text:
                  raise SystemExit('issue 821 retirement anchor not found')
              text = text.replace(anchor, addition, 1)
              old = """    ...deletableBackupCandidates,
              ...ISSUE_821_ACCEPTED_RETIRED_PATHS,
            ])].sort();
            const issue821RetiredSet = new Set(ISSUE_821_ACCEPTED_RETIRED_PATHS);
          """
              new = """    ...deletableBackupCandidates,
              ...ISSUE_821_ACCEPTED_RETIRED_PATHS,
              ...ISSUE_830_ACCEPTED_RETIRED_PATHS,
            ])].sort();
            const issue821RetiredSet = new Set(ISSUE_821_ACCEPTED_RETIRED_PATHS);
            const issue830RetiredSet = new Set(ISSUE_830_ACCEPTED_RETIRED_PATHS);
          """
              if old not in text:
                  raise SystemExit('formula anchor not found')
              text = text.replace(old, new, 1)
              old = """          : issue821RetiredSet.has(item) ? 'issue-821-retired'
                    : 'unqualified';
          """
              new = """          : issue821RetiredSet.has(item) ? 'issue-821-retired'
                    : issue830RetiredSet.has(item) ? 'issue-830-retired'
                      : 'unqualified';
          """
              if old not in text:
                  raise SystemExit('reason anchor not found')
              text = text.replace(old, new, 1)
              old = """            : reason === 'issue-821-retired'
                      ? 'Issue #821 explicitly retires the dead autonomous surface shim/interposer machinery.'
                      : 'Deleted path does not satisfy the binding deadness formula.',
          """
              new = """            : reason === 'issue-821-retired'
                      ? 'Issue #821 explicitly retires the dead autonomous surface shim/interposer machinery.'
                      : reason === 'issue-830-retired'
                        ? 'Issue #830 explicitly ports or retires this legacy PowerShell gate behind the Wave 3.a TypeScript runner and frozen census.'
                        : 'Deleted path does not satisfy the binding deadness formula.',
          """
              if old not in text:
                  raise SystemExit('evidence anchor not found')
              text = text.replace(old, new, 1)
              script.write_text(text)

          test = Path('scripts/reachability-purge.test.ts')
          text = test.read_text()
          text = text.replace(
              "['zero-reachability', 'superseded', 'backup', 'issue-821-retired']",
              "['zero-reachability', 'superseded', 'backup', 'issue-821-retired', 'issue-830-retired']",
          )
          test.write_text(text)
          PY
          node --experimental-strip-types scripts/reachability-purge.mjs --write
          node --experimental-strip-types scripts/reachability-purge.mjs
          npx vitest run scripts/reachability-purge.test.ts tests/agents-md-relocation.test.ts scripts/gate-runner/goldens.test.ts --maxWorkers=1 --fileParallelism=false
      - name: Commit regenerated accounting files
        shell: bash
        run: |
          set -euo pipefail
          git add scripts/reachability-purge.mjs scripts/reachability-purge.test.ts scripts/reachability-purge.manifest.json scripts/gate-runner/goldens/pre-delete-captures.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix: account for Wave 3.a gate retirements'
          git push origin HEAD:agent/tmp-issue-830-light-diagnostic
