name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-reachability-diagnostic:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 reachability candidate diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply candidate, run focused checks, and persist
        shell: bash
        run: |
          set +e
          rm -f issue-821-*.txt
          node .github/scripts/issue-821-finalize.mjs
          node scripts/reachability-purge.mjs --write
          npm run lint:foundation -- --write-baseline
          npm run check:pwsh-test-growth -- --write-baseline

          report=issue-821-reachability-candidate-report.txt
          : > "$report"
          overall=0
          run_check() {
            name="$1"
            shift
            tmp="$(mktemp)"
            "$@" >"$tmp" 2>&1
            status=$?
            {
              printf '\n===== %s (exit %s) =====\n' "$name" "$status"
              cat "$tmp"
            } >> "$report"
            rm -f "$tmp"
            if (( status != 0 )); then overall=1; fi
          }

          run_check "reachability manifest verifier" node scripts/reachability-purge.mjs
          run_check "reachability tests" npx vitest run scripts/reachability-purge.test.ts
          run_check "scoped lookup tests" npx vitest run scripts/review-start-scoped-gh-json-capture.test.ts
          run_check "tsconfig base" npx tsc --project tsconfig.base.json --noEmit

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f \
            issue-821-full-scope-lane-diagnostic.txt \
            issue-821-full-scope-diagnostic.txt \
            issue-821-final-validation-report.txt \
            issue-821-final-guard-report.txt \
            issue-821-migrated-test-failure.txt \
            issue-821-restored-suite-failure.txt \
            issue-821-transform-output.txt \
            .vitest-runtime-report-light.json \
            scripts/vitest-heavy-topology.plan.json
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist issue 821 reachability candidate"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$overall"
