name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  issue-821-scope-diagnostic:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 full scope diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - name: Checkout trusted base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted-scope-guard
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Run exact full-scope checks and persist output
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SCOPE_REPO_ROOT: ${{ github.workspace }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO_SAME: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          GH_TOKEN: ${{ github.token }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OPK_VITEST_PR_SCOPE_MODE: ${{ vars.OPK_VITEST_PR_SCOPE_MODE }}
        run: |
          set +e
          report=issue-821-full-scope-diagnostic.txt
          rm -f issue-821-*.txt
          : > "$report"
          overall=0

          run_check() {
            name="$1"
            shift
            tmp="$(mktemp)"
            "$@" >"$tmp" 2>&1
            status=$?
            {
              printf '\n===== %s (exit %s) =====\n' "$name" "$status"
              cat "$tmp"
            } >> "$report"
            rm -f "$tmp"
            if (( status != 0 )); then overall=1; fi
          }

          run_check "tsconfig.base typecheck" npx tsc --project tsconfig.base.json --noEmit
          run_check "vitest light lane" pwsh -NoProfile -File scripts/run-vitest-light-lane.ps1
          run_check "emit changed paths" bash -lc 'export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"; printf "%s\n" "$OPK_CHANGED_VITEST_FILES"; node scripts/emit-vitest-heavy-topology.mjs --gha-output'
          run_check "trusted PR scope guard" bash -lc 'cd trusted-scope-guard && npm ci --include=dev >/dev/null && cd .. && rm -rf node_modules && ln -s trusted-scope-guard/node_modules node_modules && pwsh -NoProfile -File trusted-scope-guard/scripts/pr-scope-check.ps1'

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -rf trusted-scope-guard node_modules
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Record issue 821 full scope diagnostics"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$overall"
