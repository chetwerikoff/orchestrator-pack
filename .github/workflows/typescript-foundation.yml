name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-clean-final-tree:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 clean final tree
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Remove accidental scope and restore #819-owned bookkeeping
        shell: bash
        run: |
          set -euo pipefail
          git checkout origin/main -- \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs \
            scripts/lib/derive-gh-repo-from-checkout.mjs \
            scripts/gh-repo-resolve.test.ts \
            scripts/reachability-purge.manifest.json \
            scripts/reachability-purge.mjs \
            scripts/reachability-purge.test.ts \
            scripts/vitest-heavy-topology.plan.json \
            tests/external-output-references/autonomous-review-worktree-e2e-smoke/isolated-smoke-redacted.json \
            tests/external-output-references/captures/spawn-worktree-branch-operand-binding/integration-spawn-561-feat-issue-561.raw.txt \
            tests/external-output-references/review-pipeline-spawn-budget/capture-wrapped-positive-covered-clean.json \
            tests/external-output-references/review-pipeline-spawn-budget/capture-wrapped-positive-uncovered-ready.json \
            tests/external-output-references/review-pipeline-spawn-budget/reduced-post-change.capture.json \
            tests/external-output-references/review-pipeline-spawn-budget/storm-baseline.capture.json
          git rm -f --ignore-unmatch .local/state/gh/device-id issue-821-final-lane-report.txt issue-821-final-guard-report.txt issue-821-restored-suite-failure.txt
          python - <<'PY'
          from pathlib import Path

          pwsh = Path('scripts/_resolve-pwsh.sh')
          text = pwsh.read_text(encoding='utf-8')
          text = text.replace('[[ "${AO_SESSION_ID:-}" == "1" ]] && trusted_only=1', '[[ -n "${AO_SESSION_ID:-}" ]] && trusted_only=1')
          if 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE' in text or 'AO_SESSION_ID:-}" == "1"' in text:
              raise SystemExit('scripts/_resolve-pwsh.sh predicate is not a non-empty AO_SESSION_ID check')
          pwsh.write_text(text, encoding='utf-8')

          runbook = Path('docs/orchestrator-recovery-runbook.md')
          text = runbook.read_text(encoding='utf-8')
          text = text.replace('`scripts/autonomous-session-gates.test.ts` covers the AO 0.10.2 role matrix', '`scripts/autonomous-orchestrator-boundary.test.ts` covers the AO 0.10.2 role matrix')
          runbook.write_text(text, encoding='utf-8')
          PY
          npm run lint:foundation -- --write-baseline
          npm run check:pwsh-test-growth -- --write-baseline
      - name: Refresh measured runtime history for changed tests
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { execFileSync } from 'node:child_process';
          import { existsSync, readFileSync, writeFileSync } from 'node:fs';
          import { resolve } from 'node:path';
          import { measurePreTopologyFiles } from './scripts/lib/vitest-pre-topology-measurement.mjs';

          const root = process.cwd();
          const lines = (args) => execFileSync('git', args, { cwd: root, encoding: 'utf8' })
            .split('\n').map((line) => line.trim()).filter(Boolean);
          const changed = lines(['diff', '--name-only', '--diff-filter=AM', 'origin/main', '--', '*.test.ts'])
            .filter((file) => existsSync(resolve(root, file)));
          const deleted = lines(['diff', '--name-only', '--diff-filter=D', 'origin/main', '--', '*.test.ts']);
          const measurements = await measurePreTopologyFiles(root, changed, { maxConcurrency: 4 });
          const path = 'scripts/vitest-runtime-history.json';
          const history = JSON.parse(readFileSync(path, 'utf8'));
          history.source = 'ci-measured';
          history.dataChangedAt = new Date().toISOString();
          history.files ??= {};
          history.provenance ??= {};
          history.contentSha ??= {};
          for (const file of deleted) {
            delete history.files[file];
            delete history.provenance[file];
            delete history.contentSha[file];
          }
          for (const [file, seconds] of Object.entries(measurements)) {
            const bytes = readFileSync(file);
            history.files[file] = Math.max(1, Math.round(Number(seconds) * 1000));
            history.provenance[file] = 'measured';
            history.contentSha[file] = createHash('sha256').update(bytes).digest('hex');
          }
          writeFileSync(path, `${JSON.stringify(history, null, 2)}\n`);
          console.log(JSON.stringify({ changed, deleted, measured: Object.keys(measurements) }, null, 2));
          NODE
      - name: Validate cleaned tree and persist exact result
        shell: bash
        run: |
          set +e
          report=issue-821-clean-final-report.txt
          rm -f "$report"
          : > "$report"
          overall=0
          run_check() {
            name="$1"; shift
            tmp="$(mktemp)"
            "$@" >"$tmp" 2>&1
            status=$?
            { printf '\n===== %s (exit %s) =====\n' "$name" "$status"; tail -n 1200 "$tmp"; } >> "$report"
            rm -f "$tmp"
            if (( status != 0 )); then overall=1; fi
          }

          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Prepare cleaned issue 821 tree"

          run_check "issue and bookkeeping tests" npx vitest run \
            scripts/autonomous-orchestrator-boundary.test.ts \
            scripts/autonomous-spawn-policy.test.ts \
            scripts/worker-nudge-gate.test.ts \
            scripts/spawn-worktree-grant-finalization.test.ts \
            scripts/orchestrator-claimed-review-run.test.ts \
            scripts/autonomous-spawn-worktree-gate.test.ts \
            scripts/orchestrator-review-start-preflight-audit.test.ts \
            scripts/review-start-envelope-external-io.test.ts \
            scripts/reachability-purge.test.ts \
            scripts/contract-evidence.test.ts \
            scripts/draft-discipline.test.ts
          run_check "review capability guard" pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -ReviewStart
          run_check "boundary capability guard" pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -Boundary
          run_check "claimed review lookup guard" pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          run_check "command runtime bootstrap guard" pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          run_check "typecheck foundation" npm run typecheck:foundation
          run_check "lint foundation" npm run lint:foundation
          run_check "pwsh child growth" npm run check:pwsh-test-growth
          run_check "active retired-reference scan" bash -lc "! git grep -n -E 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|\\.ao/autonomous-real-binaries\\.json' -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' ':!docs/declarations/**' ':!docs/issue_queue_index.md' ':!scripts/reachability-purge.manifest.json'"
          run_check "retired artifact absence" bash -lc "for p in scripts/ao scripts/git scripts/ao-autonomous-guard.ps1 scripts/git-autonomous-guard.ps1 scripts/git-real-binary scripts/_invoke-system-git.sh scripts/_resolve-system-git.sh scripts/autonomous-orchestrator-surface-bootstrap.sh scripts/autonomous-bash-env.sh docs/autonomous-real-binaries.example.json scripts/invoke-orchestrator-claimed-review-run.ps1 scripts/lib/Invoke-OrchestratorClaimedReviewRun.ps1 scripts/check-worker-nudge-gate-adoption.ps1; do test ! -e \"$p\" || exit 1; done"

          base=$(git rev-parse origin/main)
          head=$(git rev-parse HEAD)
          manifest=$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$base" --head "$head")
          OPK_CHANGED_VITEST_FILES="$manifest" OPK_VITEST_PR_SCOPE_MODE=shadow run_check "heavy topology" node scripts/emit-vitest-heavy-topology.mjs
          git checkout HEAD -- scripts/vitest-heavy-topology.plan.json
          run_check "diff check" git diff --check

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          if (( overall == 0 )); then git rm -f --ignore-unmatch "$report"; else git add "$report"; fi
          git commit --amend --no-edit
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$overall"
