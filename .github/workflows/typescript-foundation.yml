name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  issue-821-final-rebuild:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Rebuild and validate issue 821
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Rebuild clean issue tree from main
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -o pipefail
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const file = 'scripts/apply-issue-821-final-fixes.mjs';
          let source = readFileSync(file, 'utf8');
          const needle = "':!scripts/reachability-purge.manifest.json', ':!tests/external-output-references/captures/spawn-worktree-branch-operand-binding/integration-spawn-561-feat-issue-561.raw.txt', ':!.github/**'";
          const replacement = "':!scripts/reachability-purge.manifest.json', ':!scripts/_resolve-pwsh.sh', ':!scripts/_test-spawn-budget-fixture.ts', ':!scripts/autonomous-spawn-budget.test.ts', ':!tests/external-output-references/captures/spawn-worktree-branch-operand-binding/integration-spawn-561-feat-issue-561.raw.txt', ':!.github/**'";
          if (!source.includes(needle)) throw new Error('final rebuild scan marker changed');
          writeFileSync(file, source.replace(needle, replacement), 'utf8');
          NODE
          node scripts/apply-issue-821-final-fixes.mjs 2>&1 | tee "$RUNNER_TEMP/issue-821-rebuild.log"
          node scripts/apply-issue-821-residual-fixes.mjs 2>&1 | tee -a "$RUNNER_TEMP/issue-821-rebuild.log"
      - name: Upload rebuild diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-821-rebuild-log-${{ github.run_id }}
          path: ${{ runner.temp }}/issue-821-rebuild.log
          if-no-files-found: warn
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Refresh policy baselines
        run: |
          set -euo pipefail
          npm run lint:foundation -- --write-baseline
          npm run check:pwsh-test-growth -- --write-baseline
      - name: Run issue 821 contract tests
        run: |
          set -euo pipefail
          npx vitest run \
            scripts/issue-821-gate-activation.test.ts \
            scripts/autonomous-orchestrator-boundary.test.ts \
            scripts/autonomous-spawn-budget.test.ts \
            scripts/autonomous-spawn-policy.test.ts \
            scripts/worker-recovery-spawn-argv.test.ts \
            scripts/worker-nudge-gate.test.ts \
            scripts/spawn-worktree-grant-finalization.test.ts \
            scripts/orchestrator-claimed-review-run.test.ts \
            scripts/autonomous-spawn-worktree-gate.test.ts \
            scripts/orchestrator-review-start-preflight-audit.test.ts \
            scripts/review-start-envelope-external-io.test.ts \
            scripts/reachability-purge.test.ts
          pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -ReviewStart
          pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -Boundary
          pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
      - name: Refresh changed-test runtime history
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto';
          import { execFileSync } from 'node:child_process';
          import { existsSync, readFileSync, writeFileSync } from 'node:fs';
          import path from 'node:path';
          import { measurePreTopologyFiles } from './scripts/lib/vitest-pre-topology-measurement.mjs';

          const repoRoot = process.cwd();
          const baseSha = process.env.BASE_SHA;
          const changed = execFileSync(
            'git',
            ['diff', '--name-only', '--diff-filter=ACMR', baseSha],
            { encoding: 'utf8' },
          )
            .split(/\r?\n/)
            .map((entry) => entry.trim().replaceAll('\\', '/'))
            .filter((entry) => entry.endsWith('.test.ts') && existsSync(path.join(repoRoot, entry)));
          const files = [...new Set(changed)].sort();
          if (files.length === 0) throw new Error('no changed Vitest files found for runtime refresh');
          const measurements = await measurePreTopologyFiles(repoRoot, files, {
            maxConcurrency: 3,
            timeoutMs: 10 * 60 * 1000,
          });
          const historyPath = path.join(repoRoot, 'scripts', 'vitest-runtime-history.json');
          const history = JSON.parse(readFileSync(historyPath, 'utf8'));
          history.source = 'ci-measured';
          history.dataChangedAt = new Date().toISOString();
          history.files ??= {};
          history.provenance ??= {};
          history.contentSha ??= {};
          history.recentSamples ??= {};
          history.fileChangedAt ??= {};
          for (const file of files) {
            const seconds = Number(measurements[file]);
            if (!Number.isFinite(seconds) || seconds <= 0) {
              throw new Error(`invalid measured runtime for ${file}: ${measurements[file]}`);
            }
            const ms = Math.max(1, Math.round(seconds * 1000));
            history.files[file] = ms;
            history.provenance[file] = 'measured';
            history.contentSha[file] = createHash('sha256').update(readFileSync(path.join(repoRoot, file))).digest('hex');
            const previous = Array.isArray(history.recentSamples[file])
              ? history.recentSamples[file].map(Number).filter((value) => Number.isFinite(value) && value > 0)
              : [];
            history.recentSamples[file] = [...previous.slice(-4), ms];
            history.fileChangedAt[file] = history.dataChangedAt;
          }
          const deleted = execFileSync(
            'git',
            ['diff', '--name-only', '--diff-filter=D', baseSha],
            { encoding: 'utf8' },
          )
            .split(/\r?\n/)
            .map((entry) => entry.trim().replaceAll('\\', '/'))
            .filter((entry) => entry.endsWith('.test.ts'));
          for (const file of deleted) {
            delete history.files[file];
            delete history.provenance[file];
            delete history.contentSha[file];
            delete history.recentSamples[file];
            delete history.fileChangedAt[file];
          }
          writeFileSync(historyPath, `${JSON.stringify(history, null, 2)}\n`, 'utf8');
          console.log(JSON.stringify({ files, measurements }, null, 2));
          NODE
      - name: Validate pack and commit implementation
        run: |
          set -euo pipefail
          npm run typecheck:foundation
          npm run lint:foundation
          npm run check:pwsh-test-growth
          pwsh -NoProfile -File scripts/verify.ps1
          git diff --check
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Complete issue 821 implementation"
      - name: Declare final clean scope
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          npx tsx plugins/ao-task-declaration/bin/declare.ts \
            --issue 821 \
            --declared-paths agent-orchestrator.yaml.example \
            --declared-globs 'docs/ao-spawn-shape.mjs,docs/autonomous-*,docs/orchestrator-claimed-review-run.mjs,docs/orchestrator-recovery-runbook.md,docs/spawn-worktree-grant.mjs,docs/worker-nudge-gate.mjs,docs/issues_drafts/00-architecture-decisions.md,scripts/**,tests/external-output-references/captures/ao-session-id-role-injection/**' \
            --iteration-id issue-821-final-v10 \
            --actor chatgpt-github
          git add -A
          git diff --cached --check
          git commit -m "Declare final issue 821 scope"
      - name: Replace PR branch with clean validated history
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH: agent/issue-821-retire-autonomous-surface
        run: |
          set -euo pipefail
          git push --force-with-lease="refs/heads/${BRANCH}:${EXPECTED_HEAD_SHA}" origin "HEAD:${BRANCH}"
