name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-residual-diagnostic:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 residual test diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply residual fixes, test, and persist
        shell: bash
        run: |
          set +e
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const path = 'scripts/review-start-envelope-ledger-starter-surfaces.json';
          const manifest = JSON.parse(readFileSync(path, 'utf8'));
          manifest.surfaces = manifest.surfaces.filter((row) => row.path !== 'scripts/lib/Invoke-OrchestratorClaimedReviewRun.ps1');
          writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          git show origin/main:scripts/worker-recovery-spawn-argv.test.ts | sed -n '1,251p' > scripts/worker-recovery-spawn-argv.test.ts
          rm -f issue-821-*.txt issue-821-*.json
          npx vitest run \
            scripts/review-start-envelope-ledger.test.ts \
            scripts/worker-recovery-spawn-argv.test.ts \
            --reporter=default > issue-821-residual-test-report.txt 2>&1
          status=$?
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist issue 821 residual test fixes"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$status"
