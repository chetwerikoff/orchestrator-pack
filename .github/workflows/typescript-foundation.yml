name: Temporary issue 830 atomic apply

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-830-apply:
    if: github.head_ref == 'agent/issue-830-gate-framework-core-census'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Apply final implementation and remove bootstrap surfaces
        shell: bash
        run: |
          set -euo pipefail
          echo 'stage=clone'
          git clone --quiet --depth=1 --branch agent/issue-830-gate-framework-core-census "https://x-access-token:${GH_TOKEN}@github.com/chetwerikoff/orchestrator-pack.git" repo
          cd repo
          echo 'stage=decode'
          cat scripts/gate-runner/.issue-830-patch-part-* \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/issue-830-final.patch
          echo 'stage=checksum'
          printf '%s  %s\n' 'a5f7f8587007386351a50a0c07f10c35a5dba1b12c2bba29e535881d1ef39c66' '/tmp/issue-830-final.patch' | sha256sum --check
          echo 'stage=apply'
          git apply --index --whitespace=nowarn /tmp/issue-830-final.patch
          echo 'stage=cleanup'
          rm scripts/gate-runner/.issue-830-patch-part-*
          git fetch --quiet --depth=1 origin main:refs/remotes/origin/main
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git status --short
          echo 'stage=commit'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add Wave A gate framework core and census'
          echo 'stage=push'
          git push --quiet origin HEAD:agent/issue-830-gate-framework-core-census
