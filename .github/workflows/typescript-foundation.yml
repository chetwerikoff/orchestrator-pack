name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  runtime:
    name: TypeScript runtime (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce pinned Node major
        run: npm run check:node-major
      - name: Execute TypeScript without a build artifact
        run: npm run ts:smoke

  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Typecheck without emit
        run: npm run typecheck:foundation

  lint:
    name: TypeScript policy lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce Promise and subprocess policies
        run: npm run lint:foundation

  kernels:
    name: TypeScript kernel tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Run in-process foundation tests
        run: npm run test:foundation

  powershell-child-growth:
    name: PowerShell child-test growth guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce committed PowerShell child-test baseline
        run: npm run check:pwsh-test-growth

  issue-821-diagnose:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 remaining CI diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --include=dev
      - name: Install Pester
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Run diagnostics and persist compact report
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          report=issue-821-remaining-ci-report.txt
          : > "$report"
          overall=0

          run_check() {
            name="$1"
            shift
            tmp="$(mktemp)"
            "$@" >"$tmp" 2>&1
            status=$?
            {
              printf '\n===== %s (exit %s) =====\n' "$name" "$status"
              tail -n 500 "$tmp"
            } >> "$report"
            rm -f "$tmp"
            if (( status != 0 )); then overall=1; fi
          }

          run_check "verify pack" pwsh -NoProfile -File scripts/verify.ps1
          run_check "base typecheck" npx tsc --project tsconfig.base.json --noEmit
          run_check "pester track" pwsh -NoProfile -File scripts/test-all.ps1 -SkipNpm

          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$BASE_SHA" --head "$HEAD_SHA")"
          export GITHUB_OUTPUT=/tmp/issue-821-topology-output.txt
          run_check "heavy topology" node scripts/emit-vitest-heavy-topology.mjs --gha-output
          export OPK_VITEST_TOPOLOGY_PLAN_PATH="$PWD/scripts/vitest-heavy-topology.plan.json"
          if [[ -f "$OPK_VITEST_TOPOLOGY_PLAN_PATH" ]]; then
            run_check "heavy shard 1" pwsh -NoProfile -File scripts/run-vitest-heavy-shard.ps1 -Shard 1
            run_check "heavy shard 2" pwsh -NoProfile -File scripts/run-vitest-heavy-shard.ps1 -Shard 2
          fi

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f issue-821-final-lane-report.txt
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Record remaining issue 821 CI failures"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$overall"
