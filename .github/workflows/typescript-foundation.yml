name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-diagnose-guards:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 guard diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Apply fix, run guards, and persist result
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/worker-nudge-gate.test.ts')
          text = path.read_text(encoding='utf-8')
          old = "import { mkdtempSync, readFileSync, rmSync, writeFileSync } from 'node:fs';"
          new = "import { chmodSync, mkdtempSync, readFileSync, rmSync, writeFileSync } from 'node:fs';"
          if old in text:
              if text.count(old) != 1:
                  raise SystemExit('expected at most one worker nudge fs import')
              path.write_text(text.replace(old, new), encoding='utf-8')
          elif new not in text:
              raise SystemExit('worker nudge fs import has unexpected shape')
          PY

          report=issue-821-final-guard-report.txt
          rm -f issue-821-restored-suite-failure.txt issue-821-transform-output.txt "$report"
          : > "$report"
          overall=0

          run_check() {
            name="$1"
            shift
            tmp="$(mktemp)"
            "$@" >"$tmp" 2>&1
            status=$?
            {
              printf '\n===== %s (exit %s) =====\n' "$name" "$status"
              cat "$tmp"
            } >> "$report"
            rm -f "$tmp"
            if (( status != 0 )); then overall=1; fi
          }

          run_check "review capability guard" pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -ReviewStart
          run_check "boundary capability guard" pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -Boundary
          run_check "claimed review lookup guard" pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          run_check "command runtime bootstrap guard" pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          run_check "typecheck foundation" npm run typecheck:foundation
          run_check "lint foundation" npm run lint:foundation
          run_check "pwsh child growth" npm run check:pwsh-test-growth
          run_check "active retired-reference scan" bash -lc "! git grep -n -E 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|\\.ao/autonomous-real-binaries\\.json' -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' ':!docs/declarations/**' ':!docs/issue_queue_index.md' ':!scripts/reachability-purge.manifest.json' ':!.github/**'"
          run_check "working-tree diff check" git diff --check

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f \
            .github/issue-821-trigger.txt \
            .github/scripts/restore-issue-821-tests.mjs \
            .github/workflows/issue-821-minimal-runner.yml \
            .github/workflows/issue-821-run-test-restore.yml \
            .github/workflows/issue-821-restore-minimal-tests.yml \
            issue-821-gap-closure-report.txt \
            issue-821-worker-main-usage.txt \
            issue-821-minimal-test-restore-report.txt
          if (( overall == 0 )); then rm -f "$report"; fi
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Finalize issue 821 gate migration"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$overall"
