name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-finalize:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 final clean validation
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Finalize, validate, and push clean tree
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash .github/scripts/finalize-issue-821.sh
