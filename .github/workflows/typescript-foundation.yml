name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  runtime:
    name: TypeScript runtime (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce pinned Node major
        run: npm run check:node-major
      - name: Execute TypeScript without a build artifact
        run: npm run ts:smoke

  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Typecheck without emit
        run: npm run typecheck:foundation

  lint:
    name: TypeScript policy lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce Promise and subprocess policies
        run: npm run lint:foundation

  kernels:
    name: TypeScript kernel tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Run in-process foundation tests
        run: npm run test:foundation

  powershell-child-growth:
    name: PowerShell child-test growth guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce committed PowerShell child-test baseline
        run: npm run check:pwsh-test-growth

  contract-mutations:
    name: Contract mutation evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce pinned Node major
        run: npm run check:node-major
      - name: Detect complete mutation surface
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const required = [
            'scripts/pr2-foundation/mutation-runner.ts',
            'scripts/pr2-foundation/mutation-catalog.ts',
            'scripts/pr2-foundation/mutation-semantic-gates.ts',
          ];
          const present = required.filter((file) => fs.existsSync(file));
          const command = pkg.scripts?.['test:contract-mutations'];
          if (!command && present.length > 0) {
            throw new Error(`partial mutation surface without test:contract-mutations: ${present.join(',')}`);
          }
          if (command && present.length !== required.length) {
            throw new Error(`test:contract-mutations without complete mutation surface: ${present.length}/${required.length}`);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `run_evidence=${command ? 'true' : 'false'}\n`);
          console.log(command ? 'complete mutation surface detected' : 'mutation surface absent');
          NODE
      - name: Run external red-green mutation evidence
        if: steps.detect.outputs.run_evidence == 'true'
        run: npm run test:contract-mutations

  issue948-final-evidence-pre:
    name: Issue 948 final evidence pre-receipt
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 955
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      issues: read
    env:
      TARGET_SHA: a6aea8592948eac96dbbd3f4b169ee37b0d7b4d0
      LEGACY_SHA: b967dfe156838039e1d6d137e7064dc9d1b10b4d
    steps:
      - name: Checkout temporary producer
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: carrier
          fetch-depth: 0
      - name: Checkout frozen candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          path: target
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: target/package-lock.json
      - name: Install candidate dependencies
        working-directory: target
        run: npm ci --include=dev
      - name: Install candidate Pester
        working-directory: target
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - name: Produce frozen candidate evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash "$GITHUB_WORKSPACE/carrier/.github/issue-948-final-evidence.sh" pre "$GITHUB_WORKSPACE/target" "$RUNNER_TEMP/issue948-evidence"
      - name: Upload pre-receipt evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-948-pre-receipt-v3
          path: ${{ runner.temp }}/issue948-evidence
          if-no-files-found: warn
          retention-days: 30

  issue948-final-evidence-post:
    name: Issue 948 final evidence post-final
    needs: issue948-final-evidence-pre
    if: github.event_name == 'pull_request' && github.event.pull_request.number == 955 && needs.issue948-final-evidence-pre.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    permissions:
      contents: read
      issues: read
    env:
      TARGET_SHA: a6aea8592948eac96dbbd3f4b169ee37b0d7b4d0
      LEGACY_SHA: b967dfe156838039e1d6d137e7064dc9d1b10b4d
    steps:
      - name: Checkout temporary producer
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: carrier
          fetch-depth: 0
      - name: Checkout frozen candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          path: target
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: target/package-lock.json
      - name: Install candidate dependencies
        working-directory: target
        run: npm ci --include=dev
      - name: Install candidate Pester
        working-directory: target
        shell: pwsh
        run: ./scripts/install-pester-ci.ps1
      - uses: actions/download-artifact@v4
        with:
          name: issue-948-pre-receipt-v3
          path: ${{ runner.temp }}/issue948-evidence
      - name: Verify receipt in fresh frozen checkout
        run: bash "$GITHUB_WORKSPACE/carrier/.github/issue-948-final-evidence.sh" post "$GITHUB_WORKSPACE/target" "$RUNNER_TEMP/issue948-evidence"
      - name: Upload final evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue-948-final-evidence-v3
          path: ${{ runner.temp }}/issue948-evidence
          if-no-files-found: error
          retention-days: 30
