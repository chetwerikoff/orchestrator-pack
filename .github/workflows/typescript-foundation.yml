name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-history-diagnostic:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 history input diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Test resolver, inspect changed list, and persist
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/gh-repo-resolve.test.ts')
          t = p.read_text(encoding='utf-8').replace("AO_AUTONOMOUS_ORCHESTRATOR_SURFACE: '1',", "AO_SESSION_ID: 'opk-orchestrator',")
          p.write_text(t, encoding='utf-8')
          p = Path('scripts/worker-recovery-spawn-argv.test.ts')
          p.write_text(p.read_text(encoding='utf-8').rstrip() + '\n', encoding='utf-8')
          PY
          rm -f issue-821-*.txt issue-821-*.json
          report=issue-821-history-input-report.txt
          : > "$report"

          npx vitest run scripts/gh-repo-resolve.test.ts >> "$report" 2>&1
          test_status=$?
          node --input-type=module <<'NODE' >> "$report" 2>&1
          import { execFileSync } from 'node:child_process';
          import { existsSync } from 'node:fs';
          import { resolve } from 'node:path';
          import { measurePreTopologyFiles } from './scripts/lib/vitest-pre-topology-measurement.mjs';
          const root = process.cwd();
          const changed = execFileSync('git', ['diff', '--name-only', '--diff-filter=AM', 'origin/main', '--', '*.test.ts'], { encoding: 'utf8' }).split('\n').map((s) => s.trim()).filter(Boolean).filter((f) => existsSync(resolve(root, f)));
          console.log(`CHANGED=${JSON.stringify(changed)}`);
          try {
            const measurement = await measurePreTopologyFiles(root, ['scripts/gh-repo-resolve.test.ts'], { maxConcurrency: 1 });
            console.log(`MEASUREMENT=${JSON.stringify(measurement)}`);
          } catch (error) {
            console.log(`MEASUREMENT_ERROR=${error instanceof Error ? error.stack : String(error)}`);
            process.exitCode = 1;
          }
          NODE
          measure_status=$?

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist issue 821 history input diagnostic"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
          if (( test_status != 0 || measure_status != 0 )); then exit 1; fi
