name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-measurement-diagnostic:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 measurement diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Clean accidental scope and diagnose each changed test
        shell: bash
        run: |
          set +e
          git checkout origin/main -- \
            plugins/ao-codex-pr-reviewer/bin/review.ts \
            plugins/ao-scope-guard/bin/agent-wrap.ts \
            plugins/ao-scope-guard/bin/scope-check.ts \
            plugins/ao-task-declaration/bin/declare.ts \
            plugins/ao-token-chain-ledger/bin/ledger.mjs \
            scripts/lib/derive-gh-repo-from-checkout.mjs \
            scripts/gh-repo-resolve.test.ts \
            scripts/reachability-purge.manifest.json \
            scripts/reachability-purge.mjs \
            scripts/reachability-purge.test.ts \
            scripts/vitest-heavy-topology.plan.json \
            tests/external-output-references/autonomous-review-worktree-e2e-smoke/isolated-smoke-redacted.json \
            tests/external-output-references/captures/spawn-worktree-branch-operand-binding/integration-spawn-561-feat-issue-561.raw.txt \
            tests/external-output-references/review-pipeline-spawn-budget/capture-wrapped-positive-covered-clean.json \
            tests/external-output-references/review-pipeline-spawn-budget/capture-wrapped-positive-uncovered-ready.json \
            tests/external-output-references/review-pipeline-spawn-budget/reduced-post-change.capture.json \
            tests/external-output-references/review-pipeline-spawn-budget/storm-baseline.capture.json
          git rm -f --ignore-unmatch .local/state/gh/device-id issue-821-*.txt
          python - <<'PY'
          from pathlib import Path
          p = Path('scripts/_resolve-pwsh.sh')
          t = p.read_text(encoding='utf-8').replace('[[ "${AO_SESSION_ID:-}" == "1" ]] && trusted_only=1', '[[ -n "${AO_SESSION_ID:-}" ]] && trusted_only=1')
          p.write_text(t, encoding='utf-8')
          p = Path('docs/orchestrator-recovery-runbook.md')
          t = p.read_text(encoding='utf-8').replace('`scripts/autonomous-session-gates.test.ts` covers the AO 0.10.2 role matrix', '`scripts/autonomous-orchestrator-boundary.test.ts` covers the AO 0.10.2 role matrix')
          p.write_text(t, encoding='utf-8')
          PY
          npm run lint:foundation -- --write-baseline >/dev/null 2>&1
          npm run check:pwsh-test-growth -- --write-baseline >/dev/null 2>&1

          node --input-type=module <<'NODE'
          import { execFileSync } from 'node:child_process';
          import { existsSync, writeFileSync } from 'node:fs';
          import { resolve } from 'node:path';
          import { measurePreTopologyFiles } from './scripts/lib/vitest-pre-topology-measurement.mjs';

          const root = process.cwd();
          const changed = execFileSync('git', ['diff', '--name-only', '--diff-filter=AM', 'origin/main', '--', '*.test.ts'], { encoding: 'utf8' })
            .split('\n').map((s) => s.trim()).filter(Boolean).filter((f) => existsSync(resolve(root, f)));
          const report = [];
          let cursor = 0;
          const worker = async () => {
            while (true) {
              const index = cursor++;
              if (index >= changed.length) return;
              const file = changed[index];
              try {
                const measured = await measurePreTopologyFiles(root, [file], { maxConcurrency: 1 });
                report[index] = { file, ok: true, seconds: measured[file] };
              } catch (error) {
                report[index] = { file, ok: false, error: error instanceof Error ? `${error.message}\n${error.stack ?? ''}` : String(error) };
              }
            }
          };
          await Promise.all(Array.from({ length: Math.min(4, Math.max(1, changed.length)) }, () => worker()));
          writeFileSync('issue-821-measurement-report.json', `${JSON.stringify({ changed, report }, null, 2)}\n`);
          console.log(JSON.stringify(report.map(({ file, ok, seconds }) => ({ file, ok, seconds })), null, 2));
          if (report.some((entry) => !entry?.ok)) process.exitCode = 1;
          NODE
          measure_status=$?

          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Persist cleaned issue 821 measurement diagnostic"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
          exit "$measure_status"
