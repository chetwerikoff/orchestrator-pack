name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-tree-mode-cleanup:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 tree mode cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - name: Rewrite index entries with main modes
        shell: bash
        run: |
          set -euo pipefail
          git config core.filemode true
          files=(
            plugins/ao-codex-pr-reviewer/bin/review.ts
            plugins/ao-scope-guard/bin/agent-wrap.ts
            plugins/ao-scope-guard/bin/scope-check.ts
            plugins/ao-task-declaration/bin/declare.ts
            plugins/ao-token-chain-ledger/bin/ledger.mjs
          )
          for file in "${files[@]}"; do
            main_mode=$(git ls-tree origin/main -- "$file" | awk '{print $1}')
            current_blob=$(git rev-parse "HEAD:$file")
            test -n "$main_mode"
            git update-index --cacheinfo "$main_mode,$current_blob,$file"
          done
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add .github/workflows/typescript-foundation.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Normalize plugin tree modes"
          git push --force origin HEAD:agent/issue-821-retire-autonomous-surface
