name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  runtime:
    name: TypeScript runtime (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce pinned Node major
        run: npm run check:node-major
      - name: Execute TypeScript without a build artifact
        run: npm run ts:smoke

  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Typecheck without emit
        run: npm run typecheck:foundation

  lint:
    name: TypeScript policy lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce Promise and subprocess policies
        run: npm run lint:foundation

  kernels:
    name: TypeScript kernel tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Run in-process foundation tests
        run: npm run test:foundation

  powershell-child-growth:
    name: PowerShell child-test growth guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce committed PowerShell child-test baseline
        run: npm run check:pwsh-test-growth

  issue-830-apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-830-gate-framework-core-census'
    name: Apply issue 830 implementation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-830-gate-framework-core-census
          fetch-depth: 0
      - name: Apply final implementation and remove bootstrap surfaces
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/gate-runner/.issue-830-patch-part-* \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/issue-830-final.patch
          printf '%s  %s\n' 'a5f7f8587007386351a50a0c07f10c35a5dba1b12c2bba29e535881d1ef39c66' '/tmp/issue-830-final.patch' | sha256sum --check
          git apply --index --whitespace=nowarn /tmp/issue-830-final.patch
          rm scripts/gate-runner/.issue-830-patch-part-*
          git fetch origin main
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Add Wave A gate framework core and census'
          git push origin HEAD:agent/issue-830-gate-framework-core-census
