name: TypeScript foundation

on:
  pull_request:

permissions:
  contents: write

jobs:
  issue-821-finalize:
    if: github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 final full-scope validation
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --include=dev
      - name: Complete reachability handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          purge_path = Path('scripts/reachability-purge.mjs')
          purge = purge_path.read_text(encoding='utf-8')
          old = "  'scripts/lib/Invoke-OrchestratorClaimedReviewRun.ps1',\n];"
          new = "  'scripts/lib/Invoke-OrchestratorClaimedReviewRun.ps1',\n  'scripts/lib/derive-gh-repo-from-checkout.mjs',\n];"
          if old not in purge and new not in purge:
              raise SystemExit('external deletion list has unexpected shape')
          if old in purge:
              purge = purge.replace(old, new, 1)

          old = """    inboundTrustedEdges: trusted.filter((edge) => edge.target === shim),
    protectedTestReferences: literalReferences.filter((ref) => ref.target === shim && protectedTests.includes(ref.source)),
  }));"""
          new = """    inboundTrustedEdges: trusted.filter((edge) => edge.target === shim),
    externalInboundTrustedEdges: trusted.filter(
      (edge) => edge.target === shim && edge.source !== SCRIPT_REL && edge.source !== 'scripts/reachability-purge.test.ts',
    ),
    protectedTestReferences: literalReferences.filter((ref) => ref.target === shim && protectedTests.includes(ref.source)),
  }));"""
          if old not in purge and new not in purge:
              raise SystemExit('retired shim audit row has unexpected shape')
          if old in purge:
              purge = purge.replace(old, new, 1)

          old = ".filter((row) => row.deletedInCurrentTree && row.inboundTrustedEdges.length > 0)"
          new = ".filter((row) => row.deletedInCurrentTree && row.externalInboundTrustedEdges.length > 0)"
          if old not in purge and new not in purge:
              raise SystemExit('shim completion blocker has unexpected shape')
          purge = purge.replace(old, new, 1)
          purge = purge.replace(
              'a node reached by a live inbound edge from a tracked consumer must be held',
              'a node reached by an external live inbound edge from a tracked consumer must be held',
              1,
          )
          purge_path.write_text(purge, encoding='utf-8')

          test_path = Path('scripts/reachability-purge.test.ts')
          test = test_path.read_text(encoding='utf-8')
          old = "    inboundTrustedEdges: unknown[];\n  }>;"
          new = "    inboundTrustedEdges: unknown[];\n    externalInboundTrustedEdges: unknown[];\n  }>;"
          if old not in test and new not in test:
              raise SystemExit('reachability interface has unexpected shape')
          if old in test:
              test = test.replace(old, new, 1)
          test = test.replace('toHaveLength(12)', 'toHaveLength(13)', 1)
          test = test.replace(
              'row.inboundTrustedEdges.length === 0',
              'row.externalInboundTrustedEdges.length === 0',
              1,
          )
          test_path.write_text(test, encoding='utf-8')
          PY

          rm -f scripts/lib/derive-gh-repo-from-checkout.mjs
          rm -f issue-821-*.txt .vitest-runtime-report-light.json scripts/vitest-heavy-topology.plan.json
          node scripts/reachability-purge.mjs --write
          npm run lint:foundation -- --write-baseline
          npm run check:pwsh-test-growth -- --write-baseline
      - name: Run full-scope lanes
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          OPK_VITEST_PR_SCOPE_MODE: ${{ vars.OPK_VITEST_PR_SCOPE_MODE }}
        run: |
          node scripts/reachability-purge.mjs
          npx vitest run scripts/reachability-purge.test.ts scripts/review-start-scoped-gh-json-capture.test.ts
          npx tsc --project tsconfig.base.json --noEmit
          pwsh -NoProfile -File scripts/run-vitest-light-lane.ps1
          export OPK_CHANGED_VITEST_FILES="$(node scripts/emit-pr-changed-paths-manifest.mjs --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA")"
          node scripts/emit-vitest-heavy-topology.mjs --gha-output
      - name: Run issue regression matrix and guards
        shell: bash
        run: |
          npx vitest run \
            scripts/autonomous-orchestrator-boundary.test.ts \
            scripts/autonomous-spawn-policy.test.ts \
            scripts/worker-nudge-gate.test.ts \
            scripts/spawn-worktree-grant-finalization.test.ts \
            scripts/orchestrator-claimed-review-run.test.ts \
            scripts/autonomous-spawn-worktree-gate.test.ts \
            scripts/orchestrator-review-start-preflight-audit.test.ts \
            scripts/review-start-envelope-external-io.test.ts \
            scripts/review-start-scoped-gh-json-capture.test.ts
          pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -ReviewStart
          pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -Boundary
          pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          npm run typecheck:foundation
          npm run lint:foundation
          npm run check:pwsh-test-growth
          ! git grep -n -E 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|\.ao/autonomous-real-binaries\.json' -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' ':!docs/declarations/**' ':!docs/issue_queue_index.md' ':!scripts/reachability-purge.manifest.json' ':!.github/**'
          git diff --check
      - name: Commit validated result and restore workflow
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f \
            .github/issue-821-trigger.txt \
            .github/issue-821-final-ci-trigger.txt \
            .github/scripts/issue-821-finalize.mjs \
            .github/scripts/restore-issue-821-tests.mjs \
            .github/workflows/issue-821-minimal-runner.yml \
            .github/workflows/issue-821-run-test-restore.yml \
            .github/workflows/issue-821-restore-minimal-tests.yml \
            issue-821-*.txt \
            .vitest-runtime-report-light.json \
            scripts/vitest-heavy-topology.plan.json
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Finalize issue 821 reachability handoff"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
