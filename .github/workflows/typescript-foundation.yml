name: TypeScript foundation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  runtime:
    name: TypeScript runtime (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce pinned Node major
        run: npm run check:node-major
      - name: Execute TypeScript without a build artifact
        run: npm run ts:smoke

  typecheck:
    name: TypeScript strict typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Typecheck without emit
        run: npm run typecheck:foundation

  lint:
    name: TypeScript policy lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce Promise and subprocess policies
        run: npm run lint:foundation

  kernels:
    name: TypeScript kernel tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Run in-process foundation tests
        run: npm run test:foundation

  powershell-child-growth:
    name: PowerShell child-test growth guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PR_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Enforce committed PowerShell child-test baseline
        run: npm run check:pwsh-test-growth

  issue-821-finalize:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/issue-821-retire-autonomous-surface'
    name: Issue 821 final validation
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-821-retire-autonomous-surface
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install from frozen lockfile
        run: npm ci --include=dev
      - name: Restore required test import and clean diagnostics
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/worker-nudge-gate.test.ts')
          text = path.read_text(encoding='utf-8')
          old = "import { mkdtempSync, readFileSync, rmSync, writeFileSync } from 'node:fs';"
          new = "import { chmodSync, mkdtempSync, readFileSync, rmSync, writeFileSync } from 'node:fs';"
          if text.count(old) != 1:
              raise SystemExit('expected exactly one worker nudge fs import')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -f issue-821-*.txt
      - name: Run affected tests
        run: |
          npx vitest run \
            scripts/autonomous-orchestrator-boundary.test.ts \
            scripts/autonomous-spawn-policy.test.ts \
            scripts/worker-nudge-gate.test.ts \
            scripts/spawn-worktree-grant-finalization.test.ts \
            scripts/orchestrator-claimed-review-run.test.ts \
            scripts/autonomous-spawn-worktree-gate.test.ts \
            scripts/orchestrator-review-start-preflight-audit.test.ts \
            scripts/review-start-envelope-external-io.test.ts
      - name: Run issue 821 guards
        shell: bash
        run: |
          pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -ReviewStart
          pwsh -NoProfile -File scripts/check-autonomous-capabilities.ps1 -Boundary
          pwsh -NoProfile -File scripts/check-orchestrator-claimed-review-run.ps1
          pwsh -NoProfile -File scripts/check-command-runtime-bootstrap.ps1
          npm run typecheck:foundation
          npm run lint:foundation
          npm run check:pwsh-test-growth
          ! git grep -n -E 'AO_AUTONOMOUS_ORCHESTRATOR_SURFACE|\.ao/autonomous-real-binaries\.json' -- ':!docs/issues_drafts/**' ':!docs/migration_notes.md' ':!docs/declarations/**' ':!docs/issue_queue_index.md' ':!scripts/reachability-purge.manifest.json' ':!.github/**'
          git diff --check
      - name: Commit validated result and restore workflow
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/typescript-foundation.yml
          rm -f \
            .github/issue-821-trigger.txt \
            .github/scripts/restore-issue-821-tests.mjs \
            .github/workflows/issue-821-minimal-runner.yml \
            .github/workflows/issue-821-run-test-restore.yml \
            .github/workflows/issue-821-restore-minimal-tests.yml \
            issue-821-*.txt
          git add -A
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Finalize issue 821 gate migration"
          git push origin HEAD:agent/issue-821-retire-autonomous-surface
