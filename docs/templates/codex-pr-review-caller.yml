name: pr-review
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  issues: read
  pull-requests: write
jobs:
  codex-review:
    uses: chetwerikoff/orchestrator-pack/.github/workflows/codex-pr-review.yml@main
    with:
      pack_ref: main
    secrets:
      codex_auth_json: ${{ secrets.CODEX_AUTH_JSON }}
